<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>暗影幸存者 - Shadow Survivors</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a0f;touch-action:none;-webkit-touch-callout:none;user-select:none;font-family:"Microsoft YaHei",sans-serif}
#canvas{display:block;width:100vw;height:100vh}
/* TOP BAR */
.ui-top{position:fixed;top:8px;left:8px;right:8px;z-index:10;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;pointer-events:none;flex-wrap:wrap}
.ui-top>*{pointer-events:auto}
.panel{background:rgba(10,10,20,.88);color:#ddd;padding:6px 10px;border-radius:8px;font:12px "Microsoft YaHei",sans-serif;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.1)}
.top-btns{display:flex;gap:5px;pointer-events:auto}
.top-btns button{background:rgba(10,10,20,.88);color:#ccc;border:1px solid rgba(255,255,255,.15);padding:6px 10px;border-radius:6px;font:12px "Microsoft YaHei",sans-serif;cursor:pointer;transition:.2s}
.top-btns button:hover{background:rgba(200,150,255,.2);border-color:#c49bff;color:#fff}
/* BARS */
.bars-panel{position:fixed;left:8px;top:72px;z-index:10;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.bar-line{display:flex;align-items:center;gap:6px}
.bar-outer{width:min(200px,30vw);height:14px;background:#1a1a2e;border-radius:7px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.bar-inner{height:100%;transition:width .15s}
.bar-hp{background:linear-gradient(90deg,#e74c3c,#e67e22)}
.bar-exp{background:linear-gradient(90deg,#2ecc71,#27ae60)}
.bar-label{color:#aaa;font:11px "Microsoft YaHei",sans-serif;width:42px}
.bar-val{color:#fff;font:11px "Microsoft YaHei",sans-serif;min-width:55px}
/* BOSS BAR */
.boss-bar{position:fixed;top:8px;left:50%;transform:translateX(-50%);width:min(380px,70vw);height:18px;background:#1a1a2e;border-radius:9px;overflow:hidden;z-index:10;display:none;border:1px solid rgba(155,89,245,.3)}
.boss-hp{background:linear-gradient(90deg,#9b59b6,#e74c9b);height:100%;transition:width .1s}
/* COMBO */
.combo-display{position:fixed;top:50%;right:16px;transform:translateY(-50%);z-index:10;text-align:right;pointer-events:none}
.combo-num{font:bold 42px "Microsoft YaHei",sans-serif;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,.6);opacity:0;transition:opacity .2s}
.combo-label{font:14px "Microsoft YaHei",sans-serif;color:#ffa502;opacity:0;transition:opacity .2s}
/* SETTINGS PANEL */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:997;display:none;justify-content:center;align-items:center}
.settings-overlay.show{display:flex}
.settings-panel{background:#12122a;border:1px solid rgba(200,150,255,.3);border-radius:14px;padding:20px 24px;color:#ddd;min-width:300px;max-width:90vw;font:13px "Microsoft YaHei",sans-serif}
.settings-panel h3{color:#c49bff;font-size:18px;margin-bottom:14px;text-align:center}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;gap:12px}
.setting-row label{color:#ccc;white-space:nowrap}
.setting-row input[type=range]{flex:1;accent-color:#c49bff;max-width:140px}
.setting-row input[type=checkbox]{accent-color:#c49bff;width:18px;height:18px}
.settings-panel button{margin-top:14px;width:100%;padding:8px;background:#c49bff;border:none;border-radius:8px;color:#fff;font:bold 14px "Microsoft YaHei",sans-serif;cursor:pointer}
.settings-panel button:hover{box-shadow:0 0 16px rgba(150,100,255,.4)}
/* PAUSE OVERLAY */
.pause-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:996;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.pause-overlay.show{display:flex}
.pause-overlay h3{color:#fff;font:bold 36px "Microsoft YaHei",sans-serif;letter-spacing:4px}
.pause-overlay button{padding:12px 48px;border:1px solid rgba(200,150,255,.4);border-radius:10px;background:rgba(200,150,255,.12);color:#ddd;font:bold 16px "Microsoft YaHei",sans-serif;cursor:pointer;min-width:180px;transition:.2s}
.pause-overlay button:hover{background:rgba(200,150,255,.25);border-color:#c49bff;color:#fff}
/* MAIN MENU */
.menu{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(10,10,30,.94) 0%,rgba(0,0,0,.98) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:20px}
.menu h1{font:bold 48px "Microsoft YaHei",sans-serif;color:#fff;text-shadow:0 0 40px rgba(150,100,255,.5);letter-spacing:6px}
.menu .sub{color:#888;font:15px "Microsoft YaHei",sans-serif;margin-top:-10px}
.chars{display:grid;grid-template-columns:repeat(auto-fit,160px);gap:12px;max-width:700px;padding:0 16px}
.char{border:2px solid rgba(255,255,255,.12);border-radius:14px;padding:16px 10px;text-align:center;cursor:pointer;transition:.2s;background:rgba(255,255,255,.03)}
.char:hover{border-color:rgba(200,150,255,.6);background:rgba(200,150,255,.06);transform:translateY(-2px)}
.char.selected{border-color:#c49bff;background:rgba(200,150,255,.12);box-shadow:0 0 20px rgba(150,100,255,.15)}
.char-icon{font-size:44px;display:block;margin-bottom:6px}
.char-name{color:#fff;font:bold 15px "Microsoft YaHei",sans-serif}
.char-desc{color:#888;font:11px "Microsoft YaHei",sans-serif;margin-top:2px}
.char-weapon{color:#c49bff;font:10px "Microsoft YaHei",sans-serif;margin-top:2px}
.diff-row{display:flex;gap:8px}
.diff-btn{padding:8px 18px;border:1px solid rgba(255,255,255,.2);border-radius:8px;background:rgba(255,255,255,.04);color:#aaa;cursor:pointer;font:13px "Microsoft YaHei",sans-serif;transition:.2s}
.diff-btn.active{background:rgba(200,150,255,.2);border-color:#c49bff;color:#fff}
.start-btn{padding:12px 60px;background:linear-gradient(135deg,#8e44ad,#c49bff);border:none;border-radius:10px;color:#fff;font:bold 18px "Microsoft YaHei",sans-serif;cursor:pointer;transition:.2s;letter-spacing:4px}
.start-btn:hover{transform:scale(1.04);box-shadow:0 0 30px rgba(150,100,255,.4)}
/* UPGRADE PANEL */
.upgrade-panel{position:fixed;right:8px;bottom:8px;z-index:10;background:rgba(10,10,20,.9);border-radius:10px;padding:10px 14px;border:1px solid rgba(200,150,255,.2);color:#ddd;font:12px "Microsoft YaHei",sans-serif;backdrop-filter:blur(4px);max-height:60vh;overflow-y:auto;display:none}
.upgrade-panel h3{color:#c49bff;margin-bottom:2px;font-size:14px}
.upgrade-panel .gold-hint{color:#888;font-size:10px;margin-bottom:6px}
.upgrade-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:4px 0}
.upgrade-btn{padding:3px 10px;border:1px solid rgba(200,150,255,.4);border-radius:5px;background:rgba(200,150,255,.1);color:#c49bff;cursor:pointer;font:11px "Microsoft YaHei",sans-serif;white-space:nowrap;transition:.2s}
.upgrade-btn:hover:not(:disabled){background:rgba(200,150,255,.25)}
.upgrade-btn:disabled{opacity:.3;cursor:not-allowed}
.gold{color:#ffd700;font-weight:bold}
/* GAME OVER */
.over-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:998;gap:12px}
.over-overlay h2{font:bold 48px "Microsoft YaHei",sans-serif;color:#e74c3c;text-shadow:0 0 30px rgba(231,76,60,.5)}
.over-overlay .gold-breakdown{color:#ffd700;font:14px "Microsoft YaHei",sans-serif;text-align:center;line-height:2}
.over-stats{color:#ccc;font:16px "Microsoft YaHei",sans-serif;text-align:center}
.over-stats span{color:#ffd700}
.over-btn{padding:10px 36px;background:#c49bff;border:none;border-radius:8px;color:#fff;font:bold 16px "Microsoft YaHei",sans-serif;cursor:pointer;transition:.2s}
.over-btn:hover{box-shadow:0 0 20px rgba(150,100,255,.5)}
/* TOAST */
.toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(10,10,20,.9);border:1px solid var(--accent,#c49bff);color:#c49bff;padding:10px 24px;border-radius:8px;font:14px "Microsoft YaHei",sans-serif;z-index:1000;pointer-events:none}
/* SPONSOR */
.sponsor-card{text-align:center;padding:12px 16px;background:linear-gradient(135deg,rgba(200,150,255,.08) 0%,rgba(200,150,255,.02) 100%);border:1px solid rgba(200,150,255,.2);border-radius:8px;margin-top:4px}
.sponsor-card .sponsor-text{font-size:12px;color:#999;line-height:1.6;margin-bottom:6px}
.sponsor-card .sponsor-btn{display:inline-block;padding:7px 22px;background:rgba(200,150,255,.15);border:1px solid #c49bff;color:#c49bff;border-radius:6px;font-family:"Microsoft YaHei",sans-serif;font-size:13px;text-decoration:none;cursor:pointer;transition:all .25s;letter-spacing:2px}
.sponsor-card .sponsor-btn:hover{background:#c49bff;color:#0a0a12}
.sponsor-corner{position:fixed;bottom:10px;left:10px;z-index:10;pointer-events:auto}
.sponsor-corner a{color:#999;font:11px "Microsoft YaHei",sans-serif;text-decoration:none;padding:5px 10px;background:rgba(10,10,20,.75);border:1px solid rgba(255,255,255,.1);border-radius:5px;transition:.2s}
.sponsor-corner a:hover{color:#c49bff;border-color:#c49bff}
@media(max-width:768px){
  .menu h1{font-size:28px}
  .char{width:140px;padding:10px 6px}
  .char-icon{font-size:32px}
  .char-name{font-size:13px}
  .bar-outer{width:25vw}
  .top-btns button{padding:8px 8px;font:13px "Microsoft YaHei",sans-serif;min-width:32px;min-height:32px}
  .panel{font:11px "Microsoft YaHei",sans-serif;padding:5px 7px}
  .ui-top{top:4px;left:4px;right:4px;gap:4px}
  .bars-panel{left:4px;top:52px}
  .char{min-height:120px}
  .sponsor-corner a{font:12px "Microsoft YaHei",sans-serif;padding:8px 14px}
  .sponsor-corner{bottom:8px;left:8px}
  .upgrade-panel{right:4px;bottom:4px;padding:8px 10px;font:11px "Microsoft YaHei",sans-serif;max-width:55vw}
  .upgrade-btn{padding:5px 12px;font:13px "Microsoft YaHei",sans-serif}
  .pause-overlay button{padding:14px 32px;font:bold 18px "Microsoft YaHei",sans-serif}
  .over-btn{padding:12px 28px;font:bold 18px "Microsoft YaHei",sans-serif}
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ui-top">
  <div class="panel" id="ui"></div>
  <div class="top-btns">
    <button id="goldRun" style="color:#ffd700;pointer-events:none" disabled>💰0</button>
    <button id="speedBtn">1X</button>

</div>

  <div class="bar-line"><span class="bar-label">经验</span><div class="bar-outer"><div class="bar-inner bar-exp" id="expBar"></div></div><span class="bar-val" id="expText">0/200</span></div>
</div>

<div class="boss-bar" id="bossBar"><div class="boss-hp" id="bossHp"></div></div>

<!-- SETTINGS -->

</div>

<!-- UPGRADE -->
<div class="upgrade-panel" id="upgradePanel">

  <div style="color:#ffd700;margin-bottom:2px">💰 <span id="goldDisplay">0</span></div>
  <div class="gold-hint">📌 金币通过击杀敌人和击败Boss获得</div>

</div>

<!-- MAIN MENU -->
<div class="menu" id="menu">
  <h1>暗影幸存者</h1>
  <div class="sub">SHADOW SURVIVORS</div>
  <div class="chars" id="charList"></div>
  <div class="diff-row" id="diffRow"></div>
  <button class="start-btn" id="startBtn">开始战斗</button>
  <div style="color:#888;font:12px 'Microsoft YaHei',sans-serif">WASD / 方向键移动 | 空格闪避 | ESC暂停</div>

    <div class="sponsor-text">如果喜欢这个游戏，欢迎支持作者持续创作 ✦</div>

  </div>
</div>

<script>
// ===== AUDIO ENGINE =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
const masterGain = audioCtx.createGain(); masterGain.gain.value = 0.3; masterGain.connect(audioCtx.destination);
let bgmGain = null, bgmPlaying = false, sfxVol = 0.3, bgmVol = 0.04;

function playSound(freq, type='square', dur=0.08, vol=0.12, slide=0) {
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  if (slide) osc.frequency.linearRampToValueAtTime(freq+slide, t+dur);
  gain.gain.setValueAtTime(vol*sfxVol*3.3, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t+dur);
  osc.connect(gain); gain.connect(masterGain);
  osc.start(t); osc.stop(t+dur);
}
function sfxHit() { playSound(200,'square',0.06,0.1) }
function sfxPickup() { playSound(880,'sine',0.12,0.08,400) }
function sfxLevel() { [523,659,784].forEach((f,i)=>playSound(f,'sine',0.12,0.1,0)) }
function sfxBoss() { playSound(60,'sawtooth',0.4,0.15) }
function sfxCombo() { playSound(1200,'triangle',0.1,0.06) }
function sfxExplosion() { playSound(40,'sawtooth',0.3,0.18,-20) }
function sfxGold() { playSound(1200,'sine',0.08,0.06,600) }

function startBGM() {
  if (bgmPlaying) return; bgmPlaying = true;
  bgmGain = audioCtx.createGain();
  bgmGain.gain.value = bgmVol;
  bgmGain.connect(masterGain);
  const notes = [65.4, 82.4, 98, 73.4];
  let i = 0;
  function loop() {
    if (!bgmPlaying) return;
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = notes[i % 4];
    g.gain.setValueAtTime(0.025, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.8);
    osc.connect(g); g.connect(bgmGain);
    osc.start(t); osc.stop(t+0.8);
    i++;
    setTimeout(loop, 900);
  }
  loop();
}
function stopBGM() { bgmPlaying = false; if (bgmGain) { bgmGain.disconnect(); bgmGain = null; } }
function toggleMusic() {
  if (bgmPlaying) { stopBGM(); document.getElementById('musicBtn').textContent = '🔇'; }
  else { startBGM(); document.getElementById('musicBtn').textContent = '🔊'; }
}

// ===== SETTINGS =====
let settings = { bgmVol:40, sfxVol:30, showDmg:true, showShake:true, lowEnd:false };
function loadSettings() {
  try { const d = JSON.parse(localStorage.getItem('shadowSettings')); if (d) Object.assign(settings, d); } catch(e) {}
}
function saveSettings() {
  localStorage.setItem('shadowSettings', JSON.stringify(settings));
  bgmVol = settings.bgmVol / 2500;
  sfxVol = settings.sfxVol / 100;
  if (masterGain) masterGain.gain.value = settings.sfxVol / 100 * 0.3 + 0.1;
  if (bgmGain) bgmGain.gain.value = bgmVol;
  document.getElementById('bgmVol').value = settings.bgmVol;
  document.getElementById('sfxVol').value = settings.sfxVol;
  document.getElementById('showDmg').checked = settings.showDmg;
  document.getElementById('showShake').checked = settings.showShake;
  document.getElementById('lowEnd').checked = settings.lowEnd;
}
loadSettings();
document.getElementById('bgmVol').oninput = function() { settings.bgmVol = +this.value; saveSettings(); };
document.getElementById('sfxVol').oninput = function() { settings.sfxVol = +this.value; saveSettings(); };
document.getElementById('showDmg').onchange = function() { settings.showDmg = this.checked; saveSettings(); };
document.getElementById('showShake').onchange = function() { settings.showShake = this.checked; saveSettings(); };
document.getElementById('lowEnd').onchange = function() { settings.lowEnd = this.checked; saveSettings(); };

document.getElementById('settingsBtn').onclick = () => document.getElementById('settingsOverlay').classList.add('show');
document.getElementById('settingsClose').onclick = () => document.getElementById('settingsOverlay').classList.remove('show');

// ===== CONSTANTS =====
const DIFF_NAMES = ['简单','普通','地狱','噩梦'];
const DIFF_MULT = [0.65, 1, 1.7, 2.5];

const HEROES = [
  { id:'blade', name:'剑舞者', icon:'⚔️', desc:'高速低血 近战专精', weapon:'旋转飞刃', color:'#00d4ff',
    hp:80, speed:6, dmg:3, blades:4, range:55, atkSp:0.14 },
  { id:'flame', name:'烈焰法师', icon:'🔥', desc:'慢速高伤 范围灼烧', weapon:'火焰脉冲', color:'#ff6b35',
    hp:110, speed:3.8, dmg:6, blades:2, range:80, atkSp:0.06 },
  { id:'storm', name:'疾风射手', icon:'🏹', desc:'远程弹幕 自动索敌', weapon:'追踪箭矢', color:'#7eff5e',
    hp:90, speed:4.8, dmg:2.5, blades:3, range:130, atkSp:0.09 },
  { id:'shadow', name:'影刃刺客', icon:'🗡️', desc:'冲刺位移 连锁闪电', weapon:'连锁雷击', color:'#c49bff',
    hp:85, speed:5.5, dmg:3.5, blades:3, range:70, atkSp:0.1 },
];

// ===== GAME STATE =====
const G = {
  w:0, h:0, ctx:null, over:false, counting:false, started:false, paused:false, speed:1, speedIdx:0,
  speeds:[1,2,4], diff:1, score:0, level:1, needScore:300,
  enemies:[], props:[], exps:[], texts:[], particles:[], grass:[],
  projectiles:[], dmgTexts:[], goldDrops:[], waveEffects:[],
  boss:null, hasBoss:false, keys:{},
  isMobile:false, joystick:{active:false,baseX:0,baseY:0,dx:0,dy:0},
  combo:0, comboTimer:0, comboMax:0,
  gold:0, runGold:0, upgrades:{hp:0, atk:0, spd:0, blades:0, xp:0},
  shakeX:0, shakeY:0, shakeDur:0, frame:0,
};

const P = {
  x:0, y:0, hero:null,
  hp:100, maxHp:100,
  level:1, exp:0, needExp:200,
  blades:3, maxBlades:12, range:60, atkSp:0.12, dmg:2, speed:5,
  angle:0, shield:false, shieldTimer:0, hurtCD:0, hurtThisFrame:false,
  weapons:[], dashCD:0, speedTimer:0, origSpeed:0,
};

// ===== META PROGRESSION =====
function loadMeta() {
  try { const d = JSON.parse(localStorage.getItem('shadowSurvivors')||'{}'); G.gold = d.gold||0; G.upgrades = d.upgrades||{hp:0,atk:0,spd:0,blades:0,xp:0}; } catch(e) {}
}
function saveMeta() { localStorage.setItem('shadowSurvivors', JSON.stringify({gold:G.gold, upgrades:G.upgrades})); }
loadMeta();

// ===== PLAYER ID & REFERRAL =====
function getPlayerId() {
  let id = localStorage.getItem('shadowPid');
  if (!id) { id = 's'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); localStorage.setItem('shadowPid', id); }
  return id;
}
const PLAYER_ID = getPlayerId();

// Check for referral
(function checkReferral() {
  const m = location.search.match(/[?&]ref=([^&]+)/);

        setTimeout(() => t.remove(), 2500);

  }
})();

// ===== PERSONAL BESTS =====
function loadBests() {
  try { return JSON.parse(localStorage.getItem('shadowBests')||'{}'); } catch(e) { return {}; }
}
function saveBests(b) { localStorage.setItem('shadowBests', JSON.stringify(b)); }

function updateBests() {
  const b = loadBests();
  let broken = [];
  if (!b.bestCombo || G.comboMax > b.bestCombo) { b.bestCombo = G.comboMax; broken.push('最高连击'); }
  if (!b.bestScore || G.score > b.bestScore) { b.bestScore = G.score; broken.push('最高分数'); }
  if (!b.bestLevel || P.level > b.bestLevel) { b.bestLevel = P.level; broken.push('最高等级'); }
  if (!b.bestGold || G.runGold > b.bestGold) { b.bestGold = G.runGold; broken.push('单局金币'); }
  if (!b.bestStage || G.level > b.bestStage) { b.bestStage = G.level; broken.push('最高关卡'); }
  b.totalGames = (b.totalGames||0) + 1;
  b.totalKills = (b.totalKills||0) + G.score;
  saveBests(b);
  return { bests: b, broken };
}

const UPGRADE_COSTS = { hp:[10,25,50,85,130], atk:[10,25,50,85,130], spd:[10,25,50,85,130], blades:[15,35,65,110], xp:[8,20,40,70,110] };
const UPGRADE_NAMES = { hp:'最大生命', atk:'攻击力', spd:'移动速度', blades:'初始飞刀', xp:'经验获取' };
const UPGRADE_MAX = { hp:5, atk:5, spd:5, blades:4, xp:5 };

function buyUpgrade(type) {
  const lv = G.upgrades[type];
  if (lv >= UPGRADE_MAX[type]) return;
  const cost = UPGRADE_COSTS[type][lv];
  if (G.gold < cost) return;
  G.gold -= cost;
  G.upgrades[type]++;
  saveMeta();
  renderUpgradePanel();
}
function renderUpgradePanel() {
  document.getElementById('goldDisplay').textContent = G.gold;
  let html = '';
  for (const [k,v] of Object.entries(UPGRADE_NAMES)) {
    const lv = G.upgrades[k];
    const maxed = lv >= UPGRADE_MAX[k];
    const cost = maxed ? 'MAX' : UPGRADE_COSTS[k][lv];
    html += `<div class="upgrade-row"><span>${v} Lv${lv}</span>`;
    html += `<button class="upgrade-btn" onclick="buyUpgrade('${k}')" ${maxed?'disabled':''}>${cost}💰</button></div>`;
  }
  document.getElementById('upgradeList').innerHTML = html;
}

function applyUpgrades() {
  P.maxHp += G.upgrades.hp * 15;
  P.hp = P.maxHp;
  P.dmg += G.upgrades.atk * 0.8;
  P.speed += G.upgrades.spd * 0.3;
  P.blades += G.upgrades.blades;
}

// ===== HELPERS =====
function dist(a,b) { return Math.hypot(a.x-b.x, a.y-b.y) }
function rng(min,max) { return min+Math.random()*(max-min) }
function clamp(v,lo,hi) { return Math.max(lo, Math.min(hi, v)) }
function lerp(a,b,t) { return a+(b-a)*t }

function addText(x,y,text,color='#fff') {
  G.texts.push({x,y,text,color,life:40,vy:-1.2,a:1});
}
function addDmgText(x,y,val) {
  if (!settings.showDmg) return;
  let color = '#fff', size = 14;
  if (val >= 20) { color = '#ff4444'; size = 20; }
  else if (val >= 10) { color = '#ffa502'; size = 17; }
  else if (val >= 5) { color = '#ffd700'; size = 15; }
  G.dmgTexts.push({x:x+rng(-8,8), y:y+rng(-6,6), value:Math.round(val*10)/10, life:30, vy:-1.5, a:1, color, size});
}
function addParticles(x,y,color,count=6) {
  const n = settings.lowEnd ? Math.floor(count/3) : count;
  for (let i=0;i<n;i++) G.particles.push({x,y,color,vx:rng(-2,2),vy:rng(-2,2),life:rng(12,22),size:rng(2,4)});
}
function shake(amount) {
  if (!settings.showShake) return;
  G.shakeDur = Math.max(G.shakeDur, 6);
  G.shakeX = rng(-amount, amount);
  G.shakeY = rng(-amount, amount);
}

// ===== INIT =====
function initGame() {
  const canvas = document.getElementById('canvas');
  G.ctx = canvas.getContext('2d');
  G.isMobile = 'ontouchstart' in window;
  resizeCanvas();
  window.onresize = resizeCanvas;
  window.onkeydown = e => {
    G.keys[e.key.toLowerCase()] = true;
    if (e.key === 'Escape') togglePause();
    e.preventDefault();
  };
  window.onkeyup = e => { G.keys[e.key.toLowerCase()] = false; };
  if (G.isMobile) bindTouch();
  buildMenu();
  updateUI();
  renderUpgradePanel();
  saveSettings();
}

function resizeCanvas() {
  G.w = innerWidth; G.h = innerHeight;
  document.getElementById('canvas').width = G.w;
  document.getElementById('canvas').height = G.h;
}

function bindTouch() {
  const c = document.getElementById('canvas');
  c.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (t.clientY > G.h*0.55) { G.joystick.active=true; G.joystick.baseX=t.clientX; G.joystick.baseY=t.clientY; }
    }
  }, {passive:false});
  c.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      if (G.joystick.active) { G.joystick.dx=clamp(t.clientX-G.joystick.baseX,-60,60); G.joystick.dy=clamp(t.clientY-G.joystick.baseY,-60,60); }
    }
  }, {passive:false});
  c.addEventListener('touchend', e => { G.joystick.active=false; G.joystick.dx=0; G.joystick.dy=0; });
}

// ===== MENU =====
let selectedHero = 0, selectedDiff = 1;

function buildMenu() {
  const charList = document.getElementById('charList');
  charList.innerHTML = '';
  HEROES.forEach((h,i) => {
    const div = document.createElement('div');
    div.className = 'char' + (i===selectedHero?' selected':'');
    div.innerHTML = `<span class="char-icon">${h.icon}</span><span class="char-name">${h.name}</span><span class="char-desc">${h.desc}</span><span class="char-weapon">🔸 ${h.weapon}</span>`;
    div.onclick = () => { selectedHero=i; buildMenu(); };
    charList.appendChild(div);
  });
  const diffRow = document.getElementById('diffRow');
  diffRow.innerHTML = '';
  DIFF_NAMES.forEach((d,i) => {
    const btn = document.createElement('button');
    btn.className = 'diff-btn' + (i===selectedDiff?' active':'');
    btn.textContent = d;
    btn.onclick = () => { selectedDiff=i; buildMenu(); };
    diffRow.appendChild(btn);
  });
  document.getElementById('startBtn').onclick = startGame;
}

function startGame() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('overOverlay').style.display = 'none';
  G.diff = selectedDiff;
  P.hero = HEROES[selectedHero];
  applyHero();
  applyUpgrades();
  startBGM();
  nextLevel();
  G.over = false; G.started = true;
}

function resetGame() {
  G.score = 0; G.level = 1; G.needScore = 300; G.runGold = 0;
  G.enemies = []; G.props = []; G.exps = []; G.texts = []; G.particles = [];
  G.projectiles = []; G.dmgTexts = []; G.goldDrops = []; G.waveEffects = [];
  G.boss = null; G.hasBoss = false; G.counting = false; G.over = false; G.started = false; G.paused = false;
  G.combo = 0; G.comboTimer = 0; G.shakeDur = 0;
  localStorage.removeItem('shadowShareGold');
  document.getElementById('bossBar').style.display = 'none';
  document.getElementById('overOverlay').style.display = 'none';
  document.getElementById('pauseOverlay').classList.remove('show');
  P.x = G.w/2; P.y = G.h/2; P.level = 1; P.exp = 0; P.needExp = 200;
  P.weapons = []; P.shield = false; P.dashCD = 0; P.speedTimer = 0; P.hurtCD = 0; P.hurtThisFrame = false;
}

function applyHero() {
  const h = P.hero;
  P.maxHp = h.hp; P.hp = h.hp; P.speed = h.speed;
  P.dmg = h.dmg; P.blades = h.blades; P.range = h.range; P.atkSp = h.atkSp;
  P.weapons = [];
  switch (h.id) {
    case 'blade': P.weapons.push({type:'blade', dmg:1.2, interval:25, cooldown:0, count:0}); break;
    case 'flame': P.weapons.push({type:'nova', dmg:2.5, interval:110, cooldown:0, count:1}); break;
    case 'storm': P.weapons.push({type:'arrow', dmg:1.2, interval:18, cooldown:0, count:2}); break;
    case 'shadow': P.weapons.push({type:'lightning', dmg:2, interval:45, cooldown:0, count:1}); break;
  }
}

}

// ===== LEVEL =====
function nextLevel() {
  G.grass = [];
  const grassCount = settings.lowEnd ? 150 : 600;
  for (let i=0;i<grassCount;i++) G.grass.push({x:Math.random()*G.w, y:Math.random()*G.h});
  G.enemies = []; G.props = []; G.exps = [];
  if (G.level % 5 === 0) {
    G.hasBoss = true; G.boss = new Boss();
    document.getElementById('bossBar').style.display = 'block';
    sfxBoss();
  }
}

function levelUp() {
  P.level++;
  P.exp = 0;
  P.needExp = Math.floor(P.needExp * 1.28);
  P.maxHp += 20; P.hp = P.maxHp;
  P.dmg += 0.8;
  P.blades = Math.min(P.blades + (P.level % 3 === 0 ? 1 : 0), P.maxBlades);
  sfxLevel();
  updateUI();
}

// ===== GAME LOOP =====
let lastSpawn = 0;
function update() {
  if (!G.started || G.over || G.counting || G.paused) return;
  G.frame++;
  P.hurtThisFrame = false;

  movePlayer();
  const aliveCount = G.enemies.filter(e=>e.alive).length;
  const diffMult = [0.7, 1, 1.4, 1.8];
  const enemyMult = settings.lowEnd ? 0.6 : 1;
  const maxEnemies = Math.floor((35 + G.level * 8) * diffMult[G.diff] * enemyMult);
  if (aliveCount < maxEnemies) {
    lastSpawn += G.speed;
    const spawnRate = Math.max(3, 18 - G.level * 1.2);
    if (lastSpawn >= spawnRate) {
      lastSpawn = 0;
      let type = 'grunt';
      if (G.level >= 2 && Math.random() < 0.35) type = 'runner';
      if (G.level >= 4 && Math.random() < 0.25) type = 'tank';
      G.enemies.push(new Enemy(type));
    }
  }

  G.enemies.forEach(e => e.alive && e.update());
  G.enemies = G.enemies.filter(e => e.alive);
  G.props.forEach(p => { if (!p.used && dist(p, P) < 28) p.use(); });
  G.props = G.props.filter(p => !p.used);
  for (let i = G.exps.length - 1; i >= 0; i--) { const e = G.exps[i];
    if (dist(e, P) < 22) { const bonus = 1 + G.upgrades.xp * 0.2; P.exp += e.v * bonus; G.exps.splice(i,1); if (P.exp >= P.needExp) levelUp(); updateUI(); }
  }
  for (let i = G.goldDrops.length - 1; i >= 0; i--) { const gd = G.goldDrops[i];
    if (dist(gd, P) < 22) { G.runGold++; G.goldDrops.splice(i,1); sfxGold(); updateUI(); }
  }

  // Projectiles
  for (let i = G.projectiles.length - 1; i >= 0; i--) {
    const p = G.projectiles[i];
    const dx = p.tx - p.x, dy = p.ty - p.y, d = Math.hypot(dx, dy) || 1;
    p.x += dx/d * p.speed * G.speed;
    p.y += dy/d * p.speed * G.speed;
    p.life--;
    p.trail.push({x:p.x, y:p.y, life:6});
    if (p.trail.length > 8) p.trail.shift();
    if (d < 12 || p.life <= 0) {
      if (p.target && p.target.alive) { p.target.hurt(p.dmg); addDmgText(p.target.x, p.target.y, p.dmg); addParticles(p.target.x, p.target.y, p.color, 3); }
      G.projectiles.splice(i,1);
    }
  }
  // Trail decay
  G.projectiles.forEach(p => { for (let j=p.trail.length-1;j>=0;j--) { p.trail[j].life--; if(p.trail[j].life<=0)p.trail.splice(j,1); } });
  // Wave effects
  for (let i = G.waveEffects.length - 1; i >= 0; i--) { G.waveEffects[i].life -= G.speed; G.waveEffects[i].r += G.speed * 3; if (G.waveEffects[i].life <= 0) G.waveEffects.splice(i,1); }

  // Timers
  for (let i = G.texts.length - 1; i >= 0; i--) { const t = G.texts[i]; t.y+=t.vy; t.a-=0.022; if (t.a<=0) G.texts.splice(i,1); }
  for (let i = G.dmgTexts.length - 1; i >= 0; i--) { const t = G.dmgTexts[i]; t.y+=t.vy; t.a-=0.028; if (t.a<=0) G.dmgTexts.splice(i,1); }
  for (let i = G.particles.length - 1; i >= 0; i--) { const p = G.particles[i]; p.x+=p.vx; p.y+=p.vy; p.life--; if (p.life<=0) G.particles.splice(i,1); }
  if (P.shield) { P.shieldTimer -= G.speed; if (P.shieldTimer <= 0) P.shield = false; }
  if (P.hurtCD > 0) P.hurtCD -= G.speed;
  if (P.dashCD > 0) P.dashCD -= G.speed;
  if (P.speedTimer > 0) { P.speedTimer -= G.speed; if (P.speedTimer <= 0) P.speed = P.origSpeed; }
  if (G.hasBoss && G.boss && G.boss.alive) G.boss.update();
  if (G.comboTimer > 0) { G.comboTimer -= G.speed; if (G.comboTimer <= 0 && G.combo > 0) G.combo = 0; }
  if (G.score >= G.needScore && !G.hasBoss && !G.counting) startCountdown();
  P.angle += P.atkSp * G.speed;
  updateWeapons();
  if (G.shakeDur > 0) { G.shakeDur--; G.shakeX *= 0.85; G.shakeY *= 0.85; }
}

function movePlayer() {
  let dx = 0, dy = 0, sp = P.speed * G.speed;
  if (G.keys.w || G.keys.arrowup) dy = -sp;
  if (G.keys.s || G.keys.arrowdown) dy = sp;
  if (G.keys.a || G.keys.arrowleft) dx = -sp;
  if (G.keys.d || G.keys.arrowright) dx = sp;
  if (G.joystick.active) { dx = G.joystick.dx / 60 * sp; dy = G.joystick.dy / 60 * sp; }
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  P.x = clamp(P.x + dx, 10, G.w - 10);
  P.y = clamp(P.y + dy, 10, G.h - 10);
  if (G.keys[' '] && P.dashCD <= 0) {
    P.dashCD = 90;
    P.x = clamp(P.x + dx/2 * 8, 10, G.w - 10);
    P.y = clamp(P.y + dy/2 * 8, 10, G.h - 10);
    addParticles(P.x, P.y, P.hero.color, 8);
  }
}

function updateWeapons() {
  P.weapons.forEach(w => {
    w.cooldown -= G.speed;
    if (w.cooldown <= 0) { w.cooldown = w.interval; fireWeapon(w); }
  });
}

function fireWeapon(w) {
  switch (w.type) {
    case 'blade': {
      const bladeScale = 0.5 + P.blades * 0.12;
      G.enemies.forEach(e => {
        if (e.alive && dist(e, P) < P.range + 10) { e.hurt(P.dmg * w.dmg * bladeScale); addDmgText(e.x, e.y, P.dmg * w.dmg * bladeScale); }
      });
      if (G.hasBoss && G.boss && G.boss.alive && dist(G.boss, P) < P.range + 30) { G.boss.hurt(P.dmg * w.dmg * bladeScale * 0.7); addDmgText(G.boss.x, G.boss.y, P.dmg * w.dmg * bladeScale * 0.7); }
      sfxHit();
      break;
    }
    case 'nova':
      G.waveEffects.push({x:P.x, y:P.y, r:10, maxR:P.range, life:30, color:'#ff6b35'});
      G.enemies.forEach(e => { if (e.alive && dist(e, P) < P.range) { e.hurt(P.dmg * w.dmg); addDmgText(e.x, e.y, P.dmg * w.dmg); addParticles(e.x, e.y, '#ff6b35', 3); } });
      if (G.hasBoss && G.boss && G.boss.alive && dist(G.boss, P) < P.range) { G.boss.hurt(P.dmg * w.dmg); addDmgText(G.boss.x, G.boss.y, P.dmg * w.dmg); }
      addParticles(P.x, P.y, '#ff6b35', 10);
      sfxExplosion();
      break;
    case 'arrow': {
      let closest = null, closestDist = Infinity;
      G.enemies.forEach(e => { if (e.alive) { const d = dist(P, e); if (d < closestDist && d < 300) { closestDist = d; closest = e; } } });
      if (!closest && G.hasBoss && G.boss && G.boss.alive) { closest = G.boss; closestDist = dist(P, G.boss); }
      if (closest && closestDist < 300) {
        G.projectiles.push({x:P.x, y:P.y, tx:closest.x, ty:closest.y, speed:8, color:P.hero.color, life:40, dmg:P.dmg * w.dmg, target:closest, trail:[]});
      }
      break;
    }
    case 'lightning': {
      const allTargets = [...G.enemies.filter(e=>e.alive)];
      if (G.hasBoss && G.boss && G.boss.alive) allTargets.push(G.boss);
      allTargets.sort((a,b)=>dist(P,a)-dist(P,b));
      if (allTargets.length > 0) {
        const first = allTargets[0];
        if (dist(P, first) < P.range + 30) {
          // Store lightning arcs for rendering
          const arcs = [{from:{x:P.x,y:P.y}, to:{x:first.x,y:first.y}}];
          first.hurt(P.dmg * w.dmg); addDmgText(first.x, first.y, P.dmg * w.dmg); addParticles(first.x, first.y, '#c49bff', 4);
          let prev = first;
          for (let i = 1; i < Math.min(4, allTargets.length); i++) {
            if (dist(prev, allTargets[i]) < 120) {
              allTargets[i].hurt(P.dmg * w.dmg * 0.6); addDmgText(allTargets[i].x, allTargets[i].y, P.dmg * w.dmg * 0.6); addParticles(allTargets[i].x, allTargets[i].y, '#c49bff', 2);
              arcs.push({from:{x:prev.x,y:prev.y}, to:{x:allTargets[i].x,y:allTargets[i].y}});
              prev = allTargets[i];
            }
          }
          G.lightningArcs = arcs; G.lightningTimer = 8;
        }
      }
      sfxHit();
      break;
    }
  }
}
G.lightningArcs = []; G.lightningTimer = 0;

function startCountdown() {
  G.counting = true;
  let c = 3;
  const cd = document.getElementById('countDiv') || (()=>{ const d=document.createElement('div'); d.id='countDiv'; d.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font:bold 100px "Microsoft YaHei",sans-serif;color:#ffd700;text-shadow:0 0 40px rgba(255,215,0,.6);z-index:100;display:none;pointer-events:none'; document.body.appendChild(d); return d; })();
  cd.style.display='block'; cd.textContent=c;
  const iv = setInterval(() => { c--; if(c<=0){ clearInterval(iv); cd.style.display='none'; G.counting=false; G.level++; G.score=0; G.needScore=Math.floor(G.needScore*1.35); nextLevel(); } else { cd.textContent=c; } }, 900);
}

// ===== RENDER =====
function render() {
  if (!G.started) return;
  const ctx = G.ctx;
  ctx.save();
  if (G.shakeDur > 0) ctx.translate(G.shakeX, G.shakeY);

  const bgGrad = ctx.createRadialGradient(G.w/2, G.h/2, G.w*0.1, G.w/2, G.h/2, G.w*0.8);
  bgGrad.addColorStop(0, '#1a3a1a'); bgGrad.addColorStop(0.5, '#0f2a0f'); bgGrad.addColorStop(1, '#050f05');
  ctx.fillStyle = bgGrad; ctx.fillRect(-20, -20, G.w+40, G.h+40);

  ctx.strokeStyle = 'rgba(255,255,255,0.015)'; ctx.lineWidth = 1;
  const gridSize = 80;
  for (let x = gridSize; x < G.w; x += gridSize) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,G.h); ctx.stroke(); }
  for (let y = gridSize; y < G.h; y += gridSize) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(G.w,y); ctx.stroke(); }

  ctx.fillStyle = '#1e5a1e'; G.grass.forEach(g => ctx.fillRect(g.x, g.y, 2, 6));

  // Gold drops
  G.goldDrops.forEach(g => {
    ctx.save(); ctx.translate(g.x, g.y); const t = G.frame * 0.08;
    ctx.fillStyle = '#ffd700'; ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 8;
    ctx.beginPath();
    for (let i=0;i<6;i++) { const a = t + Math.PI*2/6*i; (i===0?ctx.moveTo:ctx.lineTo).call(ctx, Math.cos(a)*6, Math.sin(a)*6); }
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0; ctx.restore();
  });

  G.exps.forEach(e => {
    ctx.fillStyle = '#7eff5e'; ctx.shadowColor = '#7eff5e'; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(e.x, e.y, 5, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(e.x, e.y, 2.5, 0, Math.PI*2); ctx.fill();
  });

  G.props.forEach(p => p.render());
  G.enemies.forEach(e => e.render());
  if (G.hasBoss && G.boss) G.boss.render();

  // Wave effects (nova)
  G.waveEffects.forEach(w => {
    const a = w.life / 30;
    ctx.strokeStyle = w.color + Math.floor(a*255).toString(16).padStart(2,'0');
    ctx.lineWidth = 3 * a; ctx.beginPath(); ctx.arc(w.x, w.y, w.r, 0, Math.PI*2); ctx.stroke();
  });

  // Projectiles
  G.projectiles.forEach(p => {
    if (!settings.lowEnd) {
      p.trail.forEach((t, i) => {
        ctx.fillStyle = p.color + Math.floor(i/p.trail.length*180+20).toString(16).padStart(2,'0');
        ctx.beginPath(); ctx.arc(t.x, t.y, 2, 0, Math.PI*2); ctx.fill();
      });
    }
    ctx.fillStyle = '#fff'; ctx.shadowColor = p.color; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
  });

  // Lightning arcs
  if (G.lightningTimer > 0) {
    G.lightningTimer -= G.speed;
    G.lightningArcs.forEach(arc => {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.shadowColor = '#c49bff'; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.moveTo(arc.from.x, arc.from.y);
      const mx = (arc.from.x+arc.to.x)/2 + rng(-12,12), my = (arc.from.y+arc.to.y)/2 + rng(-12,12);
      ctx.quadraticCurveTo(mx, my, arc.to.x, arc.to.y); ctx.stroke();
      ctx.strokeStyle = '#c49bff'; ctx.lineWidth = 1; ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.moveTo(arc.from.x, arc.from.y); ctx.quadraticCurveTo(mx, my, arc.to.x, arc.to.y); ctx.stroke();
    });
  }

  // Spinning blades visual
  const hasBladeWep = P.weapons.some(w => w.type === 'blade');
  if (hasBladeWep) {
    ctx.save(); ctx.translate(P.x, P.y);
    const count = P.blades;
    for (let i = 0; i < count; i++) {
      const a = P.angle + Math.PI*2/count*i;
      const bx = Math.cos(a) * P.range, by = Math.sin(a) * P.range;
      ctx.shadowColor = P.hero.color; ctx.shadowBlur = 10;
      ctx.fillStyle = P.hero.color;
      ctx.save(); ctx.translate(bx, by); ctx.rotate(a); ctx.fillRect(-10, -3, 20, 6); ctx.restore();
    }
    ctx.shadowBlur = 0; ctx.restore();
  }

  renderPlayer();
  renderEnemyModels();

  G.particles.forEach(p => {
    ctx.fillStyle = p.color + Math.floor(p.life/22*255).toString(16).padStart(2,'0');
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  });

  // Damage texts
  G.dmgTexts.forEach(t => {
    ctx.fillStyle = t.color + Math.floor(t.a*255).toString(16).padStart(2,'0');
    ctx.font = `bold ${t.size}px "Microsoft YaHei",sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(t.value, t.x, t.y);
  });

  G.texts.forEach(t => {
    ctx.fillStyle = t.color + Math.floor(t.a*255).toString(16).padStart(2,'0');
    ctx.font = '13px "Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center'; ctx.fillText(t.text, t.x, t.y);
  });

  // Touch joystick
  if (G.isMobile && G.joystick.active) {
    ctx.globalAlpha = 0.25; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(G.joystick.baseX, G.joystick.baseY, 60, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(G.joystick.baseX+G.joystick.dx, G.joystick.baseY+G.joystick.dy, 18, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();

  // Combo display
  const comboNum = document.getElementById('comboNum'), comboLabel = document.getElementById('comboLabel');
  if (G.combo >= 5) {
    comboNum.style.opacity = '1'; comboNum.textContent = 'x' + G.combo; comboLabel.style.opacity = '1';
    comboNum.style.color = G.combo >= 50 ? '#ff4444' : (G.combo >= 25 ? '#ff8800' : '#ffd700');
  } else { comboNum.style.opacity = '0'; comboLabel.style.opacity = '0'; }
}

function renderPlayer() {
  const ctx = G.ctx, h = P.hero;
  ctx.save(); ctx.translate(P.x, P.y);

  if (P.shield) {
    ctx.shadowColor = '#63dbff'; ctx.shadowBlur = 20;
    ctx.strokeStyle = 'rgba(99,219,255,0.6)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, 36, 0, Math.PI*2); ctx.stroke(); ctx.shadowBlur = 0;
  }

  ctx.shadowColor = h.color; ctx.shadowBlur = 14;
  // Body
  const bodyGrad = ctx.createRadialGradient(0, -5, 2, 0, 0, 22);
  bodyGrad.addColorStop(0, '#fff'); bodyGrad.addColorStop(0.3, h.color); bodyGrad.addColorStop(1, '#111');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath(); ctx.arc(0, -2, 22, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Draw hero-specific model
  switch (h.id) {
    case 'blade':
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-6,-10,5,0,Math.PI*2); ctx.arc(6,-10,5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(-6,-10,2.5,0,Math.PI*2); ctx.arc(6,-10,2.5,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = h.color; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-8,8); ctx.lineTo(0,-28); ctx.lineTo(8,8); ctx.stroke();
      break;
    case 'flame':
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-6,-10,4,0,Math.PI*2); ctx.arc(6,-10,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(-6,-10,2,0,Math.PI*2); ctx.arc(6,-10,2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = h.color; ctx.beginPath(); ctx.arc(0,6,6,0,Math.PI); ctx.fill();
      break;
    case 'storm':
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-8,-10,4,0,Math.PI*2); ctx.arc(0,-14,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(-8,-10,2,0,Math.PI*2); ctx.arc(0,-14,2,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle = h.color; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(12,-8); ctx.lineTo(22,-18); ctx.stroke();
      break;
    case 'shadow':
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-6,-10,4,0,Math.PI*2); ctx.arc(6,-10,4,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(-6,-10,2,0,Math.PI*2); ctx.arc(6,-10,2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.moveTo(-14,10); ctx.lineTo(0,-12); ctx.lineTo(14,10); ctx.closePath(); ctx.fill();
      break;
  }

  ctx.fillStyle = h.color; ctx.font = '16px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(h.icon, 0, -32);
  ctx.restore();
}

// ===== ENEMY =====
class Enemy {
  constructor(type) {
    this.type = type; this.alive = true;
    const edge = Math.floor(Math.random()*4);
    switch(edge) {
      case 0: this.x = rng(0, G.w); this.y = -20; break;
      case 1: this.x = G.w+20; this.y = rng(0, G.h); break;
      case 2: this.x = rng(0, G.w); this.y = G.h+20; break;
      case 3: this.x = -20; this.y = rng(0, G.h); break;
    }
    const m = DIFF_MULT[G.diff];
    switch(type) {
      case 'grunt': this.hp = 5+G.level*2.5; this.speed = 1.2*m; this.dmg = 8; this.color = '#e74c3c'; this.size = 14; break;
      case 'runner': this.hp = 3+G.level*1.3; this.speed = 2.2*m; this.dmg = 6; this.color = '#e67e22'; this.size = 11; break;
      case 'tank': this.hp = 14+G.level*7; this.speed = 0.8*m; this.dmg = 15; this.color = '#8e44ad'; this.size = 22; break;
    }
    this.flashTimer = 0;
  }
  update() {
    if (this.flashTimer > 0) this.flashTimer -= G.speed;
    const dx = P.x - this.x, dy = P.y - this.y, d = Math.hypot(dx, dy);
    if (d > 22) { this.x += dx/d * this.speed * G.speed; this.y += dy/d * this.speed * G.speed; }
    if (d < 22 && P.hurtCD <= 0 && !P.hurtThisFrame) {
      P.hp -= this.dmg; P.hurtCD = 60; P.hurtThisFrame = true;
      if (settings.showShake) shake(3);
      if (P.hp <= 0) { P.hp = 0; gameOver(); }
      updateUI();
    }
  }
  hurt(d) {
    this.hp -= d; this.flashTimer = 4;
    addParticles(this.x, this.y, this.color, 4);
    const kdx = this.x - P.x, kdy = this.y - P.y, kd = Math.hypot(kdx, kdy) || 1;
    this.x = clamp(this.x + kdx/kd * 5, 5, G.w - 5);
    this.y = clamp(this.y + kdy/kd * 5, 5, G.h - 5);
    G.combo++; G.comboTimer = 72;
    if (G.combo > G.comboMax) G.comboMax = G.combo;
    if (G.combo === 25 || G.combo === 50 || G.combo === 100) { sfxCombo(); addText(P.x, P.y-20, G.combo+' COMBO!', '#ffd700'); shake(5); }
    if (this.hp <= 0) {
      this.alive = false;
      G.score += (this.type === 'tank' ? 12 : 5);
      const xpVal = this.type === 'tank' ? 35 : (this.type==='runner'?12:20);
      G.exps.push({x:this.x, y:this.y, v:xpVal});
      addText(this.x, this.y, '+'+(this.type==='tank'?12:5), '#ffd700');
      addParticles(this.x, this.y, this.color, this.type==='tank'?14:8);
      if (Math.random() < 0.25) G.props.push(new Prop(this.x, this.y));
      if (Math.random() < 0.4) G.goldDrops.push({x:this.x+rng(-10,10), y:this.y+rng(-10,10)});
      updateUI();
    }
  }
  render() {
    const ctx = G.ctx; ctx.save(); ctx.translate(this.x, this.y);
    if (this.flashTimer > 0) { ctx.fillStyle = '#fff'; } else {
      switch (this.type) {
        case 'grunt': this.drawBat(ctx); break;
        case 'runner': this.drawWolf(ctx); break;
        case 'tank': this.drawGolem(ctx); break;
        default: this.drawBat(ctx);
      }
    }
    ctx.restore();
  }
  drawBat(ctx) {
    const s = this.size;
    // Wings
    ctx.fillStyle = '#3a1a2e';
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(-s*1.8, -s*0.9, -s*0.6, -s*1.3); ctx.quadraticCurveTo(0, -s*0.4, 0, 0); ctx.fill();
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(s*1.8, -s*0.9, s*0.6, -s*1.3); ctx.quadraticCurveTo(0, -s*0.4, 0, 0); ctx.fill();
    // Body
    ctx.fillStyle = this.flashTimer>0?'#fff':'#4a2538';
    ctx.beginPath(); ctx.ellipse(0, 0, s*0.45, s*0.65, 0, 0, Math.PI*2); ctx.fill();
    // Ears
    ctx.beginPath(); ctx.moveTo(-s*0.3, -s*0.6); ctx.lineTo(-s*0.5, -s*1.2); ctx.lineTo(-s*0.1, -s*0.55); ctx.fill();
    ctx.beginPath(); ctx.moveTo(s*0.3, -s*0.6); ctx.lineTo(s*0.5, -s*1.2); ctx.lineTo(s*0.1, -s*0.55); ctx.fill();
    // Eyes
    ctx.fillStyle = '#ff4444'; ctx.beginPath(); ctx.arc(-s*0.22, -s*0.18, s*0.14, 0, Math.PI*2); ctx.arc(s*0.22, -s*0.18, s*0.14, 0, Math.PI*2); ctx.fill();
  }
  drawWolf(ctx) {
    const s = this.size;
    // Body
    ctx.fillStyle = this.flashTimer>0?'#fff':'#5a3a20';
    ctx.beginPath(); ctx.ellipse(0, 0, s*0.9, s*0.5, 0, 0, Math.PI*2); ctx.fill();
    // Head
    ctx.beginPath(); ctx.arc(s*0.7, -s*0.2, s*0.45, 0, Math.PI*2); ctx.fill();
    // Snout
    ctx.beginPath(); ctx.moveTo(s*1.05, -s*0.2); ctx.lineTo(s*1.4, -s*0.05); ctx.lineTo(s*1.05, s*0.1); ctx.fill();
    // Ears
    ctx.beginPath(); ctx.moveTo(s*0.55, -s*0.6); ctx.lineTo(s*0.75, -s*1); ctx.lineTo(s*0.9, -s*0.55); ctx.fill();
    ctx.beginPath(); ctx.moveTo(s*0.35, -s*0.55); ctx.lineTo(s*0.5, -s*0.95); ctx.lineTo(s*0.65, -s*0.5); ctx.fill();
    // Tail
    ctx.strokeStyle = '#5a3a20'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(-s*0.8, 0); ctx.quadraticCurveTo(-s*1.4, -s*0.5, -s*1.2, -s*1); ctx.stroke();
    // Eye
    ctx.fillStyle = '#ff8800'; ctx.beginPath(); ctx.arc(s*0.85, -s*0.3, s*0.12, 0, Math.PI*2); ctx.fill();
  }
  drawGolem(ctx) {
    const s = this.size;
    // Body
    ctx.fillStyle = this.flashTimer>0?'#fff':'#3a3050';
    ctx.fillRect(-s*0.65, -s*0.5, s*1.3, s*1.3);
    // Crack lines
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-s*0.3, -s*0.5); ctx.lineTo(-s*0.1, 0); ctx.lineTo(-s*0.4, s*0.6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(s*0.2, -s*0.4); ctx.lineTo(s*0.4, s*0.2); ctx.stroke();
    // Eyes
    ctx.fillStyle = '#ff00ff'; ctx.beginPath(); ctx.arc(-s*0.25, -s*0.1, s*0.18, 0, Math.PI*2); ctx.arc(s*0.25, -s*0.1, s*0.18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-s*0.25, -s*0.1, s*0.08, 0, Math.PI*2); ctx.arc(s*0.25, -s*0.1, s*0.08, 0, Math.PI*2); ctx.fill();
  }
}

// ===== BOSS =====
class Boss {
  constructor() {
    let bx, by;
    do { const edge = Math.floor(Math.random()*4);
      switch(edge) { case 0: bx=rng(60,G.w-60); by=60; break; case 1: bx=G.w-60; by=rng(60,G.h-60); break; case 2: bx=rng(60,G.w-60); by=G.h-60; break; case 3: bx=60; by=rng(60,G.h-60); break; }
    } while (Math.hypot(bx-P.x, by-P.y) < 200);
    this.x = bx; this.y = by;
    this.maxHp = 200 + G.level * 100; this.hp = this.maxHp;
    this.speed = 0.6 * DIFF_MULT[G.diff]; this.dmg = 28; this.alive = true;
    this.skillTimer = 0; this.cds = [0,0,0]; this.flashTimer = 0;
  }
  update() {
    if (this.flashTimer > 0) this.flashTimer -= G.speed;
    this.skillTimer += G.speed; this.cds = this.cds.map(c => Math.max(0, c - G.speed));
    const dx = P.x - this.x, dy = P.y - this.y, d = Math.hypot(dx, dy) || 1;
    if (d > 100) { this.x += dx/d * this.speed * G.speed; this.y += dy/d * this.speed * G.speed; }
    if (d < 50 && P.hurtCD <= 0 && !P.hurtThisFrame) {
      P.hp -= this.dmg; P.hurtCD = 60; P.hurtThisFrame = true; shake(8);
      if (P.hp <= 0) { P.hp = 0; gameOver(); } updateUI();
    }
    if (this.skillTimer >= 80) { this.skillTimer = 0; const s = Math.floor(Math.random()*3);
      if (s === 0 && this.cds[0] === 0) { this.x += dx/d * 140; this.y += dy/d * 140; addParticles(this.x, this.y, '#ff00ff', 15); this.cds[0] = 120; }
      else if (s === 1 && this.cds[1] === 0) { if (dist(this, P) < 150 && P.hurtCD <= 0 && !P.hurtThisFrame) { P.hp -= 22; P.hurtCD = 60; P.hurtThisFrame = true; shake(6); updateUI(); } addParticles(this.x, this.y, '#ff44ff', 20); this.cds[1] = 160; }
      else if (s === 2 && this.cds[2] === 0) { for (let i = 0; i < 8; i++) G.enemies.push(new Enemy(Math.random()<0.4?'grunt':'runner')); this.cds[2] = 200; }
    }
  }
  hurt(d) {
    this.hp -= d; this.flashTimer = 3;
    addParticles(this.x, this.y, '#ff00ff', 2);
    document.getElementById('bossHp').style.width = (this.hp/this.maxHp*100)+'%';
    if (this.hp <= 0) { this.alive = false; G.hasBoss = false; document.getElementById('bossBar').style.display = 'none'; G.score += 100; G.exps.push({x:this.x, y:this.y, v:200}); addText(this.x, this.y, 'BOSS 击败!', '#ffd700'); addParticles(this.x, this.y, '#ff00ff', 30);
      for (let i=0;i<5;i++) G.props.push(new Prop(this.x+rng(-80,80), this.y+rng(-80,80)));
      for (let i=0;i<8;i++) G.goldDrops.push({x:this.x+rng(-60,60), y:this.y+rng(-60,60)});
      sfxExplosion(); updateUI(); }
  }
  render() {
    const ctx = G.ctx; ctx.save(); ctx.translate(this.x, this.y);
    const s = 38;
    // Body
    ctx.fillStyle = this.flashTimer>0?'#fff':'#2a1040'; ctx.shadowColor = '#9b59e7'; ctx.shadowBlur = 20;
    ctx.beginPath(); ctx.ellipse(0, -4, s*0.85, s, 0, 0, Math.PI*2); ctx.fill();
    // Horns
    ctx.fillStyle = this.flashTimer>0?'#fff':'#1a0830';
    ctx.beginPath(); ctx.moveTo(-s*0.35, -s*0.9); ctx.lineTo(-s*0.7, -s*1.6); ctx.lineTo(-s*0.1, -s*0.7); ctx.fill();
    ctx.beginPath(); ctx.moveTo(s*0.35, -s*0.9); ctx.lineTo(s*0.7, -s*1.6); ctx.lineTo(s*0.1, -s*0.7); ctx.fill();
    // Wings
    ctx.fillStyle = this.flashTimer>0?'#fff':'rgba(155,89,231,0.4)';
    ctx.beginPath(); ctx.moveTo(-s*0.6, -s*0.2); ctx.quadraticCurveTo(-s*1.8, -s*0.6, -s*1.2, -s*1.5); ctx.quadraticCurveTo(-s*0.6, -s*0.8, -s*0.2, -s*0.2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(s*0.6, -s*0.2); ctx.quadraticCurveTo(s*1.8, -s*0.6, s*1.2, -s*1.5); ctx.quadraticCurveTo(s*0.6, -s*0.8, s*0.2, -s*0.2); ctx.fill();
    // Eyes
    ctx.fillStyle = '#ff00ff'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(-s*0.25, -s*0.25, s*0.2, 0, Math.PI*2); ctx.arc(s*0.25, -s*0.25, s*0.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-s*0.25, -s*0.25, s*0.08, 0, Math.PI*2); ctx.arc(s*0.25, -s*0.25, s*0.08, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 17px "Microsoft YaHei",sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('BOSS', 0, s*0.4);
    ctx.restore();
  }
}

// ===== PROP =====
const PROP_TYPES = ['blade','range','dmg','heal','shield','exp','bomb','speed'];
class Prop {
  constructor(x,y) { this.x = clamp(x,20,G.w-20); this.y = clamp(y,20,G.h-20); this.used = false; this.type = PROP_TYPES[Math.floor(Math.random()*PROP_TYPES.length)]; }
  use() { this.used = true; sfxPickup();
    switch(this.type) {
      case 'blade': if(P.blades<P.maxBlades)P.blades++; addText(P.x,P.y-10,'飞刀+1','#ffd700'); break;
      case 'range': P.range+=10; addText(P.x,P.y-10,'范围↑','#3742fa'); break;
      case 'dmg': P.dmg+=1.2; addText(P.x,P.y-10,'攻击↑','#e74c3c'); break;
      case 'heal': P.hp=Math.min(P.hp+50,P.maxHp); addText(P.x,P.y-10,'回复!','#2ecc71'); break;
      case 'shield': P.shield=true; P.shieldTimer=240; addText(P.x,P.y-10,'护盾!','#63dbff'); break;
      case 'exp': P.exp+=80; if(P.exp>=P.needExp)levelUp(); addText(P.x,P.y-10,'经验!','#ff6b9d'); break;
      case 'bomb': G.enemies.forEach(e=>{e.alive=false;G.score+=5}); if(G.hasBoss&&G.boss&&G.boss.alive){G.boss.hp=0;G.boss.alive=false;G.hasBoss=false;document.getElementById('bossBar').style.display='none';G.score+=100;addText(G.boss.x,G.boss.y,'BOSS击败!','#ffd700');} addParticles(P.x,P.y,'#fff',40); shake(10); addText(P.x,P.y-10,'全屏秒杀!','#fff'); sfxExplosion(); break;
      case 'speed': if(P.speedTimer<=0)P.origSpeed=P.speed; P.speed=P.origSpeed+1.2; P.speedTimer=300; addText(P.x,P.y-10,'加速!','#00f0ff'); break;
    } updateUI(); }
  render() {
    const ctx = G.ctx; ctx.save(); ctx.translate(this.x, this.y); ctx.shadowBlur = 8;
    let color;
    switch(this.type) {
      case 'blade': color='#ffd700'; ctx.fillStyle=color; ctx.shadowColor=color; ctx.fillRect(-6,-3,12,6); break;
      case 'range': color='#3742fa'; ctx.fillStyle=color; ctx.shadowColor=color; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill(); break;
      case 'dmg': color='#e74c3c'; ctx.fillStyle=color; ctx.shadowColor=color; ctx.fillRect(-5,-5,10,10); break;
      case 'heal': color='#2ecc71'; ctx.fillStyle=color; ctx.shadowColor=color; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill(); break;
      case 'shield': color='#63dbff'; ctx.fillStyle=color; ctx.shadowColor=color; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill(); break;
      case 'exp': color='#ff6b9d'; ctx.fillStyle=color; ctx.shadowColor=color; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill(); break;
      case 'bomb': color='#ff0'; ctx.fillStyle=color; ctx.shadowColor=color; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill(); break;
      case 'speed': color='#00f0ff'; ctx.fillStyle=color; ctx.shadowColor=color; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill(); break;
    } ctx.shadowBlur = 0; ctx.restore();
  }
}

// ===== UI =====
function updateUI() {
  document.getElementById('ui').innerHTML = `难度:${DIFF_NAMES[G.diff]} | 关卡:${G.level} | 等级:${P.level} | 分数:${G.score} | 连击:${G.comboMax} | 💰${G.gold}`;
  document.getElementById('goldRun').textContent = `💰${G.runGold}`;
  document.getElementById('hpBar').style.width = (P.hp/P.maxHp*100)+'%';
  document.getElementById('expBar').style.width = (P.exp/P.needExp*100)+'%';
  document.getElementById('hpText').textContent = `${Math.floor(P.hp)}/${P.maxHp}`;
  document.getElementById('expText').textContent = `${Math.floor(P.exp)}/${P.needExp}`;
}

function gameOver() {
  G.over = true; stopBGM();
  G.gold += G.runGold; saveMeta();

  // Verify share-gold reward
  const shareRewarded = localStorage.getItem('shadowShareGold') === 'done';
  if (!shareRewarded) {
    G.gold += 30;
    localStorage.setItem('shadowShareGold', 'done');
  }

  const { bests, broken } = updateBests();
  renderUpgradePanel();

  let brokenHTML = '';
  if (broken.length > 0) {
    brokenHTML = `<div style="color:#ffd700;font-size:18px;margin-bottom:4px">🏆 新纪录！${broken.join(' · ')}</div>`;
  }

  document.getElementById('overStats').innerHTML =
    brokenHTML +
    `等级 <span>${P.level}</span> | 关卡 <span>${G.level}</span> | 分数 <span>${G.score}</span><br>` +
    `最高连击 <span>${G.comboMax}</span> | 本局金币 <span>+${G.runGold}</span>`;

  // Personal bests summary
  const pbParts = [];
  if (bests.bestCombo) pbParts.push(`🏆最佳连击: <span>${bests.bestCombo}</span>`);
  if (bests.bestScore) pbParts.push(`🏆最佳分数: <span>${bests.bestScore}</span>`);
  if (bests.bestLevel) pbParts.push(`🏆最高等级: <span>${bests.bestLevel}</span>`);
  if (bests.bestStage) pbParts.push(`🏆最高关卡: <span>${bests.bestStage}</span>`);
  if (bests.totalGames) pbParts.push(`🎮总场次: <span>${bests.totalGames}</span>`);

  document.getElementById('goldBreakdown').innerHTML =
    `💰 本局获得 <span style="font-size:22px">+${G.runGold}</span> | 💰 总金币: <span>${G.gold}</span>` +
    `<br><span style="font-size:12px;color:#888">${shareRewarded ? '分享奖励已领取 ✓' : ''}</span>`;

  // PBs
  if (pbParts.length > 0) {
    document.getElementById('goldBreakdown').innerHTML += `<br><span style="font-size:12px;color:#aaa">${pbParts.join(' · ')}</span>`;
  }

  document.getElementById('overOverlay').style.display = 'flex';
}

// ===== BUTTONS =====
document.getElementById('speedBtn').onclick = () => { G.speedIdx = (G.speedIdx+1)%3; G.speed = G.speeds[G.speedIdx]; document.getElementById('speedBtn').textContent = G.speed+'X'; };
document.getElementById('musicBtn').onclick = toggleMusic;
document.getElementById('upgradeToggle').onclick = () => { const p = document.getElementById('upgradePanel'); p.style.display = p.style.display==='none'?'block':'none'; };
document.getElementById('shareBtn').onclick = () => {
  const url = 'https://samouswolf.github.io/shadow-survivors/?ref=' + PLAYER_ID;
  const title = '暗影幸存者 - Shadow Survivors';
  let text = '我在玩《暗影幸存者》！点击链接免费玩，还能获得25金币奖励！';
  if (G.started && !G.over) {
    text = `暗影幸存者 | ${P.hero.name} | 等级${P.level} | 连击${G.comboMax} | 关卡${G.level} | 💰${G.runGold}金币 — 点击链接和我一起玩！`;
  } else if (G.over) {
    text = `暗影幸存者 | ${P.hero.name} | 最终等级${P.level} | 最高连击${G.comboMax} | 获得💰${G.runGold}金币 — 你能超过我吗？`;
  }
  if (navigator.share) {
    navigator.share({ title, text, url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text + '\n' + url).then(() => {
      const t = document.createElement('div'); t.className='toast'; t.style.setProperty('--accent','#ffd700');
      t.textContent='📋 邀请链接已复制！好友通过链接进入，双方各得金币 💰'; document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }).catch(() => {});
  }
};

// ===== MAIN LOOP =====
function gameLoop() {
  update();
  if (!G.over) { G.ctx.clearRect(0,0,G.w,G.h); render(); }
  else { G.ctx.clearRect(0,0,G.w,G.h); render(); }
  requestAnimationFrame(gameLoop);
}

window.onload = () => { initGame(); gameLoop(); };
</script>
</body>
</html>
