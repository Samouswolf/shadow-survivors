<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>迷雾之塔 — 文字冒险</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow-x:hidden}
body{
background:radial-gradient(ellipse at 50% 20%,rgba(30,20,60,.3),transparent 60%),
radial-gradient(ellipse at 50% 80%,rgba(10,0,20,.5),transparent 50%),
#0a0a14;
color:#c8c0d8;
font-family:"Noto Serif SC","Microsoft YaHei","PingFang SC",serif;
display:flex;justify-content:center;align-items:flex-start;
min-height:100vh;padding:16px;
}
.container{width:100%;max-width:680px;min-height:100vh;display:flex;flex-direction:column}
header{text-align:center;padding:28px 0 18px;border-bottom:1px solid rgba(180,160,220,.15);margin-bottom:14px}
header h1{font-size:clamp(22px,5vw,32px);color:#d4c8f0;letter-spacing:6px;font-weight:700;text-shadow:0 0 24px rgba(150,120,220,.3)}
.subtitle{color:#888;font-size:13px;letter-spacing:4px;margin-top:4px}
.status-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}
.stat{background:rgba(20,15,35,.7);border:1px solid rgba(150,130,200,.15);border-radius:8px;padding:5px 12px;font-size:12px;text-align:center;min-width:60px}
.stat .label{display:block;color:#787090;font-size:10px;text-transform:uppercase}
.stat .value{display:block;color:#d4c8f0;font-size:16px;font-weight:600}
.inventory-panel{background:rgba(15,10,25,.8);border:1px solid rgba(150,130,200,.12);border-radius:10px;padding:8px 14px;margin-bottom:10px;display:none}
.inventory-panel.show{display:block}
.inv-title{color:#b0a0d0;font-size:12px;letter-spacing:3px;margin-bottom:4px}
.inv-items{display:flex;gap:6px;flex-wrap:wrap}
.inv-items .item{background:rgba(150,130,200,.1);border:1px solid rgba(150,130,200,.2);border-radius:6px;padding:3px 10px;font-size:12px;color:#c0b8d8}
.story-area{flex:1;line-height:2;font-size:15px;padding:8px 0 120px;overflow-y:auto}
.story-area p{margin-bottom:10px;text-indent:2em}
.story-area .highlight{color:#e0d060;font-weight:600}
.story-area .success-text{color:#6bcb8a}
.story-area .danger-text{color:#e06060}
.story-area .info-text{color:#80a0e0}
.story-area i{color:#b0a0c8}
.story-area .scene-title{font-size:20px;font-weight:700;color:#d4c8f0;text-align:center;margin:16px 0;letter-spacing:4px;text-indent:0}
.story-area .scene-divider{text-align:center;color:#484060;margin:12px 0;letter-spacing:6px;text-indent:0}
.choice-btn{display:block;width:100%;padding:10px 16px;margin:4px 0;background:rgba(150,130,200,.08);border:1px solid rgba(150,130,200,.2);border-radius:8px;color:#c8c0d8;font:14px/1.6 "Microsoft YaHei","PingFang SC",sans-serif;cursor:pointer;text-align:left;transition:.2s}
.choice-btn:hover{background:rgba(150,130,200,.18);border-color:rgba(150,130,200,.4);color:#fff}
.choice-btn:active{background:rgba(150,130,200,.25)}
.choice-btn .choice-num{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;background:rgba(200,170,255,.2);border-radius:50%;font-size:12px;margin-right:8px}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;display:flex;gap:6px;justify-content:center;padding:10px;background:linear-gradient(180deg,transparent,rgba(8,6,16,.95) 30%);z-index:10}
.bottom-bar button{padding:8px 16px;background:rgba(150,130,200,.1);border:1px solid rgba(150,130,200,.2);border-radius:20px;color:#b0a0d0;font:12px "Microsoft YaHei","PingFang SC",sans-serif;cursor:pointer;transition:.2s}
.bottom-bar button:hover{background:rgba(150,130,200,.2);border-color:rgba(150,130,200,.4);color:#fff}
.bottom-bar button:active{background:rgba(150,130,200,.3)}
.end-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:11px;margin:2px;letter-spacing:2px}
.end-badge.good{background:rgba(107,203,138,.2);border:1px solid rgba(107,203,138,.4);color:#6bcb8a}
.end-badge.bad{background:rgba(224,96,96,.15);border:1px solid rgba(224,96,96,.3);color:#e06060}
.end-badge.normal{background:rgba(128,160,224,.15);border:1px solid rgba(128,160,224,.3);color:#80a0e0}
@media(max-width:600px){
body{padding:8px}
.story-area{font-size:14px;line-height:1.9}
.choice-btn{font-size:13px}
.bottom-bar button{padding:10px 14px;font-size:13px}
}
.gallery-panel{position:fixed;inset:0;background:rgba(8,6,20,.96);z-index:100;padding:24px;overflow-y:auto;display:flex;flex-direction:column}
.gallery-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;color:#d4c8f0;font:bold 20px "Noto Serif SC",serif}
.gallery-end{background:rgba(20,15,35,.7);border:1px solid rgba(150,130,200,.15);border-radius:10px;padding:12px 16px;min-width:140px;text-align:center;cursor:default}
.gallery-end.locked{opacity:.35;filter:grayscale(1)}
.gallery-end .end-title{font:bold 15px "Noto Serif SC",serif;color:#d4c8f0;margin-bottom:4px}
.gallery-end .end-date{font-size:11px;color:#787090}
.gallery-end .end-locked{font-size:24px;color:#484060}
.gallery-end.unlocked.good{border-color:rgba(107,203,138,.3)}
.gallery-end.unlocked.bad{border-color:rgba(224,96,96,.3)}
.gallery-end.unlocked.secret{border-color:rgba(255,200,60,.3)}
</style>
<style>/* 游戏工坊广告系统 */
.ad-banner-container{position:fixed;bottom:0;left:0;right:0;z-index:14;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);min-height:50px;max-height:90px;overflow:hidden}
.ad-banner-container iframe{max-width:100%}
.ad-label{position:absolute;top:1px;right:6px;font:9px "Microsoft YaHei",sans-serif;color:rgba(255,255,255,.35)}
.sponsor-btn{position:fixed;top:44px;right:8px;z-index:20;background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.25);color:#ffd700;padding:3px 9px;border-radius:10px;font:11px "Microsoft YaHei",sans-serif;cursor:pointer;transition:.2s}
.sponsor-btn:hover{background:rgba(255,215,0,.25);transform:scale(1.05)}
.sponsor-panel{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.sponsor-panel h2{color:#ffd700;font:bold 26px "Microsoft YaHei",sans-serif;margin-bottom:4px}
.sponsor-panel .qr-row{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.sponsor-panel .qr-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:16px;text-align:center;min-width:140px}
.sponsor-panel .qr-card .qr-icon{font-size:48px;margin-bottom:6px}
.sponsor-panel .qr-card .qr-label{color:#ccc;font:13px "Microsoft YaHei",sans-serif}
.sponsor-panel .qr-card .qr-hint{color:#888;font:11px "Microsoft YaHei",sans-serif;margin-top:4px}
.sponsor-panel .sponsor-close{margin-top:8px;padding:8px 28px;border:1px solid rgba(255,255,255,.2);border-radius:20px;color:#aaa;background:0 0;font:14px "Microsoft YaHei",sans-serif;cursor:pointer;transition:.2s}
.sponsor-panel .sponsor-close:hover{background:rgba(255,255,255,.08);color:#fff}
.interstitial-ad{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:150;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.interstitial-ad .ad-content{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px;text-align:center;min-width:280px;max-width:400px}
.interstitial-ad .ad-content p{color:#aaa;font:14px "Microsoft YaHei",sans-serif;margin-bottom:12px}
.interstitial-ad .skip-btn{padding:8px 28px;background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);border-radius:20px;color:#ffd700;font:bold 15px "Microsoft YaHei",sans-serif;cursor:pointer;transition:.2s}
.interstitial-ad .skip-btn:hover{background:rgba(255,215,0,.25)}</style>
</head>
<body>
<div class="container">
<header>
<h1>✦ 迷雾之塔 ✦</h1>
<div class="subtitle">— 文字冒险 —</div>
</header>
<div class="status-bar">
<div class="stat"><span class="label">体力</span><span class="value" id="hpDisplay">100</span></div>
<div class="stat"><span class="label">理智</span><span class="value" id="sanityDisplay">100</span></div>
<div class="stat"><span class="label">楼层</span><span class="value" id="floorDisplay">1</span></div>
<div class="stat"><span class="label">探索度</span><span class="value" id="exploreDisplay">0%</span></div>
<div class="stat"><span class="label">选择</span><span class="value" id="choiceDisplay">0</span></div>
</div>
<div class="inventory-panel" id="inventoryPanel">
<div class="inv-title">◆ 背包</div>
<div class="inv-items" id="inventoryList"></div>
</div>
<div class="story-area" id="storyArea"></div>
<div class="gallery-panel" id="galleryPanel" style="display:none">
<div class="gallery-header"><span>🏆 结局图鉴</span><button id="galleryClose" style="background:none;border:1px solid rgba(150,130,200,.2);color:#b0a0d0;padding:4px 12px;border-radius:8px;cursor:pointer">✕</button></div>
<div id="galleryGrid" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:8px 0"></div>
</div>
<div class="bottom-bar">
<button id="inventoryToggle">🎒 背包 (I)</button>
<button id="saveBtn">💾 存档</button>
<button id="loadBtn">📂 读档</button>
<button id="galleryBtn">🏆 结局图鉴</button>
<button id="restartBtn">🔄 重来</button>
</div>
</div>
<script>
(function(){
'use strict';

const ITEMS = {
MATCHES:        'matches',
COMPASS:        'compass',
LETTER:         'letter',
RUSTY_KEY:      'rustyKey',
TORCH:          'torch',
JOURNAL:        'journal',
AMULET:         'amulet',
SWORD:          'sword',
SHIELD:         'shield',
POCKET_WATCH:   'pocketWatch',
PHOTO:          'photo',
HOLY_WATER:     'holyWater',
SILVER_KNIFE:   'silverKnife',
CRYSTAL_DAGGER: 'crystalDagger',
WHITE_CANDLE:   'whiteCandle',
BLESSED_WATER:  'blessedWater',
DEEP_KEY:       'deepKey',
OLD_LANTERN:    'oldLantern',
	PHANTOM_FEATHER:  'phantomFeather',
	SILVER_BELL:      'silverBell',
	BROKEN_MIRROR:    'brokenMirror',
	MOON_PEARL:       'moonPearl',
	BLOOD_PACT_SCROLL:'bloodPactScroll',
};

const ITEM_NAMES = {};
ITEM_NAMES[ITEMS.MATCHES] = '火柴';
ITEM_NAMES[ITEMS.COMPASS] = '旧指南针';
ITEM_NAMES[ITEMS.LETTER] = '泛黄的信';
ITEM_NAMES[ITEMS.RUSTY_KEY] = '生锈的钥匙';
ITEM_NAMES[ITEMS.TORCH] = '火把';
ITEM_NAMES[ITEMS.JOURNAL] = '守塔人日志';
ITEM_NAMES[ITEMS.AMULET] = '防护护身符';
ITEM_NAMES[ITEMS.SWORD] = '破幻之剑';
ITEM_NAMES[ITEMS.SHIELD] = '星座盾';
ITEM_NAMES[ITEMS.POCKET_WATCH] = '旧怀表';
ITEM_NAMES[ITEMS.PHOTO] = '旧照片';
ITEM_NAMES[ITEMS.HOLY_WATER] = '圣水';
ITEM_NAMES[ITEMS.SILVER_KNIFE] = '银质小刀';
ITEM_NAMES[ITEMS.CRYSTAL_DAGGER] = '水晶匕首';
ITEM_NAMES[ITEMS.WHITE_CANDLE] = '白烛';
ITEM_NAMES[ITEMS.BLESSED_WATER] = '祝福之水';
ITEM_NAMES[ITEMS.DEEP_KEY] = '深牢钥匙';
ITEM_NAMES[ITEMS.OLD_LANTERN] = '旧提灯';
	ITEM_NAMES[ITEMS.PHANTOM_FEATHER] = '幻羽';
	ITEM_NAMES[ITEMS.SILVER_BELL] = '银铃';
	ITEM_NAMES[ITEMS.BROKEN_MIRROR] = '碎镜';
	ITEM_NAMES[ITEMS.MOON_PEARL] = '月明珠';
	ITEM_NAMES[ITEMS.BLOOD_PACT_SCROLL] = '血契卷轴';

const H = (t, c) => '<'+t+'>'+c+'</'+t+'>';
const HL = (t) => '<span class="highlight">'+t+'</span>';
const SC = (t) => '<span class="success-text">'+t+'</span>';
const DA = (t) => '<span class="danger-text">'+t+'</span>';
const IN = (t) => '<span class="info-text">'+t+'</span>';
const IT = (t) => '<i>'+t+'</i>';


let state = {};

function resetState() {
state = {
hp: 100, maxHp: 100,
sanity: 100, maxSanity: 100,
floor: 1,
items: [ITEMS.MATCHES, ITEMS.COMPASS, ITEMS.LETTER],
flags: {},
history: [],
currentScene: 'START',
choiceCount: 0,
endingSeen: false,
};
}
resetState();

function hasItem(id) { return state.items.includes(id); }
function addItem(id) { if (!hasItem(id)) state.items.push(id); }
function removeItem(id) { state.items = state.items.filter(i => i !== id); }
function addFlag(f) { state.flags[f] = true; }
function hasFlag(f) { return !!state.flags[f]; }
function hasAnyFlag(...fs) { return fs.some(f => state.flags[f]); }
function modHP(n) { state.hp = Math.max(0, Math.min(state.maxHp, state.hp + n)); if (state.hp <= 0) state.hp = 1; }
function modSanity(n) { state.sanity = Math.max(0, Math.min(state.maxSanity, state.sanity + n)); }

function getExplorePct() {
const explored = new Set(state.history);
const targets = ['TOWER_ENTRY','TOWER_HALL','TOWER_LIBRARY','TOWER_ARMORY','TOWER_OBSERVATORY','TOWER_CRYPT','TOWER_GARDEN','TOWER_ALTAR','TOWER_ROOF','DEEP_ENTRY','DEEP_CORRIDOR','DEEP_ELDER','DEEP_ALTAR','HALL_MERCHANT','LIB_HIDDEN','OBS_FLOOR','GARDEN_BELL','CRYPT_ANCIENT'];
let count = 0;
targets.forEach(t => { if (explored.has(t)) count++; });
return Math.min(100, Math.round((count / targets.length) * 100));
}


const S = {};


function p(...lines) { return lines; }



S.START = {
title: '序章 — 迷雾',
text: p(
'你睁开眼，发现自己躺在一片湿润的草地上。灰白色的浓雾笼罩着一切，能见度不足十米。',
'空气中弥漫着古老石头和潮湿泥土的气味。远处，一个模糊的轮廓若隐若现——那是一座高塔，一座仿佛从地面生长出来的黑色石塔。',
'你摸摸身上：口袋里有一封'+HL('泛黄的信')+'、一盒'+HL('火柴')+'，以及一个'+HL('旧指南针')+'——指针疯狂地旋转着，仿佛这里不是它认识的世界。',
'信上只写着一句话：'+IT('"走到塔顶，否则你永远不会知道为什么来到这里。"'),
'雾气在你身后似乎凝固成了一道墙——没有退路。只有向前。'
),
choices: [
['检查信件，寻找更多线索', 'START_LETTER'],
['直接朝塔的方向走去', 'START_TOWER'],
['先检查四周环境', 'START_EXPLORE'],
],
};

S.START_LETTER = {
title: '信件的秘密',
text: p(
'你仔细翻看信件。纸张极旧，边缘焦黄，但质地异常精致。在水印处，你隐约看到一行小字：',
IT('"守塔人第四十九代——当塔召唤时，继承者须回应。"'),
'信的背面还有一行几乎被磨掉的铅笔字：'+HL('"不要相信塔的话。记住——你不是第一个。"'),
'这封信似乎暗示着某种循环。你感到一阵寒意——不是来自雾气，而是来自这句话的含义。'
),
choices: [
['带着警惕走向高塔', 'TOWER_ENTRY'],
['先绕塔走一圈观察', 'START_EXPLORE'],
],
onEnter: () => addItem(ITEMS.LETTER),
};

S.START_TOWER = {
title: '走向高塔',
text: p(
'你径直朝塔走去。雾气在你脚步前退开，又在身后合拢，仿佛活着的生物。',
'脚下的土地从草地变成碎石，最后变成平整的石板路面。塔越来越近，你逐渐看清它的全貌：',
'这是一座由黑曜石般的石材建成的巨塔，表面没有任何接缝，仿佛整体雕刻而成。墙面覆盖着藤蔓般的符文，有些微微发光。',
'塔底部有一扇巨大的石门，门缝中透出微弱的琥珀色光芒。'
),
choices: [
['推开石门进入塔内', 'TOWER_ENTRY'],
['观察门上的符文', 'START_EXPLORE'],
],
};

S.START_EXPLORE = {
title: '塔的周围',
text: p(
'你沿着塔的外围探索。塔身直径约有三十米，表面布满奇异的雕刻。',
'你注意到一些东西：',
'• 东南面的墙脚有一个'+HL('小铁盒')+'，半埋在土里',
'• 符文在某些角度下排列成星座图案',
'• 塔的北面有一行极小的文字刻在基石上：'+IT('"灵魂的重量决定上升的高度"'),
'你打开铁盒，里面有一把'+HL('生锈的钥匙')+'。'
),
choices: [
['用钥匙打开石门', 'TOWER_ENTRY', () => hasItem(ITEMS.RUSTY_KEY)],
['直接推门进入', 'TOWER_ENTRY'],
['返回序章', 'START'],
],
onEnter: () => addItem(ITEMS.RUSTY_KEY),
};

S.TOWER_ENTRY = {
title: '第一层 — 门厅',
text: p(
'石门在你面前缓缓打开，发出沉闷的摩擦声。一股陈旧的空气扑面而来——混合着香料、灰尘和某种金属的气息。',
'门厅是一个圆形大厅，直径与塔身一致。中央有一座熄灭的火盆，周围立着四根石柱，每根柱子上都刻着不同的图案：',
'• '+HL('东柱')+'：一把剑与天平（力量与公正）',
'• '+HL('南柱')+'：一本书与眼睛（知识与洞察）',
'• '+HL('西柱')+'：一片叶与泉水（生命与治愈）',
'• '+HL('北柱')+'：一个圆环与无尽符号（循环与永恒）',
'大厅四周有四条走廊延伸向不同方向，但三条都被坍塌的碎石堵塞。只有'+HL('东面的走廊')+'尚可通行。',
'火盆旁的地面上有一支'+HL('火把')+'。'
),
choices: [
['拿起火把，点燃它', 'HALL_LIGHT'],
['直接进入东侧走廊', 'TOWER_HALL'],
['仔细观察柱子上的符文', 'HALL_PILLARS'],
],
floor: 1,
};

S.HALL_LIGHT = {
title: '火光亮起',
text: p(
'你拿起火把，用火柴点燃。火焰腾起的瞬间，整个大厅被暖光照亮。',
'在火光下，你看到墙上出现了原本隐形的壁画——描绘着一位旅者攀登高塔的画面。每一层都展示着某种考验：勇气、智慧、牺牲、选择。',
'壁画的最后一幅显示旅者站在塔顶，双手捧着一团光芒——但看不清他/她的表情是喜是悲。',
'有了火把，黑暗中的路途会安全一些。'+SC('体力 +5')
),
choices: [
['进入东侧走廊', 'TOWER_HALL'],
],
onEnter: () => { addItem(ITEMS.TORCH); modHP(5); },
};

S.HALL_PILLARS = {
title: '柱中之秘',
text: p(
'你仔细观察每根柱子上的符文。它们不仅仅是装饰——在你注视时，符文似乎微微流动，仿佛活着的文字。',
'当你同时注视四根柱子时，它们之间的地面浮现出一幅巨大的'+HL('星座图')+'。星座的形状正是你之前在塔外看到的图案。',
'星座图中央刻着几个古语文字：'+IT('"四者合一，方见真理之门。"'),
'这句话的含义暂时不明，但你将它记在心里。'
),
choices: [
['拿起火把', 'HALL_LIGHT'],
['直接进入东侧走廊', 'TOWER_HALL'],
],
onEnter: () => addFlag('pillarClue'),

function loadEndings() {
try { return JSON.parse(localStorage.getItem('fogTowerEndings')||'{}'); }
catch(e) { return {}; }
}
function saveEnding(sceneKey) {
const endings = loadEndings();
if (!endings[sceneKey]) {
endings[sceneKey] = new Date().toISOString().slice(0,10);
localStorage.setItem('fogTowerEndings', JSON.stringify(endings));
}
}
function showGallery() {
const panel = document.getElementById('galleryPanel');
const grid = document.getElementById('galleryGrid');
const endings = loadEndings();
grid.innerHTML = '';
ENDING_LIST.forEach(e => {
const el = document.createElement('div');
const unlocked = !!endings[e.key];
el.className = 'gallery-end' + (unlocked ? ' unlocked '+e.type : ' locked');
if (unlocked) {
el.innerHTML = '<div class="end-title">'+e.title+'</div><div class="end-date">'+endings[e.key]+'解锁</div>';
} else {
el.innerHTML = '<div class="end-locked">❓</div><div class="end-title" style="color:#666">???</div>';
}
el.title = unlocked ? e.title : e.hint;
grid.appendChild(el);
});
panel.style.display = 'flex';
}
document.getElementById('galleryBtn').addEventListener('click', showGallery);
document.getElementById('galleryClose').addEventListener('click', () => {
document.getElementById('galleryPanel').style.display = 'none';
});

function render(sceneKey) {
let scene = S[sceneKey];
if (!scene) { render('START'); return; }

state.currentScene = sceneKey;
if (!state.history.includes(sceneKey)) {
state.history.push(sceneKey);
}
if (scene.floor) state.floor = scene.floor;


hpDisplay.textContent = state.hp;
sanityDisplay.textContent = state.sanity;
hpDisplay.className = 'value' + (state.hp <= 25 ? ' danger' : '');
sanityDisplay.className = 'value' + (state.sanity <= 25 ? ' danger' : '');
floorDisplay.textContent = state.floor;
exploreDisplay.textContent = getExplorePct() + '%';
choiceDisplay.textContent = state.choiceCount;


inventoryList.innerHTML = '';
state.items.forEach(id => {
const el = document.createElement('span');
el.className = 'inv-item';
el.textContent = ITEM_NAMES[id] || id;
inventoryList.appendChild(el);
});


storyArea.innerHTML = '';
const titleEl = document.createElement('div');
titleEl.className = 'scene-title fade-in';
titleEl.textContent = scene.title;
storyArea.appendChild(titleEl);

const textEl = document.createElement('div');
textEl.className = 'scene-text fade-in';
textEl.innerHTML = scene.text.map(t => t ? '<p>'+t+'</p>' : '<br>').join('');
storyArea.appendChild(textEl);


const choicesEl = document.createElement('div');
choicesEl.className = 'choices';

const available = (scene.choices || []).filter(c => {
if (c.length >= 3 && typeof c[2] === 'function' && !c[2]()) return false;
return true;
});

if (available.length === 0 && scene.ending) {
const btn = document.createElement('button');
btn.className = 'choice-btn';
btn.textContent = '🔄 重新开始旅程';
btn.addEventListener('click', restartGame);
choicesEl.appendChild(btn);
state.endingSeen = true;
			saveEnding(state.currentScene);
		GameMonetize.onGameOver();
} else if (available.length === 0) {
const btn = document.createElement('button');
btn.className = 'choice-btn';
btn.textContent = '返回';
btn.addEventListener('click', () => render('START'));
choicesEl.appendChild(btn);
} else {
available.forEach((c, i) => {
const btn = document.createElement('button');
btn.className = 'choice-btn';
btn.textContent = (i+1) + '. ' + c[0];
btn.addEventListener('click', () => {
if (c.length >= 2) {
const nextKey = c[1];
const nextScene = S[nextKey];
if (nextScene && nextScene.onEnter) nextScene.onEnter();
state.choiceCount++;
render(nextKey);
}
});
choicesEl.appendChild(btn);
});
}

storyArea.appendChild(choicesEl);
storyArea.scrollTop = storyArea.scrollHeight;
}

function restartGame() {
resetState();
render('START');
showToast('🔄 新的旅程开始');
}

function showToast(msg) {
const existing = document.querySelector('.toast');
if (existing) existing.remove();
const t = document.createElement('div');
t.className = 'toast';
t.textContent = msg;
document.body.appendChild(t);
setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .5s'; setTimeout(() => t.remove(), 500); }, 2000);
}


document.getElementById('inventoryToggle').addEventListener('click', () => {
inventoryPanel.classList.toggle('show');
});
document.getElementById('saveBtn').addEventListener('click', () => {
const data = { hp: state.hp, sanity: state.sanity, floor: state.floor, items: state.items, flags: state.flags, history: state.history, currentScene: state.currentScene, choiceCount: state.choiceCount, endingSeen: state.endingSeen };
localStorage.setItem('fogTowerSave', JSON.stringify(data));
showToast('💾 存档成功！');
});
document.getElementById('loadBtn').addEventListener('click', () => {
const raw = localStorage.getItem('fogTowerSave');
if (raw) {
try {
const d = JSON.parse(raw);
state.hp = d.hp; state.sanity = d.sanity; state.floor = d.floor;
state.items = d.items; state.flags = d.flags; state.history = d.history;
state.currentScene = d.currentScene; state.choiceCount = d.choiceCount;
state.endingSeen = d.endingSeen;
render(state.currentScene);
showToast('📂 读档成功！');
} catch(e) { showToast('❌ 存档损坏'); }
} else { showToast('❌ 没有找到存档'); }
});
document.getElementById('restartBtn').addEventListener('click', () => {
if (confirm('确定要重新开始吗？')) restartGame();
});


document.addEventListener('keydown', (e) => {
if (e.key === 'i' || e.key === 'I') inventoryPanel.classList.toggle('show');
if (e.key >= '1' && e.key <= '9') {
const btns = storyArea.querySelectorAll('.choice-btn');
const idx = parseInt(e.key) - 1;
if (btns[idx]) btns[idx].click();
}
});


render('START');

})();
