// BFS路径查找
function findPath(tx,ty){
  if(tx<0||tx>=C||ty<0||ty>=R)return null;
  const g=GD[P.f];if(!g||g[ty][tx]===CL.W)return null;
	const q=[{x:P.x,y:P.y,p:[]}],v=new Set();v.add(P.x+','+P.y);
	while(q.length){
		const c=q.shift();if(c.x===tx&&c.y===ty)return c.p;
		for(const[dX,dY]of[[0,-1],[0,1],[-1,0],[1,0]]){
			const nx=c.x+dX,ny=c.y+dY,k=nx+','+ny;
			if(v.has(k)||nx<0||nx>=C||ny<0||ny>=R)continue;
			const cl=g[ny][nx];if(cl===CL.W||cl===CL.YD||cl===CL.BD||cl===CL.RD)continue;
			v.add(k);q.push({x:nx,y:ny,p:[...c.p,{x:nx,y:ny}]});
		}
	}
	return null;
}
function startAutoWalk(){isAutoWalking=true;if(autoTimer)clearInterval(autoTimer);autoTimer=setInterval(()=>{if(autoPath.length===0){clearInterval(autoTimer);autoTimer=null;isAutoWalking=false;return;}const next=autoPath[0];const dx=next.x-P.x,dy=next.y-P.y;if(dx===0&&dy===0){autoPath.shift();return;}mv(dx,dy);if(P.x===next.x&&P.y===next.y)autoPath.shift();else{clearInterval(autoTimer);autoTimer=null;isAutoWalking=false;}},100);}

  cv.addEventListener('touchend',e=>{if(isAutoWalking)return;const t=e.changedTouches[0];const rect=cv.getBoundingClientRect();const gx=((t.clientX-rect.left)/rect.width*C)|0,gy=((t.clientY-rect.top)/rect.height*R)|0;const dx2=t.clientX-tx,dy2=t.clientY-ty;const dist=Math.sqrt(dx2*dx2+dy2*dy2);if(dist<30){const p=findPath(gx,gy);if(p&&p.length>1){autoPath=p.slice(1);startAutoWalk();}}else{if(Math.abs(dx2)>Math.abs(dy2))mv(dx2>0?1:-1,0);else mv(0,dy2>0?1:-1);}e.preventDefault();});

}
