  cv.addEventListener('touchend',e=>{if(isAutoWalking)return;const t=e.changedTouches[0];const rect=cv.getBoundingClientRect();const gx=((t.clientX-rect.left)/rect.width*C)|0,gy=((t.clientY-rect.top)/rect.height*R)|0;const dx2=t.clientX-tx,dy2=t.clientY-ty;const dist=Math.sqrt(dx2*dx2+dy2*dy2);if(dist<30){const p=findPath(gx,gy);if(p&&p.length>1){autoPath=p.slice(1);startAutoWalk();}}else{if(Math.abs(dx2)>Math.abs(dy2))mv(dx2>0?1:-1,0);else mv(0,dy2>0?1:-1);}e.preventDefault();});
  cv.addEventListener('click',e=>{const r=cv.getBoundingClientRect();const gx=(e.clientX-r.left)/r.width*C|0,gy=(e.clientY-r.top)/r.height*R|0;const dx=Math.sign(gx-P.x),dy=Math.sign(gy-P.y);if(dx||dy)mv(dx||0,dy||0);});
  cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();const gx=((e.clientX-r.left)/r.width*C)|0,gy=((e.clientY-r.top)/r.height*R)|0,tt=document.getElementById('tt');if(!tt)return;const g=GD[P.f];if(!g||gy<0||gy>=R||gx<0||gx>=C){tt.style.display='none';return;}const c=g[gy][gx];if(c>=CL.MS&&c<=CL.MS+27){const m=MON[c-CL.MS];if(m){const dM=Math.max(1,tA()-m.d),dP=Math.max(1,m.a-tD()),tn=Math.ceil(m.h/dM),cHP=tn*dP;tt.innerHTML=`<b style="color:#ff6b6b">${m.e} ${m.n}</b><br>HP:${m.h} ATK:${m.a} DEF:${m.d}<br>йў„и®ЎжҺүиЎҖ: <span style="color:${cHP>=P.h?'#ff3030':'#6bcb8a'}">${cHP}</span>`;tt.style.display='block';tt.style.left=(e.clientX-r.left+10)+'px';tt.style.top=(e.clientY-r.top-10)+'px';return;}}tt.style.display='none';});
  cv.addEventListener('mouseleave',()=>{const tt=document.getElementById('tt');if(tt)tt.style.display='none';});
  window.addEventListener('resize',()=>{if(ld)rd();});
}
window.onload=init;
