function playSound(freq, type='square', dur=0.08, vol=0.12, slide=0) {
const t = audioCtx.currentTime;
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.type = type;
osc.frequency.setValueAtTime(freq, t);
if (slide) osc.frequency.linearRampToValueAtTime(freq+slide, t+dur);
gain.gain.setValueAtTime(vol*sfxVol*3.3, t);
gain.gain.exponentialRampToValueAtTime(0.001, t+dur);
osc.connect(gain); gain.connect(masterGain);
osc.start(t); osc.stop(t+dur);
}
function sfxHit() { playSound(200,'square',0.04,0.08) }
function sfxPickup() { [660,880,1100].forEach((f,i)=>playSound(f,'sine',0.1,0.06,200)) }

function startBGM() {
if (bgmPlaying) return; bgmPlaying = true;
bgmGain = audioCtx.createGain();
bgmGain.gain.value = bgmVol;
bgmGain.connect(masterGain);
const chords = [
[130.8,164.8,196],[146.8,174.6,220],[164.8,196,246.9],[174.6,220,261.6],
[130.8,164.8,196],[196,246.9,293.7],[164.8,196,246.9],[146.8,174.6,220],
];
const bassNotes = [65.4,73.4,82.4,87.3,65.4,98,82.4,73.4];
let i = 0;
function loop() {
if (!bgmPlaying) return;
const t = audioCtx.currentTime;
const chord = chords[i % chords.length];
chord.forEach(f => {
const osc = audioCtx.createOscillator();
const g = audioCtx.createGain();
osc.type = 'triangle';
osc.frequency.value = f;
g.gain.setValueAtTime(0.012, t);
g.gain.exponentialRampToValueAtTime(0.001, t+0.7);
osc.connect(g); g.connect(bgmGain);
osc.start(t); osc.stop(t+0.7);
});
// Bass note
const bosc = audioCtx.createOscillator();
const bg = audioCtx.createGain();
bosc.type = 'sine';
bosc.frequency.value = bassNotes[i % bassNotes.length];
bg.gain.setValueAtTime(0.018, t);
bg.gain.exponentialRampToValueAtTime(0.001, t+0.7);
bosc.connect(bg); bg.connect(bgmGain);
bosc.start(t); bosc.stop(t+0.7);
i++;
setTimeout(loop, 850);
}
loop();
}

function randomEquip() {
const r = Math.random();
let rarity = 'common';

else if (r > 0.62) rarity = 'magic';

const ranges = {common:[0.7,1.3], magic:[0.8,1.6], rare:[0.85,1.85], legendary:[1.1,2.3]};
const [lo, hi] = ranges[rarity];
const randomizedStats = {};
for (const [k, v] of Object.entries(eq.stats)) {
	randomizedStats[k] = Math.round(v * (lo + Math.random() * (hi - lo)) * 100) / 100;
}
return {name:eq.name, type:eq.type, rarity, stats:randomizedStats, color:eq.color};
}

function dist(a,b) { return Math.hypot(a.x-b.x, a.y-b.y) }
function rng(min,max) { return min+Math.random()*(max-min) }
function clamp(v,lo,hi) { return Math.max(lo, Math.min(hi, v)) }
function lerp(a,b,t) { return a+(b-a)*t }

function addText(x,y,text,color='#fff') {

}
function addDmgText(x,y,val) {
if (!settings.showDmg) return;
let color = '#fff', size = 14;
if (val >= 20) { color = '#ff4444'; size = 20; }
else if (val >= 10) { color = '#ffa502'; size = 17; }
else if (val >= 5) { color = '#ffd700'; size = 15; }
G.dmgTexts.push({x:x+rng(-8,8), y:y+rng(-6,6), value:Math.round(val*10)/10, life:30, vy:-1.5, a:1, color, size});
}
function addParticles(x,y,color,count=6) {
const n = settings.lowEnd ? Math.floor(count/3) : count;
for (let i=0;i<n;i++) G.particles.push({x,y,color,vx:rng(-2,2),vy:rng(-2,2),life:rng(12,22),size:rng(2,4)});

function shadeColor(color, percent) {
	const num = parseInt(color.replace('#',''), 16);
	const amt = Math.round(2.55 * percent);
	const R = Math.max(0, Math.min(255, (num >> 16) + amt));
	const G = Math.max(0, Math.min(255, (num >> 8 & 0x00FF00) + amt));
	const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
	return '#' + (0x1000000 + R*0x10000 + G*0x100 + B).toString(16).slice(1);
}
}

// Sprite system
const SPR = { img: null, ready: false, TILE: 16, GAP: 0, COLS: 49 };
function initSprites() {
	SPR.img = document.getElementById('spr');
	if (SPR.img) { if (SPR.img.complete) SPR.ready = true; else SPR.img.onload = () => { SPR.ready = true; }; }
}
function drawSprite(ctx, col, row, x, y, size, alpha) {
	if (!SPR.ready || !SPR.img) return false;
	const sx = col * (SPR.TILE + SPR.GAP);
	const sy = row * (SPR.TILE + SPR.GAP);
	const s = size || SPR.TILE;
	if (alpha !== undefined) { const ga = ctx.globalAlpha; ctx.globalAlpha = alpha; ctx.drawImage(SPR.img, sx, sy, SPR.TILE, SPR.TILE, x - s/2, y - s/2, s, s); ctx.globalAlpha = ga; }
	else ctx.drawImage(SPR.img, sx, sy, SPR.TILE, SPR.TILE, x - s/2, y - s/2, s, s);
	return true;
}
const ST = {
	player: [32, 13], grunt: [24, 1], runner: [26, 1], tank: [30, 2], boss: [24, 4],
	gold: [43, 2], xp: [44, 2],
	propBlade: [32, 0], propRange: [35, 0], propDmg: [37, 0], propHeal: [39, 10],
	propShield: [40, 3], propExp: [43, 2], propBomb: [41, 1], propSpeed: [37, 1], propBladescroll: [32, 0],
	decorTree1: [5, 0], decorTree2: [7, 0], decorRock1: [8, 0], decorRock2: [10, 0],
	decorFlower1: [0, 1], decorFlower2: [1, 1], decorBush: [3, 1]
};


function resizeCanvas() {
G.w = innerWidth; G.h = innerHeight;
document.getElementById('canvas').width = G.w;
document.getElementById('canvas').height = G.h;
}

function bindTouch() {
const c = document.getElementById('canvas');
const maxR = 80;
let touchStartTime = 0, touchStartX = 0, touchStartY = 0;
c.addEventListener('touchstart', e => {
e.preventDefault();
for (const t of e.changedTouches) {
if (t.clientY > G.h*0.45) {
G.joystick.active = true;
G.joystick.baseX = t.clientX;
G.joystick.baseY = t.clientY;
G.joystick.dx = 0; G.joystick.dy = 0;
G.joystick.smoothX = 0; G.joystick.smoothY = 0;
touchStartTime = Date.now();
touchStartX = t.clientX; touchStartY = t.clientY;
}
}
}, {passive:false});
c.addEventListener('touchmove', e => {
e.preventDefault();
for (const t of e.changedTouches) {
if (!G.joystick.active) return;
let rawDx = t.clientX - G.joystick.baseX;
let rawDy = t.clientY - G.joystick.baseY;
let dist = Math.hypot(rawDx, rawDy);
if (dist > maxR * 1.3) {
G.joystick.baseX = t.clientX - (rawDx / dist) * maxR;
G.joystick.baseY = t.clientY - (rawDy / dist) * maxR;
rawDx = t.clientX - G.joystick.baseX;
rawDy = t.clientY - G.joystick.baseY;
dist = Math.hypot(rawDx, rawDy);
}
if (dist < 15) { G.joystick.dx = 0; G.joystick.dy = 0; return; }
let ratio = dist / maxR;
ratio = ratio < 0.3 ? ratio * 0.5 : Math.min(1, ratio * ratio);
G.joystick.dx = (rawDx / dist) * ratio * maxR;
G.joystick.dy = (rawDy / dist) * ratio * maxR;
}
}, {passive:false});
c.addEventListener('touchend', e => {
if (G.over || G.victory) return;
if (Date.now() - touchStartTime < 200) {
const tdx = (e.changedTouches[0] ? e.changedTouches[0].clientX : touchStartX) - touchStartX;
const tdy = (e.changedTouches[0] ? e.changedTouches[0].clientY : touchStartY) - touchStartY;
if (Math.hypot(tdx, tdy) < 15) {
if (touchStartX < 50 && touchStartY < 50) togglePause();
else G.speedIdx = (G.speedIdx+1)%6; G.speed = G.speeds[G.speedIdx];
}
}
G.joystick.active = false;
G.joystick.dx = 0; G.joystick.dy = 0;
G.joystick.smoothX = 0; G.joystick.smoothY = 0;
});
}

// ===== GAME LOOP =====
let lastSpawn = 0;
function update() {
if (!G.started || G.over || G.counting || G.paused) return;
G.frame++;
if (G.recording) {
const elapsed = Math.floor((Date.now() - G.recordStart) / 1000);
const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
const s = String(elapsed % 60).padStart(2, '0');
document.getElementById('recordTimer').textContent = m + ':' + s;
}
P.hurtThisFrame = false;

movePlayer();
const aliveCount = G.enemies.filter(e=>e.alive).length;
const diffMult = [0.7, 1, 1.4, 1.8];
const enemyMult = settings.lowEnd ? 0.6 : 1;

if (G.gameMode === 0) {
// 闯关模式：波次制
const waveNeed = 15 + G.level * 8;
if (G.score >= waveNeed && !G.hasBoss && !G.counting) {
G.level++;
G.waveCleared = G.level - 1;
G.score = 0;
if (G.level > 25) {
G.waveCleared = 25;
document.getElementById('bossBar').style.display = 'none';
gameVictory();
return;
}
if (G.level % 5 === 0) {
G.hasBoss = true; G.boss = new Boss();
document.getElementById('bossBar').style.display = 'block';
sfxBoss();
}
G.enemies = []; G.exps = [];
updateUI();
}
const stageMax = Math.floor((15 + G.level * 5) * diffMult[G.diff] * enemyMult);
if (aliveCount < stageMax) {
lastSpawn += G.speed;
const stageRate = Math.max(3, 16 - G.level * 1.2);
if (lastSpawn >= stageRate) {
lastSpawn = 0;
let stype = 'grunt';
if (G.level >= 2 && Math.random() < 0.3) stype = 'runner';
if (G.level >= 4 && Math.random() < 0.2) stype = 'tank';
G.enemies.push(new Enemy(stype));
}
}
} else {
// 无尽模式
const maxEnemies = Math.floor((35 + G.level * 8) * diffMult[G.diff] * enemyMult);
if (aliveCount < maxEnemies) {
lastSpawn += G.speed;
const spawnRate = Math.max(3, 18 - G.level * 1.2);
if (lastSpawn >= spawnRate) {
lastSpawn = 0;
let type = 'grunt';
if (G.level >= 2 && Math.random() < 0.35) type = 'runner';
if (G.level >= 4 && Math.random() < 0.25) type = 'tank';
G.enemies.push(new Enemy(type));
}
}
if (G.score >= G.needScore && !G.hasBoss && !G.counting) startCountdown();
}

G.enemies.forEach(e => e.alive && e.update());
G.enemies = G.enemies.filter(e => e.alive);
G.props.forEach(p => { if (!p.used && dist(p, P) < 28) p.use(); });
G.props = G.props.filter(p => !p.used);
const pickupR = 22 + (P.pickupRange || 0);
for (let i = G.exps.length - 1; i >= 0; i--) { const e = G.exps[i];
if (dist(e, P) < pickupR) { const bonus = 1 + G.upgrades.xp * 0.2 + (P.xpBonus||0); P.exp += e.v * bonus; G.exps.splice(i,1); if (P.exp >= P.needExp) levelUp(); updateUI(); }
}
for (let i = G.goldDrops.length - 1; i >= 0; i--) { const gd = G.goldDrops[i];
if (dist(gd, P) < pickupR) { G.runGold++; G.goldDrops.splice(i,1); sfxGold(); updateUI(); }
}
for (let i = G.equipDrops.length - 1; i >= 0; i--) { const ed = G.equipDrops[i];
const pickupDist = 28 + (P.pickupRange || 0);
if (dist(ed, P) < pickupDist) {
const slot = {weapon:0,armor:1,accessory:2}[ed.equip.type];
const old = P.equipment[slot];
P.equipment[slot] = ed.equip;
	for(const [k,v] of Object.entries(ed.equip.stats)) {
	if(P.equipBonus[k] !== undefined) P.equipBonus[k] += v;
	}
recalcStats();
const rn = RARITY_NAMES[ed.equip.rarity];
const statStr = Object.entries(ed.equip.stats).map(([k,v]) => STAT_LABELS[k]+'+'+v).join(' ');
addText(P.x, P.y-14, ed.equip.name+' ['+rn+'] '+statStr, ed.equip.color);
if (old) addText(P.x, P.y-28, '替换:'+old.name, '#888');
sfxPickup(); updateUI();
G.equipDrops.splice(i,1);
}
}

// Projectiles
for (let i = G.projectiles.length - 1; i >= 0; i--) {
const p = G.projectiles[i];
const dx = p.tx - p.x, dy = p.ty - p.y, d = Math.hypot(dx, dy) || 1;
p.x += dx/d * p.speed * G.speed;
p.y += dy/d * p.speed * G.speed;
p.life--;
p.trail.push({x:p.x, y:p.y, life:6});
if (p.trail.length > 8) p.trail.shift();
if (d < 12 || p.life <= 0) {
if (p.target && p.target.alive) { p.target.hurt(p.dmg); addDmgText(p.target.x, p.target.y, p.dmg); addParticles(p.target.x, p.target.y, p.color, 3); }
G.projectiles.splice(i,1);
}
}
// Trail decay
G.projectiles.forEach(p => { for (let j=p.trail.length-1;j>=0;j--) { p.trail[j].life--; if(p.trail[j].life<=0)p.trail.splice(j,1); } });
// Wave effects
for (let i = G.waveEffects.length - 1; i >= 0; i--) { G.waveEffects[i].life -= G.speed; G.waveEffects[i].r += G.speed * 3; if (G.waveEffects[i].life <= 0) G.waveEffects.splice(i,1); }

// Timers
for (let i = G.texts.length - 1; i >= 0; i--) { const t = G.texts[i]; t.y+=t.vy; t.a-=0.022; if (t.a<=0) G.texts.splice(i,1); }
for (let i = G.dmgTexts.length - 1; i >= 0; i--) { const t = G.dmgTexts[i]; t.y+=t.vy; t.a-=0.028; if (t.a<=0) G.dmgTexts.splice(i,1); }
for (let i = G.particles.length - 1; i >= 0; i--) { const p = G.particles[i]; p.x+=p.vx; p.y+=p.vy; p.life--; if (p.life<=0) G.particles.splice(i,1); }
if (G.ambientDust) { G.ambientDust.forEach(d => { d.x+=d.vx; d.y+=d.vy; d.life--; if (d.life<=0) { d.x=Math.random()*G.w; d.y=Math.random()*G.h; d.life=200; } }); }
if (G.ambientDust) { G.ambientDust.forEach(d => { d.x+=d.vx; d.y+=d.vy; d.life--; if (d.life<=0) { d.x=Math.random()*G.w; d.y=Math.random()*G.h; d.life=200; } }); }
if (P.shield) { P.shieldTimer -= G.speed; if (P.shieldTimer <= 0) P.shield = false; }
if (P.hurtCD > 0) P.hurtCD -= G.speed;
if (P.dashCD > 0) P.dashCD -= G.speed;
if (P.speedTimer > 0) { P.speedTimer -= G.speed; if (P.speedTimer <= 0) P.speed = P.origSpeed; }
if (G.hasBoss && G.boss && G.boss.alive) G.boss.update();
if (G.comboTimer > 0) { G.comboTimer -= G.speed; if (G.comboTimer <= 0 && G.combo > 0) G.combo = 0; }
P.angle += P.atkSp * G.speed;
updateWeapons();
if (G.shakeDur > 0) { G.shakeDur--; G.shakeX *= 0.85; G.shakeY *= 0.85; }
}

let mobileAimAngle = 0;
function movePlayer() {
let dx = 0, dy = 0, sp = P.speed * G.speed;
if (G.keys.w || G.keys.arrowup) dy = -sp;
if (G.keys.s || G.keys.arrowdown) dy = sp;
if (G.keys.a || G.keys.arrowleft) dx = -sp;
if (G.keys.d || G.keys.arrowright) dx = sp;
if (G.joystick.active) {
G.joystick.smoothX = G.joystick.smoothX || 0;
G.joystick.smoothY = G.joystick.smoothY || 0;
G.joystick.smoothX = lerp(G.joystick.smoothX, G.joystick.dx, 0.35);
G.joystick.smoothY = lerp(G.joystick.smoothY, G.joystick.dy, 0.35);
dx = G.joystick.smoothX / 80 * sp;
dy = G.joystick.smoothY / 80 * sp;
}
// Mobile auto-aim: face nearest enemy when using joystick
if (G.isMobile && G.joystick.active) {
let nearest = null, nearestDist = Infinity;
G.enemies.forEach(e => { if (e.alive) { const d = dist(P, e); if (d < nearestDist) { nearestDist = d; nearest = e; } } });
if (G.hasBoss && G.boss && G.boss.alive) { const d = dist(P, G.boss); if (d < nearestDist) { nearestDist = d; nearest = G.boss; } }
if (nearest) {
mobileAimAngle = Math.atan2(nearest.y - P.y, nearest.x - P.x);
}
}
if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
P.x = clamp(P.x + dx, 10, G.w - 10);
P.y = clamp(P.y + dy, 10, G.h - 10);
if (G.keys[' '] && P.dashCD <= 0) {
const dashBase = 90;
P.dashCD = Math.max(30, dashBase * (1 - (P.cdReduction || 0)));
sfxDash();
P.x = clamp(P.x + dx/2 * 8, 10, G.w - 10);
P.y = clamp(P.y + dy/2 * 8, 10, G.h - 10);
addParticles(P.x, P.y, P.hero.color, 12);
}
}

function updateWeapons() {
P.weapons.forEach(w => {
w.cooldown -= G.speed;
if (w.cooldown <= 0) { w.cooldown = w.interval; fireWeapon(w); }
});
}

function fireWeapon(w) {
switch (w.type) {
case 'blade': {
const bladeScale = 0.5 + P.blades * 0.12;

case 'flame':

ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(-6,-10,2,0,Math.PI*2); ctx.arc(6,-10,2,0,Math.PI*2); ctx.fill();

break;
}

ctx.fillStyle = h.color; ctx.font = '16px sans-serif'; ctx.textAlign = 'center';

	}

// ===== ENEMY =====
class Enemy {
constructor(type) {
this.type = type; this.alive = true;
const edge = Math.floor(Math.random()*4);
switch(edge) {
case 0: this.x = rng(0, G.w); this.y = -20; break;
case 1: this.x = G.w+20; this.y = rng(0, G.h); break;
case 2: this.x = rng(0, G.w); this.y = G.h+20; break;
case 3: this.x = -20; this.y = rng(0, G.h); break;
}
const m = DIFF_MULT[G.diff];
const lv = G.level - 1;
this.lvMult = 1 + lv * 0.04;
switch(type) {
case 'grunt': this.hp = 12 * (1 + lv * 0.11) * m; this.speed = 1.2 + lv * 0.02 * m; this.dmg = 8 + lv * 0.35; this.color = '#e74c3c'; this.size = 13; break;
case 'runner': this.hp = 7 * (1 + lv * 0.08) * m; this.speed = 2.2 + lv * 0.03 * m; this.dmg = 6 + lv * 0.2; this.color = '#e67e22'; this.size = 11; break;
case 'tank': this.hp = 28 * (1 + lv * 0.14) * m; this.speed = 0.8 + lv * 0.01 * m; this.dmg = 15 + lv * 0.5; this.color = '#8e44ad'; this.size = 20; break;
}
this.flashTimer = 0;
}
update() {
if (this.flashTimer > 0) this.flashTimer -= G.speed;
const dx = P.x - this.x, dy = P.y - this.y, d = Math.hypot(dx, dy);
if (d > 22) { this.x += dx/d * this.speed * G.speed; this.y += dy/d * this.speed * G.speed; }
if (d < 22 && P.hurtCD <= 0 && !P.hurtThisFrame) {
P.hp -= this.dmg; P.hurtCD = 60; P.hurtThisFrame = true;
if (settings.showShake) shake(3);
if (P.hp <= 0) { P.hp = 0; gameOver(); }
updateUI();
}
}
hurt(d) {
this.hp -= d; this.flashTimer = 4;
addParticles(this.x, this.y, this.color, 4);
const kdx = this.x - P.x, kdy = this.y - P.y, kd = Math.hypot(kdx, kdy) || 1;
this.x = clamp(this.x + kdx/kd * 5, 5, G.w - 5);
this.y = clamp(this.y + kdy/kd * 5, 5, G.h - 5);
G.combo++; G.comboTimer = 72;
if (G.combo > G.comboMax) G.comboMax = G.combo;
if (G.combo === 25 || G.combo === 50 || G.combo === 100) { sfxCombo(); addText(P.x, P.y-20, G.combo+' COMBO!', '#ffd700'); shake(5); }
if (this.hp <= 0) {
this.alive = false;
G.score += (this.type === 'tank' ? 12 : 5);
const xpVal = this.type === 'tank' ? 35 : (this.type==='runner'?12:20);
G.exps.push({x:this.x, y:this.y, v:xpVal});
addText(this.x, this.y, '+'+(this.type==='tank'?12:5), '#ffd700');
addParticles(this.x, this.y, this.color, this.type==='tank'?14:8);
if (Math.random() < 0.25) G.props.push(new Prop(this.x, this.y));
if (Math.random() < 0.4) G.goldDrops.push({x:this.x+rng(-10,10), y:this.y+rng(-10,10)});
if (Math.random() < 0.03) G.equipDrops.push({x:this.x+rng(-8,8), y:this.y+rng(-8,8), equip:randomEquip()});
updateUI();
}
}
render() {
const ctx = G.ctx; ctx.save(); ctx.translate(this.x, this.y);
// Sprite-first: try sprite, fallback to drawn
const tile = this.type === 'grunt' ? ST.grunt : (this.type === 'runner' ? ST.runner : ST.tank);
if (drawSprite(ctx, tile[0], tile[1], 0, 0, this.size * 2.4)) {
if (this.flashTimer > 0) { ctx.globalCompositeOperation = 'lighter'; ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.arc(0, 0, this.size*0.8, 0, Math.PI*2); ctx.fill(); ctx.globalCompositeOperation = 'source-over'; }
ctx.restore(); return;
}
// Fallback to drawn shapes
if (this.flashTimer > 0) { ctx.fillStyle = '#fff'; } else {
switch (this.type) {
case 'grunt': this.drawBat(ctx); break;
case 'runner': this.drawWolf(ctx); break;
case 'tank': this.drawGolem(ctx); break;
default: this.drawBat(ctx);
}
}
ctx.restore();
}
renderSprite() {
const ctx = G.ctx; ctx.save(); ctx.translate(this.x, this.y);
const tile = this.type === 'grunt' ? ST.grunt : (this.type === 'runner' ? ST.runner : ST.tank);
const sz = this.size * 2.4;
if (drawSprite(ctx, tile[0], tile[1], 0, 0, sz)) {
if (this.flashTimer > 0) { ctx.globalCompositeOperation = 'lighter'; ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.arc(0, 0, this.size*0.8, 0, Math.PI*2); ctx.fill(); ctx.globalCompositeOperation = 'source-over'; }
ctx.restore();
} else { ctx.restore(); this.render(); }
}
drawBat(ctx) {
const s = this.size;
// Wings (membrane gradient)
const wgL = ctx.createLinearGradient(0, 0, -s*1.2, -s*1.2); wgL.addColorStop(0, '#5a2a4a'); wgL.addColorStop(1, '#2a0a1a'); ctx.fillStyle = wgL;
ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(-s*1.8, -s*0.9, -s*0.6, -s*1.3); ctx.quadraticCurveTo(0, -s*0.4, 0, 0); ctx.fill();
const wgR = ctx.createLinearGradient(0, 0, s*1.2, -s*1.2); wgR.addColorStop(0, '#5a2a4a'); wgR.addColorStop(1, '#2a0a1a'); ctx.fillStyle = wgR;
ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(s*1.8, -s*0.9, s*0.6, -s*1.3); ctx.quadraticCurveTo(0, -s*0.4, 0, 0); ctx.fill();
// Body (radial gradient for 3D depth)
if (this.flashTimer>0) { ctx.fillStyle = '#fff'; } else { const bg = ctx.createRadialGradient(0, -s*0.2, s*0.1, 0, 0, s*0.65); bg.addColorStop(0, '#6a3550'); bg.addColorStop(0.6, '#4a2538'); bg.addColorStop(1, '#2a1020'); ctx.fillStyle = bg; }
ctx.beginPath(); ctx.ellipse(0, 0, s*0.45, s*0.65, 0, 0, Math.PI*2); ctx.fill();
// Ears
ctx.beginPath(); ctx.moveTo(-s*0.3, -s*0.6); ctx.lineTo(-s*0.5, -s*1.2); ctx.lineTo(-s*0.1, -s*0.55); ctx.fill();
ctx.beginPath(); ctx.moveTo(s*0.3, -s*0.6); ctx.lineTo(s*0.5, -s*1.2); ctx.lineTo(s*0.1, -s*0.55); ctx.fill();
// Eyes
ctx.fillStyle = '#ff4444'; ctx.beginPath(); ctx.arc(-s*0.22, -s*0.18, s*0.14, 0, Math.PI*2); ctx.arc(s*0.22, -s*0.18, s*0.14, 0, Math.PI*2); ctx.fill();
}
drawWolf(ctx) {
const s = this.size;
// Body (radial gradient for fur depth)
if (this.flashTimer>0) { ctx.fillStyle = '#fff'; } else { const wbg = ctx.createRadialGradient(0, -s*0.1, s*0.1, 0, 0, s*0.9); wbg.addColorStop(0, '#8a5a30'); wbg.addColorStop(0.5, '#5a3a20'); wbg.addColorStop(1, '#3a2010'); ctx.fillStyle = wbg; }
ctx.beginPath(); ctx.ellipse(0, 0, s*0.9, s*0.5, 0, 0, Math.PI*2); ctx.fill();
// Head
ctx.beginPath(); ctx.arc(s*0.7, -s*0.2, s*0.45, 0, Math.PI*2); ctx.fill();
// Snout
ctx.beginPath(); ctx.moveTo(s*1.05, -s*0.2); ctx.lineTo(s*1.4, -s*0.05); ctx.lineTo(s*1.05, s*0.1); ctx.fill();
// Ears
ctx.beginPath(); ctx.moveTo(s*0.55, -s*0.6); ctx.lineTo(s*0.75, -s*1); ctx.lineTo(s*0.9, -s*0.55); ctx.fill();
ctx.beginPath(); ctx.moveTo(s*0.35, -s*0.55); ctx.lineTo(s*0.5, -s*0.95); ctx.lineTo(s*0.65, -s*0.5); ctx.fill();
// Tail
ctx.strokeStyle = '#5a3a20'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(-s*0.8, 0); ctx.quadraticCurveTo(-s*1.4, -s*0.5, -s*1.2, -s*1); ctx.stroke();
// Eye
ctx.fillStyle = '#ff8800'; ctx.beginPath(); ctx.arc(s*0.85, -s*0.3, s*0.12, 0, Math.PI*2); ctx.fill();
}
drawGolem(ctx) {
const s = this.size;
// Body (linear gradient for stone depth)
if (this.flashTimer>0) { ctx.fillStyle = '#fff'; } else { const gbg = ctx.createLinearGradient(-s*0.65, -s*0.5, s*0.65, s*0.8); gbg.addColorStop(0, '#5a4a70'); gbg.addColorStop(0.4, '#3a3050'); gbg.addColorStop(1, '#201830'); ctx.fillStyle = gbg; }
ctx.fillRect(-s*0.65, -s*0.5, s*1.3, s*1.3);
// Crack lines
ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1;
ctx.beginPath(); ctx.moveTo(-s*0.3, -s*0.5); ctx.lineTo(-s*0.1, 0); ctx.lineTo(-s*0.4, s*0.6); ctx.stroke();
ctx.beginPath(); ctx.moveTo(s*0.2, -s*0.4); ctx.lineTo(s*0.4, s*0.2); ctx.stroke();
// Eyes
ctx.fillStyle = '#ff00ff'; ctx.beginPath(); ctx.arc(-s*0.25, -s*0.1, s*0.18, 0, Math.PI*2); ctx.arc(s*0.25, -s*0.1, s*0.18, 0, Math.PI*2); ctx.fill();
ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-s*0.25, -s*0.1, s*0.08, 0, Math.PI*2); ctx.arc(s*0.25, -s*0.1, s*0.08, 0, Math.PI*2); ctx.fill();
}
}

class Boss {
constructor() {
let bx, by;
do { const edge = Math.floor(Math.random()*4);
switch(edge) { case 0: bx=rng(60,G.w-60); by=60; break; case 1: bx=G.w-60; by=rng(60,G.h-60); break; case 2: bx=rng(60,G.w-60); by=G.h-60; break; case 3: bx=60; by=rng(60,G.h-60); break; }
} while (Math.hypot(bx-P.x, by-P.y) < 200);
this.x = bx; this.y = by;
this.maxHp = 200 + G.level * 100; this.hp = this.maxHp;
this.speed = 0.6 * DIFF_MULT[G.diff]; this.dmg = 28; this.alive = true;
this.skillTimer = 0; this.cds = [0,0,0]; this.flashTimer = 0;
}
update() {
if (this.flashTimer > 0) this.flashTimer -= G.speed;
this.skillTimer += G.speed; this.cds = this.cds.map(c => Math.max(0, c - G.speed));
const dx = P.x - this.x, dy = P.y - this.y, d = Math.hypot(dx, dy) || 1;
if (d > 100) { this.x += dx/d * this.speed * G.speed; this.y += dy/d * this.speed * G.speed; }
if (d < 50 && P.hurtCD <= 0 && !P.hurtThisFrame) {
P.hp -= this.dmg; P.hurtCD = 60; P.hurtThisFrame = true; shake(8);
if (P.hp <= 0) { P.hp = 0; gameOver(); } updateUI();
}
if (this.skillTimer >= 80) { this.skillTimer = 0; const s = Math.floor(Math.random()*3);
if (s === 0 && this.cds[0] === 0) { this.x += dx/d * 140; this.y += dy/d * 140; addParticles(this.x, this.y, '#ff00ff', 15); this.cds[0] = 120; }
else if (s === 1 && this.cds[1] === 0) { if (dist(this, P) < 150 && P.hurtCD <= 0 && !P.hurtThisFrame) { P.hp -= 22; P.hurtCD = 60; P.hurtThisFrame = true; shake(6); updateUI(); } addParticles(this.x, this.y, '#ff44ff', 20); this.cds[1] = 160; }
else if (s === 2 && this.cds[2] === 0) { for (let i = 0; i < 8; i++) G.enemies.push(new Enemy(Math.random()<0.4?'grunt':'runner')); this.cds[2] = 200; }
}
}
hurt(d) {
this.hp -= d; this.flashTimer = 3;
addParticles(this.x, this.y, '#ff00ff', 2);
document.getElementById('bossHp').style.width = (this.hp/this.maxHp*100)+'%';
if (this.hp <= 0) { this.alive = false; G.hasBoss = false; document.getElementById('bossBar').style.display = 'none'; G.score += 100; G.exps.push({x:this.x, y:this.y, v:200}); addText(this.x, this.y, 'BOSS 击败!', '#ffd700'); addParticles(this.x, this.y, '#ff00ff', 30);
for (let i=0;i<5;i++) G.props.push(new Prop(this.x+rng(-80,80), this.y+rng(-80,80)));
for (let i=0;i<8;i++) G.goldDrops.push({x:this.x+rng(-60,60), y:this.y+rng(-60,60)});
sfxExplosion(); updateUI(); }
}
render() {
const ctx = G.ctx; ctx.save(); ctx.translate(this.x, this.y);

ctx.fillStyle = this.flashTimer>0?'#fff':'#2a1040'; ctx.shadowColor = '#9b59e7'; ctx.shadowBlur = 20;

// ===== PROP =====
const PROP_TYPES = ['blade','range','dmg','heal','shield','exp','bomb','speed','bladescroll'];
class Prop {

case 'speed': if(P.speedTimer<=0)P.origSpeed=P.speed; P.speed=P.origSpeed+1.2; P.speedTimer=300; addText(P.x,P.y-10,'加速!','#00f0ff'); break;
case 'bladescroll': if(!P.weapons.some(w=>w.type==='blade')){P.weapons.push({type:'blade',dmg:1.2,interval:25,cooldown:0,count:0});addText(P.x,P.y-10,'习得飞刀!','#ffd700');sfxLevel();}else{if(P.blades<P.maxBlades)P.blades++;addText(P.x,P.y-10,'飞刀+1','#ffd700');}break;

function toggleRecording() {

function startRecording() {
try {
const canvas = document.getElementById('canvas');
const stream = canvas.captureStream(60);
G.recordChunks = [];
// Prefer MP4 (Douyin compatible), fallback WebM
const mimes = ['video/mp4','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
let mime = 'video/webm';
for (const m of mimes) { if (MediaRecorder.isTypeSupported(m)) { mime = m; break; } }
G.recordIsMP4 = mime.startsWith('video/mp4');
G.recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 5000000 });
G.recorder.ondataavailable = e => { if (e.data.size > 0) G.recordChunks.push(e.data); };
G.recorder.onstop = async () => {
const ext = G.recordIsMP4 ? 'mp4' : 'webm';
const blobType = G.recordIsMP4 ? 'video/mp4' : 'video/webm';
const blob = new Blob(G.recordChunks, { type: blobType });
const ts = new Date().toISOString().slice(0,19).replace(/:/g,'-');
const filename = `暗影幸存者_${P.hero?P.hero.name:''}_${ts}.${ext}`;
G.lastRecording = blob; G.lastRecType = ext;

// Try "Save As" dialog (Chrome/Edge) - user picks folder
let saved = false;
try {
if (window.showSaveFilePicker) {
const handle = await window.showSaveFilePicker({
suggestedName: filename,
types: [{
description: ext === 'mp4' ? 'MP4 Video' : 'WebM Video',
accept: { [blobType]: ['.' + ext] }
}]
});
const writable = await handle.createWritable();
await writable.write(blob);
await writable.close();
saved = true;
}
} catch (e) {
// User cancelled or not supported - fall through to download
}

if (!saved) {
// Fallback: download to browser default folder
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url; a.download = filename;
document.body.appendChild(a); a.click(); a.remove();
setTimeout(() => URL.revokeObjectURL(url), 60000);
}

const t = document.createElement('div');
t.className='toast'; t.style.setProperty('--accent', G.recordIsMP4 ? '#2ecc71' : '#ffa502');
t.innerHTML = G.recordIsMP4
? (saved ? 'MP4保存成功! 可直接上传抖音' : 'MP4已下载! 可直接上传抖音')
: (saved ? 'WebM保存成功! 用剪映转MP4后上传抖音' : 'WebM已下载<br><small>用剪映打开 -> 导出MP4 -> 上传抖音</small>');
document.body.appendChild(t); setTimeout(() => t.remove(), 4000);
};
G.recorder.start(1000);
G.recordStart = Date.now();
G.recording = true;
document.getElementById('recordBtn').textContent = '⏹ 停止';
document.getElementById('recordBtn').style.color = '#ff5050';
document.getElementById('recordIndicator').style.display = 'flex';
} catch(e) {
alert('录屏失败：你的浏览器不支持。请使用 Chrome 或 Edge 浏览器。');
console.error('Record error:', e);
}
}

// ===== LittleJS ENGINE CORE =====
// Object pool — reusable objects to reduce GC pressure
function Pool(factory, reset, initSize=64){
const a=[], f=factory, r=reset;
a.get=(...args)=>{const o=a.pop();if(o){r(o,...args);return o}return f(...args)};
a.recycle=o=>{if(a.length<256)a.push(o)};
a.preFill=n=>{for(let i=0;i<n;i++)a.push(f())};
a.preFill(initSize);
return a;
}

// Spatial grid for O(1) collision lookup
const CELL=64;
function SpatialGrid(w,h){
const grid={};
grid.clear=()=>{for(const k in grid)delete grid[k]};
grid.key=(x,y)=>Math.floor(x/CELL)+','+Math.floor(y/CELL);
grid.insert=(id,x,y,r)=>{
for(let cy=Math.floor((y-r)/CELL);cy<=Math.floor((y+r)/CELL);cy++)
for(let cx=Math.floor((x-r)/CELL);cx<=Math.floor((x+r)/CELL);cx++){
const k=cx+','+cy;if(!grid[k])grid[k]=[];grid[k].push(id);
}
};
grid.query=(x,y,r,out=[])=>{
out.length=0;
for(let cy=Math.floor((y-r)/CELL);cy<=Math.floor((y+r)/CELL);cy++)
for(let cx=Math.floor((x-r)/CELL);cx<=Math.floor((x+r)/CELL);cx++){
const cell=grid[cx+','+cy];if(cell)for(let i=0;i<cell.length;i++)out.push(cell[i]);
}
return out;
};
return grid;
}

// Fixed-timestep game loop (LittleJS pattern)
let frameTime=0, fixedDelta=1/60, maxFrame=1/15, physicsTime=0;
function gameLoop(now=performance.now()){
requestAnimationFrame(gameLoop);
let dt=(now-frameTime)/1000;
frameTime=now;
if(dt>maxFrame)dt=maxFrame;
dt*=G.speed;
physicsTime+=dt;
let steps=0;
while(physicsTime>=fixedDelta&&steps<4){
updatePhysics(fixedDelta);
physicsTime-=fixedDelta;
steps++;
}
render(physicsTime/fixedDelta);
}
