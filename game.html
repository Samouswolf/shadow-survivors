<script>
// ===== AUDIO ENGINE =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
const masterGain = audioCtx.createGain(); masterGain.gain.value = 0.3; masterGain.connect(audioCtx.destination);
let bgmGain = null, bgmPlaying = false, sfxVol = 0.3, bgmVol = 0.04;

function playSound(freq, type='square', dur=0.08, vol=0.12, slide=0) {
const t = audioCtx.currentTime;
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.type = type;
osc.frequency.setValueAtTime(freq, t);
if (slide) osc.frequency.linearRampToValueAtTime(freq+slide, t+dur);
gain.gain.setValueAtTime(vol*sfxVol*3.3, t);
gain.gain.exponentialRampToValueAtTime(0.001, t+dur);
osc.connect(gain); gain.connect(masterGain);
osc.start(t); osc.stop(t+dur);
}
function sfxHit() { playSound(200,'square',0.04,0.08) }
function sfxPickup() { [660,880,1100].forEach((f,i)=>playSound(f,'sine',0.1,0.06,200)) }
function sfxLevel() { [392,523,659,784,1047].forEach((f,i)=>playSound(f,'sine',0.14,0.08,0)) }
function sfxBoss() { playSound(40,'sawtooth',0.5,0.15,-20); playSound(30,'sawtooth',0.4,0.12,-15); }
function sfxCombo() { [784,988,1175,1319].forEach((f,i)=>playSound(f,'triangle',0.1,0.06,0)); }

function startBGM() {
if (bgmPlaying) return; bgmPlaying = true;
audioCtx.resume();
bgmGain = audioCtx.createGain();
bgmGain.gain.value = bgmVol;
bgmGain.connect(masterGain);
const chords = [
[130.8,164.8,196],[146.8,174.6,220],[164.8,196,246.9],[174.6,220,261.6],
[130.8,164.8,196],[196,246.9,293.7],[164.8,196,246.9],[146.8,174.6,220],
];
const bassNotes = [65.4,73.4,82.4,87.3,65.4,98,82.4,73.4];
let i = 0;
function loop() {
if (!bgmPlaying) return;
const t = audioCtx.currentTime;
const chord = chords[i % chords.length];
chord.forEach(f => {
const osc = audioCtx.createOscillator();
const g = audioCtx.createGain();
osc.type = 'triangle';
osc.frequency.value = f;
g.gain.setValueAtTime(0.012, t);
g.gain.exponentialRampToValueAtTime(0.001, t+0.7);
osc.connect(g); g.connect(bgmGain);
osc.start(t); osc.stop(t+0.7);
});
// Bass note
const bosc = audioCtx.createOscillator();
const bg = audioCtx.createGain();
bosc.type = 'sine';
bosc.frequency.value = bassNotes[i % bassNotes.length];
bg.gain.setValueAtTime(0.018, t);
bg.gain.exponentialRampToValueAtTime(0.001, t+0.7);
bosc.connect(bg); bg.connect(bgmGain);
bosc.start(t); bosc.stop(t+0.7);
i++;
setTimeout(loop, 850);
}
loop();
}
function stopBGM() { bgmPlaying = false; if (bgmGain) { bgmGain.disconnect(); bgmGain = null; } }
function toggleMusic() {
if (bgmPlaying) { stopBGM(); document.getElementById('musicBtn').textContent = '🔇'; }
else { startBGM(); document.getElementById('musicBtn').textContent = '🔊'; }
}

function randomEquip() {
	const r = Math.random();
	let rarity = 'common';
	if (r > 0.98) rarity = 'legendary';
	else if (r > 0.94) rarity = 'epic';
	else if (r > 0.85) rarity = 'rare';
	else if (r > 0.70) rarity = 'magic';
	else if (r > 0.45) rarity = 'uncommon';
	const slot = EQ_SLOTS[Math.floor(Math.random() * EQ_SLOTS.length)];
	const pool = EQ_POOL.filter(e => e.slot === slot.type && e.rarity === rarity);
	if (pool.length === 0) {
		const fallback = EQ_POOL.filter(e => e.rarity === rarity);
		if (fallback.length === 0) return randomEquip();
		const eq = fallback[Math.floor(Math.random() * fallback.length)];
		return makeEquipCopy(eq);
	}
	const eq = pool[Math.floor(Math.random() * pool.length)];
	return makeEquipCopy(eq);
}

function makeEquipCopy(eq) {
	const ranges = {common:[0.7,1.3], uncommon:[0.75,1.4], magic:[0.8,1.6], rare:[0.85,1.8], epic:[0.9,2.0], legendary:[1.1,2.4]};
	const [lo, hi] = ranges[eq.rarity];
	const randomizedStats = {};
	for (const [k, v] of Object.entries(eq.stats)) {
		randomizedStats[k] = Math.round(v * (lo + Math.random() * (hi - lo)) * 100) / 100;
	}
	return {name:eq.name, slot:eq.slot, rarity:eq.rarity, stats:randomizedStats, color:RARITY_COLORS[eq.rarity]};
}

function recalcStats() {
	const h = P.hero; if(!h) return;
	P.baseMaxHp = Math.round(h.hp * 0.75); P.baseDmg = Math.round(h.dmg * 0.75); P.baseSpeed = h.speed;
	P.baseRange = h.range; P.baseAtkSp = h.atkSp; P.baseBlades = h.blades;
	let bonusHp=0, bonusDmg=0, bonusSpd=0, bonusRange=0, bonusAtk=0, bonusXp=0, bonusCd=0, bonusPickup=0;
	P.equipment.forEach(eq => {
		if(!eq || !eq.stats) return;
		if(eq.stats.maxHp) bonusHp += eq.stats.maxHp;
		if(eq.stats.dmg) bonusDmg += eq.stats.dmg;
		if(eq.stats.speed) bonusSpd += eq.stats.speed;
		if(eq.stats.range) bonusRange += eq.stats.range;
		if(eq.stats.atkSp) bonusAtk += eq.stats.atkSp;
		if(eq.stats.xp) bonusXp += eq.stats.xp;
		if(eq.stats.cd) bonusCd += eq.stats.cd;
		if(eq.stats.pickup) bonusPickup += eq.stats.pickup;
	});
	if(P.equipBonus) {
		if(P.equipBonus.maxHp) bonusHp += P.equipBonus.maxHp;
		if(P.equipBonus.dmg) bonusDmg += P.equipBonus.dmg;
		if(P.equipBonus.speed) bonusSpd += P.equipBonus.speed;
		if(P.equipBonus.range) bonusRange += P.equipBonus.range;
		if(P.equipBonus.atkSp) bonusAtk += P.equipBonus.atkSp;
		if(P.equipBonus.xp) bonusXp += P.equipBonus.xp;
		if(P.equipBonus.cd) bonusCd += P.equipBonus.cd;
		if(P.equipBonus.pickup) bonusPickup += P.equipBonus.pickup;
	}
	P.maxHp = P.baseMaxHp + bonusHp + G.upgrades.hp*10;
	if(P.hp > P.maxHp) P.hp = P.maxHp;
	P.dmg = P.baseDmg + bonusDmg + G.upgrades.atk*1.5;
	P.speed = P.baseSpeed + bonusSpd + G.upgrades.spd*0.3;
	P.range = P.baseRange + bonusRange;
	P.atkSp = P.baseAtkSp + bonusAtk + G.upgrades.blades*0.005;
	P.xpBonus = bonusXp;
	P.cdReduction = bonusCd;
	P.pickupRange = bonusPickup;
}

b.totalKills = (b.totalKills||0) + G.score;
saveBests(b);

function dist(a,b) { return Math.hypot(a.x-b.x, a.y-b.y) }
function rng(min,max) { return min+Math.random()*(max-min) }
function clamp(v,lo,hi) { return Math.max(lo, Math.min(hi, v)) }
function lerp(a,b,t) { return a+(b-a)*t }

function addText(x,y,text,color='#fff') {

function addDmgText(x,y,val) {

if (val >= 20) { color = '#ff4444'; size = 20; }
else if (val >= 10) { color = '#ffa502'; size = 17; }
else if (val >= 5) { color = '#ffd700'; size = 15; }
G.dmgTexts.push({x:x+rng(-8,8), y:y+rng(-6,6), value:Math.round(val*10)/10, life:30, vy:-1.5, a:1, color, size});
}
function addParticles(x,y,color,count=6) {

function shadeColor(color, percent) {
	const num = parseInt(color.replace('#',''), 16);
	const amt = Math.round(2.55 * percent);
	const R = Math.max(0, Math.min(255, (num >> 16) + amt));
	const G = Math.max(0, Math.min(255, (num >> 8 & 0x00FF00) + amt));
	const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
	return '#' + (0x1000000 + R*0x10000 + G*0x100 + B).toString(16).slice(1);
}
}
function shake(amount) {
if (!settings.showShake) return;
G.shakeDur = Math.max(G.shakeDur, 6);
G.shakeX = rng(-amount, amount);
G.shakeY = rng(-amount, amount);
}

// Sprite system
const SPR = { img: null, ready: false, TILE: 16, GAP: 0, COLS: 20 };
function initSprites() {
	SPR.img = document.getElementById('spr');
	if (SPR.img) { if (SPR.img.complete) SPR.ready = true; else SPR.img.onload = () => { SPR.ready = true; }; }
}
function drawSprite(ctx, col, row, x, y, size, alpha) {
	if (!SPR.ready || !SPR.img) return false;
	const sx = col * (SPR.TILE + SPR.GAP);
	const sy = row * (SPR.TILE + SPR.GAP);
	const s = size || SPR.TILE;
	if (alpha !== undefined) { const ga = ctx.globalAlpha; ctx.globalAlpha = alpha; ctx.drawImage(SPR.img, sx, sy, SPR.TILE, SPR.TILE, x - s/2, y - s/2, s, s); ctx.globalAlpha = ga; }
	else ctx.drawImage(SPR.img, sx, sy, SPR.TILE, SPR.TILE, x - s/2, y - s/2, s, s);
	return true;
}
const ST = {
		// Heroes [0,0]~[12,0]
		player: [1, 0], heroBlade: [0, 0], heroFlame: [1, 0], heroStorm: [2, 0], heroShadow: [3, 0],
		// Monsters [13,0]~[19,0], [13,2]~[19,2], [0,1]~[3,1], [12,1]~[19,1]
		grunt: [13, 0], runner: [12, 1], tank: [18, 2],
		// Boss [11,2]~[19,2]
		boss: [11, 2],
		// Weapons
		weaponBlade: [4, 1], weaponStaff: [7, 5], weaponBow: [5, 8], weaponDagger: [3, 2],
		// Drops [11,8]~[16,10]
		gold: [12, 9], xp: [13, 9],
		propBlade: [11, 9], propRange: [16, 9], propDmg: [15, 9],
		propHeal: [11, 10], propShield: [14, 9], propExp: [13, 10],
		propBomb: [14, 10], propSpeed: [15, 10], propBladescroll: [16, 10]
	};



function drawDecor(ctx, d) {
	switch (d.type) {
	case 'tree1': case 'tree2': {
		const h = d.size, w = h * 0.4;
		ctx.fillStyle = '#1a3a1a'; ctx.strokeStyle = '#2a3a1a'; ctx.lineWidth = 2;
		ctx.beginPath(); ctx.moveTo(d.x, d.y + h*0.1);
		ctx.lineTo(d.x - w*0.5, d.y + h*0.6); ctx.lineTo(d.x + w*0.5, d.y + h*0.6); ctx.closePath(); ctx.fill();
		ctx.fillStyle = '#2a4a2a'; ctx.beginPath(); ctx.arc(d.x, d.y + h*0.35, w*0.3, 0, Math.PI*2); ctx.fill();
		ctx.fillStyle = '#5a3a1a'; ctx.fillRect(d.x - 2, d.y + h*0.55, 4, h*0.3);
		break;
	}
	case 'rock1': case 'rock2': {
		const r = d.size * 0.3;
		ctx.fillStyle = '#3a3a3a'; ctx.beginPath(); ctx.arc(d.x, d.y + r*0.3, r, 0, Math.PI*2); ctx.fill();
		ctx.fillStyle = '#4a4a3a'; ctx.beginPath(); ctx.arc(d.x - r*0.2, d.y - r*0.1, r*0.6, 0, Math.PI*2); ctx.fill();
		break;
	}
	case 'flower1': case 'flower2': {
		const r = d.size * 0.2;
		const colors = { flower1: '#ff6b9d', flower2: '#ffd700' };
		ctx.fillStyle = '#2a5a2a'; ctx.fillRect(d.x - 1, d.y + r*0.2, 2, d.size*0.5);
		ctx.fillStyle = colors[d.type] || '#ff6b9d';
		for (let i = 0; i < 5; i++) {
			const a = Math.PI*2/5*i - Math.PI/2;
			ctx.beginPath(); ctx.arc(d.x + Math.cos(a)*r*0.6, d.y + Math.sin(a)*r*0.6, r*0.4, 0, Math.PI*2); ctx.fill();
		}
		break;
	}
	case 'bush': {
		const r = d.size * 0.25;
		ctx.fillStyle = '#1a3a1a'; ctx.beginPath(); ctx.arc(d.x, d.y, r, 0, Math.PI*2); ctx.fill();
		ctx.fillStyle = '#2a4a2a'; ctx.beginPath(); ctx.arc(d.x - r*0.3, d.y - r*0.2, r*0.7, 0, Math.PI*2); ctx.fill();
		ctx.fillStyle = '#3a5a3a'; ctx.beginPath(); ctx.arc(d.x + r*0.3, d.y - r*0.1, r*0.6, 0, Math.PI*2); ctx.fill();
		break;
	}
	}
}

function bindTouch() {
const c = document.getElementById('canvas');
const maxR = 80;
let touchStartTime = 0, touchStartX = 0, touchStartY = 0;
c.addEventListener('touchstart', e => {
e.preventDefault();
for (const t of e.changedTouches) {
if (t.clientY > G.h*0.45) {
G.joystick.active = true;
G.joystick.baseX = t.clientX;
G.joystick.baseY = t.clientY;
G.joystick.dx = 0; G.joystick.dy = 0;
G.joystick.smoothX = 0; G.joystick.smoothY = 0;
touchStartTime = Date.now();
touchStartX = t.clientX; touchStartY = t.clientY;
}
}
}, {passive:false});
c.addEventListener('touchmove', e => {
e.preventDefault();
for (const t of e.changedTouches) {
if (!G.joystick.active) return;
let rawDx = t.clientX - G.joystick.baseX;
let rawDy = t.clientY - G.joystick.baseY;
let dist = Math.hypot(rawDx, rawDy);
if (dist > maxR * 1.3) {
G.joystick.baseX = t.clientX - (rawDx / dist) * maxR;
G.joystick.baseY = t.clientY - (rawDy / dist) * maxR;
rawDx = t.clientX - G.joystick.baseX;
rawDy = t.clientY - G.joystick.baseY;
dist = Math.hypot(rawDx, rawDy);
}
if (dist < 15) { G.joystick.dx = 0; G.joystick.dy = 0; return; }
let ratio = dist / maxR;
ratio = ratio < 0.3 ? ratio * 0.5 : Math.min(1, ratio * ratio);
G.joystick.dx = (rawDx / dist) * ratio * maxR;
G.joystick.dy = (rawDy / dist) * ratio * maxR;
}
}, {passive:false});
c.addEventListener('touchend', e => {
if (G.over || G.victory) return;
if (Date.now() - touchStartTime < 200) {
const tdx = (e.changedTouches[0] ? e.changedTouches[0].clientX : touchStartX) - touchStartX;
const tdy = (e.changedTouches[0] ? e.changedTouches[0].clientY : touchStartY) - touchStartY;
if (Math.hypot(tdx, tdy) < 15) {
if (touchStartX < 50 && touchStartY < 50) togglePause();
else G.speedIdx = (G.speedIdx+1)%6; G.speed = G.speeds[G.speedIdx];
}
}
G.joystick.active = false;
G.joystick.dx = 0; G.joystick.dy = 0;
G.joystick.smoothX = 0; G.joystick.smoothY = 0;
});
}

// ===== GAME LOOP =====
let lastSpawn = 0;
function update() {
if (!G.started || G.over || G.counting || G.paused) return;
G.frame++;
if (G.recording) {
const elapsed = Math.floor((Date.now() - G.recordStart) / 1000);
const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
const s = String(elapsed % 60).padStart(2, '0');
document.getElementById('recordTimer').textContent = m + ':' + s;
}
P.hurtThisFrame = false;

movePlayer();
const aliveCount = G.enemies.filter(e=>e.alive).length;
const diffMult = [0.7, 1, 1.4, 1.8];
const enemyMult = settings.lowEnd ? 0.6 : 1;

if (G.gameMode === 0) {
// 闯关模式：波次制
const waveNeed = 15 + G.level * 8;
if (G.score >= waveNeed && !G.hasBoss && !G.counting) {
G.level++;
G.waveCleared = G.level - 1;
G.score = 0;
if (G.level > 25) {
G.waveCleared = 25;
document.getElementById('bossBar').style.display = 'none';
gameVictory();
return;
}
if (G.level % 5 === 0) {
G.hasBoss = true; G.boss = new Boss();
document.getElementById('bossBar').style.display = 'block';
sfxBoss();
}
G.enemies = []; G.exps = [];
updateUI();
}
const stageMax = Math.floor((15 + G.level * 5) * diffMult[G.diff] * enemyMult);
if (aliveCount < stageMax) {
lastSpawn += G.speed;
const stageRate = Math.max(3, 16 - G.level * 1.2);
if (lastSpawn >= stageRate) {
lastSpawn = 0;
let stype = 'grunt';
if (G.level >= 2 && Math.random() < 0.3) stype = 'runner';
if (G.level >= 4 && Math.random() < 0.2) stype = 'tank';
G.enemies.push(new Enemy(stype));
}
}
} else {
// 无尽模式
const maxEnemies = Math.floor((35 + G.level * 8) * diffMult[G.diff] * enemyMult);
if (aliveCount < maxEnemies) {
lastSpawn += G.speed;
const spawnRate = Math.max(3, 18 - G.level * 1.2);
if (lastSpawn >= spawnRate) {
lastSpawn = 0;
let type = 'grunt';
if (G.level >= 2 && Math.random() < 0.35) type = 'runner';
if (G.level >= 4 && Math.random() < 0.25) type = 'tank';
G.enemies.push(new Enemy(type));
}
}
if (G.score >= G.needScore && !G.hasBoss && !G.counting) startCountdown();
}

G.enemies.forEach(e => e.alive && e.update());

	for (let i = G.equipDrops.length - 1; i >= 0; i--) { const ed = G.equipDrops[i];

// Projectiles

for (let i = G.dmgTexts.length - 1; i >= 0; i--) { const t = G.dmgTexts[i]; t.y+=t.vy; t.a-=0.028; if (t.a<=0) G.dmgTexts.splice(i,1); }
for (let i = G.particles.length - 1; i >= 0; i--) { const p = G.particles[i]; p.x+=p.vx; p.y+=p.vy; p.life--; if (p.life<=0) G.particles.splice(i,1); }
if (G.ambientDust) { G.ambientDust.forEach(d => { d.x+=d.vx; d.y+=d.vy; d.life--; if (d.life<=0) { d.x=Math.random()*G.w; d.y=Math.random()*G.h; d.life=200; } }); }
if (G.ambientDust) { G.ambientDust.forEach(d => { d.x+=d.vx; d.y+=d.vy; d.life--; if (d.life<=0) { d.x=Math.random()*G.w; d.y=Math.random()*G.h; d.life=200; } }); }
if (P.shield) { P.shieldTimer -= G.speed; if (P.shieldTimer <= 0) P.shield = false; }

let mobileAimAngle = 0;
function movePlayer() {
let dx = 0, dy = 0, sp = P.speed * G.speed;
if (G.keys.w || G.keys.arrowup) dy = -sp;
if (G.keys.s || G.keys.arrowdown) dy = sp;
if (G.keys.a || G.keys.arrowleft) dx = -sp;
if (G.keys.d || G.keys.arrowright) dx = sp;
if (G.joystick.active) {
G.joystick.smoothX = G.joystick.smoothX || 0;
G.joystick.smoothY = G.joystick.smoothY || 0;
G.joystick.smoothX = lerp(G.joystick.smoothX, G.joystick.dx, 0.35);
G.joystick.smoothY = lerp(G.joystick.smoothY, G.joystick.dy, 0.35);
dx = G.joystick.smoothX / 80 * sp;
dy = G.joystick.smoothY / 80 * sp;
}
// Mobile auto-aim: face nearest enemy when using joystick
if (G.isMobile && G.joystick.active) {
let nearest = null, nearestDist = Infinity;
G.enemies.forEach(e => { if (e.alive) { const d = dist(P, e); if (d < nearestDist) { nearestDist = d; nearest = e; } } });
if (G.hasBoss && G.boss && G.boss.alive) { const d = dist(P, G.boss); if (d < nearestDist) { nearestDist = d; nearest = G.boss; } }
if (nearest) {
mobileAimAngle = Math.atan2(nearest.y - P.y, nearest.x - P.x);
}
}
if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
P.x = clamp(P.x + dx, 10, G.w - 10);
P.y = clamp(P.y + dy, 10, G.h - 10);
if (G.keys[' '] && P.dashCD <= 0) {
const dashBase = 90;
P.dashCD = Math.max(30, dashBase * (1 - (P.cdReduction || 0)));
sfxDash();
P.x = clamp(P.x + dx/2 * 8, 10, G.w - 10);
P.y = clamp(P.y + dy/2 * 8, 10, G.h - 10);
addParticles(P.x, P.y, P.hero.color, 12);
}
}

function updateWeapons() {
P.weapons.forEach(w => {
w.cooldown -= G.speed;
if (w.cooldown <= 0) { w.cooldown = w.interval; fireWeapon(w); }
});
}

function fireWeapon(w) {
switch (w.type) {
case 'blade': {
const bladeScale = 0.5 + P.blades * 0.12;
G.enemies.forEach(e => {
if (e.alive && dist(e, P) < P.range + 10) { e.hurt(P.dmg * w.dmg * bladeScale); addDmgText(e.x, e.y, P.dmg * w.dmg * bladeScale); }
});
if (G.hasBoss && G.boss && G.boss.alive && dist(G.boss, P) < P.range + 30) { G.boss.hurt(P.dmg * w.dmg * bladeScale * 0.7); addDmgText(G.boss.x, G.boss.y, P.dmg * w.dmg * bladeScale * 0.7); }
sfxHit();
break;
}
case 'nova':
G.waveEffects.push({x:P.x, y:P.y, r:10, maxR:P.range, life:30, color:'#ff6b35'});
G.enemies.forEach(e => { if (e.alive && dist(e, P) < P.range) { e.hurt(P.dmg * w.dmg); addDmgText(e.x, e.y, P.dmg * w.dmg); addParticles(e.x, e.y, '#ff6b35', 3); } });
if (G.hasBoss && G.boss && G.boss.alive && dist(G.boss, P) < P.range) { G.boss.hurt(P.dmg * w.dmg); addDmgText(G.boss.x, G.boss.y, P.dmg * w.dmg); }
addParticles(P.x, P.y, '#ff6b35', 10);
sfxExplosion();
break;
case 'arrow': {
const targets = [...G.enemies.filter(e=>e.alive)].sort((a,b)=>dist(P,a)-dist(P,b));
if (G.hasBoss && G.boss && G.boss.alive) targets.unshift(G.boss);
const count = w.count || 1;
for (let i = 0; i < Math.min(count, targets.length); i++) {
const t = targets[i];
const d = dist(P, t);
if (d < 300) {
G.projectiles.push({x:P.x, y:P.y, tx:t.x, ty:t.y, speed:8, color:P.hero.color, life:40, dmg:P.dmg * w.dmg, target:t, trail:[]});
}
}
break;
}
case 'lightning': {
const allTargets = [...G.enemies.filter(e=>e.alive)];
if (G.hasBoss && G.boss && G.boss.alive) allTargets.push(G.boss);
allTargets.sort((a,b)=>dist(P,a)-dist(P,b));
if (allTargets.length > 0) {
const first = allTargets[0];
if (dist(P, first) < P.range + 30) {
// Store lightning arcs for rendering
const arcs = [{from:{x:P.x,y:P.y}, to:{x:first.x,y:first.y}}];
first.hurt(P.dmg * w.dmg); addDmgText(first.x, first.y, P.dmg * w.dmg); addParticles(first.x, first.y, '#c49bff', 4);
let prev = first;
for (let i = 1; i < Math.min(4, allTargets.length); i++) {
if (dist(prev, allTargets[i]) < 120) {
allTargets[i].hurt(P.dmg * w.dmg * 0.6); addDmgText(allTargets[i].x, allTargets[i].y, P.dmg * w.dmg * 0.6); addParticles(allTargets[i].x, allTargets[i].y, '#c49bff', 2);
arcs.push({from:{x:prev.x,y:prev.y}, to:{x:allTargets[i].x,y:allTargets[i].y}});
prev = allTargets[i];
}
}
G.lightningArcs = arcs; G.lightningTimer = 8;
}
}
sfxHit();
break;
}
}
}
G.lightningArcs = []; G.lightningTimer = 0;

const baseX = Math.cos(a) * (orbitR - bladeLen * 0.3), baseY = Math.sin(a) * (orbitR - bladeLen * 0.3);
// Outer glow aura
ctx.shadowColor = P.hero.color; ctx.shadowBlur = 26;
// Kunai blade body
const bladeGrad = ctx.createLinearGradient(baseX, baseY, tipX, tipY);
const shimmer = Math.sin(G.frame * 0.12 + i) * 0.35;
bladeGrad.addColorStop(0, 'rgba(255,255,255,0.9)');
bladeGrad.addColorStop(0.2 + shimmer * 0.25, P.hero.color);
bladeGrad.addColorStop(0.45, '#fff');
bladeGrad.addColorStop(0.7 + shimmer * 0.3, P.hero.color);
bladeGrad.addColorStop(1, 'rgba(255,255,255,0.95)');
ctx.fillStyle = bladeGrad;
ctx.beginPath();
const perpW = 7;
const perpX = -Math.sin(a) * perpW, perpY = Math.cos(a) * perpW;
const midX = (baseX + tipX) * 0.55, midY = (baseY + tipY) * 0.55;
ctx.moveTo(baseX + perpX, baseY + perpY);
ctx.lineTo(midX + perpX * 0.5, midY + perpY * 0.5);
ctx.lineTo(tipX, tipY);
ctx.lineTo(midX - perpX * 0.5, midY - perpY * 0.5);
ctx.lineTo(baseX - perpX, baseY - perpY);
ctx.closePath(); ctx.fill();
// Bright center spine
ctx.fillStyle = 'rgba(255,255,255,0.85)';
ctx.beginPath();
const spineW = 2.2;
const spinePX = -Math.sin(a) * spineW, spinePY = Math.cos(a) * spineW;
ctx.moveTo(baseX + spinePX, baseY + spinePY);
ctx.lineTo(tipX, tipY);
ctx.lineTo(baseX - spinePX, baseY - spinePY);
ctx.closePath(); ctx.fill();
ctx.shadowBlur = 0;
// Orbital ring with pulse
ctx.strokeStyle = P.hero.color + '60';
ctx.lineWidth = 2;
ctx.setLineDash([6, 5]); ctx.lineDashOffset = -G.frame * 2.5;
ctx.beginPath();
ctx.arc(bx, by, 8 + Math.sin(G.frame*0.18+i)*3, 0, Math.PI*2);
ctx.stroke(); ctx.setLineDash([]);
// Inner solid ring
ctx.strokeStyle = P.hero.color + '30';
ctx.lineWidth = 0.8;
ctx.beginPath();
ctx.arc(bx, by, 4, 0, Math.PI*2);
ctx.stroke();
// Spark trail at blade tip
for (let j = 0; j < 3; j++) {
	const sparkA = a + rng(-0.35, 0.35);
	const sparkDist = orbitR + bladeLen * 0.7 + rng(4, 14);
	const sx = Math.cos(sparkA) * sparkDist, sy = Math.sin(sparkA) * sparkDist;
	ctx.fillStyle = j===0 ? '#fff' : P.hero.color;
	ctx.globalAlpha = 0.8 - j * 0.2;
	ctx.beginPath(); ctx.arc(sx, sy, rng(1.2, 3), 0, Math.PI*2); ctx.fill();
	ctx.globalAlpha = 1;
}
// Handle ring at base
ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.6;
ctx.beginPath();
ctx.arc(baseX, baseY, 5, a + 0.6, a + Math.PI*2 - 0.6);
ctx.stroke(); ctx.globalAlpha = 1;
}
ctx.restore();
}

class Enemy {

case 1: this.x = G.w+20; this.y = rng(0, G.h); break;
case 2: this.x = rng(0, G.w); this.y = G.h+20; break;
case 3: this.x = -20; this.y = rng(0, G.h); break;
}
const m = DIFF_MULT[G.diff];
const lv = G.level - 1;
this.lvMult = 1 + lv * 0.04;
switch(type) {
case 'grunt': this.hp = 12 * (1 + lv * 0.11) * m; this.speed = 1.2 + lv * 0.02 * m; this.dmg = 8 + lv * 0.35; this.color = '#e74c3c'; this.size = 13; break;
case 'runner': this.hp = 7 * (1 + lv * 0.08) * m; this.speed = 2.2 + lv * 0.03 * m; this.dmg = 6 + lv * 0.2; this.color = '#e67e22'; this.size = 11; break;
case 'tank': this.hp = 28 * (1 + lv * 0.14) * m; this.speed = 0.8 + lv * 0.01 * m; this.dmg = 15 + lv * 0.5; this.color = '#8e44ad'; this.size = 20; break;
}

}
update() {
if (this.flashTimer > 0) this.flashTimer -= G.speed;
const dx = P.x - this.x, dy = P.y - this.y, d = Math.hypot(dx, dy);
if (d > 22) { this.x += dx/d * this.speed * G.speed; this.y += dy/d * this.speed * G.speed; }
if (d < 22 && P.hurtCD <= 0 && !P.hurtThisFrame) {
P.hp -= this.dmg; P.hurtCD = 60; P.hurtThisFrame = true;
if (settings.showShake) shake(3);
if (P.hp <= 0) { P.hp = 0; gameOver(); }
updateUI();
}
}
hurt(d) {
this.hp -= d; this.flashTimer = 4;
addParticles(this.x, this.y, this.color, 4);

this.x = clamp(this.x + kdx/kd * 5, 5, G.w - 5);
this.y = clamp(this.y + kdy/kd * 5, 5, G.h - 5);
G.combo++; G.comboTimer = 72;
if (G.combo > G.comboMax) G.comboMax = G.combo;

if (this.hp <= 0) {
this.alive = false;
G.score += (this.type === 'tank' ? 12 : 5);
const xpVal = this.type === 'tank' ? 35 : (this.type==='runner'?12:20);
G.exps.push({x:this.x, y:this.y, v:xpVal});
addText(this.x, this.y, '+'+(this.type==='tank'?12:5), '#ffd700');
addParticles(this.x, this.y, this.color, this.type==='tank'?14:8);
if (Math.random() < 0.25) G.props.push(new Prop(this.x, this.y));
if (Math.random() < 0.4) G.goldDrops.push({x:this.x+rng(-10,10), y:this.y+rng(-10,10)});

}
render() {
const ctx = G.ctx; ctx.save(); ctx.translate(this.x, this.y);
// Sprite-first: try sprite, fallback to drawn

if (drawSprite(ctx, tile[0], tile[1], 0, 0, this.size * 2.4)) {
if (this.flashTimer > 0) { ctx.globalCompositeOperation = 'lighter'; ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.arc(0, 0, this.size*0.8, 0, Math.PI*2); ctx.fill(); ctx.globalCompositeOperation = 'source-over'; }
ctx.restore(); return;
}
// Fallback to drawn shapes
if (this.flashTimer > 0) { ctx.fillStyle = '#fff'; } else {
switch (this.type) {
case 'grunt': this.drawBat(ctx); break;
case 'runner': this.drawWolf(ctx); break;
case 'tank': this.drawGolem(ctx); break;
default: this.drawBat(ctx);
}
}
ctx.restore();
}

}

}

// ===== LittleJS ENGINE CORE =====
// Object pool — reusable objects to reduce GC pressure
function Pool(factory, reset, initSize=64){
const a=[], f=factory, r=reset;
a.get=(...args)=>{const o=a.pop();if(o){r(o,...args);return o}return f(...args)};
a.recycle=o=>{if(a.length<256)a.push(o)};
a.preFill=n=>{for(let i=0;i<n;i++)a.push(f())};
a.preFill(initSize);
return a;
}

// Spatial grid for O(1) collision lookup
const CELL=64;
function SpatialGrid(w,h){
const grid={};
grid.clear=()=>{for(const k in grid)delete grid[k]};
grid.key=(x,y)=>Math.floor(x/CELL)+','+Math.floor(y/CELL);
grid.insert=(id,x,y,r)=>{
for(let cy=Math.floor((y-r)/CELL);cy<=Math.floor((y+r)/CELL);cy++)
for(let cx=Math.floor((x-r)/CELL);cx<=Math.floor((x+r)/CELL);cx++){
const k=cx+','+cy;if(!grid[k])grid[k]=[];grid[k].push(id);
}
};
grid.query=(x,y,r,out=[])=>{
out.length=0;
for(let cy=Math.floor((y-r)/CELL);cy<=Math.floor((y+r)/CELL);cy++)
for(let cx=Math.floor((x-r)/CELL);cx<=Math.floor((x+r)/CELL);cx++){
const cell=grid[cx+','+cy];if(cell)for(let i=0;i<cell.length;i++)out.push(cell[i]);
}
return out;
};
return grid;
}

// Fixed-timestep game loop (LittleJS pattern)
let frameTime=0, fixedDelta=1/60, maxFrame=1/15, physicsTime=0;
function gameLoop(now=performance.now()){
requestAnimationFrame(gameLoop);
let dt=(now-frameTime)/1000;
frameTime=now;
if(dt>maxFrame)dt=maxFrame;
dt*=G.speed;
physicsTime+=dt;
let steps=0;
while(physicsTime>=fixedDelta&&steps<4){
updatePhysics(fixedDelta);
physicsTime-=fixedDelta;
steps++;
}
render(physicsTime/fixedDelta);
}
