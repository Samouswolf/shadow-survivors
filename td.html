            if (!this._enabled || !this._ctx) return;
            try {
                var ctx = this._ctx;
                var osc = ctx.createOscillator();
                var gain = ctx.createGain();
                osc.type = type || 'square';
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(vol || 0.08, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + duration);
            } catch (e) {}
        },
        shoot: function () { this._beep(800 + Math.random() * 400, 0.08, 'square', 0.04); },
        explosion: function () { this._beep(80 + Math.random() * 60, 0.18, 'sawtooth', 0.1); },
        place: function () { this._beep(600, 0.06, 'square', 0.05); setTimeout(this._beep.bind(this, 900, 0.08, 'square', 0.05), 60); },
        waveStart: function () { this._beep(400, 0.1, 'triangle', 0.07); setTimeout(this._beep.bind(this, 600, 0.1, 'triangle', 0.07), 100); setTimeout(this._beep.bind(this, 900, 0.15, 'triangle', 0.08), 200); },
        sell: function () { this._beep(500, 0.05, 'triangle', 0.05); setTimeout(this._beep.bind(this, 700, 0.05, 'triangle', 0.04), 50); },
        click: function () { this._beep(1000, 0.03, 'square', 0.03); },
        error: function () { this._beep(150, 0.2, 'sawtooth', 0.07); }
    };
    var _audioInited = false;
    var _initAudio = function () {
        if (_audioInited) return;
        _audioInited = true;
        TD.Sound._init();
        document.removeEventListener('click', _initAudio);
        document.removeEventListener('touchstart', _initAudio);
    };
    document.addEventListener('click', _initAudio);
    document.addEventListener('touchstart', _initAudio);
    // ========================

    TD._t = function (k, args) {
        var s = TD._msg_texts[k] || k;
        if (args && args.length) {
            for (var i = 0; i < args.length; i++) {
                s = s.replace("${" + i + "}", args[i]);
            }
        }
        return s;
    };
});


// ===== MOBILE TOUCH SUPPORT =====
(function() {
  var canvas = document.getElementById('td-canvas');
  if (!canvas) return;
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var t = e.touches[0];
    canvas.dispatchEvent(new MouseEvent('mousemove', {clientX:t.clientX, clientY:t.clientY}));
    canvas.dispatchEvent(new MouseEvent('mousedown', {clientX:t.clientX, clientY:t.clientY}));
  });
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var t = e.touches[0];
    canvas.dispatchEvent(new MouseEvent('mousemove', {clientX:t.clientX, clientY:t.clientY}));
  });
  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    var t = e.changedTouches[0];
    canvas.dispatchEvent(new MouseEvent('click', {clientX:t.clientX, clientY:t.clientY}));
    canvas.dispatchEvent(new MouseEvent('mouseup', {}));
  });
})();

window.onerror = function(m,s,l,c,e) {
  var el = document.getElementById("td-loading");
  if (el) {
    el.style.display = "block";
    el.style.color = "red";
    el.textContent = "Error: " + m + " (line " + l + ")";
  }
  console.error("GAME ERROR:", m, "at line", l);
  return false;
};

window.onload = function() {
  try {
    _TD.init("td-board", true);
    document.getElementById("td-loading").style.display = "none";
    document.getElementById("td-board").style.display = "block";
	    GameMonetize.init();
    console.log("Game initialized successfully");
  } catch(e) {
    var el = document.getElementById("td-loading");
    if (el) {
      el.style.display = "block";
      el.style.color = "red";
      el.textContent = "Init Error: " + e.message;
    }
    console.error("Game init failed:", e);
  }
};
	// ===== 游戏工坊统一广告系统 =====
	const GameMonetize = {
		adsterra: { enabled: true },
		sponsor: { enabled: true, wechatQR: '', alipayQR: '' },
		interstitial: { enabled: true, cooldownMs: 180000, gameCount: 2 },
		_lastInterTime: 0, _deathCount: 0,
		init() {
			const banner = document.getElementById('adBanner');
			if (banner && this.adsterra.enabled) {
				const s1 = document.createElement('script');
				s1.src = 'https://pl29544740.effectivecpmnetwork.com/de/26/0e/de260e17b6a348e3489772a87b1cedf1.js';
				s1.async = true;
				banner.appendChild(s1);
			}
			const spBtn = document.getElementById('sponsorBtn');
			const spPanel = document.getElementById('sponsorPanel');
			const spClose = document.getElementById('sponsorClose');
			if (spBtn && spPanel && spClose && this.sponsor.enabled) {
				spBtn.onclick = () => { spPanel.style.display = 'flex'; };
				spClose.onclick = () => { spPanel.style.display = 'none'; };
				spPanel.onclick = (e) => { if (e.target === spPanel) spPanel.style.display = 'none'; };
			} else if (spBtn) { spBtn.style.display = 'none'; }
			const skipBtn = document.getElementById('skipInterstitial');
			const interstitial = document.getElementById('interstitialAd');
			if (skipBtn && interstitial) {
				skipBtn.onclick = () => { interstitial.style.display = 'none'; if (this._reviveCallback) { const cb = this._reviveCallback; this._reviveCallback = null; cb(); } else { document.getElementById('overOverlayTD').style.display = 'flex'; } };
			}
		},
		requestRevive(callback) {
			this._reviveCallback = callback || null;
			document.getElementById('overOverlayTD').style.display = 'none';
			const el = document.getElementById('interstitialAd');
			if (!el) { if (callback) callback(); return; }
			const s2 = document.createElement('script');
			s2.src = 'https://pl29544742.effectivecpmnetwork.com/be/a9/6d/bea96d779c0ee07c2b15613852dd3e70.js';
			s2.async = true;
			document.getElementById('interstitialAdSlot').innerHTML = '';
			document.getElementById('interstitialAdSlot').appendChild(s2);
			el.style.display = 'flex';
			const skipBtn = document.getElementById('skipInterstitial');
			if (skipBtn) {
				skipBtn.textContent = '5 秒后可跳过'; skipBtn.disabled = true;
				let cd = 5;
				const timer = setInterval(() => {
					cd--;
					if (cd <= 0) { clearInterval(timer); skipBtn.textContent = '跳过广告 ▶'; skipBtn.disabled = false; }
					else { skipBtn.textContent = cd + ' 秒后可跳过'; }
				}, 1000);
			}
		},
	};
	document.getElementById('overReviveTD').onclick = () => { GameMonetize.requestRevive(() => { TD.stage.revive(); }); };
	document.getElementById('overRestartTD').onclick = () => { document.getElementById('overOverlayTD').style.display = 'none'; TD.stage.clear(); TD.is_paused = true; TD.start(); TD.mouseHand(false); };

</script>
