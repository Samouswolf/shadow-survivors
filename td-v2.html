<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>塔防保卫战 v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a0f;font-family:"Microsoft YaHei",sans-serif;-webkit-user-select:none;user-select:none;touch-action:none;-ms-touch-action:none}
#game-board{position:relative;display:flex;justify-content:center;align-items:center;width:100%;height:100vh}
#game-board canvas{display:block;image-rendering:pixelated;cursor:crosshair;touch-action:none}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#888;font-size:18px;z-index:10;pointer-events:none}
</style>
</head>
<body>
<div id="game-board">
	<canvas id="gc"></canvas>
	<div id="loading">加载中...</div>
</div>
<script>
// ===== 配置 =====
var CFG = {
	canvasW: 960, canvasH: 840,
	retina: 1.5,
	cols: 16, rows: 16,
	gridSize: 48,
	padding: 15
};

var canvas = document.getElementById("gc");
canvas.width = CFG.canvasW;
canvas.height = CFG.canvasH;
// CSS size set by resizeCanvas()
var ctx = canvas.getContext("2d");

// ===== COORD HELPERS =====
var MX = CFG.padding, MY = CFG.padding, GS = CFG.gridSize;
function gridCenter(gx, gy) { return [MX + gx * GS + GS / 2, MY + gy * GS + GS / 2]; }
function posToGrid(px, py) {
	var gx = Math.floor((px - MX) / GS), gy = Math.floor((py - MY) / GS);
	return (gx >= 0 && gx < CFG.cols && gy >= 0 && gy < CFG.rows) ? [gx, gy] : null;
}

// ===== SPRITE SYSTEM (spritesheet-based) =====
var SPR = { img: null, ready: false };

// Sprite coordinates [col, row] in 16x16 spritesheet (assets/spritesheet-tdv2.png)
var SC = {
	archer_lv1: [2, 5],
	archer_lv2: [3, 5],
	archer_lv3: [4, 5],
	barrack_lv1: [9, 3],
	barrack_lv2: [10, 3],
	barrack_lv3: [11, 3],
	building_place: [16, 9],
	bullet_arrow: [8, 8],
	bullet_fire: [10, 7],
	bullet_frost: [9, 7],
	bullet_wizard: [8, 7],
	crystal_lv1: [5, 0],
	crystal_lv2: [6, 0],
	crystal_lv3: [7, 0],
	fire_lv1: [8, 4],
	fire_lv2: [9, 4],
	fire_lv3: [10, 4],
	frost_lv1: [5, 4],
	frost_lv2: [6, 4],
	frost_lv3: [7, 4],
	grass: [15, 7],
	grass_deco: [2, 1],
	knight_lv1: [12, 3],
	knight_lv2: [13, 3],
	knight_lv3: [14, 3],
	monster_1: [13, 7],
	monster_2: [13, 0],
	monster_3: [14, 0],
	monster_4: [0, 1],
	monster_5: [1, 1],
	monster_6: [1, 2],
	monster_7: [16, 1],
	road: [18, 8],
	stone: [19, 10],
	tree_1: [17, 10],
	tree_2: [18, 10],
	wall: [3, 9],
	wizard_lv1: [5, 6],
	wizard_lv2: [6, 6],
	wizard_lv3: [7, 6]
};

SPR.load = function(cb) {
	SPR.img = new Image();
	SPR.img.onload = function() {
		SPR.ready = true;
		console.log("[TDv2] sprite loaded");
		if (cb) cb();
	};
	SPR.img.onerror = function() {
		console.error("[TDv2] sprite load failed:", SPR.img.src);
		setTimeout(function() {
			if (!SPR.ready) {
				console.log("[TDv2] retrying sprite load...");
				var oldSrc = SPR.img.src;
				SPR.img = new Image();
				SPR.img.onload = function() {
					SPR.ready = true;
					console.log("[TDv2] retry succeeded");
					if (cb) cb();
				};
				SPR.img.onerror = function() {
					console.error("[TDv2] both loads failed, showing error");
					document.getElementById("loading").textContent = "素材加载失败，请刷新重试";
				};
				SPR.img.src = oldSrc;
			}
		}, 2000);
	};
	SPR.img.src = (location.pathname.includes('/tests/') ? '../' : '') + "assets/spritesheet-tdv2.png";
};

SPR.get = function(n) {
	var c = SC[n];
	if (!c || !SPR.ready || !SPR.img || !SPR.img.complete) return null;
	return { img: SPR.img, col: c[0], row: c[1], sx: c[0]*16, sy: c[1]*16, sw: 16, sh: 16, complete: true, naturalWidth: 16, naturalHeight: 16 };
};

// ===== GRID / MAP =====
var mapGrid = []; // [gy][gx] = { passable, buildable, building, decoration }
var ROAD_PATH = []; // precomputed way

function initMap() {
	mapGrid = [];
	for (var gy = 0; gy < CFG.rows; gy++) {
		mapGrid[gy] = [];
		for (var gx = 0; gx < CFG.cols; gx++) {
			mapGrid[gy][gx] = { passable: true, buildable: true, building: null, decor: null };
		}
	}
	// Build S-path from (0,0) to (15,15)
	// Path: go right to (10,0), down to (10,12), right to (15,12), down to (15,15)
	buildRoadPath();
	// Mark path cells as non-buildable
	for (var i = 0; i < ROAD_PATH.length; i++) {
		var gx = ROAD_PATH[i][0], gy = ROAD_PATH[i][1];
		mapGrid[gy][gx].buildable = false;
	}
	// Place environment decorations
	placeDecorations();
}

function buildRoadPath() {
	ROAD_PATH = [];
	// Segment 1: (0,0) to (10,0) along top
	for (var x = 0; x <= 10; x++) ROAD_PATH.push([x, 0]);
	// Segment 2: (10,1) to (10,12) down
	for (var y = 1; y <= 12; y++) ROAD_PATH.push([10, y]);
	// Segment 3: (11,12) to (15,12) right
	for (var x = 11; x <= 15; x++) ROAD_PATH.push([x, 12]);
	// Segment 4: (15,13) to (15,15) down
	for (var y = 13; y <= 15; y++) ROAD_PATH.push([15, y]);
}

function placeDecorations() {
	var decorItems = ["stone","stone","stone","stone","grass_deco","grass_deco","tree_1","tree_2"];
	for (var gy = 0; gy < CFG.rows; gy++) {
		for (var gx = 0; gx < CFG.cols; gx++) {
			var g = mapGrid[gy][gx];
			if (!g.buildable || g.building) continue;
			// ~20% chance based on position
			var h = (gx * 13 + gy * 7 + 3) % 19;
			if (h >= decorItems.length) continue;
			g.decor = decorItems[h];
		}
	}
}

// ===== BUILDING TYPES =====
var TOWER_DATA = {
	archer: { name: "射手", cost: 50, range: 150, dmg: 10, rate: 20, spr: ["archer_lv1","archer_lv2","archer_lv3"], bullet: "bullet_arrow", splash: 0 },
	wizard: { name: "法师", cost: 80, range: 130, dmg: 20, rate: 35, spr: ["wizard_lv1","wizard_lv2","wizard_lv3"], bullet: "bullet_wizard", splash: 40 },
	barrack: { name: "骑士营", cost: 60, range: 60, dmg: 15, rate: 15, spr: ["barrack_lv1","barrack_lv2","barrack_lv3"], bullet: null, splash: 0 },
	crystal: { name: "水晶塔", cost: 100, range: 140, dmg: 8, rate: 25, spr: ["crystal_lv1","crystal_lv2","crystal_lv3"], bullet: "bullet_wizard", splash: 30 },
	wall: { name: "屏障", cost: 30, range: 0, dmg: 0, rate: 0, spr: null, bullet: null, splash: 0 },
	frost: { name: "冰霜塔", cost: 120, range: 200, dmg: 8, rate: 72, spr: ["frost_lv1","frost_lv2","frost_lv3"], bullet: "bullet_frost", splash: 0 },
	fire: { name: "火焰塔", cost: 150, range: 180, dmg: 15, rate: 108, spr: ["fire_lv1","fire_lv2","fire_lv3"], bullet: "bullet_fire", splash: 72 }
};
var TOWER_KEYS = ["archer","wizard","barrack","crystal","wall","frost","fire"];

// ===== GAME STATE =====
var G = {
	money: 200, life: 20, score: 0, wave: 0, phase: "loading",
	step: 0, selectedType: null, // selected tower type key
	buildings: [], monsters: [], bullets: [],
	waveTimer: 0, spawnQueue: [], waveInProgress: false,
	gameOver: false, mouseX: 0, mouseY: 0, hoverGrid: null,
	particles: []
};

// ===== BUILDING =====
var _bid = 0;
function createBuilding(type, gx, gy) {
	var td = TOWER_DATA[type];
	if (!td) return null;
	var b = {
		id: "b" + (_bid++),
		type: type, level: 1, gx: gx, gy: gy,
		cx: 0, cy: 0, // computed from grid
		range: td.range, dmg: td.dmg, rate: td.rate,
		cooldown: 0, target: null,
		spr: td.spr, bullet: td.bullet, splash: td.splash,
		cost: td.cost, exp: 0, expNext: 2 // 2 kills to level up
	};
	var c = gridCenter(gx, gy);
	b.cx = c[0]; b.cy = c[1];
	mapGrid[gy][gx].building = b;
	G.buildings.push(b);
	G.money -= td.cost;
	// Reset cooldown so it doesn't fire immediately
	b.cooldown = b.rate;
	return b;
}

function getTowerSprite(b) {
	if (!b.spr || b.spr.length === 0) return null;
	var idx = Math.min(b.level - 1, b.spr.length - 1);
	return b.spr[idx];
}

// ===== MONSTER =====
var _mid = 0;
function spawnMonster(type, hp, speed, reward, tint) {
	if (!ROAD_PATH.length) return null;
	var start = ROAD_PATH[0];
	var c = gridCenter(start[0], start[1]);
	var m = {
		id: "m" + (_mid++),
		type: type, hp: hp, maxHp: hp, speed: speed, reward: reward,
		tint: tint || null, baseSpeed: speed, slowTimer: 0, pathIdx: 0, // position along ROAD_PATH
		gx: start[0], gy: start[1],
		cx: c[0], cy: c[1], alive: true, hitFlash: 0,
		animFrame: 0
	};
	G.monsters.push(m);
	return m;
}

function monsterTint(typeIdx) {
	var tints = [
		null, "rgba(255,255,255,0.3)", "rgba(255,100,100,0.3)", "rgba(100,255,100,0.3)",
		"rgba(200,100,255,0.3)", "rgba(100,150,255,0.3)", "rgba(255,200,50,0.4)"
	];
	return tints[typeIdx] || null;
}

// ===== BULLET =====
var _blid = 0;
function createBullet(fromBx, fromBy, target, speed, dmg, sprName, splash, fromBld) {
	var b = {
		id: "bl" + (_blid++),
		x: fromBx, y: fromBy, target: target,
		speed: speed || 4, dmg: dmg, spr: sprName || "bullet_arrow",
		splash: splash || 0, fromBld: fromBld || null, alive: true
	};
	G.bullets.push(b);
	return b;
}

// ===== WAVE SYSTEM =====
var WAVE_DEFS = [
	// wave 1: 5 normal
	{ count: 5, types: [0], hpMul: 1, speedMul: 1, rewardMul: 1 },
	// wave 2: 8 mixed
	{ count: 8, types: [0,1], hpMul: 1, speedMul: 1, rewardMul: 1 },
	// wave 3: 10 + fast
	{ count: 10, types: [0,1,2], hpMul: 1.2, speedMul: 1, rewardMul: 1 },
	// wave 4: 12 tanky
	{ count: 12, types: [0,1,3], hpMul: 1.5, speedMul: 1, rewardMul: 1.2 },
	// wave 5: boss
	{ count: 15, types: [0,1,2,3,6], hpMul: 2, speedMul: 1, rewardMul: 1.5 }
];

var MONSTER_TYPES = [
	{ hp: 30, speed: 1.2, reward: 10 },   // 0 normal
	{ hp: 60, speed: 0.9, reward: 15 },   // 1 strong
	{ hp: 20, speed: 2.0, reward: 12 },   // 2 fast
	{ hp: 120, speed: 0.7, reward: 20 },  // 3 tank
	{ hp: 50, speed: 1.0, reward: 18 },   // 4 shield (not used directly)
	{ hp: 40, speed: 1.5, reward: 14 },   // 5 agile
	{ hp: 300, speed: 0.6, reward: 50 }   // 6 boss
];

function startWave() {
	if (G.waveInProgress || G.gameOver) return;
	G.wave++;
	var def = WAVE_DEFS[Math.min(G.wave - 1, WAVE_DEFS.length - 1)];
	G.spawnQueue = [];
	for (var i = 0; i < def.count; i++) {
		var ti = def.types[i % def.types.length];
		var mt = MONSTER_TYPES[ti];
		var delay = 30 + i * 20; // frames between spawns
		G.spawnQueue.push({
			type: ti,
			hp: mt.hp * def.hpMul,
			speed: mt.speed * def.speedMul,
			reward: Math.round(mt.reward * def.rewardMul),
			tint: monsterTint(ti),
			delay: delay
		});
	}
	G.waveTimer = 0;
	G.waveInProgress = true;
	G.money += 20; // wave bonus
}

// ===== PARTICLE SYSTEM =====
function spawnParticle(x, y, vx, vy, life, color, size) {
	G.particles.push({ x: x, y: y, vx: vx, vy: vy, life: life, maxLife: life, color: color, size: size || 3 });
}

function spawnExplosion(x, y, count, color, speed, life, size) {
	for (var i = 0; i < count; i++) {
		var angle = Math.random() * Math.PI * 2;
		var spd = (0.5 + Math.random() * 0.5) * (speed || 3);
		spawnParticle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, life || 20, color, size || 3);
	}
}

// ===== UPDATE =====
function update() {
	G.step++;

	// Spawn queue
	if (G.waveInProgress) {
		if (G.spawnQueue.length > 0) {
			G.waveTimer++;
			while (G.spawnQueue.length > 0 && G.waveTimer >= G.spawnQueue[0].delay) {
				var sq = G.spawnQueue.shift();
				var c = gridCenter(ROAD_PATH[0][0], ROAD_PATH[0][1]);
				spawnMonster(sq.type, sq.hp, sq.speed, sq.reward, sq.tint);
			}
		}
		if (G.spawnQueue.length === 0 && G.monsters.every(function(m) { return !m.alive; })) {
			G.waveInProgress = false;
		}
	}

	// Auto-start next wave when no wave in progress and monsters cleared
	if (!G.waveInProgress && !G.gameOver && G.monsters.every(function(m) { return !m.alive; })) {
		if (G.wave === 0 || G.step > 60) { // small delay between waves
			startWave();
		}
	}

	// Update monsters
	for (var mi = G.monsters.length - 1; mi >= 0; mi--) {
		var m = G.monsters[mi];
		if (!m.alive) { G.monsters.splice(mi, 1); continue; }

		// Move along path
		m.animFrame++;
		if (m.pathIdx < ROAD_PATH.length - 1) {
			var next = ROAD_PATH[m.pathIdx + 1];
			var targetPos = gridCenter(next[0], next[1]);
			var dx = targetPos[0] - m.cx, dy = targetPos[1] - m.cy;
			var dist = Math.sqrt(dx * dx + dy * dy);
			var effectiveSpeed = m.speed * (m.slowTimer > 0 ? 0.6 : 1.0);
			if (m.slowTimer > 0) m.slowTimer--;
			if (dist < effectiveSpeed) {
				m.pathIdx++;
				m.gx = next[0]; m.gy = next[1];
				m.cx = targetPos[0]; m.cy = targetPos[1];
			} else {
				m.cx += (dx / dist) * effectiveSpeed;
				m.cy += (dy / dist) * effectiveSpeed;
			}
		} else {
			// Reached exit
			m.alive = false;
			G.life--;
			if (G.life <= 0) { G.life = 0; G.gameOver = true; G.phase = "gameover"; }
			continue;
		}
		if (m.hitFlash > 0) m.hitFlash--;
	}

	// Update buildings
	for (var bi = 0; bi < G.buildings.length; bi++) {
		var b = G.buildings[bi];
		if (b.cooldown > 0) b.cooldown--;

		// Find target
		b.target = null;
		var bestDist = Infinity;
		for (var mi2 = 0; mi2 < G.monsters.length; mi2++) {
			var m2 = G.monsters[mi2];
			if (!m2.alive) continue;
			var dx = m2.cx - b.cx, dy = m2.cy - b.cy;
			var d = Math.sqrt(dx * dx + dy * dy);
			if (d < b.range && d < bestDist) {
				bestDist = d;
				b.target = m2;
			}
		}

		// Fire if ready
		if (b.target && b.cooldown <= 0) {
			b.cooldown = b.rate;
			if (b.type === "barrack") {
				// Melee: instant damage to target in range
				b.target.hp -= b.dmg;
				b.target.hitFlash = 5;
				if (b.target.hp <= 0) {
					b.target.alive = false;
					G.money += b.target.reward;
					G.score++;
					b.exp++;
					if (b.exp >= b.expNext && b.level < 3) {
						b.level++;
						b.exp = 0;
						b.dmg = Math.round(b.dmg * 1.5);
						b.rate = Math.max(5, Math.round(b.rate * 0.8));
					}
				}
			} else if (b.bullet) {
				createBullet(b.cx, b.cy, b.target, 4, b.dmg, b.bullet, b.splash, b);
			}
		}
	}

	// Update bullets
	for (var bli = G.bullets.length - 1; bli >= 0; bli--) {
		var bl = G.bullets[bli];
		if (!bl.alive) { G.bullets.splice(bli, 1); continue; }
		if (!bl.target || !bl.target.alive) {
			bl.alive = false;
			G.bullets.splice(bli, 1);
			continue;
		}
		var dx = bl.target.cx - bl.x, dy = bl.target.cy - bl.y;
		var d = Math.sqrt(dx * dx + dy * dy);
		if (d < bl.speed + 5) {
			// Hit
			bl.target.hp -= bl.dmg;
			bl.target.hitFlash = 5;
			// Frost slow
			if (bl.spr === "bullet_frost") {
				for (var fi = 0; fi < G.monsters.length; fi++) {
					var fm = G.monsters[fi];
					if (!fm.alive) continue;
					var fdx = fm.cx - bl.target.cx, fdy = fm.cy - bl.target.cy;
					if (Math.sqrt(fdx * fdx + fdy * fdy) < 50) {
						fm.slowTimer = 90;
					}
				}
				spawnExplosion(bl.target.cx, bl.target.cy, 12, "#88ddff", 2, 25, 4);
			} else if (bl.spr === "bullet_fire") {
				spawnExplosion(bl.target.cx, bl.target.cy, 16, "#ff6622", 2.5, 25, 5);
			}
			// Splash damage
			if (bl.splash > 0) {
				for (var si = 0; si < G.monsters.length; si++) {
					var sm = G.monsters[si];
					if (!sm.alive || sm === bl.target) continue;
					var sdx = sm.cx - bl.target.cx, sdy = sm.cy - bl.target.cy;
					if (Math.sqrt(sdx * sdx + sdy * sdy) < bl.splash) {
						sm.hp -= Math.round(bl.dmg * 0.5);
						sm.hitFlash = 3;
						if (sm.hp <= 0) {
							sm.alive = false;
							G.money += sm.reward;
							G.score++;
						}
					}
				}
			}
			// Grant tower exp
			if (bl.target.hp <= 0) {
				bl.target.alive = false;
				G.money += bl.target.reward;
				G.score++;
				// Find which tower fired this bullet
				for (var bi2 = 0; bi2 < G.buildings.length; bi2++) {
					var tb = bl.fromBld || G.buildings[bi2];
					if (tb) {
						tb.exp++;
						if (tb.exp >= tb.expNext && tb.level < 3) {
							tb.level++;
							tb.exp = 0;
							tb.dmg = Math.round(tb.dmg * 1.5);
							tb.rate = Math.max(5, Math.round(tb.rate * 0.8));
						}
						break;
					}
				}
			}
			bl.alive = false;
		} else {
			bl.x += (dx / d) * bl.speed;
			bl.y += (dy / d) * bl.speed;
			// Trail particles
			if (bl.spr === "bullet_frost" && G.step % 2 === 0) {
				spawnParticle(bl.x, bl.y, (Math.random() - 0.5) * 0.5, (Math.random() - 0.5) * 0.5, 15, "#88ddff", 3);
			} else if (bl.spr === "bullet_fire" && G.step % 2 === 0) {
				spawnParticle(bl.x, bl.y, (Math.random() - 0.5) * 0.5, (Math.random() - 0.5) * 0.5, 18, "#ff6622", 4);
			}
		}
	}

		// Update particles
		for (var pi = G.particles.length - 1; pi >= 0; pi--) {
			var p = G.particles[pi];
			p.x += p.vx;
			p.y += p.vy;
			p.life--;
			if (p.life <= 0) { G.particles.splice(pi, 1); }
		}
	}

// ===== RENDER =====
function render() {
	ctx.fillStyle = "#0a0a0f";
	ctx.fillRect(0, 0, CFG.canvasW, CFG.canvasH);

	renderMap();
	renderDecorations();
	renderGrid();
	renderPreview();
	renderBuildings();
	renderMonsters();
	renderBullets();
	renderUI();
	renderParticles();
	renderGameOver();
}

function isOnRoad(gx, gy) {
	return ROAD_PATH.some(function(p) { return p[0] === gx && p[1] === gy; });
}

function renderMap() {
	var mx = MX, my = MY, mw = GS * 16, mh = GS * 16;
	// Grass background using 1-bit-pack tile or fallback checkerboard
	if (SPR.ready && SC.grass) {
		var gc = SC.grass;
		for (var gy = 0; gy < CFG.rows; gy++) {
			for (var gx = 0; gx < CFG.cols; gx++) {
				var px = mx + gx * GS, py = my + gy * GS;
				ctx.drawImage(SPR.img, gc[0]*16, gc[1]*16, 16, 16, px, py, GS, GS);
			}
		}
	} else {
		for (var gy = 0; gy < CFG.rows; gy++) {
			for (var gx = 0; gx < CFG.cols; gx++) {
				var px = mx + gx * GS, py = my + gy * GS;
				ctx.fillStyle = (gx + gy) % 2 === 0 ? "#38d973" : "#2daf5e";
				ctx.fillRect(px, py, GS, GS);
			}
		}
	}
	// Draw road with seamless connections between adjacent cells
	var m = 3;
	for (var i = 0; i < ROAD_PATH.length; i++) {
		var gx = ROAD_PATH[i][0], gy = ROAD_PATH[i][1];
		var px = mx + gx * GS + m, py = my + gy * GS + m;
		var sz = GS - m * 2;
		var hasN = isOnRoad(gx, gy - 1), hasS = isOnRoad(gx, gy + 1);
		var hasW = isOnRoad(gx - 1, gy), hasE = isOnRoad(gx + 1, gy);
		// Road base (warm brown)
		ctx.fillStyle = "#8a7a5a";
		ctx.fillRect(px, py, sz, sz);
		// Road inner (lighter tan)
		ctx.fillStyle = "#b8a880";
		ctx.fillRect(px + 2, py + 2, sz - 4, sz - 4);
		// Extend to adjacent road cells for seamless connection
		if (hasN) { ctx.fillRect(px, py - m, sz, m); }
		if (hasS) { ctx.fillRect(px, py + sz, sz, m); }
		if (hasW) { ctx.fillRect(px - m, py, m, sz); }
		if (hasE) { ctx.fillRect(px + sz, py, m, sz); }
	}
	// Draw road edge borders for path definition
	ctx.strokeStyle = "rgba(60,40,20,0.3)";
	ctx.lineWidth = 1;
	for (var i = 0; i < ROAD_PATH.length; i++) {
		var gx = ROAD_PATH[i][0], gy = ROAD_PATH[i][1];
		var px = mx + gx * GS, py = my + gy * GS;
		if (!isOnRoad(gx - 1, gy)) { ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, py + GS); ctx.stroke(); }
		if (!isOnRoad(gx + 1, gy)) { ctx.beginPath(); ctx.moveTo(px + GS, py); ctx.lineTo(px + GS, py + GS); ctx.stroke(); }
		if (!isOnRoad(gx, gy - 1)) { ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px + GS, py); ctx.stroke(); }
		if (!isOnRoad(gx, gy + 1)) { ctx.beginPath(); ctx.moveTo(px, py + GS); ctx.lineTo(px + GS, py + GS); ctx.stroke(); }
	}
}

function renderDecorations() {
	if (!SPR.ready) return;
	for (var gy = 0; gy < CFG.rows; gy++) {
		for (var gx = 0; gx < CFG.cols; gx++) {
			var g = mapGrid[gy][gx];
			if (!g.decor) continue;
			var dc = SC[g.decor];
			if (!dc) continue;
			var c = gridCenter(gx, gy);
			var s = GS * 0.5 / 16;
			var w = 16 * s, h = 16 * s;
			ctx.drawImage(SPR.img, dc[0]*16, dc[1]*16, 16, 16, c[0] - w/2, c[1] - h + GS*0.2, w, h);
		}
	}
}

function renderGrid() {
	// Highlight hovered grid cell
	if (G.hoverGrid) {
		var gx = G.hoverGrid[0], gy = G.hoverGrid[1];
		var px = MX + gx * GS, py = MY + gy * GS;
		ctx.fillStyle = "rgba(255,255,255,0.08)";
		ctx.fillRect(px, py, GS, GS);
		ctx.strokeStyle = "rgba(255,255,255,0.2)";
		ctx.lineWidth = 1;
		ctx.strokeRect(px, py, GS, GS);
	}
}

function renderPreview() {
	if (!G.selectedType || !G.hoverGrid) return;
	var gx = G.hoverGrid[0], gy = G.hoverGrid[1];
	var g = mapGrid[gy][gx];
	if (!g.buildable || g.building) return;
	var td = TOWER_DATA[G.selectedType];
	if (!td || !td.spr) return;
	var c = gridCenter(gx, gy);
	var sprName = td.spr[0];
	var dc = SC[sprName];
	if (!dc) return;
	ctx.save();
	ctx.globalAlpha = 0.35;
	var s = GS * 0.5 / 16;
	var w = 16 * s, h = 16 * s;
	ctx.drawImage(SPR.img, dc[0]*16, dc[1]*16, 16, 16, c[0] - w/2, c[1] - h + GS*0.2, w, h);
	ctx.restore();
	// Range circle
	ctx.beginPath();
	ctx.arc(c[0], c[1], td.range, 0, Math.PI * 2);
	ctx.fillStyle = "rgba(187,141,32,0.1)";
	ctx.fill();
	ctx.strokeStyle = "rgba(187,141,32,0.3)";
	ctx.lineWidth = 1;
	ctx.stroke();
}

function renderBuildings() {
	for (var i = 0; i < G.buildings.length; i++) {
		var b = G.buildings[i];
		var sprName = getTowerSprite(b);
		if (!sprName) continue;
		var dc = SC[sprName];
		if (!dc) continue;
		var s = GS * 0.5 / 16;
		var w = 16 * s, h = 16 * s;
		ctx.drawImage(SPR.img, dc[0]*16, dc[1]*16, 16, 16, b.cx - w/2, b.cy - h + GS*0.2, w, h);
		// Frost tower tint
		if (b.type === "frost") {
			ctx.globalCompositeOperation = "source-atop";
			ctx.fillStyle = "rgba(100,200,255,0.5)";
			ctx.fillRect(b.cx - w / 2, b.cy - h + GS * 0.2, w, h);
			ctx.globalCompositeOperation = "source-over";
			// Blue ground circle (drawn after tint, won't be re-tinted)
			ctx.fillStyle = "rgba(80,180,255,0.25)";
			ctx.beginPath();
			ctx.arc(b.cx, b.cy + GS * 0.05, GS * 0.35, 0, Math.PI * 2);
			ctx.fill();
		} else if (b.type === "fire") {
			ctx.globalCompositeOperation = "source-atop";
			ctx.fillStyle = "rgba(255,100,30,0.5)";
			ctx.fillRect(b.cx - w / 2, b.cy - h + GS * 0.2, w, h);
			ctx.globalCompositeOperation = "source-over";
			// Red ground circle (drawn after tint, won't be re-tinted)
			ctx.fillStyle = "rgba(255,120,30,0.25)";
			ctx.beginPath();
			ctx.arc(b.cx, b.cy + GS * 0.05, GS * 0.35, 0, Math.PI * 2);
			ctx.fill();
		}
		// Barrack: draw knight
		if (b.type === "barrack" && b.level > 0) {
			var knightSpr = ["knight_lv1","knight_lv2","knight_lv3"][Math.min(b.level-1, 2)];
			var kdc = SC[knightSpr];
			if (kdc) {
				var ks = GS * 0.4 / 16;
				var kw = 16 * ks, kh = 16 * ks;
				var kx = b.cx + GS * 0.3, ky = b.cy - GS * 0.1;
				if (b.target && b.target.alive) {
					// Knight moves toward target
					var dirX = b.target.cx - b.cx, dirY = b.target.cy - b.cy;
					var d = Math.sqrt(dirX*dirX+dirY*dirY) || 1;
					var dist = Math.min(GS * 0.4, d);
					kx = b.cx + (dirX/d) * dist;
					ky = b.cy + (dirY/d) * dist;
				}
				// Swing animation
				ctx.save();
				var swing = b.cooldown < 5 ? Math.sin(G.step * 0.3) * 0.3 : 0;
				ctx.translate(kx, ky);
				ctx.rotate(swing);
				ctx.drawImage(SPR.img, kdc[0]*16, kdc[1]*16, 16, 16, -kw/2, -kh/2, kw, kh);
				ctx.restore();
			}
		}
		// Level indicator
		if (b.level > 1) {
			ctx.fillStyle = "#ff0";
			ctx.font = "bold 10px sans-serif";
			ctx.textAlign = "center";
			ctx.fillText("★".repeat(b.level-1), b.cx, b.cy - GS * 0.35);
		}
	}
}

function renderMonsters() {
	for (var i = 0; i < G.monsters.length; i++) {
		var m = G.monsters[i];
		if (!m.alive) continue;
		var ufoFrame = (m.animFrame % 70 < 10 ? 1 : Math.floor(m.animFrame / 10) % 7) + 1;
		var sprName = "monster_" + ufoFrame;
		var mc = SC[sprName];
		if (!mc) continue;
		var s = 30 / 16;
		var w = 16 * s, h = 16 * s;
		ctx.save();
		ctx.drawImage(SPR.img, mc[0]*16, mc[1]*16, 16, 16, m.cx - w/2, m.cy - h/2, w, h);
		if (m.tint) {
			ctx.globalCompositeOperation = "source-atop";
			ctx.fillStyle = m.tint;
			ctx.fillRect(m.cx - w/2, m.cy - h/2, w, h);
		}
		ctx.restore();
		// Hit flash
		if (m.hitFlash > 0) {
			ctx.fillStyle = "rgba(255,255,255," + (m.hitFlash / 10) + ")";
			ctx.beginPath();
			ctx.arc(m.cx, m.cy, 16, 0, Math.PI * 2);
			ctx.fill();
		}
		// HP bar
		var hpPct = m.hp / m.maxHp;
		ctx.fillStyle = "#333";
		ctx.fillRect(m.cx - 15, m.cy - h/2 - 6, 30, 4);
		ctx.fillStyle = hpPct > 0.5 ? "#4c4" : (hpPct > 0.25 ? "#cc4" : "#c44");
		ctx.fillRect(m.cx - 15, m.cy - h/2 - 6, 30 * hpPct, 4);
	}
}

function renderBullets() {
	for (var i = 0; i < G.bullets.length; i++) {
		var bl = G.bullets[i];
		if (!bl.alive) continue;
		var bc = SC[bl.spr];
		if (bc) {
			var s = 20 / 16;
			var w = 16 * s, h = 16 * s;
			ctx.drawImage(SPR.img, bc[0]*16, bc[1]*16, 16, 16, bl.x - w/2, bl.y - h/2, w, h);
		} else {
			// Fallback colored circle
			var color = "#ff0";
			if (bl.spr === "bullet_frost") color = "#88ddff";
			else if (bl.spr === "bullet_fire") color = "#ff6622";
			ctx.fillStyle = color;
			ctx.beginPath();
			ctx.arc(bl.x, bl.y, 4, 0, Math.PI * 2);
			ctx.fill();
		}
		// Frost/fire bullet glow
		if (bl.spr === "bullet_frost") {
			ctx.fillStyle = "rgba(136,221,255,0.4)";
			ctx.beginPath();
			ctx.arc(bl.x, bl.y, 6, 0, Math.PI * 2);
			ctx.fill();
		} else if (bl.spr === "bullet_fire") {
			ctx.fillStyle = "rgba(255,102,34,0.5)";
			ctx.beginPath();
			ctx.arc(bl.x, bl.y, 7, 0, Math.PI * 2);
			ctx.fill();
		}
	}
}

function renderParticles() {
	for (var i = 0; i < G.particles.length; i++) {
		var p = G.particles[i];
		var alpha = p.life / p.maxLife;
		ctx.globalAlpha = alpha;
		ctx.fillStyle = p.color;
		ctx.beginPath();
		ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
		ctx.fill();
	}
	ctx.globalAlpha = 1;
}

function renderUI() {
	// Right panel background
	var px = MX + GS * 16 + 10, py = MY, pw = CFG.canvasW - px - 10, ph = GS * 16;
	ctx.fillStyle = "rgba(20,20,30,0.9)";
	ctx.fillRect(px, py, pw, ph);
	ctx.strokeStyle = "#333";
	ctx.lineWidth = 1;
	ctx.strokeRect(px, py, pw, ph);

	// Info
	ctx.fillStyle = "#fff";
	ctx.font = "bold 14px Microsoft YaHei";
	ctx.textAlign = "left";
	ctx.fillText("波次 " + G.wave, px + 8, py + 22);
	ctx.fillStyle = "#ff0";
	ctx.fillText("💰 " + G.money, px + 8, py + 44);
	ctx.fillStyle = "#f44";
	ctx.fillText("❤ " + G.life + "/20", px + 8, py + 64);
	ctx.fillStyle = "#fd0";
	ctx.fillText("⭐ " + G.score, px + 8, py + 84);

	// Tower buttons
	var btnY = py + 100;
	for (var i = 0; i < TOWER_KEYS.length; i++) {
		var key = TOWER_KEYS[i];
		var td = TOWER_DATA[key];
		var by = btnY + i * 60;
		var selected = G.selectedType === key;
		ctx.fillStyle = selected ? "rgba(100,150,255,0.3)" : "rgba(255,255,255,0.05)";
		ctx.fillRect(px + 4, by, pw - 8, 54);
		ctx.strokeStyle = selected ? "#69f" : "#444";
		ctx.lineWidth = selected ? 2 : 1;
		ctx.strokeRect(px + 4, by, pw - 8, 54);
		ctx.fillStyle = selected ? "#fff" : "#aaa";
		ctx.font = "12px Microsoft YaHei";
		ctx.textAlign = "left";
		ctx.fillText(td.name, px + 10, by + 16);
		ctx.fillStyle = G.money >= td.cost ? "#ff0" : "#644";
		ctx.fillText("💰" + td.cost, px + 10, by + 32);
		// Mini sprite preview
		if (td.spr && td.spr[0]) {
			var uic = SC[td.spr[0]];
			if (uic) {
				var ss = 28 / 16;
				ctx.drawImage(SPR.img, uic[0]*16, uic[1]*16, 16, 16, px + pw - 36, by + 8, 16*ss, 16*ss);
			}
		}
	}

	// Wave button
	var waveBtnY = btnY + TOWER_KEYS.length * 60 + 10;
	ctx.fillStyle = G.waveInProgress ? "#333" : "#284";
	ctx.fillRect(px + 4, waveBtnY, pw - 8, 36);
	ctx.strokeStyle = G.waveInProgress ? "#555" : "#4a8";
	ctx.strokeRect(px + 4, waveBtnY, pw - 8, 36);
	ctx.fillStyle = "#fff";
	ctx.font = "13px Microsoft YaHei";
	ctx.textAlign = "center";
	ctx.fillText(G.waveInProgress ? "进行中..." : "下一波", px + pw/2, waveBtnY + 24);
}

function renderGameOver() {
	if (!G.gameOver) return;
	ctx.fillStyle = "rgba(0,0,0,0.6)";
	ctx.fillRect(0, 0, CFG.canvasW, CFG.canvasH);
	ctx.fillStyle = "#f44";
	ctx.font = "bold 40px Microsoft YaHei";
	ctx.textAlign = "center";
	ctx.fillText("游戏结束", CFG.canvasW / 2, CFG.canvasH / 2 - 20);
	ctx.fillStyle = "#aaa";
	ctx.font = "18px Microsoft YaHei";
	ctx.fillText("坚持到第 " + G.wave + " 波", CFG.canvasW / 2, CFG.canvasH / 2 + 30);
	ctx.fillStyle = "#ff0";
	ctx.font = "14px Microsoft YaHei";
	ctx.fillText("点击重新开始", CFG.canvasW / 2, CFG.canvasH / 2 + 70);
}

function restartGame() {
	G.money = 200; G.life = 20; G.score = 0; G.wave = 0;
	G.step = 0; G.selectedType = null;
	G.buildings = []; G.monsters = []; G.bullets = []; G.particles = [];
	G.waveTimer = 0; G.spawnQueue = []; G.waveInProgress = false;
	G.gameOver = false; G.phase = "playing";
	_bid = 0; _mid = 0; _blid = 0;
	initMap();
}

// ===== INPUT =====
var touchActive = false;

function getEventXY(e) {
	var rect = canvas.getBoundingClientRect();
	var scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
	var clientX = e.clientX !== undefined ? e.clientX : e.pageX;
	var clientY = e.clientY !== undefined ? e.clientY : e.pageY;
	var x = (clientX - rect.left) * scaleX;
	var y = (clientY - rect.top) * scaleY;
	return [x, y];
}

function handleCanvasClick(x, y) {
	// Game over click = restart
	if (G.gameOver) { restartGame(); return; }

	// Check panel click
	var px = MX + GS * 16 + 10, py = MY, pw = CFG.canvasW - px - 10;
	if (x >= px && x <= px + pw) {
		// Tower buttons
		var btnY = py + 100;
		for (var i = 0; i < TOWER_KEYS.length; i++) {
			var by = btnY + i * 60;
			if (y >= by && y <= by + 54) {
				G.selectedType = TOWER_KEYS[i];
				return;
			}
		}
		// Wave button
		var waveBtnY = btnY + TOWER_KEYS.length * 60 + 10;
		if (y >= waveBtnY && y <= waveBtnY + 36 && !G.waveInProgress) {
			startWave();
		}
		return;
	}

	// Try place building on map
	if (!G.selectedType || !G.hoverGrid) return;
	var gx = G.hoverGrid[0], gy = G.hoverGrid[1];
	var g = mapGrid[gy][gx];
	if (!g.buildable || g.building) return;
	var td = TOWER_DATA[G.selectedType];
	if (!td || G.money < td.cost) return;
	createBuilding(G.selectedType, gx, gy);
}

function handleCanvasMove(x, y) {
	G.mouseX = x; G.mouseY = y;
	G.hoverGrid = posToGrid(x, y);
}

canvas.addEventListener("mousemove", function(e) {
	var xy = getEventXY(e);
	handleCanvasMove(xy[0], xy[1]);
});

canvas.addEventListener("click", function(e) {
	if (touchActive) { touchActive = false; return; }
	var xy = getEventXY(e);
	handleCanvasClick(xy[0], xy[1]);
});

// Touch events
canvas.addEventListener("touchstart", function(e) {
	e.preventDefault();
	touchActive = true;
	var touch = e.touches[0];
	var xy = getEventXY(touch);
	handleCanvasMove(xy[0], xy[1]);
	handleCanvasClick(xy[0], xy[1]);
}, { passive: false });

canvas.addEventListener("touchmove", function(e) {
	e.preventDefault();
	var touch = e.touches[0];
	var xy = getEventXY(touch);
	handleCanvasMove(xy[0], xy[1]);
}, { passive: false });

canvas.addEventListener("touchend", function(e) {
	e.preventDefault();
	touchActive = false;
}, { passive: false });

// ===== RESIZE HANDLER =====
function resizeCanvas() {
	var aspect = CFG.canvasW / CFG.canvasH;
	var maxW = window.innerWidth;
	var maxH = window.innerHeight;
	var w, h;
	if (maxW / maxH > aspect) {
		h = maxH;
		w = h * aspect;
	} else {
		w = maxW;
		h = w / aspect;
	}
	canvas.style.width = Math.floor(w) + "px";
	canvas.style.height = Math.floor(h) + "px";
}

window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", function() {
	setTimeout(resizeCanvas, 200);
});
resizeCanvas();

// ===== MAIN LOOP =====
function gameLoop() {
	if (G.phase === "loading") { drawLoading(); requestAnimationFrame(gameLoop); return; }
	update();
	render();
	requestAnimationFrame(gameLoop);
}

function drawLoading() {
	ctx.fillStyle = "#0a0a0f";
	ctx.fillRect(0, 0, CFG.canvasW, CFG.canvasH);
	ctx.fillStyle = "#888";
	ctx.font = "18px Microsoft YaHei";
	ctx.textAlign = "center";
	ctx.fillText("加载精灵素材中...", CFG.canvasW / 2, CFG.canvasH / 2);
}

// ===== START =====
initMap();
SPR.load(function() {
	document.getElementById("loading").style.display = "none";
	if (G.phase !== "playing") {
		G.phase = "playing";
		gameLoop();
	}
});
setTimeout(function() {
	if (G.phase === "loading") {
		if (SPR.ready) {
			document.getElementById("loading").style.display = "none";
			G.phase = "playing";
			gameLoop();
		} else {
			document.getElementById("loading").textContent = "素材加载超时，请刷新重试";
		}
	}
}, 5000);

// ===== TESTS =====
function assert(cond, msg) {
	if (!cond) console.error("[FAIL] " + msg);
	else console.log("[PASS] " + msg);
}

(function runTests() {
	assert(typeof canvas !== "undefined", "Canvas 存在");
	assert(CFG.gridSize === 48, "网格尺寸 48");
	assert(CFG.cols === 16 && CFG.rows === 16, "16x16 网格");
	assert(Object.keys(SC).length === 43, "SC " + Object.keys(SC).length + " 精灵");
	assert(ROAD_PATH.length > 0, "道路路径 " + ROAD_PATH.length + " 格");
	assert(TOWER_KEYS.length === 7, "7 种塔类型");
	assert(typeof createBuilding === "function", "createBuilding 函数存在");
	assert(typeof startWave === "function", "startWave 函数存在");
	assert(typeof spawnMonster === "function", "spawnMonster 函数存在");
	// Check road path shape
	var endsAtExit = ROAD_PATH[ROAD_PATH.length-1][0] === 15 && ROAD_PATH[ROAD_PATH.length-1][1] === 15;
	assert(endsAtExit, "路径终点 (15,15)");
	// Decor count
	var decorCount = 0;
	for (var gy = 0; gy < CFG.rows; gy++)
		for (var gx = 0; gx < CFG.cols; gx++)
			if (mapGrid[gy][gx].decor) decorCount++;
	assert(decorCount > 0, "环境装饰 " + decorCount + " 个");
	console.log("[INFO] 游戏初始化完成");
})();
</script>
