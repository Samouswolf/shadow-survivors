// ===== COORD HELPERS =====
var MX = CFG.padding, MY = CFG.padding, GS = CFG.gridSize;
function gridCenter(gx, gy) { return [MX + gx * GS + GS / 2, MY + gy * GS + GS / 2]; }
function posToGrid(px, py) {
    var gx = Math.floor((px - MX) / GS), gy = Math.floor((py - MY) / GS);
    return (gx >= 0 && gx < CFG.cols && gy >= 0 && gy < CFG.rows) ? [gx, gy] : null;
}

SPR.load = function(cb) {
    SPR.img = new Image();
    SPR.img.onload = function() {
        SPR.ready = true;
        console.log("[TDv2] sprite loaded");
        if (cb) cb();
    };
    SPR.img.onerror = function() {
        console.error("[TDv2] sprite load failed:", SPR.img.src);
        setTimeout(function() {
            if (!SPR.ready) {
                console.log("[TDv2] retrying sprite load...");
                var oldSrc = SPR.img.src;
                SPR.img = new Image();
                SPR.img.onload = function() {
                    SPR.ready = true;
                    console.log("[TDv2] retry succeeded");
                    if (cb) cb();
                };
                SPR.img.onerror = function() {
                    console.error("[TDv2] both loads failed, showing error");
                    document.getElementById("loading").textContent = "素材加载失败，请刷新重试";
                };
                SPR.img.src = oldSrc;
            }
        }, 2000);
    };
    SPR.img.src = (location.pathname.includes('/tests/') ? '../' : '') + "assets/spritesheet-tdv2.png";
};

SPR.get = function(n) {
    var c = SC[n];
    if (!c || !SPR.ready || !SPR.img || !SPR.img.complete) return null;
    return { img: SPR.img, col: c[0], row: c[1], sx: c[0]*16, sy: c[1]*16, sw: 16, sh: 16 };
};

// By default only archer and wall are unlocked (level 1)

function getUnlockedTowerKeys(currentLevel) {
    var unlocked = ["archer", "wall"];
    for (var i = 0; i <= currentLevel; i++) {
        var levelData = LEVEL_DATA[i];
        if (levelData && levelData.towerUnlock) {
            for (var t = 0; t < levelData.towerUnlock.length; t++) {
                var tk = levelData.towerUnlock[t];
                if (tk !== "upgrade_lv2" && unlocked.indexOf(tk) === -1) {
                    unlocked.push(tk);
                }
            }
        }
    }
    return unlocked;
}

function getMaxTowerLevel(currentLevel) {
    var lv5Unlocked = false;
    for (var i = 4; i < currentLevel; i++) {
        var levelData = LEVEL_DATA[i];
        if (levelData && levelData.towerUnlock) {
            for (var t = 0; t < levelData.towerUnlock.length; t++) {
                if (levelData.towerUnlock[t] === "upgrade_lv2") lv5Unlocked = true;
            }
        }
    }
    // Level 1-4: max level 1, Level 5-7: max level 2, Level 8+: max level 3
    if (currentLevel >= 8) return 3;
    if (currentLevel >= 5) return 2;
    return 1;
}

function initLevel(levelIdx) {
    var ld = LEVEL_DATA[levelIdx];
    if (!ld) { console.error("Invalid level:", levelIdx); return; }

    // Clear all
    G.buildings = []; G.monsters = []; G.bullets = []; G.particles = [];
    G.wave = 0; G.wavesCleared = 0;
    G.waveTimer = 0; G.spawnQueue = [];
    G.waveInProgress = false; G.gameOver = false;
    G.selectedType = null; G.selectedBuilding = null;
    G.bossActive = false;
    G.autoWaveTimer = 0; G.waveCooldown = 0; G.nextWaveReady = false;

    // Set state
    G.currentLevel = levelIdx;
    G.money = ld.startMoney || 200;
    G.life = ld.life || 20;
    G.levelStartMoney = G.money;
    G.levelLivesLost = 0;
    G.score = 0;
    G.maxTowerLevel = getMaxTowerLevel(levelIdx);

    // Reset globalWaveIndex to cumulative waves before this level
    var cumWaves = 0;
    for (var i = 0; i < levelIdx; i++) {
        cumWaves += LEVEL_DATA[i].waves.length;
    }
    G.globalWaveIndex = cumWaves;

    // Build grid
    ROAD_PATH = ld.path.slice();
    mapGrid = [];
    for (var gy = 0; gy < CFG.rows; gy++) {
        mapGrid[gy] = [];
        for (var gx = 0; gx < CFG.cols; gx++) {
            mapGrid[gy][gx] = { passable: true, buildable: true, building: null, decor: null };
        }
    }
    // Mark road cells as non-buildable
    for (var i = 0; i < ROAD_PATH.length; i++) {
        var p = ROAD_PATH[i];
        mapGrid[p[1]][p[0]].buildable = false;
    }
    // Mark no-build cells
    var nb = ld.noBuild;
    if (nb) {
        for (var ni = 0; ni < nb.length; ni++) {
            var np = nb[ni];
            if (np[1] < CFG.rows && np[0] < CFG.cols) {
                mapGrid[np[1]][np[0]].buildable = false;
            }
        }
    }
    // Place decorations
    placeDecorationsByTheme(levelIdx);
}

function placeDecorationsByTheme(levelIdx) {
    var themes = ["plain", "forest", "desert", "swamp", "volcano", "frost", "shadow", "void"];
    var theme = (LEVEL_DATA[levelIdx] && LEVEL_DATA[levelIdx].theme) || "plain";
    var decorSet = [];
    if (theme === "plain") decorSet = ["stone","grass_deco","tree_1","tree_2"];
    else if (theme === "forest") decorSet = ["tree_1","tree_2","tree_1","tree_2","grass_deco"];
    else if (theme === "desert") decorSet = ["stone","stone","stone","stone"];
    else if (theme === "swamp") decorSet = ["grass_deco","grass_deco","stone"];
    else if (theme === "volcano") decorSet = ["stone","stone","stone","stone"];
    else if (theme === "frost") decorSet = ["stone","grass_deco","stone"];
    else if (theme === "shadow") decorSet = ["stone","stone"];
    else if (theme === "void") decorSet = ["stone","stone","stone","stone"];

    for (var gy = 0; gy < CFG.rows; gy++) {
        for (var gx = 0; gx < CFG.cols; gx++) {
            var g = mapGrid[gy][gx];
            if (!g.buildable || g.building) continue;
            var h = (gx * 13 + gy * 7 + 3) % 19;
            if (h >= decorSet.length) continue;
            g.decor = decorSet[h];
        }
    }
}

function upgradeBuilding(b) {
    if (!b) return false;
    var td = TOWER_DATA[b.type];
    if (!td) return false;
    var nextLevel = b.level;
    if (nextLevel >= 3) return false;
    if (nextLevel >= G.maxTowerLevel) return false;
    var cost = td.upgradeCost[nextLevel];
    if (G.money < cost) return false;
    G.money -= cost;
    b.level++;
    var lvData = td.levels[b.level - 1];
    b.dmg = lvData.dmg;
    b.rate = lvData.rate;
    b.range = lvData.range;
    b.splash = lvData.splash;
    b.spr = b.type + "_lv" + b.level;
    b.exp = 0;
    b.expNext = b.level === 2 ? 8 : 12;
    return true;
}

// ===== WAVE SYSTEM =====
function isLevelComplete() {
    var ld = LEVEL_DATA[G.currentLevel];
    if (!ld) return false;
    var totalWaves = ld.waves.length;
    if (G.wave >= totalWaves && !G.waveInProgress &&
        G.monsters.every(function(m) { return !m.alive; })) {
        return true;
    }
    return false;
}

function getLevelTotalWaves() {
    var ld = LEVEL_DATA[G.currentLevel];
    return ld ? ld.waves.length : 0;
}

function startWave() {
    var ld = LEVEL_DATA[G.currentLevel];
    if (!ld) return;
    if (G.waveInProgress || G.gameOver) return;
    if (G.wave >= ld.waves.length) return;

    var waveDef = ld.waves[G.wave];
    G.spawnQueue = [];

    if (waveDef.boss !== undefined) {
        // Boss wave
        G.spawnQueue.push({
            isBoss: true,
            bossIdx: waveDef.boss,
            delay: 60
        });
    } else {
        var spawnInterval = waveDef.spawnInterval || 120;
        var count = 0;
        for (var mi = 0; mi < waveDef.mobs.length; mi++) {
            count += waveDef.mobs[mi][1];
        }
        var spawnIdx = 0;
        for (var mi = 0; mi < waveDef.mobs.length; mi++) {
            var typeIdx = waveDef.mobs[mi][0];
            var amount = waveDef.mobs[mi][1];
            var mt = MONSTER_TYPES[typeIdx];
            var waveInLevel = G.wave;
            var baseMul = Math.pow(1.15, waveInLevel);
            var hpMul = Math.min(baseMul, 10);
            var rewardMul = (1 + 0.1 * G.currentLevel);
            for (var c = 0; c < amount; c++) {
                G.spawnQueue.push({
                    isBoss: false,
                    typeIdx: typeIdx,
                    hp: Math.round(mt.hp * hpMul),
                    speed: mt.speed,
                    reward: Math.round(mt.reward * rewardMul),
                    delay: 60 + spawnIdx * spawnInterval
                });
                spawnIdx++;
            }
        }
    }

    G.waveTimer = 0;
    G.waveInProgress = true;
    G.nextWaveReady = false;
    G.waveCooldown = ld.levelWaveDelay || 1800;
    G.autoWaveTimer = 0;
    console.log("[TDv2] Wave " + (G.wave + 1) + " started (global #" + (G.globalWaveIndex + 1) + ")");
}

// ===== PARTICLE SYSTEM =====
function spawnParticle(x, y, vx, vy, life, color, size) {
    G.particles.push({ x: x, y: y, vx: vx, vy: vy, life: life, maxLife: life, color: color, size: size || 3 });
}

function spawnExplosion(x, y, count, color, speed, life, size) {
    for (var i = 0; i < count; i++) {
        var angle = Math.random() * Math.PI * 2;
        var spd = (0.5 + Math.random() * 0.5) * (speed || 3);
        spawnParticle(x, y, Math.cos(angle) * spd, Math.sin(angle) * spd, life || 20, color, size || 3);
    }
}

// ===== UPDATE =====
function update() {
    G.step++;

    // Spawn queue
    if (G.waveInProgress) {
        if (G.spawnQueue.length > 0) {
            G.waveTimer++;
            while (G.spawnQueue.length > 0 && G.waveTimer >= G.spawnQueue[0].delay) {
                var sq = G.spawnQueue.shift();
                if (sq.isBoss) {
                    spawnBoss(sq.bossIdx);
                    console.log("[TDv2] BOSS spawned: " + BOSS_DATA[sq.bossIdx].name);
                } else {
                    spawnMonster(sq.typeIdx, sq.hp, sq.speed, sq.reward);
                }
            }
        }
        // Check if wave completed (all spawned and all dead)
        if (G.spawnQueue.length === 0 && G.monsters.every(function(m) { return !m.alive; })) {
            G.waveInProgress = false;
            G.wavesCleared++;
            G.wave++;
            G.globalWaveIndex++;
            G.bossActive = false;

            // Check level complete
            if (isLevelComplete()) {
                G.gamePhase = "levelComplete";
                if (G.currentLevel + 1 > G.maxUnlockedLevel) {
                    G.maxUnlockedLevel = G.currentLevel + 1;
                }
                saveProgress();
                return;
            }
        }
    }

    // Auto-start next wave
    if (!G.waveInProgress && !G.gameOver && G.gamePhase === "playing") {
        if (G.monsters.every(function(m) { return !m.alive; }) && G.spawnQueue.length === 0) {
            G.autoWaveTimer++;
            if (G.autoWaveTimer > 120) { // 2s auto delay before next wave
                G.nextWaveReady = true;
            }
        }
    }

    // Update monsters
    for (var mi = G.monsters.length - 1; mi >= 0; mi--) {
        var m = G.monsters[mi];
        if (!m.alive) { G.monsters.splice(mi, 1); continue; }

        m.animFrame++;

        // Boss abilities
        if (m.isBoss) {
            updateBossAbility(m);
        }

        // Slow/stun
        var effectiveSpeed = m.speed;
        if (m.slowTimer > 0) {
            effectiveSpeed *= (m.isBoss ? 0.7 : 0.4);
            m.slowTimer--;
        }
        if (m.stunTimer > 0) {
            m.stunTimer--;
            continue; // Skip movement while stunned
        }
        if (m.burrowed || m.invisible) continue; // Skip movement when burrowed

        // Sprint
        if (m.sprintActive) {
            effectiveSpeed *= 2.0;
            m.sprintTimer--;
            if (m.sprintTimer <= 0) { m.sprintActive = false; }
        }

        // Move along path
        if (m.pathIdx < ROAD_PATH.length - 1) {
            var next = ROAD_PATH[m.pathIdx + 1];
            var targetPos = gridCenter(next[0], next[1]);
            var dx = targetPos[0] - m.cx, dy = targetPos[1] - m.cy;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < effectiveSpeed) {
                m.pathIdx++;
                m.gx = next[0]; m.gy = next[1];
                m.cx = targetPos[0]; m.cy = targetPos[1];
            } else {
                m.cx += (dx / dist) * effectiveSpeed;
                m.cy += (dy / dist) * effectiveSpeed;
            }
        } else {
            // Reached exit
            m.alive = false;
            G.life--;
            G.levelLivesLost++;
            if (G.life <= 0) { G.life = 0; G.gameOver = true; G.gamePhase = "gameover"; }
            continue;
        }
        if (m.hitFlash > 0) m.hitFlash--;
    }

    // Update buildings
    for (var bi = 0; bi < G.buildings.length; bi++) {
        var b = G.buildings[bi];
        if (b.cooldown > 0) b.cooldown--;

        // Frost giant aura: slow tower attack rate
        var rateMultiplier = 1;
        for (var bmi = 0; bmi < G.monsters.length; bmi++) {
            var bm = G.monsters[bmi];
            if (bm.isBoss && bm.alive && bm.bossSkill === "frostAura") {
                var fdx = bm.cx - b.cx, fdy = bm.cy - b.cy;
                if (Math.sqrt(fdx * fdx + fdy * fdy) < 120) {
                    rateMultiplier = 1.5;
                }
            }
        }

        // Find target
        b.target = null;
        var bestDist = Infinity;
        for (var mi2 = 0; mi2 < G.monsters.length; mi2++) {
            var m2 = G.monsters[mi2];
            if (!m2.alive || m2.burrowed || m2.invisible) continue;
            var dx = m2.cx - b.cx, dy = m2.cy - b.cy;
            var d = Math.sqrt(dx * dx + dy * dy);
            if (d < b.range && d < bestDist) {
                bestDist = d;
                b.target = m2;
            }
        }

        // Fire if ready
        if (b.target && b.cooldown <= 0) {
            b.cooldown = Math.round(b.rate * rateMultiplier);
            if (b.type === "barrack") {
                // Melee: instant damage
                b.target.hp -= b.dmg;
                b.target.hitFlash = 5;
                if (b.target.hp <= 0) {
                    killMonster(b.target, b);
                }
            } else if (b.bullet) {
                createBullet(b.cx, b.cy, b.target, 4, b.dmg, b.bullet, b.splash, b);
            }
        }
    }

    // Update bullets
    for (var bli = G.bullets.length - 1; bli >= 0; bli--) {
        var bl = G.bullets[bli];
        if (!bl.alive) { G.bullets.splice(bli, 1); continue; }
        if (!bl.target || !bl.target.alive || bl.target.burrowed || bl.target.invisible) {
            bl.alive = false;
            G.bullets.splice(bli, 1);
            continue;
        }
        var dx = bl.target.cx - bl.x, dy = bl.target.cy - bl.y;
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d < bl.speed + 5) {
            // Hit
            bl.target.hp -= bl.dmg;
            bl.target.hitFlash = 5;
            // Frost effect
            if (bl.spr === "bullet_frost") {
                for (var fi = 0; fi < G.monsters.length; fi++) {
                    var fm = G.monsters[fi];
                    if (!fm.alive) continue;
                    var fdx = fm.cx - bl.target.cx, fdy = fm.cy - bl.target.cy;
                    if (Math.sqrt(fdx * fdx + fdy * fdy) < 50) {
                        fm.slowTimer = 90;
                    }
                }
                spawnExplosion(bl.target.cx, bl.target.cy, 12, "#88ddff", 2, 25, 4);
            } else if (bl.spr === "bullet_fire") {
                spawnExplosion(bl.target.cx, bl.target.cy, 16, "#ff6622", 2.5, 25, 5);
            }
            // Splash damage
            if (bl.splash > 0) {
                for (var si = 0; si < G.monsters.length; si++) {
                    var sm = G.monsters[si];
                    if (!sm.alive || sm === bl.target) continue;
                    var sdx = sm.cx - bl.target.cx, sdy = sm.cy - bl.target.cy;
                    if (Math.sqrt(sdx * sdx + sdy * sdy) < bl.splash) {
                        sm.hp -= Math.round(bl.dmg * 0.5);
                        sm.hitFlash = 3;
                        if (sm.hp <= 0) { killMonster(sm, bl.fromBld); }
                    }
                }
            }
            // Kill if dead
            if (bl.target.hp <= 0) {
                killMonster(bl.target, bl.fromBld);
            } else if (bl.spr === "bullet_wizard") {
                // Wizard bullet stun
                bl.target.stunTimer = 30;
            }
            bl.alive = false;
        } else {
            bl.x += (dx / d) * bl.speed;
            bl.y += (dy / d) * bl.speed;
            // Trail particles
            if (bl.spr === "bullet_frost" && G.step % 2 === 0) {
                spawnParticle(bl.x, bl.y, (Math.random() - 0.5) * 0.5, (Math.random() - 0.5) * 0.5, 15, "#88ddff", 3);
            } else if (bl.spr === "bullet_fire" && G.step % 2 === 0) {
                spawnParticle(bl.x, bl.y, (Math.random() - 0.5) * 0.5, (Math.random() - 0.5) * 0.5, 18, "#ff6622", 4);
            }
        }
    }

    // Update particles
    for (var pi = G.particles.length - 1; pi >= 0; pi--) {
        var p = G.particles[pi];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) { G.particles.splice(pi, 1); }
    }
}

function killMonster(m, sourceBld) {
    if (!m.alive) return;
    m.alive = false;
    G.money += m.reward;
    G.score++;

    // Boss split ability
    if (m.isBoss && m.bossSkill === "split") {
        for (var si = 0; si < 3; si++) {
            var sm = spawnMonster(0, 300, 0.8, 10);
            if (sm) {
                sm.cx = m.cx + (Math.random() - 0.5) * 40;
                sm.cy = m.cy + (Math.random() - 0.5) * 40;
                sm.gx = m.gx;
                sm.gy = m.gy;
                sm.pathIdx = m.pathIdx;
            }
        }
        spawnExplosion(m.cx, m.cy, 20, "#88ff88", 3, 30, 5);
    }

    // Grant tower exp
    if (sourceBld) {
        sourceBld.exp++;
        if (sourceBld.exp >= sourceBld.expNext && sourceBld.level < 3 && sourceBld.level < G.maxTowerLevel) {
            sourceBld.level++;
            sourceBld.exp = 0;
            var lvData = TOWER_DATA[sourceBld.type].levels[sourceBld.level - 1];
            sourceBld.dmg = lvData.dmg;
            sourceBld.rate = lvData.rate;
            sourceBld.range = lvData.range;
            sourceBld.splash = lvData.splash;
            sourceBld.spr = sourceBld.type + "_lv" + sourceBld.level;
            sourceBld.expNext = sourceBld.level === 2 ? 8 : 12;
        }
    }

    spawnExplosion(m.cx, m.cy, 8, "#ffa500", 2, 15, 3);
}

function updateBossAbility(m) {
    if (!m.alive) return;
    m.bossSkillTimer--;

    switch (m.bossSkill) {
        case "sprint":
            if (m.bossSkillTimer <= 0) {
                m.sprintActive = true;
                m.sprintTimer = 180; // 3s
                m.bossSkillTimer = 600; // 10s
                spawnExplosion(m.cx, m.cy, 10, "#ffaa00", 3, 20, 4);
            }
            break;
        case "burrow":
            if (m.bossSkillTimer <= 0) {
                m.burrowed = !m.burrowed;
                if (m.burrowed) {
                    spawnExplosion(m.cx, m.cy, 15, "#886644", 2, 20, 6);
                    // Reappear at slightly random position
                }
                m.bossSkillTimer = m.burrowed ? 150 : 480; // 2.5s burrowed, 8s above
            }
            break;
        case "poison":
            if (m.bossSkillTimer <= 0) {
                // Visual poison cloud effect
                spawnExplosion(m.cx, m.cy, 30, "#88ff44", 1.5, 40, 8);
                // Damage nearby towers (simplified - just visual)
                m.bossSkillTimer = 720; // 12s
            }
            break;
        case "inferno":
            if (m.bossSkillTimer <= 0) {
                spawnExplosion(m.cx, m.cy, 40, "#ff4400", 3, 30, 10);
                // Affect towers in range (simplified)
                for (var bi = 0; bi < G.buildings.length; bi++) {
                    var bb = G.buildings[bi];
                    var fdx = m.cx - bb.cx, fdy = m.cy - bb.cy;
                    if (Math.sqrt(fdx * fdx + fdy * fdy) < 100) {
                        bb.cooldown += 180; // 3s stun
                    }
                }
                m.bossSkillTimer = 600; // 10s
            }
            break;
        case "teleport":
            if (m.bossSkillTimer <= 0) {
                // Simplified teleport: move forward on path
                if (m.pathIdx < ROAD_PATH.length - 3) {
                    m.pathIdx += 2;
                    var tp = ROAD_PATH[m.pathIdx];
                    var tc = gridCenter(tp[0], tp[1]);
                    m.cx = tc[0]; m.cy = tc[1];
                    m.gx = tp[0]; m.gy = tp[1];
                    spawnExplosion(m.cx, m.cy, 15, "#9900ff", 3, 20, 6);
                }
                m.bossSkillTimer = 300; // 5s
            }
            break;
        case "voidLord":
            // Summon: every 15s spawn 2 void minions
            m.summonTimer--;
            if (m.summonTimer <= 0) {
                m.summonTimer = 900; // 15s
                for (var vi = 0; vi < 2; vi++) {
                    var vm = spawnMonster(14, 200, 0.6, 15);
                    if (vm) {
                        vm.gx = m.gx;
                        vm.gy = m.gy;
                        vm.cx = m.cx + (Math.random() - 0.5) * 60;
                        vm.cy = m.cy + (Math.random() - 0.5) * 60;
                        vm.pathIdx = m.pathIdx;
                    }
                }
                spawnExplosion(m.cx, m.cy, 20, "#8844ff", 3, 30, 8);
            }

            // Phase transitions based on HP %
            var hpPct = m.hp / m.maxHp;
            if (hpPct < 0.5 && !m.phase2done) {
                m.phase2done = true;
                m.speed = 0.58; // Phase 2: slow down
                m.bossSkillTimer = 600;
                spawnExplosion(m.cx, m.cy, 30, "#ff00ff", 3, 30, 8);
            } else if (hpPct < 0.2 && !m.phase3done) {
                m.phase3done = true;
                m.speed = 1.0; // Phase 3: speed up
                m.bossSkillTimer = 360;
                spawnExplosion(m.cx, m.cy, 40, "#ffffff", 4, 40, 12);
            }
            break;
    }
}

// ===== RENDER =====
function render() {
    // Clear
    ctx.fillStyle = "#0a0a0f";
    ctx.fillRect(0, 0, CFG.canvasW, CFG.canvasH);

    if (G.gamePhase === "menu") {
        renderMenu();
        return;
    }
    if (G.gamePhase === "loading") {
        drawLoading();
        return;
    }

    renderMap();
    renderDecorations();
    renderGrid();
    renderPreview();
    renderBuildings();
    renderMonsters();
    renderBullets();
    renderParticles();

    if (G.gamePhase === "playing") {
        renderUI();
    } else if (G.gamePhase === "levelComplete") {
        renderUI();
        renderLevelComplete();
    } else if (G.gamePhase === "gameover") {
        renderUI();
        renderGameOver();
    }
}

function renderMap() {
    var mx = MX, my = MY, mw = GS * 16, mh = GS * 16;
    // Background
    if (SPR.ready && SC.grass) {
        var gc = SC.grass;
        for (var gy = 0; gy < CFG.rows; gy++) {
            for (var gx = 0; gx < CFG.cols; gx++) {
                var px = mx + gx * GS, py = my + gy * GS;
                ctx.drawImage(SPR.img, gc[0]*16, gc[1]*16, 16, 16, px, py, GS, GS);
            }
        }
    } else {
        for (var gy = 0; gy < CFG.rows; gy++) {
            for (var gx = 0; gx < CFG.cols; gx++) {
                var px = mx + gx * GS, py = my + gy * GS;
                ctx.fillStyle = (gx + gy) % 2 === 0 ? "#38d973" : "#2daf5e";
                ctx.fillRect(px, py, GS, GS);
            }
        }
    }

    // Theme-specific overlay
    var theme = (LEVEL_DATA[G.currentLevel] && LEVEL_DATA[G.currentLevel].theme) || "plain";
    if (theme === "void") {
        ctx.fillStyle = "rgba(40,0,60,0.3)";
        ctx.fillRect(mx, my, mw, mh);
    } else if (theme === "shadow") {
        ctx.fillStyle = "rgba(20,20,30,0.2)";
        ctx.fillRect(mx, my, mw, mh);
    } else if (theme === "volcano") {
        ctx.fillStyle = "rgba(60,20,0,0.15)";
        ctx.fillRect(mx, my, mw, mh);
    } else if (theme === "frost") {
        ctx.fillStyle = "rgba(200,230,255,0.1)";
        ctx.fillRect(mx, my, mw, mh);
    } else if (theme === "swamp") {
        ctx.fillStyle = "rgba(30,60,20,0.2)";
        ctx.fillRect(mx, my, mw, mh);
    }

    // Draw road
    var m = 3;
    for (var i = 0; i < ROAD_PATH.length; i++) {
        var gx = ROAD_PATH[i][0], gy = ROAD_PATH[i][1];
        var px = mx + gx * GS + m, py = my + gy * GS + m;
        var sz = GS - m * 2;
        var hasN = isOnRoad(gx, gy - 1), hasS = isOnRoad(gx, gy + 1);
        var hasW = isOnRoad(gx - 1, gy), hasE = isOnRoad(gx + 1, gy);
        ctx.fillStyle = "#8a7a5a";
        ctx.fillRect(px, py, sz, sz);
        ctx.fillStyle = "#b8a880";
        ctx.fillRect(px + 2, py + 2, sz - 4, sz - 4);
        if (hasN) { ctx.fillRect(px, py - m, sz, m); }
        if (hasS) { ctx.fillRect(px, py + sz, sz, m); }
        if (hasW) { ctx.fillRect(px - m, py, m, sz); }
        if (hasE) { ctx.fillRect(px + sz, py, m, sz); }
    }
    // Road borders
    ctx.strokeStyle = "rgba(60,40,20,0.3)";
    ctx.lineWidth = 1;
    for (var i = 0; i < ROAD_PATH.length; i++) {
        var gx = ROAD_PATH[i][0], gy = ROAD_PATH[i][1];
        var px = mx + gx * GS, py = my + gy * GS;
        if (!isOnRoad(gx - 1, gy)) { ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, py + GS); ctx.stroke(); }
        if (!isOnRoad(gx + 1, gy)) { ctx.beginPath(); ctx.moveTo(px + GS, py); ctx.lineTo(px + GS, py + GS); ctx.stroke(); }
        if (!isOnRoad(gx, gy - 1)) { ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px + GS, py); ctx.stroke(); }
        if (!isOnRoad(gx, gy + 1)) { ctx.beginPath(); ctx.moveTo(px, py + GS); ctx.lineTo(px + GS, py + GS); ctx.stroke(); }
    }

    // Spawn point indicator
    if (ROAD_PATH.length > 0) {
        var sp = ROAD_PATH[0];
        var spx = mx + sp[0] * GS, spy = my + sp[1] * GS;
        ctx.fillStyle = "rgba(255,100,100,0.3)";
        ctx.fillRect(spx, spy, GS, GS);
        ctx.fillStyle = "#f88";
        ctx.font = "10px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("▶", spx + GS/2, spy + GS/2 + 3);
    }
    // Exit indicator
    if (ROAD_PATH.length > 0) {
        var ep = ROAD_PATH[ROAD_PATH.length - 1];
        var epx = mx + ep[0] * GS, epy = my + ep[1] * GS;
        ctx.fillStyle = "rgba(255,50,50,0.4)";
        ctx.fillRect(epx, epy, GS, GS);
        ctx.fillStyle = "#f44";
        ctx.font = "10px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("基地", epx + GS/2, epy + GS/2 + 3);
    }
}

function renderDecorations() {
    if (!SPR.ready) return;
    for (var gy = 0; gy < CFG.rows; gy++) {
        for (var gx = 0; gx < CFG.cols; gx++) {
            var g = mapGrid[gy][gx];
            if (!g.decor) continue;
            var dc = SC[g.decor];
            if (!dc) continue;
            var c = gridCenter(gx, gy);
            var s = GS * 0.5 / 16;
            var w = 16 * s, h = 16 * s;
            ctx.drawImage(SPR.img, dc[0]*16, dc[1]*16, 16, 16, c[0] - w/2, c[1] - h + GS*0.2, w, h);
        }
    }
}

function renderGrid() {
    if (G.hoverGrid) {
        var gx = G.hoverGrid[0], gy = G.hoverGrid[1];
        var px = MX + gx * GS, py = MY + gy * GS;
        ctx.fillStyle = "rgba(255,255,255,0.08)";
        ctx.fillRect(px, py, GS, GS);
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.lineWidth = 1;
        ctx.strokeRect(px, py, GS, GS);
    }
}

function renderPreview() {
    if (!G.selectedType || !G.hoverGrid) return;
    var gx = G.hoverGrid[0], gy = G.hoverGrid[1];
    var g = mapGrid[gy] && mapGrid[gy][gx];
    if (!g || !g.buildable || g.building) return;
    var td = TOWER_DATA[G.selectedType];
    if (!td) return;
    // Check if tower is unlocked
    var unlocked = getUnlockedTowerKeys(G.currentLevel);
    if (unlocked.indexOf(G.selectedType) === -1) return;
    var c = gridCenter(gx, gy);
    var sprName = G.selectedType + "_lv1";
    var dc = SC[sprName];
    if (!dc) return;
    ctx.save();
    ctx.globalAlpha = 0.35;
    var s = GS * 0.5 / 16;
    var w = 16 * s, h = 16 * s;
    ctx.drawImage(SPR.img, dc[0]*16, dc[1]*16, 16, 16, c[0] - w/2, c[1] - h + GS*0.2, w, h);
    ctx.restore();
    // Range circle
    var lvData = td.levels[0];
    ctx.beginPath();
    ctx.arc(c[0], c[1], lvData.range, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(187,141,32,0.1)";
    ctx.fill();
    ctx.strokeStyle = "rgba(187,141,32,0.3)";
    ctx.lineWidth = 1;
    ctx.stroke();
}

function renderBuildings() {
    for (var i = 0; i < G.buildings.length; i++) {
        var b = G.buildings[i];
        var sprName = getTowerSprite(b);
        if (!sprName) continue;
        var dc = SC[sprName];
        if (!dc) continue;
        var s = GS * 0.5 / 16;
        var w = 16 * s, h = 16 * s;
        ctx.drawImage(SPR.img, dc[0]*16, dc[1]*16, 16, 16, b.cx - w/2, b.cy - h + GS*0.2, w, h);

        // Tower-specific tint effects
        if (b.type === "frost") {
            ctx.globalCompositeOperation = "source-atop";
            ctx.fillStyle = "rgba(100,200,255,0.5)";
            ctx.fillRect(b.cx - w / 2, b.cy - h + GS * 0.2, w, h);
            ctx.globalCompositeOperation = "source-over";
            ctx.fillStyle = "rgba(80,180,255,0.25)";
            ctx.beginPath();
            ctx.arc(b.cx, b.cy + GS * 0.05, GS * 0.35, 0, Math.PI * 2);
            ctx.fill();
        } else if (b.type === "fire") {
            ctx.globalCompositeOperation = "source-atop";
            ctx.fillStyle = "rgba(255,100,30,0.5)";
            ctx.fillRect(b.cx - w / 2, b.cy - h + GS * 0.2, w, h);
            ctx.globalCompositeOperation = "source-over";
            ctx.fillStyle = "rgba(255,120,30,0.25)";
            ctx.beginPath();
            ctx.arc(b.cx, b.cy + GS * 0.05, GS * 0.35, 0, Math.PI * 2);
            ctx.fill();
        } else if (b.type === "crystal") {
            ctx.fillStyle = "rgba(200,100,255,0.15)";
            ctx.beginPath();
            ctx.arc(b.cx, b.cy + GS * 0.05, GS * 0.35, 0, Math.PI * 2);
            ctx.fill();
        }

        // Barrack knight
        if (b.type === "barrack" && b.level > 0) {
            var knightSpr = ["knight_lv1","knight_lv2","knight_lv3"][Math.min(b.level-1, 2)];
            var kdc = SC[knightSpr];
            if (kdc) {
                var ks = GS * 0.4 / 16;
                var kw = 16 * ks, kh = 16 * ks;
                var kx = b.cx + GS * 0.3, ky = b.cy - GS * 0.1;
                if (b.target && b.target.alive) {
                    var dirX = b.target.cx - b.cx, dirY = b.target.cy - b.cy;
                    var d = Math.sqrt(dirX*dirX+dirY*dirY) || 1;
                    var dist = Math.min(GS * 0.4, d);
                    kx = b.cx + (dirX/d) * dist;
                    ky = b.cy + (dirY/d) * dist;
                }
                ctx.save();
                var swing = b.cooldown < 5 ? Math.sin(G.step * 0.3) * 0.3 : 0;
                ctx.translate(kx, ky);
                ctx.rotate(swing);
                ctx.drawImage(SPR.img, kdc[0]*16, kdc[1]*16, 16, 16, -kw/2, -kh/2, kw, kh);
                ctx.restore();
            }
        }

        // Level indicator
        if (b.level > 1) {
            ctx.fillStyle = "#ff0";
            ctx.font = "bold 10px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("★".repeat(b.level-1), b.cx, b.cy - GS * 0.35);
        }
        // Selected building highlight
        if (G.selectedBuilding === b) {
            ctx.strokeStyle = "#ff0";
            ctx.lineWidth = 2;
            ctx.strokeRect(b.cx - GS/2, b.cy - GS/2, GS, GS);
        }
    }
}

function renderMonsters() {
    for (var i = 0; i < G.monsters.length; i++) {
        var m = G.monsters[i];
        if (!m.alive) continue;
        if (m.burrowed) {
            // Show burrowed indicator
            ctx.fillStyle = "rgba(136,100,68,0.5)";
            ctx.beginPath();
            ctx.arc(m.cx, m.cy, 12, 0, Math.PI * 2);
            ctx.fill();
            continue;
        }

        var sprName = "monster_" + m.sprIdx;
        var mc = SC[sprName];
        if (!mc) continue;
        var s = 30 / 16;
        var w = 16 * s, h = 16 * s;

        // Boss size boost
        var scale = m.isBoss ? 1.6 : 1;
        s = s * scale;
        w = 16 * s;
        h = 16 * s;

        ctx.save();
        ctx.drawImage(SPR.img, mc[0]*16, mc[1]*16, 16, 16, m.cx - w/2, m.cy - h/2, w, h);
        ctx.restore();

        // Boss name
        if (m.isBoss && m.bossName) {
            ctx.fillStyle = "#ff0";
            ctx.font = "bold 11px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(m.bossName, m.cx, m.cy - h/2 - 10);
        }

        // Hit flash
        if (m.hitFlash > 0) {
            ctx.fillStyle = "rgba(255,255,255," + (m.hitFlash / 10) + ")";
            ctx.beginPath();
            ctx.arc(m.cx, m.cy, 16 * scale, 0, Math.PI * 2);
            ctx.fill();
        }
        // HP bar
        var hpPct = m.hp / m.maxHp;
        var barW = m.isBoss ? 50 : 30;
        ctx.fillStyle = "#333";
        ctx.fillRect(m.cx - barW/2, m.cy - h/2 - 6, barW, 4);
        ctx.fillStyle = hpPct > 0.5 ? "#4c4" : (hpPct > 0.25 ? "#cc4" : "#c44");
        ctx.fillRect(m.cx - barW/2, m.cy - h/2 - 6, barW * hpPct, 4);
        // Slow indicator
        if (m.slowTimer > 0) {
            ctx.fillStyle = "rgba(100,200,255,0.4)";
            ctx.beginPath();
            ctx.arc(m.cx, m.cy, 14 * scale, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

function renderBullets() {
    for (var i = 0; i < G.bullets.length; i++) {
        var bl = G.bullets[i];
        if (!bl.alive) continue;
        var bc = SC[bl.spr];
        if (bc) {
            var s = 20 / 16;
            var w = 16 * s, h = 16 * s;
            ctx.drawImage(SPR.img, bc[0]*16, bc[1]*16, 16, 16, bl.x - w/2, bl.y - h/2, w, h);
        } else {
            var color = "#ff0";
            if (bl.spr === "bullet_frost") color = "#88ddff";
            else if (bl.spr === "bullet_fire") color = "#ff6622";
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(bl.x, bl.y, 4, 0, Math.PI * 2);
            ctx.fill();
        }
        // Glow effects
        if (bl.spr === "bullet_frost") {
            ctx.fillStyle = "rgba(136,221,255,0.4)";
            ctx.beginPath();
            ctx.arc(bl.x, bl.y, 6, 0, Math.PI * 2);
            ctx.fill();
        } else if (bl.spr === "bullet_fire") {
            ctx.fillStyle = "rgba(255,102,34,0.5)";
            ctx.beginPath();
            ctx.arc(bl.x, bl.y, 7, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}

function renderParticles() {
    for (var i = 0; i < G.particles.length; i++) {
        var p = G.particles[i];
        var alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

// ===== INPUT =====
var touchActive = false;

function getEventXY(e) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
    var clientX = e.clientX !== undefined ? e.clientX : e.pageX;
    var clientY = e.clientY !== undefined ? e.clientY : e.pageY;
    var x = (clientX - rect.left) * scaleX;
    var y = (clientY - rect.top) * scaleY;
    return [x, y];
}

function handleCanvasClick(x, y) {
    // MENU phase
    if (G.gamePhase === "menu") {
        handleMenuClick(x, y);
        return;
    }

    // LEVEL COMPLETE phase
    if (G.gamePhase === "levelComplete") {
        handleLevelCompleteClick(x, y);
        return;
    }

    // GAME OVER phase
    if (G.gamePhase === "gameover") {
        handleGameOverClick(x, y);
        return;
    }

    // PLAYING phase
    if (G.gamePhase !== "playing") return;

    // Check right panel click
    var px = MX + GS * 16 + 10, py = MY, pw = CFG.canvasW - px - 10;
    if (x >= px && x <= px + pw) {
        // Tower buttons
        var unlockedTowers = getUnlockedTowerKeys(G.currentLevel);
        var displayedTowers = [];
        for (var i = 0; i < TOWER_KEYS.length; i++) {
            if (unlockedTowers.indexOf(TOWER_KEYS[i]) !== -1) {
                displayedTowers.push(TOWER_KEYS[i]);
            }
        }
        var wallIdx = displayedTowers.indexOf("wall");
        if (wallIdx > -1) {
            displayedTowers.splice(wallIdx, 1);
            displayedTowers.push("wall");
        }

        var btnY = py + 110;
        for (var i = 0; i < displayedTowers.length; i++) {
            var by = btnY + i * 52;
            if (y >= by && y <= by + 46) {
                var key = displayedTowers[i];
                var td = TOWER_DATA[key];
                if (G.money >= td.cost) {
                    G.selectedType = key;
                    G.selectedBuilding = null;
                }
                return;
            }
        }
        // Wave button
        var waveBtnY = btnY + displayedTowers.length * 52 + 8;
        if (y >= waveBtnY && y <= waveBtnY + 34 && G.nextWaveReady && !G.waveInProgress) {
            startWave();
            return;
        }
        // Upgrade button (when building selected)
        var upgradeBtnY = waveBtnY + 42;
        if (G.selectedBuilding) {
            var sb = G.selectedBuilding;
            var nextLvl = sb.level + 1;
            var td = TOWER_DATA[sb.type];
            var maxLvl = Math.min(G.maxTowerLevel, 3);
            if (nextLvl <= maxLvl && td) {
                if (y >= upgradeBtnY && y <= upgradeBtnY + 30) {
                    upgradeBuilding(sb);
                    return;
                }
                upgradeBtnY += 36;
            }
        }
        // Back to menu
        var menuBtnY = upgradeBtnY + 6;
        if (y >= menuBtnY && y <= menuBtnY + 30) {
            G.gamePhase = "menu";
            return;
        }
        return;
    }

    // Map click - place building
    if (!G.selectedType || !G.hoverGrid) return;
    var gx = G.hoverGrid[0], gy = G.hoverGrid[1];
    var g = mapGrid[gy] && mapGrid[gy][gx];
    if (!g) return;

    // Check if clicking on existing building (upgrade)
    if (g.building) {
        var b = g.building;
        G.selectedBuilding = (G.selectedBuilding === b) ? null : b;
        // If upgrade clicked, try to upgrade
        if (G.selectedBuilding === b) {
            // Just select; upgrade happens on second click or via UI
        }
        return;
    }

    // Place new building
    if (!g.buildable || g.building) return;
    var td = TOWER_DATA[G.selectedType];
    if (!td || G.money < td.cost) return;
    // Check if tower is unlocked
    var unlocked = getUnlockedTowerKeys(G.currentLevel);
    if (unlocked.indexOf(G.selectedType) === -1) return;

    createBuilding(G.selectedType, gx, gy);
    G.selectedBuilding = null;
}

function handleMenuClick(x, y) {
    var cols = 4, rows = 2;
    var btnW = 180, btnH = 140, gap = 20;
    var totalW = cols * btnW + (cols - 1) * gap;
    var startX = (CFG.canvasW - totalW) / 2;
    var startY = 110;

    for (var i = 0; i < TOTAL_LEVELS; i++) {
        var col = i % cols;
        var row = Math.floor(i / cols);
        var bx = startX + col * (btnW + gap);
        var by = startY + row * (btnH + gap);
        if (x >= bx && x <= bx + btnW && y >= by && y <= by + btnH) {
            if (i <= G.maxUnlockedLevel) {
                // Start this level
                startPlayingLevel(i);
                return;
            }
        }
    }
}

function startPlayingLevel(levelIdx) {
    initLevel(levelIdx);
    G.gamePhase = "playing";
    G.autoWaveTimer = 0;
    G.nextWaveReady = true;
}

function handleLevelCompleteClick(x, y) {
    var pw = 360, ph = 320;
    var px = (CFG.canvasW - pw) / 2, py = (CFG.canvasH - ph) / 2;
    var isLastLevel = G.currentLevel >= TOTAL_LEVELS - 1;

    if (!isLastLevel) {
        var btnY = py + ph - 80;
        // Next level
        if (x >= px + 30 && x <= px + 170 && y >= btnY && y <= btnY + 40) {
            var ld = LEVEL_DATA[G.currentLevel];
            if (ld) G.money += ld.goldReward || 0;
            if (G.currentLevel + 1 > G.maxUnlockedLevel) {
                G.maxUnlockedLevel = G.currentLevel + 1;
                saveProgress();
            }
            startPlayingLevel(G.currentLevel + 1);
            return;
        }
        // Back to menu
        if (x >= px + pw - 170 && x <= px + pw - 30 && y >= btnY && y <= btnY + 40) {
            saveProgress();
            G.gamePhase = "menu";
            return;
        }
    } else {
        // Back to menu
        var btnY = py + ph - 35;
        if (x >= px + pw/2 - 70 && x <= px + pw/2 + 70 && y >= btnY && y <= btnY + 36) {
            var ld = LEVEL_DATA[G.currentLevel];
            if (ld) G.money += ld.goldReward || 0;
            saveProgress();
            G.gamePhase = "menu";
            return;
        }
    }
}

function handleGameOverClick(x, y) {
    var pw = 320, ph = 240;
    var px = (CFG.canvasW - pw) / 2, py = (CFG.canvasH - ph) / 2;
    var btnY = py + 145;

    // Retry
    if (x >= px + 30 && x <= px + 150 && y >= btnY && y <= btnY + 40) {
        startPlayingLevel(G.currentLevel);
        return;
    }
    // Back to menu
    if (x >= px + pw - 150 && x <= px + pw - 30 && y >= btnY && y <= btnY + 40) {
        G.gamePhase = "menu";
        return;
    }
}

function handleCanvasMove(x, y) {
    G.mouseX = x; G.mouseY = y;
    G.hoverGrid = posToGrid(x, y);
}

canvas.addEventListener("mousemove", function(e) {
    var xy = getEventXY(e);
    handleCanvasMove(xy[0], xy[1]);
});

canvas.addEventListener("click", function(e) {
    if (touchActive) { touchActive = false; return; }
    var xy = getEventXY(e);
    handleCanvasClick(xy[0], xy[1]);
});

// Touch events
canvas.addEventListener("touchstart", function(e) {
    e.preventDefault();
    touchActive = true;
    var touch = e.touches[0];
    var xy = getEventXY(touch);
    handleCanvasMove(xy[0], xy[1]);
    handleCanvasClick(xy[0], xy[1]);
}, { passive: false });

canvas.addEventListener("touchmove", function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    var xy = getEventXY(touch);
    handleCanvasMove(xy[0], xy[1]);
}, { passive: false });

canvas.addEventListener("touchend", function(e) {
    e.preventDefault();
    touchActive = false;
}, { passive: false });

// Keyboard shortcuts
document.addEventListener("keydown", function(e) {
    if (e.key === "r" && G.gamePhase === "gameover") {
        startPlayingLevel(G.currentLevel);
    }
    if (e.key === "m") {
        if (G.gamePhase === "playing") G.gamePhase = "menu";
        else if (G.gamePhase === "menu") G.gamePhase = "playing";
    }
    if (e.key === " " && G.nextWaveReady && !G.waveInProgress && G.gamePhase === "playing") {
        e.preventDefault();
        startWave();
    }
});

// ===== RESIZE =====
function resizeCanvas() {
    var aspect = CFG.canvasW / CFG.canvasH;
    var maxW = window.innerWidth;
    var maxH = window.innerHeight;
    var w, h;
    if (maxW / maxH > aspect) {
        h = maxH;
        w = h * aspect;
    } else {
        w = maxW;
        h = w / aspect;
    }
    canvas.style.width = Math.floor(w) + "px";
    canvas.style.height = Math.floor(h) + "px";
}

window.addEventListener("resize", resizeCanvas);
window.addEventListener("orientationchange", function() {
    setTimeout(resizeCanvas, 200);
});
resizeCanvas();

// ===== MAIN LOOP =====
function gameLoop() {
    if (G.gamePhase === "loading") { drawLoading(); requestAnimationFrame(gameLoop); return; }
    if (G.gamePhase === "playing") {
        update();
    }
    render();
    requestAnimationFrame(gameLoop);
}

// ===== START =====
loadProgress();
// If first time, start at menu with level 1 unlocked
if (G.maxUnlockedLevel < 0) G.maxUnlockedLevel = 0;

// Initialize level 1 data (for map rendering if needed)
initLevel(0);
G.gamePhase = "menu";

SPR.load(function() {
    document.getElementById("loading").style.display = "none";
    if (G.gamePhase === "loading") {
        G.gamePhase = "menu";
        gameLoop();
    }
});

setTimeout(function() {
    if (G.gamePhase === "loading") {
        if (SPR.ready) {
            document.getElementById("loading").style.display = "none";
            G.gamePhase = "menu";
            gameLoop();
        } else {
            document.getElementById("loading").textContent = "素材加载超时，请刷新重试";
        }
    }
}, 5000);

// Start game loop
gameLoop();

// ===== TESTS =====
function assert(cond, msg) {
    if (!cond) console.error("[FAIL] " + msg);
    else console.log("[PASS] " + msg);
}

(function runTests() {
    assert(typeof canvas !== "undefined", "Canvas 存在");
    assert(CFG.gridSize === 48, "网格尺寸 48");
    assert(CFG.cols === 16 && CFG.rows === 16, "16x16 网格");
    assert(Object.keys(SC).length >= 40, "精灵表 " + Object.keys(SC).length + " 精灵");
    assert(MONSTER_TYPES.length === 15, "15种怪物类型");
    assert(BOSS_DATA.length === 8, "8个Boss");
    assert(LEVEL_DATA.length === 8, "8个关卡");

    // Check each level has waves and path
    for (var i = 0; i < LEVEL_DATA.length; i++) {
        var lv = LEVEL_DATA[i];
        assert(lv.path && lv.path.length > 0, "关卡" + (i+1) + " 有路径");
        assert(lv.waves && lv.waves.length > 0, "关卡" + (i+1) + " 有波次");
        assert(lv.name && lv.name !== "", "关卡" + (i+1) + " 有名称");
    }

    // Check path continuity (each step moves to adjacent cell)
    for (var i = 0; i < LEVEL_DATA.length; i++) {
        var path = LEVEL_DATA[i].path;
        var continuous = true;
        for (var p = 1; p < path.length; p++) {
            var dx = Math.abs(path[p][0] - path[p-1][0]);
            var dy = Math.abs(path[p][1] - path[p-1][1]);
            if (dx + dy !== 1) { continuous = false; break; }
        }
        assert(continuous, "关卡" + (i+1) + " 路径连续");
    }

    // Check tower data
    assert(TOWER_DATA.archer.levels.length === 3, "箭塔3级");
    assert(TOWER_DATA.archer.levels[2].dmg === 65, "箭塔Lv3伤害65");

    // Check total waves
    var totalWaves = 0;
    for (var i = 0; i < LEVEL_DATA.length; i++) {
        totalWaves += LEVEL_DATA[i].waves.length;
    }
    assert(totalWaves === 104, "总共104波 (实际" + totalWaves + ")");

    // Check ROAD_PATH is valid
    assert(typeof isOnRoad === "function", "isOnRoad 函数存在");
    assert(typeof createBuilding === "function", "createBuilding 函数存在");
    assert(typeof startWave === "function", "startWave 函数存在");
    assert(typeof spawnMonster === "function", "spawnMonster 函数存在");
    assert(typeof initLevel === "function", "initLevel 函数存在");

    console.log("[INFO] 塔防v2八关系统初始化完成");
    console.log("[INFO] 当前解锁关卡: " + (G.maxUnlockedLevel + 1));
})();
</script>
