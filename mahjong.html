function beep(freq, type='square', dur=.08, vol=.08, pan=0) {
if (!audioCtx || !settings.soundOn) return;
const t = audioCtx.currentTime, o = audioCtx.createOscillator(), g = audioCtx.createGain();
const p = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;
o.type = type; o.frequency.value = freq;
g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(.001, t+dur);
o.connect(g);
if (p) { g.connect(p); p.pan.value = pan; p.connect(audioCtx.destination); }
else { g.connect(audioCtx.destination); }
o.start(t); o.stop(t+dur);
}

function animateParticles(ts) {
fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
const dt = Math.min(.05, 1 / 60);
particles = particles.filter(p => {
if (p.ring) {

p.ringRadius += p.ringSpeed * dt;
p.x += Math.cos(p.ringAngle) * p.ringSpeed * dt;
p.y += Math.sin(p.ringAngle) * p.ringSpeed * dt;
} else {
p.x += p.vx * dt; p.y += p.vy * dt;
p.vy += 120 * dt;
}
p.life -= dt;
if (p.life <= 0) return false;
const alpha = p.life / p.maxLife;
fxCtx.globalAlpha = alpha;
fxCtx.fillStyle = p.color;
if (p.sparkle) {

const sz = p.size * alpha * 2;
fxCtx.save(); fxCtx.translate(p.x, p.y);
fxCtx.rotate(p.life * 8);
fxCtx.beginPath();
for (let i = 0; i < 4; i++) {
const a = (i / 4) * Math.PI * 2;
fxCtx.lineTo(Math.cos(a) * sz, Math.sin(a) * sz);
fxCtx.lineTo(Math.cos(a + Math.PI/4) * sz * .35, Math.sin(a + Math.PI/4) * sz * .35);
}
fxCtx.closePath(); fxCtx.fill();
fxCtx.restore();
} else {
fxCtx.beginPath(); fxCtx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2); fxCtx.fill();
}
return true;
});
fxCtx.globalAlpha = 1;
fxRAF = particles.length > 0 ? requestAnimationFrame(animateParticles) : null;
}


let shakeTimer = null;
function shakeScreen(intensity=6, dur=300) {
if (!settings.fxOn) return;
clearTimeout(shakeTimer);
const body = document.body, start = performance.now();
(function shake(ts) {
const elapsed = ts - start, decay = 1 - elapsed / dur;
if (decay <= 0) { body.style.transform = ''; return; }
const s = intensity * decay;
body.style.transform = `translate(${(Math.random() - .5) * s * 2}px, ${(Math.random() - .5) * s * 2}px)`;
shakeTimer = setTimeout(() => requestAnimationFrame(shake), 16);
})(start);
}

function pipPositions(n) {
const cx = TW / 2, cy = TH * 0.52, s = TH * 0.092;
if (n === 1) return [[cx, cy]];
if (n === 2) return [[cx, cy - s * 1.4], [cx, cy + s * 1.4]];
if (n === 3) return [[cx - s * 0.8, cy - s * 1.7], [cx + s * 0.8, cy], [cx - s * 0.8, cy + s * 1.7]];
if (n === 4) return [[cx - s * 1.1, cy - s * 1.1], [cx + s * 1.1, cy - s * 1.1], [cx - s * 1.1, cy + s * 1.1], [cx + s * 1.1, cy + s * 1.1]];
if (n === 5) return [[cx - s * 1.1, cy - s * 1.1], [cx + s * 1.1, cy - s * 1.1], [cx, cy], [cx - s * 1.1, cy + s * 1.1], [cx + s * 1.1, cy + s * 1.1]];
if (n === 6) {
const g = s * 1.3;
return [[cx - g, cy - s * 1.3], [cx, cy - s * 1.3], [cx + g, cy - s * 1.3], [cx - g, cy + s * 1.3], [cx, cy + s * 1.3], [cx + g, cy + s * 1.3]];
}
if (n === 7) {
const g = s * 1.25;
return [[cx - g, cy - s * 1.8], [cx + g, cy - s * 1.8], [cx - g * 1.5, cy - s * 0.3], [cx, cy - s * 0.3], [cx + g * 1.5, cy - s * 0.3], [cx - g * 1.5, cy + s * 1.5], [cx + g * 1.5, cy + s * 1.5]];
}
if (n === 8) {
const g = s * 1.25;
return [[cx - g * 1.5, cy - s * 1.7], [cx - g * 0.5, cy - s * 1.7], [cx + g * 0.5, cy - s * 1.7], [cx + g * 1.5, cy - s * 1.7], [cx - g * 1.5, cy + s * 1.5], [cx - g * 0.5, cy + s * 1.5], [cx + g * 0.5, cy + s * 1.5], [cx + g * 1.5, cy + s * 1.5]];
}
const g = s * 1.05;
const pts = [];
for (let r = -1; r <= 1; r++) for (let c = -1; c <= 1; c++) pts.push([cx + c * g, cy + r * g]);
return pts;
}

const RED_DOT = { 1: [0], 3: [0], 5: [0, 2, 4], 7: [0, 2, 4], 9: [0, 2, 4, 6, 8] };

function drawCoin(ctx, x, y, R, isRed) {

const bodyGrd = ctx.createRadialGradient(x - R * 0.15, y - R * 0.2, R * 0.05, x, y, R);
if (isRed) {
bodyGrd.addColorStop(0, '#F06050'); bodyGrd.addColorStop(0.5, '#C83028');
bodyGrd.addColorStop(0.85, '#7A100C'); bodyGrd.addColorStop(1, '#4A0604');
} else {
bodyGrd.addColorStop(0, '#5A80B8'); bodyGrd.addColorStop(0.5, '#2A4880');
bodyGrd.addColorStop(0.85, '#102040'); bodyGrd.addColorStop(1, '#060E20');
}
ctx.beginPath(); ctx.arc(x, y, R, 0, Math.PI * 2);
ctx.fillStyle = bodyGrd; ctx.fill();


const innerR = R * 0.65;
ctx.beginPath(); ctx.arc(x, y, innerR, 0, Math.PI * 2);
ctx.fillStyle = isRed ? '#FEE8E0' : '#E8EFF8';
ctx.fill();


ctx.beginPath(); ctx.arc(x, y, innerR, 0, Math.PI * 2);
ctx.strokeStyle = isRed ? 'rgba(180,30,20,0.5)' : 'rgba(30,50,90,0.5)';
ctx.lineWidth = 0.8; ctx.stroke();


const dotR = R * 0.13;
ctx.beginPath(); ctx.arc(x, y, dotR, 0, Math.PI * 2);
ctx.fillStyle = isRed ? '#2A0202' : '#020610';
ctx.fill();


ctx.beginPath(); ctx.arc(x - dotR * 0.25, y - dotR * 0.3, dotR * 0.28, 0, Math.PI * 2);
ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fill();


ctx.beginPath(); ctx.arc(x, y, R * 0.92, -Math.PI * 0.7, -Math.PI * 0.02);
ctx.strokeStyle = 'rgba(220,210,180,0.3)'; ctx.lineWidth = R * 0.1; ctx.stroke();


ctx.beginPath(); ctx.arc(x, y, R, 0, Math.PI * 2);
ctx.strokeStyle = isRed ? 'rgba(80,8,4,0.5)' : 'rgba(4,10,30,0.5)';
ctx.lineWidth = 0.5; ctx.stroke();
}

function drawTong(ctx, n) {
const pts = pipPositions(n);
const reds = RED_DOT[n] || [];

if (n === 1) {
const cx = TW / 2, cy = TH * 0.5;
const bigR = TH * 0.2;
drawCoin(ctx, cx, cy, bigR, true);

const petalR = bigR * 0.52;
ctx.fillStyle = 'rgba(255,220,180,0.3)';
for (let i = 0; i < 8; i++) {
const a = (Math.PI * 2 * i) / 8 - Math.PI / 2;
const px = cx + Math.cos(a) * petalR * 0.38;
const py = cy + Math.sin(a) * petalR * 0.38;
ctx.beginPath(); ctx.arc(px, py, petalR * 0.18, 0, Math.PI * 2); ctx.fill();
}
return;
}
const R = n <= 3 ? TH * 0.09 : n <= 6 ? TH * 0.07 : TH * 0.062;
pts.forEach(([x, y], i) => { drawCoin(ctx, x, y, R, reds.includes(i)); });
}


function tiaoStickColor(i, n) {

if (n % 2 === 0) return 'g';
if (n === 3) return i === 1 ? 'r' : 'g';
if (n === 5) return (i === 0 || i === 2 || i === 4) ? 'r' : 'g';
if (n === 7) return (i === 1 || i === 3 || i === 5) ? 'r' : 'g';
if (n === 9) return (i === 0 || i === 2 || i === 4 || i === 6 || i === 8) ? 'r' : 'g';
return 'g';
}

function tiaoStickPositions(n) {
const cx = TW / 2, cy = TH * 0.52;
const sw = n <= 3 ? TW * 0.075 : n <= 6 ? TW * 0.064 : TW * 0.056;
const gh = n <= 3 ? TW * 0.065 : n <= 6 ? TW * 0.050 : TW * 0.042;
if (n <= 2) {
const tw = n * sw + (n - 1) * gh, sx = cx - tw / 2 + sw / 2;
const pts = [];
for (let i = 0; i < n; i++) pts.push([sx + i * (sw + gh), cy]);
return [pts];
}
if (n === 3) {
const tw = n * sw + (n - 1) * gh, sx = cx - tw / 2 + sw / 2;
const pts = [];
for (let i = 0; i < n; i++) pts.push([sx + i * (sw + gh), cy]);
return [pts];
}
if (n === 4) {
const vg = TH * 0.31;
const tw = 2 * sw + gh; const sx = cx - tw / 2 + sw / 2;
return [[[sx, cy - vg / 2], [sx + sw + gh, cy - vg / 2]], [[sx, cy + vg / 2], [sx + sw + gh, cy + vg / 2]]];
}
if (n === 5) {
const vg = TH * 0.29;
const tw3 = 3 * sw + 2 * gh, sx3 = cx - tw3 / 2 + sw / 2;

const duanYao = isDuanYaoJiu(uid);


if (qingYiSe && longQiDui) baseFan = 16;      
else if (isTianHu) baseFan = 16;               
else if (isDiHu) baseFan = 16;                 
else if (isRenHu) baseFan = 16;                
else if (qingYiSe && qiDui) baseFan = 8;       
else if (qingYiSe && duiDuiHu) baseFan = 8;    
else if (longQiDui) baseFan = 8;               
else if (isJiangDui(uid)) baseFan = 8;         
else if (isQuanYaoJiu(uid)) baseFan = 8;       
else if (qingYiSe) baseFan = 4;                
else if (qiDui) baseFan = 4;                   
else if (duiDuiHu) baseFan = 2;                
else if (isDaiYaoJiu(uid) && !duanYao) baseFan = 2; 
else if (duanYao) baseFan = 1;                 


let totalFan = baseFan;


const gen = countGen(uid);
totalFan += gen;

if (isSelfDraw && settings.selfDrawFan) totalFan += 1;
if (isQiangGang) totalFan += 1;
if (isGangShangKai) totalFan += 1;
if (isGangShangPao) totalFan += 1;            
if (isHaiDi && isSelfDraw) totalFan += 1;    
if (isHaiDi && !isSelfDraw) totalFan += 1;   

return { fan: totalFan, baseType: baseFan, gen, isSelfDraw, isQiangGang, isGangShangKai, isGangShangPao, isHaiDi,
qingYiSe, duiDuiHu, qiDui, longQiDui, isTianHu, isDiHu, isRenHu,
isDuanYaoJiu: duanYao, isDaiYaoJiu: isDaiYaoJiu(uid) && !duanYao, isJiangDui: isJiangDui(uid), isQuanYaoJiu: isQuanYaoJiu(uid) };
}

function getFanName(result) {
const fan = typeof result === 'object' ? result : { fan: result };
const f = fan.fan;
const parts = [];
if (fan.isTianHu) parts.push('天胡');
else if (fan.isDiHu) parts.push('地胡');
else if (fan.isRenHu) parts.push('人胡');
else if (fan.qingYiSe && fan.longQiDui) parts.push('清龙七对');
else if (fan.qingYiSe && fan.qiDui) parts.push('清七对');
else if (fan.qingYiSe && fan.duiDuiHu) parts.push('清对');
else if (fan.longQiDui) parts.push('龙七对');
else if (fan.qiDui) parts.push('小七对');
else if (fan.qingYiSe) parts.push('清一色');
else if (fan.duiDuiHu) parts.push('对对胡');
else parts.push('平胡');

if (fan.gen > 0) parts.push(fan.gen + '根');
if (fan.isSelfDraw && settings.selfDrawFan) parts.push('自摸');
if (fan.isQiangGang) parts.push('抢杠');
if (fan.isGangShangKai) parts.push('杠上花');
if (fan.isGangShangPao) parts.push('杠上炮');
if (fan.isHaiDi === true) parts.push('海底');

return { name: parts.join('·'), fan: f };
}

function getFanBreakdown(result) {
const lines = [];

if (result.isTianHu) lines.push('天胡 16番');
else if (result.isDiHu) lines.push('地胡 16番');
else if (result.isRenHu) lines.push('人胡 16番');
else if (result.qingYiSe && result.longQiDui) lines.push('清龙七对 16番');
else if (result.qingYiSe && result.qiDui) lines.push('清七对 8番');
else if (result.qingYiSe && result.duiDuiHu) lines.push('清对 8番');
else if (result.longQiDui) lines.push('龙七对 8番');
else if (result.isJiangDui) lines.push('将对 8番');
else if (result.isQuanYaoJiu) lines.push('全幺九 8番');
else if (result.qingYiSe) lines.push('清一色 4番');
else if (result.qiDui) lines.push('小七对 4番');
else if (result.duiDuiHu) lines.push('对对胡 2番');
else if (result.isDaiYaoJiu) lines.push('带幺九 2番');
else if (result.isDuanYaoJiu) lines.push('断幺九 1番');
else lines.push('平胡 1番');


if (result.gen > 0) lines.push('+根 x' + result.gen + ' = +' + result.gen + '番');
if (result.isSelfDraw && settings.selfDrawFan) lines.push('+自摸 +1番');
if (result.isQiangGang) lines.push('+抢杠 +1番');
if (result.isGangShangKai) lines.push('+杠上花 +1番');
if (result.isGangShangPao) lines.push('+杠上炮 +1番');
if (result.isHaiDi) lines.push('+海底 +1番');

lines.push('——');
const perPayer = settings.baseScore * Math.pow(2, result.fan - 1);
lines.push('合计 ' + result.fan + '番 · 每家' + perPayer + '分');
return lines.join('\n');
}

function doHu(uid, paoUid, isSelfDraw, isQiangGang=false, isGangShangKai=false, isTianHu=false, isDiHu=false, isRenHu=false, isGangShangPao=false) {

function aiChooseDiscard(uid) {
const hand = hands[uid];
const profile = AI_PROFILES[uid];


const suitCounts = { wan: 0, tiao: 0, tong: 0 };
hand.forEach(c => suitCounts[cardSuit(c)]++);
let minSuit = 'wan', minCnt = Infinity;
for (const sk of SUIT_KEYS) { if (suitCounts[sk] < minCnt) { minCnt = suitCounts[sk]; minSuit = sk; } }


let bestIdx = 0, bestScore = -Infinity;
for (let i = 0; i < hand.length; i++) {
const card = hand[i];
const n = cardNum(card), s = cardSuit(card);
let score = 0;


if (s === queMen[uid]) score += 200;

if (s === minSuit && minCnt <= 3) score += 70;


const sameCount = hand.filter(c => c === card).length;
const hasAdj1 = hand.some(c => cardSuit(c) === s && cardNum(c) === n - 1);
const hasAdj2 = hand.some(c => cardSuit(c) === s && cardNum(c) === n + 1);
const hasAdjJump1 = hand.some(c => cardSuit(c) === s && cardNum(c) === n - 2);
const hasAdjJump2 = hand.some(c => cardSuit(c) === s && cardNum(c) === n + 2);

if (sameCount === 1 && !hasAdj1 && !hasAdj2) {
if (!hasAdjJump1 && !hasAdjJump2) score += 60; 
else score += 25; 
}
if (sameCount >= 2) score -= 50; 
if (sameCount >= 3) score -= 80; 
if (hasAdj1 || hasAdj2) score -= 35; 
if (hasAdj1 && hasAdj2) score -= 55; 


if (n === 1 || n === 9) score += 10;



const totalDiscarded = discards.flat().filter(c => cardSuit(c) === s).length;
if (totalDiscarded >= 12) score -= 15; 


if (profile.defense > .6) {

if (sameCount === 1 && !hasAdj1 && !hasAdj2 && totalDiscarded < 6) score += 20;
}

if (score > bestScore) { bestScore = score; bestIdx = i; }
}
return hand[bestIdx];
}

function chaJiao(remaining) {

scores[c] += penalty;
}
}
renderAll();

}
return '';
}

}

function dealAnimation(callback) {

const positions = [
{ x: window.innerWidth / 2, y: window.innerHeight * .85 },
{ x: window.innerWidth / 2, y: window.innerHeight * .08 },
{ x: window.innerWidth * .08, y: window.innerHeight / 2 },
{ x: window.innerWidth * .92, y: window.innerHeight / 2 },
];
const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
let dealt = 0;
const totalCards = 52; 

function dealNext() {
if (dealt >= totalCards) { callback(); return; }
const playerIdx = dealt % 4;
const cardNum = Math.floor(dealt / 4);
const to = positions[playerIdx];

if (settings.fxOn) {
const steps = 6;
for (let i = 0; i < steps; i++) {
setTimeout(() => {
const t = i / steps;
const px = cx + (to.x - cx) * t + (Math.random() - .5) * 40;
const py = cy + (to.y - cy) * t + (Math.random() - .5) * 30;
for (let j = 0; j < 2; j++) {
particles.push({
x: px, y: py, vx: (Math.random() - .5) * 20, vy: (Math.random() - .5) * 20,
life: .3, maxLife: .3, color: playerIdx === 0 ? '#ffd700' : '#aaa', size: 1.5
});
}
}, i * 15);
}
}
if (!fxRAF) fxRAF = requestAnimationFrame(animateParticles);
dealt++;
const delay = dealt === totalCards ? 200 : (cardNum === 0 ? 30 : 16);
setTimeout(dealNext, delay);
}
dealNext();
}

$('histBtn').onclick = () => {
$('histOverlay').classList.add('show');
if (history.length === 0) {
$('histContent').innerHTML = '<div style="color:#997000;text-align:center;margin-bottom:8px;font-size:13px">🏆 最高分: ' + highScore + '</div><div style="color:#666;text-align:center;padding:20px">暂无战绩记录</div>';
} else {
$('histContent').innerHTML = '<div style="color:#997000;text-align:center;margin-bottom:8px;font-size:13px">🏆 最高分: ' + highScore + '</div>' + history.slice(0, 20).map((h, i) => {
let fanStr = '';
if (h.fanDetails && h.fanDetails.length > 0) {
fanStr = ' [' + h.fanDetails.map(f => f.name).join('·') + ']';
}
return '<div style="margin-bottom:4px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)"><span style="color:#888">' + h.time + '</span><span style="color:' + (h.diff>=0?'#4caf50':'#f44336') + ';margin:0 6px">' + (h.diff>=0?'+':'') + h.diff + '分</span><span style="color:#e0b860;font-size:10px">' + fanStr + '</span><span style="color:#666;font-size:10px"> ' + h.huCount + '人胡·' + (h.type==='draw'?'流局':'结束') + '</span></div>';
}).join('');
}
};
$('histClose').onclick = () => { $('histOverlay').classList.remove('show'); };
$('histClear').onclick = () => { history = []; localStorage.removeItem('scMJHistory'); $('histOverlay').classList.remove('show'); };
$('histOverlay').onclick = e => { if (e.target === $('histOverlay')) $('histOverlay').classList.remove('show'); };


document.addEventListener('keydown', e => {
if (!running) return;
switch(e.key.toLowerCase()) {
case 'd': playerDoDiscard(); break;
case 'p': playerPeng(); break;
case 'g': playerMingGang(); break;
case 'a': playerAnGang(); break;
case 'h': playerHu(); break;
case 'x': case 'escape': playerPass(); break;
case '1': case '2': case '3': case '4': case '5':
case '6': case '7': case '8': case '9': case '0':
const idx = parseInt(e.key) - 1;
if (idx >= 0 && idx < hands[0].length) selectCard(idx, {});
break;
}
});


renderAll();
</script>
</body>
</html>
