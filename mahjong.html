<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>川麻血战到底</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

/* ================================================================
   SICHUAN TEA HOUSE THEME — 四川茶馆主题
   ================================================================ */

/* ---- BODY: 多层木纹桌面 ---- */
body{
  background:
    /* 底层：深色桃花心木基调 */
    radial-gradient(ellipse at 50% 25%, #6b3a2a 0%, #4a2218 30%, #2e1208 70%, #1a0800 100%),
    /* 木纹层1：细密年轮纹理（微斜） */
    repeating-linear-gradient(2.5deg, transparent, transparent 3px, rgba(0,0,0,.07) 3px, rgba(0,0,0,.07) 4px),
    /* 木纹层2：更宽的反光纹（反向微斜） */
    repeating-linear-gradient(-1.8deg, transparent, transparent 7px, rgba(255,220,180,.02) 7px, rgba(255,220,180,.02) 8px),
    /* 木纹层3：纵向粗纹 */
    repeating-linear-gradient(90deg, transparent, transparent 50px, rgba(0,0,0,.04) 50px, rgba(0,0,0,.04) 51px),
    /* 木节花纹 */
    radial-gradient(ellipse at 18% 62%, rgba(0,0,0,.18) 0%, transparent 80px),
    radial-gradient(ellipse at 75% 38%, rgba(0,0,0,.1) 0%, transparent 50px),
    radial-gradient(ellipse at 55% 78%, rgba(0,0,0,.12) 0%, transparent 60px);
  font-family:"Microsoft YaHei","PingFang SC",sans-serif;
  overflow-x:hidden;
  height:100vh;
  touch-action:manipulation;
  user-select:none;
  transition:transform .05s;
}

/* 暖琥珀灯笼光 + 毡面纹理 */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    /* 中央暖光 */
    radial-gradient(ellipse at 50% 42%, rgba(255,180,60,.1) 0%, rgba(255,140,20,.04) 28%, transparent 55%),
    /* 四周暗角 */
    radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,.55) 100%),
    /* 毡面细纹 */
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.015) 2px, rgba(0,0,0,.015) 3px);
  pointer-events:none;z-index:0;
}

/* 竹节装饰边框 */
body::after{
  content:'';
  position:fixed;inset:5px;
  border:2px solid rgba(90,140,62,.18);
  border-radius:3px;
  box-shadow:inset 0 0 0 1px rgba(70,110,45,.1);
  pointer-events:none;z-index:0;
}

/* ---- 盖碗茶 CSS 艺术 ---- */
.tea-cup-art{
  position:fixed;bottom:18px;right:24px;z-index:0;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;
  opacity:.22;transition:opacity .8s;
}
.tea-cup-art:hover{opacity:.4}
.tea-cup-art .steam{
  width:3px;border-radius:2px;
  background:rgba(255,255,255,.5);
  animation:steamRise 2.5s ease-out infinite;
  margin-bottom:-2px;
}
.tea-cup-art .steam.s1{height:14px;animation-delay:0s;margin-left:-6px}
.tea-cup-art .steam.s2{height:18px;animation-delay:.8s;margin-left:4px}
.tea-cup-art .steam.s3{height:11px;animation-delay:1.6s;margin-left:-2px}
.tea-cup-art .knob{
  width:12px;height:7px;
  background:linear-gradient(180deg,#e8dcc0,#c8b878);
  border-radius:6px 6px 0 0;
  box-shadow:0 1px 2px rgba(0,0,0,.2);
}
.tea-cup-art .lid{
  width:44px;height:12px;
  background:linear-gradient(180deg,#f2ecd8,#ddd0b0);
  border-radius:22px 22px 3px 3px;
  box-shadow:0 2px 3px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.4);
  margin-bottom:-1px;
}
.tea-cup-art .bowl{
  width:52px;height:34px;
  background:linear-gradient(180deg,#f5f0e2 0%,#e8dcc0 40%,#d4c8a0 100%);
  border-radius:2px 2px 20px 20px;
  box-shadow:0 3px 8px rgba(0,0,0,.35),inset 0 2px 4px rgba(255,255,255,.35);
}
.tea-cup-art .saucer{
  width:68px;height:14px;
  background:linear-gradient(180deg,#e8dcc0,#d0c090,#b8a870);
  border-radius:50%;
  box-shadow:0 3px 6px rgba(0,0,0,.3);
  margin-top:-2px;
}
@keyframes steamRise{
  0%{transform:translateY(0) scaleX(1);opacity:.6}
  50%{transform:translateY(-18px) scaleX(1.8);opacity:.15}
  100%{transform:translateY(-30px) scaleX(2.5);opacity:0}
}

/* 竹叶装饰 */
.bamboo-leaf{
  position:fixed;pointer-events:none;z-index:0;
  width:0;height:0;opacity:.1;
}
.bamboo-leaf.l1{top:12%;left:3%;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:40px solid #5a8c3e;transform:rotate(-25deg)}
.bamboo-leaf.l2{top:15%;left:4.5%;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:32px solid #5a8c3e;transform:rotate(-10deg)}
.bamboo-leaf.l3{top:78%;right:3%;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:36px solid #5a8c3e;transform:rotate(20deg)}

/* ---- TILE: 象牙牌面 ---- */
.tile{
  width:clamp(38px,6.5vw,52px);height:clamp(52px,9vw,72px);
  border-radius:6px;
  display:inline-flex;align-items:center;justify-content:center;
  cursor:pointer;margin:2px;
  box-shadow:
    2px 3px 6px rgba(0,0,0,.4),
    0 1px 0 rgba(255,255,255,.08),
    inset 0 1px 0 rgba(255,255,255,.2);
  transition:transform .12s cubic-bezier(.34,1.56,.64,1),box-shadow .12s;
  position:relative;overflow:visible;
  background:linear-gradient(180deg,#fdfaef 0%,#f5edd7 45%,#e8debf 100%);
}
.tile::after{
  content:'';position:absolute;
  bottom:-4px;left:3px;right:3px;height:4px;
  background:rgba(0,0,0,.25);border-radius:0 0 3px 3px;
  z-index:-1;transition:opacity .12s;
}
.tile::before{
  content:'';position:absolute;inset:2px;border-radius:3px;
  background:linear-gradient(135deg,transparent 38%,rgba(255,255,255,.2) 50%,transparent 62%);
  background-size:200% 200%;
  animation:tileShine 3s ease-in-out infinite;
  pointer-events:none;z-index:2;opacity:.55;
}
@keyframes tileShine{0%,100%{background-position:200% 200%}50%{background-position:0% 0%}}
.tile img{width:100%;height:100%;display:block;border-radius:4px;position:relative;z-index:1}
.tile:hover{
  transform:translateY(-7px);
  box-shadow:3px 10px 18px rgba(0,0,0,.55),0 0 14px rgba(255,200,120,.1);
}
.tile:hover::after{opacity:.5;bottom:-6px}
.tile.selected{
  transform:translateY(-16px);
  border:3px solid #ff9c00;
  box-shadow:0 12px 28px rgba(255,140,0,.6),0 0 24px rgba(255,180,40,.3);
  z-index:10;animation:bounce .6s ease-in-out infinite;
}
/* 缺门牌深色蒙层提醒 */
.tile.dim{filter:brightness(.45) saturate(.3)}
.tile.dim::after{background:rgba(100,0,0,.15)}
.tile.dim.selected{filter:brightness(.6) saturate(.5)}
.tile.selected::after{opacity:.4;bottom:-9px}
.tile.selected::before{
  background:linear-gradient(135deg,transparent 28%,rgba(255,210,120,.3) 50%,transparent 72%);
  animation:tileShine .7s ease-in-out infinite;
}
@keyframes bounce{0%,100%{transform:translateY(-16px)}50%{transform:translateY(-22px)}}
.tile.back{
  background:linear-gradient(180deg,#2c1a0e 0%,#1a0d05 100%);
  cursor:default;
  box-shadow:2px 3px 8px rgba(0,0,0,.5);
}
.tile.back::before{
  content:'';position:absolute;inset:4px;
  border:1.5px solid rgba(200,160,100,.12);border-radius:3px;
  background:repeating-linear-gradient(0deg,transparent,transparent 6px,rgba(255,255,255,.015) 6px,rgba(255,255,255,.015) 7px);
  animation:none;
}
.tile.back:hover{transform:none;box-shadow:2px 3px 8px rgba(0,0,0,.5)}
.tile.back img{display:none}
.tile.meld-peng{border:2px solid #ff8c00;box-shadow:0 0 10px rgba(255,140,0,.35)}
.tile.meld-gang{border:2px solid #8b5cf6;box-shadow:0 0 10px rgba(139,92,246,.35)}
.tile.fly{position:fixed;z-index:25;pointer-events:none;transition:all .35s cubic-bezier(.25,.46,.45,.94)}
.tile.fly.peng{transition:all .3s cubic-bezier(.6,.04,.98,.34)}
.tile.fly.gang{transition:all .25s cubic-bezier(.36,.07,.19,.97)}

/* ---- 主牌桌区域 ---- */
.game-area{
  position:relative;width:100vw;height:100vh;z-index:1;
  background:
    /* 绿色毡面 */
    radial-gradient(ellipse at 50% 50%, #265018 0%, #1b3a10 45%, #122a0a 100%),
    /* 毡面纹理 */
    repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.025) 3px, rgba(0,0,0,.025) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(0,0,0,.015) 3px, rgba(0,0,0,.015) 4px);
  /* 木框 */
  box-shadow:
    inset 0 0 80px rgba(0,0,0,.45),
    inset 0 0 0 10px #4a2a14,
    inset 0 0 0 13px #3a1e0c,
    inset 0 0 0 14px #2a1206,
    0 6px 30px rgba(0,0,0,.6);
}
.game-area::before{
  content:'🀄';
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:clamp(40px,8vw,80px);
  opacity:.04;pointer-events:none;z-index:0;
  filter:blur(3px);
}

/* 摸牌光晕 */
.draw-glow{
  position:fixed;z-index:28;pointer-events:none;
  width:60px;height:80px;border-radius:8px;
  background:radial-gradient(ellipse,rgba(255,215,0,.45) 0%,transparent 70%);
  animation:drawGlow .6s ease-out forwards;
}
@keyframes drawGlow{0%{opacity:1;transform:scale(.5)}100%{opacity:0;transform:scale(2.8)}}

/* ---- 手牌区 ---- */
.hand-area{position:absolute;display:flex;align-items:center;z-index:5}
.hand-area.bottom{bottom:clamp(80px,12vh,120px);left:50%;transform:translateX(-50%);flex-direction:row}
.hand-area.top{top:clamp(50px,8vh,80px);left:50%;transform:translateX(-50%);flex-direction:row}
.hand-area.left{left:18px;top:50%;transform:translateY(-50%);flex-direction:column}
.hand-area.right{right:18px;top:50%;transform:translateY(-50%);flex-direction:column}
.hand-cards{display:flex;gap:1px}
.hand-area.left .hand-cards,.hand-area.right .hand-cards{flex-direction:column}
.hand-area.top .hand-cards,.hand-area.bottom .hand-cards{flex-direction:row}
.hand-area.left .hand-cards .tile,.hand-area.right .hand-cards .tile{
  width:clamp(30px,5vw,42px);height:clamp(42px,7vw,58px);
}

/* ---- 副露区 ---- */
.meld-zone{display:flex;gap:2px;margin:0 6px}
.meld-zone .tile{
  width:clamp(28px,4.5vw,38px);height:clamp(38px,6.5vw,52px);
  cursor:default;box-shadow:1px 2px 4px rgba(0,0,0,.3);
}
.meld-zone .tile:hover{transform:none;box-shadow:1px 2px 4px rgba(0,0,0,.3)}
.meld-zone .tile::after{display:none}
.meld-zone.bottom{position:absolute;bottom:clamp(52px,8vh,70px);left:50%;transform:translateX(-50%)}
.meld-zone.top{position:absolute;top:clamp(92px,13vh,120px);left:50%;transform:translateX(-50%)}
.meld-zone.left{position:absolute;left:66px;top:50%;transform:translateY(-50%);flex-direction:column}
.meld-zone.right{position:absolute;right:66px;top:50%;transform:translateY(-50%);flex-direction:column}

/* ---- 弃牌区 ---- */
.discard-zone{
  position:absolute;display:flex;flex-wrap:wrap;gap:1px;
  max-width:280px;justify-content:center;z-index:2;
}
.discard-zone .tile{
  width:clamp(22px,3.5vw,30px);height:clamp(30px,5vw,42px);
  cursor:default;margin:1px;border-radius:4px;
  box-shadow:1px 2px 3px rgba(0,0,0,.35);
  background:linear-gradient(180deg,#f8f2e4,#e8dcbb);
}
.discard-zone .tile:hover{transform:none;box-shadow:1px 2px 3px rgba(0,0,0,.35)}
.discard-zone .tile::after{display:none}
.discard-zone .tile::before{animation:none}
.discard-zone.bottom{bottom:clamp(32px,5vh,50px);left:50%;transform:translateX(-50%)}
.discard-zone.top{top:clamp(110px,16vh,140px);left:50%;transform:translateX(-50%)}
.discard-zone.left{left:82px;top:50%;transform:translateY(-50%);max-width:80px}
.discard-zone.right{right:82px;top:50%;transform:translateY(-50%);max-width:80px}

/* ---- 粒子画布 ---- */
#fxCanvas{position:fixed;inset:0;z-index:30;pointer-events:none}

/* ---- 浮动文字 ---- */
.float-text{
  position:fixed;z-index:35;pointer-events:none;
  font:bold clamp(18px,4vw,28px) "Microsoft YaHei","PingFang SC",sans-serif;
  animation:floatUp .8s ease-out forwards;white-space:nowrap;
  text-shadow:0 0 14px currentColor;
}
@keyframes floatUp{
  0%{opacity:1;transform:translate(-50%,0) scale(.5)}
  30%{opacity:1;transform:translate(-50%,-30px) scale(1.2)}
  100%{opacity:0;transform:translate(-50%,-85px) scale(1)}
}

/* ---- 顶栏 ---- */
.top-bar{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);
  z-index:20;display:flex;gap:8px;align-items:center;
  flex-wrap:wrap;justify-content:center;
}
.badge{
  background:rgba(20,10,5,.7);backdrop-filter:blur(6px);
  color:#d5c8a8;padding:5px 12px;border-radius:14px;
  font-size:12px;white-space:nowrap;
  border:1px solid rgba(180,140,80,.15);
}
.badge.gold{color:#ffd700;border-color:rgba(255,215,0,.25)}
.badge.danger{color:#ff6b6b}
.badge.info{color:#7ec8ff}
.badge.warn{color:#ffa040}

/* ---- 回合指示器 ---- */
.turn-indicator{
  position:fixed;z-index:20;
  font:bold 14px "Microsoft YaHei","PingFang SC",sans-serif;
  color:#ffd700;text-shadow:0 0 14px rgba(255,215,0,.5);
  pointer-events:none;
}
.turn-indicator.bottom{bottom:14px;left:50%;transform:translateX(-50%)}
.turn-indicator.top{top:42px;left:50%;transform:translateX(-50%)}
.turn-indicator.left{left:8px;top:50%}
.turn-indicator.right{right:8px;top:50%}

/* ---- 按钮 —— 木纹质感 ---- */
.btn-bar{
  position:fixed;bottom:3px;left:50%;transform:translateX(-50%);
  z-index:20;display:flex;gap:5px;flex-wrap:wrap;justify-content:center;
}
.btn{
  padding:9px 15px;border:none;border-radius:10px;
  font:bold 13px "Microsoft YaHei","PingFang SC",sans-serif;
  cursor:pointer;transition:.15s;letter-spacing:1px;
  min-width:44px;box-shadow:0 3px 6px rgba(0,0,0,.35);
}
.btn:active{transform:scale(.93)}
.btn-start{
  background:linear-gradient(180deg,#f0a020,#c8700a);
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3);
  box-shadow:0 3px 8px rgba(200,120,20,.4);
}
.btn-action{
  background:linear-gradient(180deg,#5a8c3e,#3a6028);
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3);
}
.btn-action:disabled{background:#3a3028;color:#665;cursor:not-allowed;box-shadow:none}
.btn-special{
  background:linear-gradient(180deg,#c43830,#8a1a1a);
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3);
}
.btn-special:disabled{background:#3a3028;color:#665;cursor:not-allowed;box-shadow:none}
.btn-gang{
  background:linear-gradient(180deg,#6a3fc0,#3a1878);
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3);
}
.btn-gang:disabled{background:#3a3028;color:#665;cursor:not-allowed;box-shadow:none}
.btn-pass{
  background:linear-gradient(180deg,#6a7268,#3a3e36);
  color:#ddd;
}
.btn-pass:disabled{background:#3a3028;color:#665;cursor:not-allowed;box-shadow:none}
.btn-set{
  background:rgba(180,140,80,.12);color:#c8b898;
  border:1px solid rgba(180,140,80,.2);
}

/* ---- 提示 ---- */
.tip{
  position:fixed;top:46%;left:50%;transform:translate(-50%,-50%);
  z-index:30;
  background:rgba(10,5,0,.9);backdrop-filter:blur(10px);
  color:#ffd700;padding:14px 30px;border-radius:12px;
  font:bold 18px "Microsoft YaHei","PingFang SC",sans-serif;
  pointer-events:none;opacity:0;transition:opacity .2s;
  border:1px solid rgba(200,150,60,.25);
  text-shadow:0 0 10px rgba(255,215,0,.3);
}
.tip.show{opacity:1}
/* sponsor & nav */
.sponsor-corner{position:fixed;bottom:10px;left:10px;z-index:55;pointer-events:auto}
.sponsor-corner a{color:#998866;font:11px "Microsoft YaHei",sans-serif;text-decoration:none;padding:5px 10px;background:rgba(20,10,5,.8);border:1px solid rgba(200,160,100,.2);border-radius:6px;transition:.2s;margin-right:8px}
.sponsor-corner a:hover{color:#e0b860;border-color:#c89840}

/* ---- 遮罩 & 面板 木纹+金边 ---- */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.65);backdrop-filter:blur(3px);
  z-index:50;display:none;justify-content:center;align-items:center;
}
.overlay.show{display:flex}
.panel{
  background:linear-gradient(180deg,#2a1a0e,#1a0d05);
  border:2px solid #c89840;border-radius:16px;
  padding:24px 28px;color:#d5c8a8;min-width:320px;
  box-shadow:
    0 16px 48px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(255,255,255,.03);
}
.panel h3{color:#e0b860;text-align:center;margin-bottom:14px;font-size:18px;letter-spacing:3px}
.row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;gap:8px}
.row select{
  padding:4px 8px;border-radius:4px;border:1px solid #5a4a30;
  background:#1a0d05;color:#d5c8a8;max-width:160px;font-size:12px;
}
.row input[type=number]{
  width:50px;padding:4px;text-align:center;border-radius:4px;
  border:1px solid #5a4a30;background:#1a0d05;color:#d5c8a8;
}
.row input[type=checkbox]{accent-color:#c89840;width:16px;height:16px}
.panel .btn-row{display:flex;gap:8px;margin-top:14px}
.panel .btn-row button{
  flex:1;padding:10px;
  background:linear-gradient(180deg,#c89840,#8a6020);
  border:none;border-radius:8px;color:#fff;
  font:bold 14px "Microsoft YaHei","PingFang SC",sans-serif;
  cursor:pointer;text-shadow:0 1px 2px rgba(0,0,0,.3);
}

/* ---- 定缺选择器 ---- */
.que-panel{
  background:linear-gradient(180deg,#1e0e04,#0d0500);
  border:3px solid #c89840;border-radius:20px;
  padding:30px 36px;color:#d5c8a8;text-align:center;
  min-width:340px;max-width:92vw;
  box-shadow:
    0 24px 64px rgba(0,0,0,.75),
    0 0 48px rgba(200,152,64,.12);
}
.que-panel h3{color:#e0b860;font-size:28px;margin-bottom:8px;letter-spacing:8px}
.que-sub{color:#988860;font-size:13px;margin-bottom:20px}
.que-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:14px}
.que-btn{
  flex:1;min-width:90px;padding:18px 20px;
  border:2px solid rgba(200,152,64,.2);border-radius:14px;
  background:rgba(200,152,64,.05);color:#c8b898;
  font:bold 18px "Microsoft YaHei","PingFang SC",sans-serif;
  cursor:pointer;transition:.2s;letter-spacing:2px;
}
.que-btn:hover{
  border-color:#c89840;
  background:rgba(200,152,64,.14);
  color:#e0b860;
  transform:translateY(-3px);
  box-shadow:0 10px 28px rgba(200,152,64,.18);
}
.que-btn:active{transform:scale(.95)}
.que-btn.tong:hover{border-color:#5a8c3e;color:#7cbf5a;box-shadow:0 10px 28px rgba(90,140,62,.2)}
.que-btn.tiao:hover{border-color:#c43830;color:#e85a52;box-shadow:0 10px 28px rgba(196,56,48,.2)}
.que-btn.wan:hover{border-color:#448aff;color:#6aadff;box-shadow:0 10px 28px rgba(68,138,255,.2)}
.que-hint{color:#6a5030;font-size:11px}

/* ---- 结算面板 ---- */
.over-panel{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:40;
  background:linear-gradient(180deg,rgba(20,10,5,.97),rgba(10,4,0,.97));
  border:2px solid #e0b860;border-radius:20px;
  padding:28px 32px;color:#d5c8a8;text-align:center;
  display:none;min-width:320px;max-width:92vw;
  box-shadow:
    0 24px 64px rgba(0,0,0,.65),
    0 0 64px rgba(224,184,96,.1),
    inset 0 1px 0 rgba(255,255,255,.03);
}
.over-panel.show{
  display:block;
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{
  0%{transform:translate(-50%,-50%) scale(.7) rotate(-4deg);opacity:0}
  60%{transform:translate(-50%,-50%) scale(1.03) rotate(.5deg);opacity:1}

// 环境音 — 微弱的茶室背景
function startAmbience() {
  if (!audioCtx || !settings.soundOn || ambiencePlaying) return;
  ambiencePlaying = true;
  function loop() {
    if (!ambiencePlaying) return;
    const t = audioCtx.currentTime;
    // 低频环境音
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = 60 + Math.random() * 30;
    g.gain.setValueAtTime(.003, t);
    g.gain.exponentialRampToValueAtTime(.001, t + 1.5);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t); o.stop(t + 1.5);
    setTimeout(loop, 1500 + Math.random() * 2000);
  }
  loop();
}
function stopAmbience() { ambiencePlaying = false; }

function spawnRingWave(x, y, color, radius=120, count=20, life=.5) {
  for (let i = 0; i < count; i++) {

    particles.push({

      life, maxLife: life, color, size: 2.5, ring: true, ringAngle: angle, ringRadius: 10, ringSpeed: radius / life
    });

}

function spawnSparkles(x, y, color, count=8, spread=40, life=.35) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2, speed = 30 + Math.random() * spread;
    particles.push({
      x: x + (Math.random() - .5) * 20, y: y + (Math.random() - .5) * 10,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 20,
      life, maxLife: life, color, size: 1 + Math.random() * 2, sparkle: true
    });
  }
  if (!fxRAF) fxRAF = requestAnimationFrame(animateParticles);

function animateParticles(ts) {
  fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
  const dt = Math.min(.05, 1 / 60);
  particles = particles.filter(p => {
    if (p.ring) {
      // Ring wave: expand outward from center
      p.ringRadius += p.ringSpeed * dt;
      p.x += Math.cos(p.ringAngle) * p.ringSpeed * dt;
      p.y += Math.sin(p.ringAngle) * p.ringSpeed * dt;
    } else {
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 120 * dt;
    }
    p.life -= dt;
    if (p.life <= 0) return false;
    const alpha = p.life / p.maxLife;
    fxCtx.globalAlpha = alpha;
    fxCtx.fillStyle = p.color;
    if (p.sparkle) {
      // Star shape for sparkles
      const sz = p.size * alpha * 2;
      fxCtx.save(); fxCtx.translate(p.x, p.y);
      fxCtx.rotate(p.life * 8);
      fxCtx.beginPath();
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI * 2;
        fxCtx.lineTo(Math.cos(a) * sz, Math.sin(a) * sz);
        fxCtx.lineTo(Math.cos(a + Math.PI/4) * sz * .35, Math.sin(a + Math.PI/4) * sz * .35);
      }
      fxCtx.closePath(); fxCtx.fill();
      fxCtx.restore();
    } else {
      fxCtx.beginPath(); fxCtx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2); fxCtx.fill();
    }
    return true;
  });
  fxCtx.globalAlpha = 1;
  fxRAF = particles.length > 0 ? requestAnimationFrame(animateParticles) : null;
}

// Screen shake
let shakeTimer = null;
function shakeScreen(intensity=6, dur=300) {
  if (!settings.fxOn) return;
  clearTimeout(shakeTimer);
  const body = document.body, start = performance.now();
  (function shake(ts) {
    const elapsed = ts - start, decay = 1 - elapsed / dur;
    if (decay <= 0) { body.style.transform = ''; return; }
    const s = intensity * decay;
    body.style.transform = `translate(${(Math.random() - .5) * s * 2}px, ${(Math.random() - .5) * s * 2}px)`;
    shakeTimer = setTimeout(() => requestAnimationFrame(shake), 16);
  })(start);
}

// ==================== TILE FACE RENDERER ====================
const tileFaces = {};

function getPositions(n) {
  // Traditional mahjong dot/stick arrangement for each number
  const cy = TH * .52, cx = TW/2;
  const r1 = TH * .12, r2 = TH * .22;
  if (n === 1) return [[cx, cy]];
  if (n === 2) return [[cx, cy - r1], [cx, cy + r1]];
  if (n === 3) return [[cx, cy - r2], [cx, cy], [cx, cy + r2]];
  if (n === 4) return [[cx - r1, cy - r1], [cx + r1, cy - r1], [cx - r1, cy + r1], [cx + r1, cy + r1]];
  if (n === 5) return [[cx - r1, cy - r1], [cx + r1, cy - r1], [cx, cy], [cx - r1, cy + r1], [cx + r1, cy + r1]];
  if (n === 6) return [[cx - r1, cy - r1], [cx + r1, cy - r1], [cx - r1, cy], [cx + r1, cy], [cx - r1, cy + r1], [cx + r1, cy + r1]];
  if (n === 7) {
    const r3 = TH * .07;
    return [[cx - r1, cy - r1 - r3], [cx + r1, cy - r1 - r3], [cx, cy - r3],
            [cx - r1, cy + r3], [cx + r1, cy + r3],
            [cx - r1, cy + r1 + r3], [cx + r1, cy + r1 + r3]];
  }
  if (n === 8) {
    const r3 = TH * .06;
    return [[cx - r1, cy - r1 - r3], [cx + r1, cy - r1 - r3],
            [cx - r1, cy - r3], [cx + r1, cy - r3],
            [cx - r1, cy + r3], [cx + r1, cy + r3],
            [cx - r1, cy + r1 + r3], [cx + r1, cy + r1 + r3]];
  }
  // 9: 3×3 grid
  const g = TH * .13;
  const pts = [];
  for (let r = -1; r <= 1; r++) for (let c = -1; c <= 1; c++) pts.push([cx + c * g * 2, cy + r * g * 2]);
  return pts;
}

function drawWan(ctx, n) {

function drawBambooStick(ctx, x, y) {
  const hh = TH * .07, hw = 4;
  // 现代翠绿竹节
  const grd = ctx.createLinearGradient(x - hw, y, x + hw, y);
  grd.addColorStop(0, '#1A6B3C');
  grd.addColorStop(.3, '#28A85C');
  grd.addColorStop(.5, '#34C46A');
  grd.addColorStop(.7, '#28A85C');
  grd.addColorStop(1, '#1A6B3C');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.moveTo(x - hw, y - hh);
  ctx.quadraticCurveTo(x - hw, y - hh - 2, x, y - hh - 2);
  ctx.quadraticCurveTo(x + hw, y - hh - 2, x + hw, y - hh);
  ctx.lineTo(x + hw, y + hh);
  ctx.quadraticCurveTo(x + hw, y + hh + 2, x, y + hh + 2);
  ctx.quadraticCurveTo(x - hw, y + hh + 2, x - hw, y + hh);
  ctx.closePath(); ctx.fill();

  // 竹节环
  ctx.strokeStyle = '#0F4A28'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(x - hw - 0.5, y - hh + 7); ctx.lineTo(x + hw + 0.5, y - hh + 7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x - hw - 0.5, y + hh - 7); ctx.lineTo(x + hw + 0.5, y + hh - 7); ctx.stroke();

  // 高光
  ctx.strokeStyle = 'rgba(255,255,255,.2)'; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(x - 1.5, y - hh + 3); ctx.lineTo(x - 1.5, y + hh - 3); ctx.stroke();
}

function drawTiao(ctx, n) {
  if (n === 1) {
    // 幺鸡 — 现代简洁雀鸟
    const cx = TW/2, cy = TH * .47;
    // 身体
    const bodyGrd = ctx.createLinearGradient(cx - 12, cy, cx + 12, cy);
    bodyGrd.addColorStop(0, '#1A6B3C');
    bodyGrd.addColorStop(.4, '#34C46A');
    bodyGrd.addColorStop(.6, '#34C46A');
    bodyGrd.addColorStop(1, '#1A6B3C');
    ctx.fillStyle = bodyGrd;
    ctx.beginPath();
    ctx.ellipse(cx, cy + 2, 13, 19, 0, 0, Math.PI*2);
    ctx.fill();

    // 翅膀
    ctx.fillStyle = '#16803C';
    ctx.beginPath();
    ctx.ellipse(cx - 3, cy + 4, 8, 13, -.2, 0, Math.PI*2);
    ctx.fill();

    // 头部
    ctx.fillStyle = '#28A85C';
    ctx.beginPath(); ctx.arc(cx, cy - 20, 8, 0, Math.PI*2); ctx.fill();

    // 眼睛
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(cx + 3, cy - 22, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx + 4, cy - 23, 0.8, 0, Math.PI*2); ctx.fill();

    // 喙
    ctx.fillStyle = '#E8553D';
    ctx.beginPath();
    ctx.moveTo(cx + 10, cy - 21);
    ctx.lineTo(cx + 16, cy - 18);
    ctx.lineTo(cx + 10, cy - 17);
    ctx.closePath(); ctx.fill();

    // 尾羽
    ctx.strokeStyle = '#16803C'; ctx.lineWidth = 2;
    [ -1, 0, 1 ].forEach(i => {
      ctx.beginPath();
      ctx.moveTo(cx - 8, cy + 15);
      ctx.quadraticCurveTo(cx - 13 - i*4, cy + 25, cx - 7 - i*6, cy + 29);
      ctx.stroke();
    });

    // 爪
    ctx.strokeStyle = '#E8553D'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(cx - 2, cy + 18); ctx.lineTo(cx - 4, cy + 25); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + 3, cy + 18); ctx.lineTo(cx + 5, cy + 25); ctx.stroke();

    ctx.fillStyle = '#1A6B3C';
    ctx.font = 'bold 10px "KaiTi","STKaiti","楷体","Microsoft YaHei",serif';
    ctx.fillText('幺鸡', TW/2, TH * .88);
  } else {
    const pts = getPositions(n);
    pts.forEach(([x, y]) => drawBambooStick(ctx, x, y));
  }
}

function drawTong(ctx, n) {
  const pts = getPositions(n);
  pts.forEach(([x, y]) => {
    const outerR = TH * .105;
    // 外圈 — 深蓝色
    ctx.beginPath(); ctx.arc(x, y, outerR, 0, Math.PI*2);
    ctx.strokeStyle = '#1A3A6A'; ctx.lineWidth = 3.2; ctx.stroke();

    // 内圈 — 中蓝色
    ctx.beginPath(); ctx.arc(x, y, outerR * .6, 0, Math.PI*2);
    ctx.strokeStyle = '#2A5AAA'; ctx.lineWidth = 1.5; ctx.stroke();

    // 中心圆
    ctx.beginPath(); ctx.arc(x, y, outerR * .2, 0, Math.PI*2);
    ctx.fillStyle = '#1A3A6A'; ctx.fill();

    // 高光点
    ctx.beginPath(); ctx.arc(x - outerR*.1, y - outerR*.1, outerR*.07, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(120,170,230,.4)'; ctx.fill();
  });
}

function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

function tileFace(card) {
  if (tileFaces[card]) return tileFaces[card];
  const c = document.createElement('canvas'); c.width = TW; c.height = TH;
  const ctx = c.getContext('2d');
  const n = parseInt(card);
  const suit = card.slice(-1);

  // 欢乐麻将风格：明亮现代牌面
  const bg = ctx.createLinearGradient(0, 0, 0, TH);
  bg.addColorStop(0, '#FFFFFF');
  bg.addColorStop(.3, '#FEFEFC');
  bg.addColorStop(.5, '#FCFAF5');
  bg.addColorStop(1, '#F5F2E8');
  ctx.fillStyle = bg;
  rrect(ctx, 0, 0, TW, TH, 5); ctx.fill();

  // 边框 — 深色精致边框
  ctx.strokeStyle = '#8B7355'; ctx.lineWidth = 2;
  rrect(ctx, 3, 3, TW-6, TH-6, 4); ctx.stroke();
  // 内线
  ctx.strokeStyle = '#C4B99A'; ctx.lineWidth = 0.8;
  rrect(ctx, 7, 7, TW-14, TH-14, 3); ctx.stroke();

  // 中央微凸高光
  const hl = ctx.createRadialGradient(TW/2, TH*.33, TW*.03, TW/2, TH/2, TW*.5);
  hl.addColorStop(0, 'rgba(255,255,255,.35)');
  hl.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hl;
  rrect(ctx, 8, 8, TW-16, TH-16, 3); ctx.fill();

  if (suit === '万') drawWan(ctx, n);
  else if (suit === '条') drawTiao(ctx, n);
  else drawTong(ctx, n);

  return tileFaces[card] = c.toDataURL();
}

// ==================== TILE COUNT VERIFICATION ====================
function verifyTileCount(uid) {
  let total = hands[uid].length;
  let gangCount = 0;
  for (const m of melds[uid]) {
    if (m.type === 'angang' || m.type === 'minggang' || m.type === 'jiagang') {
      total += 4;
      gangCount++;
    } else {
      total += 3;
    }
  }
  const expected = 13 + gangCount;
  if (total !== expected) {
    console.warn(`Player ${uid} tile count mismatch: ${total} vs expected ${expected} (hand:${hands[uid].length}, melds:${melds[uid].length}, gangs:${gangCount})`);
  }
  return total === expected;
}

// ==================== HU CHECKING ====================
function getMeldCount(uid) { return melds[uid].length; }

// Check if a HIDDEN hand (with meldCount already-satisfied melds) can win
// meldCount: number of existing exposed melds (peng/gang) that are already counted
function canHu(hand, meldCount=0) {
  const remainingMelds = 4 - meldCount;
  const expectedLen = remainingMelds * 3 + 2;
  if (hand.length !== expectedLen) return false;
  const cnt = {};
  hand.forEach(c => cnt[c] = (cnt[c] || 0) + 1);
  for (const c in cnt) {
    if (cnt[c] >= 2) {
      cnt[c] -= 2;
      if (checkMelds(cnt)) { cnt[c] += 2; return true; }
      cnt[c] += 2;
    }
  }
  return false;
}

function checkMelds(cnt) {
  const keys = Object.keys(cnt).filter(k => cnt[k] > 0);
  if (keys.length === 0) return true;
  const first = keys[0], n = cardNum(first), s = cardSuit(first);
  if (cnt[first] >= 3) {
    cnt[first] -= 3; if (checkMelds(cnt)) { cnt[first] += 3; return true; } cnt[first] += 3;
  }
  if (n <= 7) {
    const c2 = (n+1) + SUITS[s], c3 = (n+2) + SUITS[s];
    if (cnt[c2] && cnt[c3]) {
      cnt[first]--; cnt[c2]--; cnt[c3]--;
      if (checkMelds(cnt)) { cnt[first]++; cnt[c2]++; cnt[c3]++; return true; }
      cnt[first]++; cnt[c2]++; cnt[c3]++;
    }
  }
  return false;
}

function canPeng(hand, card) { return hand.filter(c => c === card).length >= 2; }
function canMingGang(hand, card) { return hand.filter(c => c === card).length >= 3; }
function canAnGang(hand) {
  const cnt = {}; hand.forEach(c => cnt[c] = (cnt[c]||0) + 1);
  return Object.entries(cnt).filter(([,n]) => n === 4).map(([c]) => c);
}
function canJiaGang(uid) {
  return melds[uid].filter(m => m.type === 'peng' && hands[uid].includes(m.card)).map(m => m.card);
}

// Check if player is 下叫 (ready hand) — one tile away from winning
function canTingPai(uid) {
  const mc = getMeldCount(uid);
  const hand = [...hands[uid]];
  // After discarding, hand should be: 13 - 3*mc tiles
  // Adding one more tile makes: 14 - 3*mc = (4-mc)*3 + 2 = expected canHu length
  for (const s of ['万','条','筒']) {
    for (let n = 1; n <= 9; n++) {
      const test = n + s;
      if (canHu([...hand, test], mc)) return true;
    }
  }
  return false;
}
function queYiMen(uid) {
  // 缺一门: the declared queMen suit must have 0 cards remaining
  if (!queMen[uid]) return false;
  const handCards = [...hands[uid]];
  const meldCards = melds[uid].flatMap(m => {
    const cnt = m.type.includes('gang') ? 4 : 3;
    return Array(cnt).fill(m.card);
  });
  const allCards = [...handCards, ...meldCards];
  return !allCards.some(c => cardSuit(c) === queMen[uid]);
}

// ==================== FAN CALCULATION ====================
function hasAllTriplets(uid) {
  // Check if hand + melds form all triplets (对对胡 form)
  const h = hands[uid], cnt = {};
  h.forEach(c => cnt[c] = (cnt[c] || 0) + 1);
  const pairs = Object.values(cnt).filter(v => v === 2).length;
  const triples = Object.values(cnt).filter(v => v >= 3).length;
  return pairs === 1 && (triples + melds[uid].length) * 3 + 2 === 14;
}

function countGen(uid) {
  // 根: each set of 4 identical tiles = +1 fan
  let gen = 0;
  // In melds
  melds[uid].forEach(m => { if (m.type.includes('gang')) gen++; });
  // In hand (4 copies not declared)
  const cnt = {};
  hands[uid].forEach(c => cnt[c] = (cnt[c] || 0) + 1);
  Object.values(cnt).forEach(v => { if (v === 4) gen++; });
  return gen;
}

function handSuits(uid) {
  const suits = new Set();
  hands[uid].forEach(c => suits.add(cardSuit(c)));
  melds[uid].forEach(m => suits.add(cardSuit(m.card)));
  return [...suits];
}

function isDuanYaoJiu(uid) {
  // 断幺九: no 1 or 9 in hand
  return !hands[uid].some(c => { const n = cardNum(c); return n === 1 || n === 9; }) &&
    !melds[uid].some(m => { const n = cardNum(m.card); return n === 1 || n === 9; });
}

function isDaiYaoJiu(uid) {
  // 带幺九: every group (meld + pair) contains 1 or 9
  // For sequences, the sequence must include 1 or 9: means 123 or 789
  // For triplets, the triplet card must be 1 or 9
  // For the pair, must be 1 or 9
  const h = [...hands[uid]];
  // This requires parsing the exact melds, too complex for simple check
  // Simplified: check all cards are 1/9 or adjacent to 1/9
  const allCards = [...h, ...melds[uid].flatMap(m => {
    const cnt = m.type.includes('gang') ? 4 : 3;
    return Array(cnt).fill(m.card);
  })];
  return allCards.every(c => {
    const n = cardNum(c);
    return n === 1 || n === 2 || n === 3 || n === 7 || n === 8 || n === 9;
  });
}

function isQiDui(uid) {
  // 七对: 7 pairs, no melds
  if (melds[uid].length > 0) return false;
  if (hands[uid].length !== 14) return false;
  const cnt = {};
  hands[uid].forEach(c => cnt[c] = (cnt[c] || 0) + 1);
  return Object.values(cnt).every(v => v === 2);
}

function isLongQiDui(uid) {
  // 龙七对: 七对 with at least one set of 4 (根 in pairs form)
  if (melds[uid].length > 0) return false;
  if (hands[uid].length !== 14) return false;
  const cnt = {};
  hands[uid].forEach(c => cnt[c] = (cnt[c] || 0) + 1);
  const vals = Object.values(cnt);
  if (!vals.every(v => v === 2 || v === 4)) return false;
  return vals.some(v => v === 4);
}

function isJiangDui(uid) {
  // 将对: all triplets of 2/5/8, pair is 2/5/8
  if (!hasAllTriplets(uid)) return false;
  const all = [...hands[uid], ...melds[uid].flatMap(m => {
    const cnt = m.type.includes('gang') ? 4 : 3;
    return Array(cnt).fill(m.card);
  })];
  return all.every(c => { const n = cardNum(c); return n === 2 || n === 5 || n === 8; });
}

function isQuanYaoJiu(uid) {
  // 全幺九: all triplets of 1/9, pair is 1/9
  if (!hasAllTriplets(uid)) return false;
  const all = [...hands[uid], ...melds[uid].flatMap(m => {
    const cnt = m.type.includes('gang') ? 4 : 3;
    return Array(cnt).fill(m.card);
  })];
  return all.every(c => { const n = cardNum(c); return n === 1 || n === 9; });
}

function calculateFan(uid, isSelfDraw, isQiangGang, isGangShangKai, isHaiDi,
                      isTianHu=false, isDiHu=false, isRenHu=false, isGangShangPao=false) {
  let baseFan = 1; // Default: 平胡
  const qingYiSe = handSuits(uid).length === 1;
  const duiDuiHu = hasAllTriplets(uid);
  const qiDui = isQiDui(uid);
  const longQiDui = isLongQiDui(uid);
  const duanYao = isDuanYaoJiu(uid);

  // Determine base fan from hand type (use highest matching)
  if (qingYiSe && longQiDui) baseFan = 16;      // 清龙七对
  else if (isTianHu) baseFan = 16;               // 天胡
  else if (isDiHu) baseFan = 16;                 // 地胡
  else if (isRenHu) baseFan = 16;                // 人胡
  else if (qingYiSe && qiDui) baseFan = 8;       // 清七对
  else if (qingYiSe && duiDuiHu) baseFan = 8;    // 清对
  else if (longQiDui) baseFan = 8;               // 龙七对
  else if (isJiangDui(uid)) baseFan = 8;         // 将对
  else if (isQuanYaoJiu(uid)) baseFan = 8;       // 全幺九
  else if (qingYiSe) baseFan = 4;                // 清一色
  else if (qiDui) baseFan = 4;                   // 小七对
  else if (duiDuiHu) baseFan = 2;                // 对对胡
  else if (isDaiYaoJiu(uid) && !duanYao) baseFan = 2; // 带幺九
  else if (duanYao) baseFan = 1;                 // 断幺九
  // else baseFan = 1; // 平胡

  let totalFan = baseFan;

  // Additional +1 fan each
  const gen = countGen(uid);
  totalFan += gen;

  if (isSelfDraw && settings.selfDrawFan) totalFan += 1;
  if (isQiangGang) totalFan += 1;
  if (isGangShangKai) totalFan += 1;
  if (isGangShangPao) totalFan += 1;            // 杠上炮：+1番
  if (isHaiDi && isSelfDraw) totalFan += 1;    // 海底捞月
  if (isHaiDi && !isSelfDraw) totalFan += 1;   // 海底炮

  return { fan: totalFan, baseType: baseFan, gen, isSelfDraw, isQiangGang, isGangShangKai, isGangShangPao, isHaiDi,
           qingYiSe, duiDuiHu, qiDui, longQiDui, isTianHu, isDiHu, isRenHu,
           isDuanYaoJiu: duanYao, isDaiYaoJiu: isDaiYaoJiu(uid) && !duanYao, isJiangDui: isJiangDui(uid), isQuanYaoJiu: isQuanYaoJiu(uid) };
}

function getFanName(result) {
  const fan = typeof result === 'object' ? result : { fan: result };
  const f = fan.fan;
  const parts = [];
  if (fan.isTianHu) parts.push('天胡');
  else if (fan.isDiHu) parts.push('地胡');
  else if (fan.isRenHu) parts.push('人胡');
  else if (fan.qingYiSe && fan.longQiDui) parts.push('清龙七对');
  else if (fan.qingYiSe && fan.qiDui) parts.push('清七对');
  else if (fan.qingYiSe && fan.duiDuiHu) parts.push('清对');
  else if (fan.longQiDui) parts.push('龙七对');
  else if (fan.qiDui) parts.push('小七对');
  else if (fan.qingYiSe) parts.push('清一色');
  else if (fan.duiDuiHu) parts.push('对对胡');
  else parts.push('平胡');

  if (fan.gen > 0) parts.push(fan.gen + '根');
  if (fan.isSelfDraw && settings.selfDrawFan) parts.push('自摸');
  if (fan.isQiangGang) parts.push('抢杠');
  if (fan.isGangShangKai) parts.push('杠上花');
  if (fan.isGangShangPao) parts.push('杠上炮');
  if (fan.isHaiDi === true) parts.push('海底');

  return { name: parts.join('·'), fan: f };
}

function getFanBreakdown(result) {
  const lines = [];
  // Base fan type
  if (result.isTianHu) lines.push('天胡 16番');
  else if (result.isDiHu) lines.push('地胡 16番');
  else if (result.isRenHu) lines.push('人胡 16番');
  else if (result.qingYiSe && result.longQiDui) lines.push('清龙七对 16番');
  else if (result.qingYiSe && result.qiDui) lines.push('清七对 8番');
  else if (result.qingYiSe && result.duiDuiHu) lines.push('清对 8番');
  else if (result.longQiDui) lines.push('龙七对 8番');
  else if (result.isJiangDui) lines.push('将对 8番');
  else if (result.isQuanYaoJiu) lines.push('全幺九 8番');
  else if (result.qingYiSe) lines.push('清一色 4番');
  else if (result.qiDui) lines.push('小七对 4番');
  else if (result.duiDuiHu) lines.push('对对胡 2番');
  else if (result.isDaiYaoJiu) lines.push('带幺九 2番');
  else if (result.isDuanYaoJiu) lines.push('断幺九 1番');
  else lines.push('平胡 1番');

  // Additional fan
  if (result.gen > 0) lines.push('+根 x' + result.gen + ' = +' + result.gen + '番');
  if (result.isSelfDraw && settings.selfDrawFan) lines.push('+自摸 +1番');
  if (result.isQiangGang) lines.push('+抢杠 +1番');
  if (result.isGangShangKai) lines.push('+杠上花 +1番');
  if (result.isGangShangPao) lines.push('+杠上炮 +1番');
  if (result.isHaiDi) lines.push('+海底 +1番');

  lines.push('——');
  const perPayer = settings.baseScore * Math.pow(2, result.fan - 1);
  lines.push('合计 ' + result.fan + '番 · 每家' + perPayer + '分');
  return lines.join('\n');
}

// ==================== RENDERING ====================
function renderTileHTML(card, cls='') {
  return `<div class="tile ${cls}"><img src="${tileFace(card)}" alt="${card}"></div>`;
}
function renderBackHTML() { return '<div class="tile back"></div>'; }

function renderAll() {
  for (let i = 0; i < 4; i++) {
    // Hand
    if (i === 0) {
      handDoms[i].innerHTML = hands[i].map((c, j) => {
        // 缺牌深色提醒：que men suit tiles are dimmed
        const dim = queMen[0] && cardSuit(c) === queMen[0] ? ' dim' : '';
        return renderTileHTML(c, (j === selIdx ? 'selected' : '') + dim);
      }).join('');
      handDoms[i].querySelectorAll('.tile').forEach((el, j) => {
        el.onclick = (e) => selectCard(j, e);
      });
    } else {
      handDoms[i].innerHTML = renderBackHTML().repeat(hands[i].length);
    }

    // Melds
    meldDoms[i].innerHTML = melds[i].map(m => {
      const cnt = (m.type === 'angang' || m.type === 'minggang' || m.type === 'jiagang') ? 4 : 3;
      const cls = m.type.includes('gang') ? 'meld-gang' : 'meld-peng';
      return Array(cnt).fill(0).map(() => renderTileHTML(m.card, cls)).join('');
    }).join('');

    // Discards
    discardDoms[i].innerHTML = discards[i].map(c => renderTileHTML(c)).join('');

    // Turn indicator with player name
    const name = PLAYER_NAMES[i];
    const qm = queMen[i] ? ' 缺' + queMen[i] : '';
    turnDoms[i].textContent = (running && turn === i && !exited[i]) ? name + '▼' + qm : (exited[i] ? name + '✓' + qm : name + (queMen[i] ? ' 缺' + queMen[i] : ''));
    turnDoms[i].style.color = exited[i] ? '#4caf50' : (turn === i ? '#ffd700' : '#888');
  }
  // Score badges with player names
  for (let i = 0; i < 4; i++) {
    scoreBadges[i].textContent = PLAYER_NAMES[i] + ': ' + scores[i];
    if (i === 0) scoreBadges[i].classList.add('gold'); else scoreBadges[i].classList.remove('gold');
  }
  $('remainBadge').textContent = '牌:' + deck.length;
  if (running && lastDropper >= 0 && lastCard) {
    $('windBadge').style.display = 'inline';
    $('windBadge').textContent = PLAYER_NAMES[lastDropper] + '出' + lastCard;
  } else {
    $('windBadge').style.display = 'none';
  }
}

// ==================== UI HELPERS ====================
function showTip(msg, dur=1800) {
  const t = $('tip'); t.innerHTML = msg.replace(/\n/g, '<br>'); t.classList.add('show');
  clearTimeout(tipTimer); tipTimer = setTimeout(() => t.classList.remove('show'), dur);
}
let tipTimer = null;

function updateButtons() {
  const isMyTurn = turn === 0 && running && !exited[0];
  const isReact = isMyTurn && turnPhase === 'react';
  const isDraw = isMyTurn && turnPhase === 'draw';
  const isDiscard = isMyTurn && turnPhase === 'discard';

  $('dropBtn').disabled = !((isDraw || isDiscard) && selIdx >= 0);
  $('pengBtn').disabled = !(isReact && lastDropper !== 0 && lastDropper !== -1 && canPeng(hands[0], lastCard));
  $('gangBtn').disabled = !(isReact && lastDropper !== 0 && lastDropper !== -1 && canMingGang(hands[0], lastCard));
  $('anGangBtn').disabled = !(isDraw && canAnGang(hands[0]).length > 0);
  $('jiaGangBtn').disabled = !(isDraw && canJiaGang(0).length > 0);
  $('huBtn').disabled = !(
    (isReact && lastDropper !== 0 && lastDropper !== -1 && canHu([...hands[0], lastCard], getMeldCount(0))) ||
    (isDraw && canHu(hands[0], getMeldCount(0)))
  );
  $('passBtn').disabled = !isReact;
}

// ==================== GAME FLOW ====================
function nextPlayer(uid) {
  const order = [0, 3, 1, 2];
  const idx = order.indexOf(uid);
  for (let i = 1; i <= 4; i++) {
    const next = order[(idx + i) % 4];
    if (!exited[next]) return next;
  }
  return -1;
}

function doDraw(uid) {
  if (deck.length === 0) { endGame('draw'); return; }
  hands[uid].push(deck.pop());
  sortHand(hands[uid]);
  if (settings.fxOn && uid === 0) {
    const hx = window.innerWidth/2, hy = window.innerHeight*.85;
    spawnDrawTrail(window.innerWidth*.85, 10, hx, hy);
    spawnSparkles(hx, hy, '#ffd700', 10, 50, .4);
    const glow = document.createElement('div');
    glow.className = 'draw-glow';
    glow.style.left = (hx - 30) + 'px';
    glow.style.top = (hy - 40) + 'px';
    document.body.appendChild(glow);
    setTimeout(() => glow.remove(), 650);
  }
}

function doReplaceDraw(uid) {
  // 杠后补张 from wall end (beginning of array)
  if (deck.length === 0) { endGame('draw'); return; }
  hands[uid].push(deck.shift());
  sortHand(hands[uid]);
}

function beginDrawPhase(uid) {
  turn = uid; selIdx = -1; turnPhase = 'draw';
  doDraw(uid); sfxDraw();
  // Carry gang-shang-pao flag forward: if previous action was gang replace,
  // the coming discard will be flagged as gang-shang-pao
  gangShangPaoFlag = gangShangKaiFlag;
  gangShangKaiFlag = false;
  turnsPlayed++;
  if (turnsPlayed > 4) firstRound = false;
  renderAll(); updateButtons();

  // Tian Hu check: dealer's first draw
  if (firstRound && turnsPlayed === 1 && uid === 0 && canHu(hands[0], getMeldCount(0))) {
    showTip('天胡！开局即胡！', 2500);
    doHu(0, -1, true, false, false, true);
    return;
  }
  // Di Hu check: non-dealer's first draw
  if (firstRound && uid !== 0 && canHu(hands[uid], getMeldCount(uid))) {
    // Check this is truly their first draw (turnsPlayed corresponds to their first draw)
    const dealerDraws = [0]; // player 0 drew at turn 1
    const nonDealerFirstDraws = {1: [2,3,4], 2: [2,3,4], 3: [2,3,4]};
    // Simplified: if firstRound and non-dealer can hu on draw, it's di hu
    // The non-dealer's first draw happens at turnsPlayed 2-4
    if (turnsPlayed >= 2 && turnsPlayed <= 4) {
      showTip(PLAYER_NAMES[uid] + '地胡！首摸即胡！', 2500);
      doHu(uid, -1, true, false, false, false, true);
      return;
    }
  }

  // Last 4 tiles rule: must hu if possible
  const isLast4 = deck.length <= 4;
  if (uid === 0) {
    if (isLast4 && canHu(hands[0], getMeldCount(0))) {
      showTip('海底最后4张！必须胡！', 2000);
      doHu(0, -1, true, false, false, false, false, false);
      return;
    }
    showTip(isLast4 ? '海底！最后' + deck.length + '张牌' : '你的回合 · 选牌出牌 / 暗杠 / 补杠 / 自摸');
  } else {
    disableAllButtons();
    if (isLast4 && canHu(hands[uid], getMeldCount(uid))) {
      aiDoHu(uid, -1, true);
      return;
    }
    const delay = aiDelay(400 + Math.random() * 400);
    setTimeout(() => aiDrawPhase(uid), delay);
  }
}

function beginDiscardOnly(uid) {
  // After peng — skip draw, go directly to discard (no gang flags)
  gangShangKaiFlag = false; gangShangPaoFlag = false;
  turn = uid; selIdx = -1; turnPhase = 'discard';
  renderAll(); updateButtons();

  if (uid === 0) {
    showTip('碰牌后 · 请选牌打出');
  } else {
    disableAllButtons();
    setTimeout(() => aiDoDiscard(uid), aiDelay(400 + Math.random() * 300));
  }
}

function beginGangReplace(uid) {
  // After gang — draw replacement from wall end, then discard
  gangShangKaiFlag = true;
  doReplaceDraw(uid);
  sfxDraw();
  turn = uid; selIdx = -1; turnPhase = 'discard';
  renderAll(); updateButtons();

  if (uid === 0) {
    showTip('杠后补张 · 请选牌打出（可杠上花自摸）');
  } else {
    disableAllButtons();
    setTimeout(() => aiDoDiscard(uid), aiDelay(400 + Math.random() * 300));
  }
}

function playerDoDiscard() {
  if (!running || turn !== 0 || exited[0] || (turnPhase !== 'draw' && turnPhase !== 'discard')) return;
  if (selIdx < 0) { showTip('请先点击选中一张手牌（双击快速出牌）'); return; }
  // Carry gang-shang-pao flag from gang replacement
  gangShangPaoFlag = gangShangKaiFlag;
  gangShangKaiFlag = false;
  const card = hands[0].splice(selIdx, 1)[0];
  discards[0].push(card);
  lastCard = card; lastDropper = 0;
  selIdx = -1; turnPhase = 'idle';
  sfxPlay(); speakCard(card);
  if (settings.fxOn) spawnDiscardTrail(window.innerWidth/2, window.innerHeight*.8, window.innerWidth/2, window.innerHeight*.08);
  trackCombo();
  firstRound = false;
  renderAll(); updateButtons();
  disableAllButtons();
  checkReactions(0, card);
}

function aiDoDiscard(uid) {
  if (!running || exited[uid]) return;
  // Check gang-shang-kai self-draw before discarding
  if (gangShangKaiFlag && canHu(hands[uid], getMeldCount(uid)) && Math.random() < AI_PROFILES[uid].aggression) {
    // Carry gangShangPaoFlag from gangShangKaiFlag
    gangShangPaoFlag = gangShangKaiFlag;
    gangShangKaiFlag = false;
    aiDoHu(uid, -1, true);
    return;
  }
  // Carry gang-shang-pao flag
  gangShangPaoFlag = gangShangKaiFlag;
  gangShangKaiFlag = false;
  const card = aiChooseDiscard(uid);
  hands[uid].splice(hands[uid].indexOf(card), 1);
  discards[uid].push(card);
  lastCard = card; lastDropper = uid;
  turnPhase = 'idle';
  sfxPlay(); speakCard(card);
  firstRound = false;
  renderAll();
  checkReactions(uid, card);
}

function checkReactions(dropper, card) {
  waitingReactions = true;
  turnPhase = 'react';

  // Check if player can react
  if (!exited[0] && dropper !== 0) {
    const testHand = [...hands[0], card];
    const canH = canHu(testHand, getMeldCount(0));
    const canP = canPeng(hands[0], card);
    const canG = canMingGang(hands[0], card);
    if (canH || canP || canG) {
      turn = 0;
      renderAll(); updateButtons();
      showTip('可操作！胡/碰/杠 或 点"过"跳过');
      setTimeout(() => {
        if (waitingReactions && turn === 0) {
          // Auto-pass after timeout
          playerPass();
        }
      }, 2500);
      return;
    }
  }

  // AI reactions
  setTimeout(() => {
    if (!waitingReactions) return;
    // Determine if this is gang-shang-pao (discard after gang replacement)
    const isGSP = gangShangPaoFlag;
    // Determine if this could be ren hu (first round, non-dealer hasn't drawn yet)
    const isFirstDiscard = firstRound;

    // Priority: Hu > Gang > Peng
    for (let i = 1; i < 4; i++) {
      if (exited[i] || i === dropper) continue;
      const testHand = [...hands[i], card];
      if (canHu(testHand, getMeldCount(i))) {
        const profile = AI_PROFILES[i];
        // Check ren hu: first discard, non-dealer hu
        const isRenHu = isFirstDiscard && i !== dropper;
        if (Math.random() < profile.aggression + (i === dropper ? .3 : 0) + (isGSP ? .4 : 0)) {
          aiDoHu(i, dropper, false, isGSP, isRenHu); return;
        }
      }
    }
    for (let i = 1; i < 4; i++) {
      if (exited[i] || i === dropper) continue;
      if (canMingGang(hands[i], card)) {
        const profile = AI_PROFILES[i];
        if (Math.random() < profile.gangLove) {
          aiDoMingGang(i, dropper, card); return;
        }
      }
    }
    for (let i = 1; i < 4; i++) {
      if (exited[i] || i === dropper) continue;
      if (canPeng(hands[i], card)) {
        const profile = AI_PROFILES[i];
        if (Math.random() < .5 + profile.aggression * .3) {
          aiDoPeng(i, dropper, card); return;
        }
      }
    }
    // Nobody reacted — next player's turn
    waitingReactions = false; turnPhase = 'idle';
    gangShangPaoFlag = false;
    const next = nextPlayer(dropper);
    if (next >= 0) beginDrawPhase(next);
    else endGame('done');
  }, aiDelay(500 + Math.random() * 300));
}

function disableAllButtons() {
  $('dropBtn').disabled = $('pengBtn').disabled = $('gangBtn').disabled = true;
  $('anGangBtn').disabled = $('jiaGangBtn').disabled = $('huBtn').disabled = $('passBtn').disabled = true;
}

// ==================== PLAYER ACTIONS ====================
function selectCard(idx, event) {
  if (!running || turn !== 0 || exited[0]) return;
  if (turnPhase !== 'draw' && turnPhase !== 'discard') return;

  const now = Date.now();
  // Double-click detection
  if (idx === lastClickIdx && (now - lastClickTime) < 350) {
    // Double click — select and discard immediately
    selIdx = idx;
    renderAll(); updateButtons();
    if ((turnPhase === 'draw' || turnPhase === 'discard') && selIdx >= 0) {
      playerDoDiscard();
    }
    lastClickTime = 0; lastClickIdx = -1;
    return;
  }
  lastClickTime = now;
  lastClickIdx = idx;

  const prev = selIdx;
  selIdx = (selIdx === idx) ? -1 : idx;
  if (selIdx >= 0 && selIdx !== prev) sfxClack();
  renderAll(); updateButtons();
}

function playerPass() {
  if (!running || turn !== 0 || turnPhase !== 'react') return;
  waitingReactions = false; turnPhase = 'idle';
  gangShangPaoFlag = false;
  renderAll(); updateButtons();
  speakSC('pass');
  showTip('过 · 等对家出牌');
  // Trigger AI reactions or next turn
  setTimeout(() => {
    if (waitingReactions) return;
    let processed = false;
    for (let i = 1; i < 4; i++) {
      if (exited[i] || i === lastDropper) continue;
      const testHand = [...hands[i], lastCard];
      if (canHu(testHand, getMeldCount(i)) && Math.random() < AI_PROFILES[i].aggression) {
        aiDoHu(i, lastDropper, false); processed = true; break;
      }
    }
    if (processed) return;
    for (let i = 1; i < 4; i++) {
      if (exited[i] || i === lastDropper) continue;
      if (canMingGang(hands[i], lastCard) && Math.random() < AI_PROFILES[i].gangLove) {
        aiDoMingGang(i, lastDropper, lastCard); processed = true; break;
      }
    }
    if (processed) return;
    for (let i = 1; i < 4; i++) {
      if (exited[i] || i === lastDropper) continue;
      if (canPeng(hands[i], lastCard) && Math.random() < .5) {
        aiDoPeng(i, lastDropper, lastCard); processed = true; break;
      }
    }
    if (processed) return;
    const next = nextPlayer(lastDropper);
    if (next >= 0) beginDrawPhase(next);
  }, aiDelay(300));
}

function playerPeng() {
  if (!running || exited[0] || turnPhase !== 'react') return;
  if (lastDropper === 0 || lastDropper === -1) return;
  if (!canPeng(hands[0], lastCard)) return;

  const card = lastCard;
  let cnt = 0;
  hands[0] = hands[0].filter(c => { if (c === card && cnt < 2) { cnt++; return false; } return true; });
  discards[lastDropper].pop();
  melds[0].push({ type: 'peng', card, from: lastDropper });
  sortHand(hands[0]);

  turnPhase = 'idle'; waitingReactions = false;
  sfxPeng(); speakSC('peng');
  floatText('碰!', window.innerWidth / 2, window.innerHeight / 2, '#ff8c00');
  spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#ff8c00', 20, 80, .5);
  trackCombo();
  renderAll(); updateButtons();
  verifyTileCount(0);
  showTip('碰牌！轮到你出牌');
  setTimeout(() => beginDiscardOnly(0), 300);
}

function playerMingGang() {
  if (!running || exited[0] || turnPhase !== 'react') return;
  if (lastDropper === 0 || lastDropper === -1) return;
  if (!canMingGang(hands[0], lastCard)) return;

  const card = lastCard;
  let cnt = 0;
  hands[0] = hands[0].filter(c => { if (c === card && cnt < 3) { cnt++; return false; } return true; });
  discards[lastDropper].pop();
  melds[0].push({ type: 'minggang', card, from: lastDropper });
  sortHand(hands[0]);

  // 刮风: only the discarding player pays
  doScoreGang(0, [lastDropper]);

  turnPhase = 'idle'; waitingReactions = false;
  sfxGang(); speakSC('gang');
  floatText('杠!', window.innerWidth / 2, window.innerHeight / 2, '#448aff');
  spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#448aff', 25, 90, .6);
  shakeScreen(5, 250);
  trackCombo();
  renderAll(); updateButtons();
  verifyTileCount(0);
  showTip('杠牌！刮风 — 出牌者付' + settings.gangScore + '分');
  setTimeout(() => beginGangReplace(0), 350);
}

function playerAnGang() {
  if (!running || exited[0] || turnPhase !== 'draw') return;
  const anGangs = canAnGang(hands[0]);
  if (anGangs.length === 0) return;

  const card = anGangs[0];
  hands[0] = hands[0].filter(c => c !== card);
  melds[0].push({ type: 'angang', card, from: -1 });
  sortHand(hands[0]);

  // 下雨: all 3 others pay
  doScoreGang(0, [1, 2, 3]);

  turnPhase = 'idle';
  sfxGang(); speakSC('angang');
  floatText('暗杠!', window.innerWidth / 2, window.innerHeight / 2, '#7c4dff');
  spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#7c4dff', 25, 100, .6);
  shakeScreen(8, 350);
  renderAll(); updateButtons();
  verifyTileCount(0);
  showTip('暗杠！下雨 — 每家付' + settings.gangScore + '分');
  setTimeout(() => beginGangReplace(0), 400);
}

function playerJiaGang() {
  if (!running || exited[0] || turnPhase !== 'draw') return;
  const jiaGangs = canJiaGang(0);
  if (jiaGangs.length === 0) return;

  const card = jiaGangs[0];
  const idx = hands[0].indexOf(card);
  if (idx < 0) return;
  const meldIdx = melds[0].findIndex(m => m.type === 'peng' && m.card === card);
  if (meldIdx < 0) return;

  // 补杠/巴杠: check 抢杠 BEFORE committing the gang
  let robbed = false;
  for (let i = 1; i < 4; i++) {
    if (exited[i]) continue;
    const testHand = [...hands[i], card];
    if (canHu(testHand, getMeldCount(i)) && Math.random() < .6) {
      robbed = true;
      // 抢杠! Don't commit the gang. AI hu's, taking score from player 0.
      doHu(i, 0, false, true);
      showTip('抢杠！对手' + i + '抢杠胡！');
      // Player 0's turn continues (still in draw phase)
      turnPhase = 'draw'; turn = 0;
      renderAll(); updateButtons();
      return;
    }
  }

  // No 抢杠, commit the gang
  hands[0].splice(idx, 1);
  melds[0][meldIdx] = { type: 'jiagang', card, from: melds[0][meldIdx].from };
  sortHand(hands[0]);

  doScoreGang(0, [1, 2, 3]);
  turnPhase = 'idle';
  sfxGang(); speakSC('gang');
  floatText('补杠!', window.innerWidth / 2, window.innerHeight / 2, '#448aff');
  spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#448aff', 20, 80, .5);
  shakeScreen(4, 200);
  renderAll(); updateButtons();
  verifyTileCount(0);
  showTip('补杠！下雨 — 每家付' + settings.gangScore + '分');
  setTimeout(() => beginGangReplace(0), 350);
}

function playerHu() {
  if (!running || exited[0]) return;
  if ((turnPhase === 'draw' || turnPhase === 'discard') && canHu(hands[0], getMeldCount(0))) {
    // Self-draw hu — check if gang replacement draw
    const gsk = gangShangKaiFlag;
    gangShangKaiFlag = false;
    gangShangPaoFlag = false;
    doHu(0, -1, true, false, gsk);
  } else if (turnPhase === 'react' && lastDropper !== 0 && lastDropper !== -1) {
    if (!canHu([...hands[0], lastCard], getMeldCount(0))) return;
    const isGSP = gangShangPaoFlag;
    const isRen = firstRound;
    gangShangPaoFlag = false;
    doHu(0, lastDropper, false, false, false, false, false, isRen, isGSP);
  }
}

function doScoreGang(uid, payers) {
  for (const p of payers) {
    if (exited[p]) continue;
    scores[uid] += settings.gangScore;
    scores[p] -= settings.gangScore;
  }
  renderAll();
}

function doHu(uid, paoUid, isSelfDraw, isQiangGang=false, isGangShangKai=false, isTianHu=false, isDiHu=false, isRenHu=false, isGangShangPao=false) {
  turnPhase = 'idle'; waitingReactions = false;

  const isHaiDi = deck.length === 0;
  const result = calculateFan(uid, isSelfDraw, isQiangGang, isGangShangKai, isHaiDi, isTianHu, isDiHu, isRenHu, isGangShangPao);
  const totalFan = result.fan;
  const perPayer = settings.baseScore * Math.pow(2, totalFan - 1);

  if (isSelfDraw) {
    [0,1,2,3].forEach(i => {
      if (i !== uid && !exited[i]) { scores[uid] += perPayer; scores[i] -= perPayer; }
    });
  } else {
    scores[uid] += perPayer;
    scores[paoUid] -= perPayer;
  }

  sfxHu();
  if (isSelfDraw) { speakSC('zimo'); } else { speakSC('hu'); }

  // Fan-specific voice
  const { name: fanName } = getFanName(result);
  if (result.qingYiSe) setTimeout(() => speakSC('qingYiSe'), 600);
  if (result.longQiDui) setTimeout(() => speakSC('longQiDui'), 1200);
  if (isGangShangKai) setTimeout(() => speakSC('gangShangKai'), 800);
  if (isGangShangPao) setTimeout(() => speakSC('gangShangPao'), 600);
  if (isQiangGang) setTimeout(() => speakSC('qiangGang'), 400);
  if (isTianHu) setTimeout(() => speakSC('tianHu'), 300);
  if (isDiHu) setTimeout(() => speakSC('diHu'), 300);

  const isPlayer = uid === 0;
  const label = (isSelfDraw ? '自摸' : '胡牌') + ' ' + fanName;

  if (isPlayer || isSelfDraw) {
    floatText(label + ' +' + perPayer, window.innerWidth / 2, window.innerHeight * .4, isPlayer ? '#ffd700' : '#f44336');
    if (settings.fxOn && totalFan >= 4) spawnFireworks(window.innerWidth / 2, window.innerHeight * .45, totalFan >= 8 ? 12 : 6);
    if (settings.fxOn && totalFan >= 2 && uid === 0) {
      setTimeout(() => spawnFireworks(window.innerWidth*.3, window.innerHeight*.4, 4), 300);
      setTimeout(() => spawnFireworks(window.innerWidth*.7, window.innerHeight*.4, 4), 500);
    }
    shakeScreen(isSelfDraw ? 12 : 8, 400);
  }
  const breakdown = getFanBreakdown(result);
  showTip((isPlayer ? '你' : PLAYER_NAMES[uid]) + (isSelfDraw ? '自摸' : '胡牌') + '！' + fanName + '\n' + breakdown, totalFan >= 8 ? 5000 : 3500);

  renderAll();

  // Blood mode: hu-er stays in, game continues
  if (settings.bloodMode) {
    huOrder.push({ uid, fan: totalFan, fanName, score: perPayer });
    if (exited.filter(x => x).length >= 3) {
      // Everyone hu'd at least once, end
      setTimeout(() => endGame('done'), 1200);
      return;
    }
    if (deck.length === 0) {
      setTimeout(() => endGame('done'), 1200);
      return;
    }
    if (uid === 0) {
      setTimeout(() => { const next = nextPlayer(uid); if (next >= 0) beginDrawPhase(next); }, 1000);
    } else if (running) {
      setTimeout(() => { const next = nextPlayer(uid); if (next >= 0) beginDrawPhase(next); }, 800);
    }
    return;
  }

  // Normal mode: hu-er exits
  exited[uid] = true;

  if (exited.filter(x => x).length >= 3) {
    setTimeout(() => endGame('done'), 1200);
    return;
  }

  if (isQiangGang) return;
  if (uid === 0) {
    setTimeout(() => { const next = nextPlayer(uid); if (next >= 0) beginDrawPhase(next); }, 1000);
  } else if (running) {
    setTimeout(() => { const next = nextPlayer(uid); if (next >= 0) beginDrawPhase(next); }, 800);
  }
}

// ==================== AI ACTIONS ====================
function aiDrawPhase(uid) {
  if (!running || exited[uid]) return;

  // Check an gang first
  const anGangs = canAnGang(hands[uid]);
  if (anGangs.length > 0 && Math.random() < AI_PROFILES[uid].gangLove) {
    const card = anGangs[0];
    hands[uid] = hands[uid].filter(c => c !== card);
    melds[uid].push({ type: 'angang', card, from: -1 });
    sortHand(hands[uid]);
    doScoreGang(uid, [0,1,2,3].filter(i => i !== uid && !exited[i]));
    sfxGang(); speakSC('angang');
    spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#7c4dff', 18, 80, .5);
    renderAll(); updateButtons();
    setTimeout(() => beginGangReplace(uid), aiDelay(400));
    return;
  }

  // Check jia gang
  const jiaGangs = canJiaGang(uid);
  if (jiaGangs.length > 0 && Math.random() < AI_PROFILES[uid].gangLove * .7) {
    const card = jiaGangs[0];
    const idx = hands[uid].indexOf(card);
    hands[uid].splice(idx, 1);
    const meldIdx = melds[uid].findIndex(m => m.type === 'peng' && m.card === card);
    melds[uid][meldIdx] = { type: 'jiagang', card, from: melds[uid][meldIdx].from };
    sortHand(hands[uid]);
    doScoreGang(uid, [0,1,2,3].filter(i => i !== uid && !exited[i]));
    sfxGang();
    renderAll(); updateButtons();
    setTimeout(() => beginGangReplace(uid), aiDelay(400));
    return;
  }

  // Self-draw hu?
  if (canHu(hands[uid], getMeldCount(uid)) && Math.random() < AI_PROFILES[uid].aggression) {
    doHu(uid, uid, true);
    return;
  }

  // Discard
  aiDoDiscard(uid);
}

function aiChooseDiscard(uid) {
  const hand = hands[uid];
  const profile = AI_PROFILES[uid];

  // Suit analysis for 缺一门
  const suitCounts = { wan: 0, tiao: 0, tong: 0 };
  hand.forEach(c => suitCounts[cardSuit(c)]++);
  let minSuit = 'wan', minCnt = Infinity;
  for (const sk of SUIT_KEYS) { if (suitCounts[sk] < minCnt) { minCnt = suitCounts[sk]; minSuit = sk; } }

  // Score each tile for discard
  let bestIdx = 0, bestScore = -Infinity;
  for (let i = 0; i < hand.length; i++) {
    const card = hand[i];
    const n = cardNum(card), s = cardSuit(card);
    let score = 0;

    // Must discard queMen suit if any remain
    if (s === queMen[uid]) score += 200;
    // Also prefer minority suit
    if (s === minSuit && minCnt <= 3) score += 70;

    // Isolated tile penalty (no adjacent, no pair, no triplet)
    const sameCount = hand.filter(c => c === card).length;
    const hasAdj1 = hand.some(c => cardSuit(c) === s && cardNum(c) === n - 1);
    const hasAdj2 = hand.some(c => cardSuit(c) === s && cardNum(c) === n + 1);
    const hasAdjJump1 = hand.some(c => cardSuit(c) === s && cardNum(c) === n - 2);
    const hasAdjJump2 = hand.some(c => cardSuit(c) === s && cardNum(c) === n + 2);

    if (sameCount === 1 && !hasAdj1 && !hasAdj2) {
      if (!hasAdjJump1 && !hasAdjJump2) score += 60; // Completely isolated
      else score += 25; // Has a gap neighbor
    }
    if (sameCount >= 2) score -= 50; // Keep pairs
    if (sameCount >= 3) score -= 80; // Keep triplets (can peng/gang)
    if (hasAdj1 || hasAdj2) score -= 35; // Part of potential sequence
    if (hasAdj1 && hasAdj2) score -= 55; // Center of sequence

    // Edge tiles slightly worse
    if (n === 1 || n === 9) score += 10;

    // Defense: avoid discarding tiles that others might need
    // Simple heuristic: if a suit has been heavily discarded, it's safer
    const totalDiscarded = discards.flat().filter(c => cardSuit(c) === s).length;
    if (totalDiscarded >= 12) score -= 15; // Safe to discard from depleted suit

    // Conservative AI avoids discarding dangerous tiles
    if (profile.defense > .6) {
      // Check if tile might complete opponent's meld
      if (sameCount === 1 && !hasAdj1 && !hasAdj2 && totalDiscarded < 6) score += 20;
    }

    if (score > bestScore) { bestScore = score; bestIdx = i; }
  }
  return hand[bestIdx];
}

function aiDoPeng(uid, dropper, card) {
  if (exited[uid]) return;
  let cnt = 0;
  hands[uid] = hands[uid].filter(c => { if (c === card && cnt < 2) { cnt++; return false; } return true; });
  discards[dropper].pop();
  melds[uid].push({ type: 'peng', card, from: dropper });
  sortHand(hands[uid]);

  waitingReactions = false;
  sfxPeng(); speakSC('peng', uid);
  floatText('碰!', window.innerWidth / 2, window.innerHeight / 2, '#ff8c00');
  showTip(PLAYER_NAMES[uid] + '碰牌');
  renderAll(); updateButtons();
  setTimeout(() => beginDiscardOnly(uid), aiDelay(400));
}

function aiDoMingGang(uid, dropper, card) {
  if (exited[uid]) return;
  let cnt = 0;
  hands[uid] = hands[uid].filter(c => { if (c === card && cnt < 3) { cnt++; return false; } return true; });
  discards[dropper].pop();
  melds[uid].push({ type: 'minggang', card, from: dropper });
  sortHand(hands[uid]);
  doScoreGang(uid, [dropper]);

  waitingReactions = false;
  sfxGang(); speakSC('gang', uid);
  floatText('杠!', window.innerWidth / 2, window.innerHeight / 2, '#448aff');
  showTip(PLAYER_NAMES[uid] + '杠牌！刮风');
  renderAll(); updateButtons();
  setTimeout(() => beginGangReplace(uid), aiDelay(400));
}

function aiDoHu(uid, dropper, isSelfDraw, isGangShangPao=false, isRenHu=false) {
  if (exited[uid]) return;
  waitingReactions = false;
  const gsk = gangShangKaiFlag;
  gangShangKaiFlag = false;
  gangShangPaoFlag = false;
  doHu(uid, dropper, isSelfDraw, false, gsk, false, false, isRenHu, isGangShangPao);
}

// Random AI chat
let aiChatTimer = null;
function triggerAIChat() {
  if (!running) return;
  const phrase = AI_CHAT[Math.floor(Math.random() * AI_CHAT.length)];
  // Pick a random AI player to "say" it
  const aiUid = 1 + Math.floor(Math.random() * 3);
  showTip(PLAYER_NAMES[aiUid] + '：' + phrase, 2500);
  if (Math.random() < .35) speak(phrase, 1.1, .9, aiUid);
  aiChatTimer = setTimeout(triggerAIChat, 8000 + Math.random() * 12000);
}

// ==================== END GAME ====================
function endGame(type) {
  stopAmbience();
  clearTimeout(aiChatTimer); aiChatTimer = null;
  running = false; turnPhase = 'idle';
  $('startBtn').disabled = false;
  disableAllButtons();
  renderAll();

  // 查叫/查花猪 (skip in blood mode)
  const remaining = [0,1,2,3].filter(i => !exited[i]);
  let chaJiaoText = '', chaHuaZhuText = '';
  if (!settings.bloodMode && type === 'draw' && remaining.length > 1) {
    const jiaoResult = chaJiao(remaining);
    if (jiaoResult) chaJiaoText = jiaoResult;
    const hzResult = chaHuaZhu(remaining);
    if (hzResult) chaHuaZhuText = hzResult;
  }

  const diff = scores[0] - 100;
  const huCount = settings.bloodMode ? huOrder.length : exited.filter(x => x).length;

  // Save history
  saveHistory({ time: new Date().toLocaleString(), scores: [...scores], diff, huCount, type, blood: settings.bloodMode });

  let html = '';
  if (settings.bloodMode) {
    // Blood mode settlement
    const myHus = huOrder.filter(h => h.uid === 0);
    if (diff > 0) {
      html = `<div class="stamp">血流成河</div><div class="big" style="color:#ffd700">+${diff} 分</div>`;
    } else if (diff < 0) {
      html = `<div class="stamp" style="border-color:#f44336;color:#f44336">再接再厉</div><div class="big" style="color:#f44336">${diff} 分</div>`;
    } else {
      html = '<div class="stamp">平局</div><div style="color:#888">不输不赢</div>';
    }
    html += `<div style="margin-top:4px;font-size:11px;color:#aaa">共${huOrder.length}次胡牌`;
    if (myHus.length > 0) html += ` · 我胡${myHus.length}次`;
    html += '</div>';
  } else if (type === 'draw') {
    html = '<div class="stamp">流局</div><div style="color:#888">牌库耗尽</div>';
  } else if (diff > 0) {
    html = `<div class="stamp">大获全胜</div><div class="big" style="color:#ffd700">+${diff} 分</div>`;
  } else if (diff < 0) {
    html = `<div class="stamp" style="border-color:#f44336;color:#f44336">再接再厉</div><div class="big" style="color:#f44336">${diff} 分</div>`;
  } else {
    html = '<div class="stamp">平局</div><div style="color:#888">不输不赢</div>';
  }

  html += `<div style="margin-top:8px"><span class="${diff>=0?'win':'lose'}">我: ${scores[0]}</span></div>`;
  html += `<div style="color:#aaa;font-size:12px">对家: ${scores[1]} | 上家: ${scores[2]} | 下家: ${scores[3]}</div>`;
  if (chaJiaoText) html += `<div style="color:#ff8c00;font-size:11px;margin-top:4px">${chaJiaoText}</div>`;
  if (chaHuaZhuText) html += `<div style="color:#f44336;font-size:11px;margin-top:2px">${chaHuaZhuText}</div>`;
  html += `<div style="color:#666;font-size:11px;margin-top:4px">${huCount}人胡牌 · 剩${deck.length}张</div>`;

  $('overTitle').textContent = type === 'draw' ? '牌库耗尽' : '本局结束';
  $('overResult').innerHTML = html;
  $('overPanel').classList.add('show');
  speakSC('end');
  if (diff > 0 && settings.fxOn) spawnFireworks(window.innerWidth / 2, window.innerHeight / 2);
}

function chaJiao(remaining) {
  const called = remaining.filter(i => canTingPai(i));
  const notCalled = remaining.filter(i => !canTingPai(i));

  if (called.length > 0 && notCalled.length > 0) {
    const penalty = settings.baseScore * 2;
    speakSC('chaJiao');
    showTip('查叫！未下叫玩家赔付' + penalty + '分', 2500);
    for (const nc of notCalled) {
      for (const c of called) {
        scores[nc] -= penalty;
        scores[c] += penalty;
      }
    }
    renderAll();
    return '查叫：未下叫赔付' + penalty + '分';
  }
  return '';
}

function chaHuaZhu(remaining) {
  // 查花猪: players whose 缺一门 doesn't match or didn't discard their que suit
  const huaZhu = remaining.filter(i => !queYiMen(i));
  if (huaZhu.length > 0) {
    const penalty = settings.baseScore * 4;
    const nonHuaZhu = remaining.filter(i => queYiMen(i));
    speakSC('huaZhu');
    showTip('查花猪！未缺一门赔付' + penalty + '分', 2500);
    for (const hz of huaZhu) {
      for (const nh of nonHuaZhu) {
        scores[hz] -= penalty;
        scores[nh] += penalty;
      }
    }
    renderAll();
    return '查花猪：未缺一门赔付' + penalty + '分';
  }
  return '';
}

function captureScreenshot() {
  const el = document.body;

  } else {

  }
}

// ==================== START GAME ====================
function dealAnimation(callback) {
  // Deal 13 cards to each player (index order: 0=bottom/player, 1=top/dealer, 2=left, 3=right)
  const positions = [
    { x: window.innerWidth / 2, y: window.innerHeight * .85 },
    { x: window.innerWidth / 2, y: window.innerHeight * .08 },
    { x: window.innerWidth * .08, y: window.innerHeight / 2 },
    { x: window.innerWidth * .92, y: window.innerHeight / 2 },
  ];
  const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
  let dealt = 0;
  const totalCards = 52; // 13 * 4

  function dealNext() {
    if (dealt >= totalCards) { callback(); return; }
    const playerIdx = dealt % 4;
    const cardNum = Math.floor(dealt / 4);
    const to = positions[playerIdx];
    // Spawn trail from center to player
    if (settings.fxOn) {
      const steps = 6;
      for (let i = 0; i < steps; i++) {
        setTimeout(() => {
          const t = i / steps;
          const px = cx + (to.x - cx) * t + (Math.random() - .5) * 40;
          const py = cy + (to.y - cy) * t + (Math.random() - .5) * 30;
          for (let j = 0; j < 2; j++) {
            particles.push({
              x: px, y: py, vx: (Math.random() - .5) * 20, vy: (Math.random() - .5) * 20,
              life: .3, maxLife: .3, color: playerIdx === 0 ? '#ffd700' : '#aaa', size: 1.5
            });
          }
        }, i * 15);
      }
    }
    if (!fxRAF) fxRAF = requestAnimationFrame(animateParticles);
    dealt++;
    const delay = dealt === totalCards ? 200 : (cardNum === 0 ? 30 : 16);
    setTimeout(dealNext, delay);
  }
  dealNext();
}

function aiPickQueMen(uid) {
  // AI picks the suit with fewest cards
  const counts = { '万': 0, '条': 0, '筒': 0 };
  hands[uid].forEach(c => { const s = cardSuit(c); if (counts[s] !== undefined) counts[s]++; });
  const sorted = Object.entries(counts).sort((a, b) => a[1] - b[1]);
  queMen[uid] = sorted[0][0];
}

function pickQueMen(callback) {
  turnPhase = 'queMen';
  // Auto-pick for AI
  for (let i = 1; i < 4; i++) aiPickQueMen(i);

  // Show picker for player
  $('queMenOverlay').classList.add('show');
  const btns = document.querySelectorAll('.que-btn');
  btns.forEach(btn => {
    btn.onclick = () => {
      queMen[0] = btn.dataset.suit;
      $('queMenOverlay').classList.remove('show');
      sfxClack();
      showTip('你定缺：' + queMen[0] + '子', 1500);
      setTimeout(callback, 600);
    };
  });
  renderAll();
}

function startGame() {
  $('titleScreen').classList.add('hidden');
  initAudio(); loadVoices(); startAmbience();
  rollAINames();
  initDeck();
  hands = [[],[],[],[]];
  melds = [[],[],[],[]];
  discards = [[],[],[],[]];
  exited = [false, false, false, false];
  queMen = ['','','',''];
  selIdx = -1; lastCard = ''; lastDropper = -1;
  turnPhase = 'idle'; waitingReactions = false;
  comboCount = 0; dealDone = false;
  lastClickTime = 0; lastClickIdx = -1;
  gangShangKaiFlag = false; gangShangPaoFlag = false;
  firstRound = true; turnsPlayed = 0; huOrder = [];

  for (let i = 0; i < 13; i++) for (let j = 0; j < 4; j++) hands[j].push(deck.pop());
  hands.forEach(sortHand);

  scores = [100, 100, 100, 100];
  running = true; turn = 0;
  $('startBtn').disabled = true;
  disableAllButtons();
  $('overPanel').classList.remove('show');
  sfxStart(); speakSC('start');

  renderAll();
  showTip('川麻血战到底 · 定缺一门才能胡', 2200);

  dealAnimation(() => {
    dealDone = true;
    renderAll();
    pickQueMen(() => {
      speak('请定缺，筒条万随便选一门！', 1.0, 0.9);
      triggerAIChat();
      beginDrawPhase(0);
    });
  });
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (!running) return;
  switch(e.key.toLowerCase()) {
    case 'd': playerDoDiscard(); break;
    case 'p': playerPeng(); break;
    case 'g': playerMingGang(); break;
    case 'a': playerAnGang(); break;
    case 'h': playerHu(); break;
    case 'x': case 'escape': playerPass(); break;
    case '1': case '2': case '3': case '4': case '5':
    case '6': case '7': case '8': case '9': case '0':
      const idx = parseInt(e.key) - 1;
      if (idx >= 0 && idx < hands[0].length) selectCard(idx, {});
      break;
  }
});
