<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇大作战 - 彩虹蛇蛇</title>
<style>html{height:100%}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:"Microsoft YaHei","PingFang SC",sans-serif;height:100vh;height:100dvh}
canvas{display:block}
.ui-top{position:fixed;top:8px;left:8px;right:8px;z-index:10;display:flex;justify-content:space-between;align-items:center;pointer-events:none;gap:8px}
.ui-top>*{pointer-events:auto}
.score-display{background:rgba(10,10,20,.85);color:#ffd700;padding:6px 14px;border-radius:20px;font:bold 16px "Microsoft YaHei",sans-serif;border:1px solid rgba(255,215,0,.3)}
.combo-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font:bold 48px "Microsoft YaHei",sans-serif;pointer-events:none;z-index:20;animation:popUp .6s ease-out forwards;text-shadow:0 0 30px currentColor}
@keyframes popUp{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}50%{opacity:1;transform:translate(-50%,-80%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-120%) scale(1)}}
.menu{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(20,10,40,.92),rgba(0,0,0,.97));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;gap:16px}
.menu h1{font:bold 52px "Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#ff6b6b);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:rainbow 3s ease infinite;letter-spacing:6px}
@keyframes rainbow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.menu .emoji-snake{font-size:80px;animation:bounce 1s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.menu .sub{color:#888;font-size:15px;margin-top:-8px}
.menu .high-score{color:#ffd700;font-size:18px}
.start-btn{padding:14px 56px;background:linear-gradient(135deg,#ff6b6b,#ff8e53);border:none;border-radius:30px;color:#fff;font:bold 22px "Microsoft YaHei",sans-serif;cursor:pointer;letter-spacing:4px;transition:.25s;box-shadow:0 8px 30px rgba(255,107,107,.4)}
.start-btn:hover{transform:scale(1.06);box-shadow:0 12px 40px rgba(255,107,107,.6)}
.start-btn:active{transform:scale(.96)}
.diff-row{display:flex;gap:10px}
.diff-btn{padding:8px 20px;border:2px solid rgba(255,255,255,.2);border-radius:20px;background:rgba(255,255,255,.04);color:#aaa;cursor:pointer;font:14px "Microsoft YaHei",sans-serif;transition:.2s}
.diff-btn.active{border-color:#ffd93d;background:rgba(255,215,60,.15);color:#ffd93d}
.skin-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:320px}
.skin-btn{width:48px;height:48px;border:3px solid rgba(255,255,255,.15);border-radius:50%;cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;transition:.2s;background:rgba(255,255,255,.04)}
.skin-btn.active{border-color:#ffd93d;background:rgba(255,215,60,.15);transform:scale(1.1);box-shadow:0 0 16px rgba(255,215,60,.3)}
.spd-btn.active{color:#ffd700!important;border-color:#ffd700!important;background:rgba(255,215,0,.15)!important}
.game-board{stroke:rgba(200,180,255,.3);stroke-width:2;fill:none;stroke-dasharray:8,4}
.board-bg{fill:rgba(15,10,30,.6);stroke:rgba(200,180,255,.4);stroke-width:2}
.over-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:99999;gap:12px}
.over-overlay h2{font:bold 42px "Microsoft YaHei",sans-serif;color:#ff6b6b;text-shadow:0 0 30px rgba(255,107,107,.5)}
.over-score{color:#ffd700;font:bold 28px "Microsoft YaHei",sans-serif}
.over-new{color:#4dff4d;font:bold 20px "Microsoft YaHei",sans-serif;animation:bounce .6s ease-in-out infinite}
.over-btn{padding:12px 40px;border:none;border-radius:25px;color:#fff;font:bold 18px "Microsoft YaHei",sans-serif;cursor:pointer;transition:.2s;background:linear-gradient(135deg,#8e44ad,#c49bff)}
.over-btn:hover{transform:scale(1.04)}
.pause-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:99998;gap:16px}.pause-overlay h2{font:bold 36px "Microsoft YaHei",sans-serif;color:#fff;text-shadow:0 0 20px rgba(255,255,255,.3)}.pause-btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
/* 游戏工坊广告系统 */
.ad-banner-container{position:fixed;bottom:0;left:0;right:0;z-index:14;display:flex;justify-content:center;align-items:center;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);min-height:50px;max-height:90px;overflow:hidden}
.ad-banner-container iframe{max-width:100%}
.ad-label{position:absolute;top:1px;right:6px;font:9px "Microsoft YaHei",sans-serif;color:rgba(255,255,255,.35)}
.sponsor-btn{position:fixed;top:44px;right:8px;z-index:20;background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.25);color:#ffd700;padding:3px 9px;border-radius:10px;font:11px "Microsoft YaHei",sans-serif;cursor:pointer;transition:.2s}
.sponsor-btn:hover{background:rgba(255,215,0,.25);transform:scale(1.05)}
.sponsor-panel{position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.sponsor-panel h2{color:#ffd700;font:bold 26px "Microsoft YaHei",sans-serif;margin-bottom:4px}
.sponsor-panel .qr-row{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.sponsor-panel .qr-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:16px;text-align:center;min-width:140px}
.sponsor-panel .qr-card .qr-icon{font-size:48px;margin-bottom:6px}
.sponsor-panel .qr-card .qr-label{color:#ccc;font:13px "Microsoft YaHei",sans-serif}
.sponsor-panel .qr-card .qr-hint{color:#888;font:11px "Microsoft YaHei",sans-serif;margin-top:4px}
.sponsor-panel .sponsor-close{margin-top:8px;padding:8px 28px;border:1px solid rgba(255,255,255,.2);border-radius:20px;color:#aaa;background:transparent;font:14px "Microsoft YaHei",sans-serif;cursor:pointer;transition:.2s}
.sponsor-panel .sponsor-close:hover{background:rgba(255,255,255,.08);color:#fff}
.interstitial-ad{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:150;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.interstitial-ad .ad-content{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px;text-align:center;min-width:300px;max-width:400px}
.interstitial-ad .ad-content p{color:#aaa;font:14px "Microsoft YaHei",sans-serif;margin-bottom:12px}
.interstitial-ad .skip-btn{padding:8px 28px;background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);border-radius:20px;color:#ffd700;font:bold 15px "Microsoft YaHei",sans-serif;cursor:pointer;transition:.2s}
.interstitial-ad .skip-btn:hover{background:rgba(255,215,0,.25)}
.mobile-controls{position:fixed;bottom:clamp(70px,10vh,100px);left:0;right:0;z-index:25;display:none;justify-content:center;align-items:center;gap:clamp(40px,8vw,80px);pointer-events:none}
.mobile-controls>*{pointer-events:auto}
.dpad{position:relative;width:clamp(180px,35vw,220px);height:clamp(180px,35vw,220px)}
.dpad-btn{position:absolute;width:33%;height:33%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.18);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:clamp(22px,5vw,30px);color:#fff;touch-action:none;transition:background .1s,border-color .1s,transform .1s}
.dpad-btn:active,.dpad-btn.pressed{background:rgba(200,150,255,.35);border-color:#c49bff;transform:scale(.92);box-shadow:0 0 20px rgba(180,140,255,.4)}
.dpad-up{top:0;left:33%}
.dpad-down{bottom:0;left:33%}
.dpad-left{top:33%;left:0}
.dpad-right{top:33%;right:0}
.joystick-zone{width:clamp(120px,25vw,160px);height:clamp(120px,25vw,160px);border:2px dashed rgba(255,255,255,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;touch-action:none}
.joystick-knob{width:clamp(40px,10vw,56px);height:clamp(40px,10vw,56px);background:rgba(200,180,255,.25);border:2px solid rgba(200,180,255,.4);border-radius:50%;transition:transform .05s linear}
@media(max-width:1024px){
.mobile-controls{display:flex}
.menu h1{font-size:clamp(28px,7vw,42px)}
.start-btn{padding:clamp(12px,3vw,16px) clamp(40px,10vw,56px);font-size:clamp(18px,4vw,22px)}
.over-overlay h2{font-size:clamp(26px,6vw,36px)}
.over-btn{padding:clamp(10px,2.5vw,14px) clamp(28px,8vw,40px);font-size:clamp(14px,3.5vw,18px)}
.ui-top{top:clamp(4px,1vh,8px);left:clamp(4px,1vw,8px);right:clamp(4px,1vw,8px)}
.score-display{font-size:clamp(13px,3vw,16px);padding:clamp(4px,1vw,8px) clamp(10px,3vw,14px)}
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui-top">
<div class="score-display" id="scoreUI">🍎 0</div>
<div style="display:flex;gap:4px;align-items:center">
<button class="spd-btn active" data-spd="1" style="background:rgba(10,10,20,.85);color:#aaa;border:1px solid rgba(255,255,255,.2);padding:5px 10px;border-radius:15px;font:12px 'Microsoft YaHei',sans-serif;cursor:pointer">1x</button>
<button class="spd-btn" data-spd="1.5" style="background:rgba(10,10,20,.85);color:#aaa;border:1px solid rgba(255,255,255,.2);padding:5px 10px;border-radius:15px;font:12px 'Microsoft YaHei',sans-serif;cursor:pointer">1.5x</button>
<button class="spd-btn" data-spd="2" style="background:rgba(10,10,20,.85);color:#aaa;border:1px solid rgba(255,255,255,.2);padding:5px 10px;border-radius:15px;font:12px 'Microsoft YaHei',sans-serif;cursor:pointer">2x</button>
<button id="pauseBtn" style="background:rgba(10,10,20,.85);color:#fff;border:1px solid rgba(255,255,255,.2);padding:5px 10px;border-radius:15px;font:12px 'Microsoft YaHei',sans-serif;cursor:pointer">⏸</button>
<button id="soundBtn" style="background:rgba(10,10,20,.85);color:#fff;border:1px solid rgba(255,255,255,.2);padding:5px 10px;border-radius:15px;font:12px 'Microsoft YaHei',sans-serif;cursor:pointer">🔊</button>

</div>
</div>

<div class="menu" id="menu">
<div class="emoji-snake" id="menuSnakeEmoji">🐍</div>
<h1>贪吃蛇大作战</h1>
<div class="sub">彩虹蛇蛇 · 收集星星 · 超级加速</div>

<div class="pause-overlay" id="pauseOverlay"><h2>⏸ 暂停</h2><div class="pause-btn-row"><button class="over-btn" id="pauseResume">▶ 继续游戏</button><button class="over-btn" id="pauseMenu" style="background:rgba(255,255,255,.15)">🏠 返回主菜单</button></div></div>

<!-- 游戏工坊统一广告系统 -->
<div class="ad-banner-container" id="adBanner"><span class="ad-label">ad</span></div>
<button class="sponsor-btn" id="sponsorBtn" title="支持开发者">💛 赞助</button>
<div class="sponsor-panel" id="sponsorPanel">

<div style="color:#aaa;font:14px 'Microsoft YaHei',sans-serif;text-align:center;max-width:280px">如果你喜欢这个游戏，请开发者喝杯咖啡吧 ☕<br>每一份支持都是持续更新的动力！</div>
<div class="qr-row">

</div>

</div>

</div>

<script>
// ===== AUDIO =====
let audioCtx = null;
function initAudio() {
if (!audioCtx) { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
if (audioCtx.state === 'suspended') audioCtx.resume();
}
let soundOn = true;
function beep(freq, type='square', dur=0.1, vol=0.08, slide=0) {
if (!audioCtx || !soundOn) return;
const t = audioCtx.currentTime;
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.type = type;
osc.frequency.setValueAtTime(freq, t);
if (slide) osc.frequency.linearRampToValueAtTime(freq+slide, t+dur);
gain.gain.setValueAtTime(vol, t);
gain.gain.exponentialRampToValueAtTime(0.001, t+dur);
osc.connect(gain); gain.connect(audioCtx.destination);
osc.start(t); osc.stop(t+dur);
}
function sfxEat() { beep(500+Math.random()*400, 'sine', 0.06, 0.05, 300); beep(800+Math.random()*200, 'triangle', 0.04, 0.03, 0); }
function sfxCombo() { [523,659,784,1047].forEach((f,i)=>beep(f,'triangle',0.1,0.07,0)); }
function sfxComboBig() { [392,523,659,784,1047,1318].forEach((f,i)=>beep(f,'triangle',0.12,0.08,0)); }
function sfxPowerUp() { [523,659,784,1047].forEach((f,i)=>beep(f,'sine',0.15,0.08,0)); }
function sfxDie() { beep(45,'sawtooth',0.5,0.15,-25); beep(35,'sawtooth',0.4,0.1,-20); }
function sfxBonus() { [800,1000,1200].forEach((f,i)=>beep(f,'sine',0.08,0.05,300)); }
function sfxTurn() { if (!soundOn) return; beep(180+Math.random()*120, 'sine', 0.03, 0.02, 60); }
function sfxMilestone() { [392,523,659,784,1047].forEach((f,i)=>beep(f,'triangle',0.18,0.06,0)); }
function sfxStart() { [262,330,392,523,659].forEach((f,i)=>beep(f,'sine',0.16,0.05,0)); }
function sfxEatNPC() { [200,300,400,500,600].forEach((f,i)=>beep(f,'sawtooth',0.07,0.05,200)); }
function sfxShield() { [440,554,659].forEach((f,i)=>beep(f,'sine',0.2,0.04,0)); }

// BGM - kids melody with chords
let bgmTimer = null, bgmPlaying = false, bgmOscs = [];
function beepChord(freqs, type='triangle', dur=0.25, vol=0.012) {
if (!audioCtx || !soundOn) return;
const t = audioCtx.currentTime;
freqs.forEach(f => {
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.type = type; osc.frequency.setValueAtTime(f, t);
gain.gain.setValueAtTime(vol, t);
gain.gain.exponentialRampToValueAtTime(0.001, t+dur);
osc.connect(gain); gain.connect(audioCtx.destination);
osc.start(t); osc.stop(t+dur);
});
}
function startBGM() {
if (bgmPlaying || !audioCtx || !soundOn) return;
bgmPlaying = true;
const melody = [
[262,330,392],[294,349,440],[330,392,523],[349,440,523],
[392,523,659],[349,440,523],[330,392,523],[294,349,440],
[262,330,392],[330,392,523],[392,523,659],[440,523,659],
[392,523,659],[349,440,523],[330,392,523],[294,349,440],
];
let ni = 0;
function playNote() {
if (!bgmPlaying) return;
beepChord(melody[ni%melody.length], 'triangle', 0.28, 0.012);
ni++;
bgmTimer = setTimeout(playNote, 280);
}
playNote();
}
function stopBGM() {
bgmPlaying = false;
if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
}

// ===== CANVAS =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
	if (!ctx.roundRect) {
		ctx.roundRect = function(x, y, w, h, r) {
			if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
			ctx.beginPath();
			ctx.moveTo(x + r.tl, y);
			ctx.arcTo(x + w, y, x + w, y + h, r.tr);
			ctx.arcTo(x + w, y + h, x, y + h, r.br);
			ctx.arcTo(x, y + h, x, y, r.bl);
			ctx.arcTo(x, y, x + w, y, r.tl);
			ctx.closePath();
		};
	}
let W, H;

function resize() {
W = canvas.width = innerWidth; document.body.style.height = innerHeight + "px";
H = canvas.height = innerHeight;
calcBoard();
}
let resizeTimer;window.addEventListener("resize",()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(resize,150);});window.addEventListener("orientationchange",function(){setTimeout(resize,100);});

// ===== GAME STATE =====
const GS = 18;
const BOARD = { x:0, y:0, w:0, h:0, cols:0, rows:0, cx:0, cy:0 };
function calcBoard() {
	const m = 20;
	BOARD.x = m;
	BOARD.y = 66;
	BOARD.w = W - m*2;
	const bottomPad = innerWidth <= 1024 ? 150 : 36; BOARD.h = H - BOARD.y - m - bottomPad;
	BOARD.cols = Math.floor(BOARD.w / GS);
	BOARD.rows = Math.floor(BOARD.h / GS);
	BOARD.cx = Math.floor(BOARD.cols / 2);
	BOARD.cy = Math.floor(BOARD.rows / 2);
}
const SNAKE_SKINS = [
	{ name:'彩虹', emoji:'🌈',
		body:(i,tot,h)=>'hsl('+((h*60+i*15)%360)+',80%,'+(55-(i/Math.max(tot-1,1))*20)+'%)',
		glow:(i,tot,h)=>'hsl('+((h*60+i*15)%360)+',90%,65%)' },
	{ name:'火焰', emoji:'🔥',
		body:(i,tot)=>'hsl('+(Math.sin(i*0.4)*10+15)+',100%,'+(55-(i/Math.max(tot-1,1))*20)+'%)',
		glow:()=>'hsl(25,100%,60%)' },
	{ name:'海洋', emoji:'🌊',
		body:(i,tot)=>'hsl('+(Math.sin(i*0.4)*10+210)+',80%,'+(55-(i/Math.max(tot-1,1))*20)+'%)',
		glow:()=>'hsl(210,90%,65%)' },
	{ name:'森林', emoji:'🌿',
		body:(i,tot)=>'hsl('+(Math.sin(i*0.4)*10+130)+',70%,'+(50-(i/Math.max(tot-1,1))*20)+'%)',
		glow:()=>'hsl(130,80%,55%)' },
	{ name:'糖果', emoji:'🍬',
		body:(i)=>['#ff6b9d','#c44dff','#4dc9f6','#ffd93d','#ff8a5c','#6bcb77'][i%6],
		glow:(i)=>['#ff6b9d','#c44dff','#4dc9f6','#ffd93d','#ff8a5c','#6bcb77'][i%6] },
	{ name:'黄金', emoji:'👑',
		body:(i,tot)=>'hsl(45,'+(90-(i/Math.max(tot-1,1))*30)+'%,'+(55-(i/Math.max(tot-1,1))*20)+'%)',
		glow:()=>'hsl(48,100%,60%)' },
	{ name:'霓虹', emoji:'💜',
		body:(i,tot,h)=>'hsl('+((h*80+i*20)%360)+',100%,55%)',
		glow:(i,tot,h)=>'hsl('+((h*80+i*20)%360)+',100%,70%)' },
	{ name:'经典', emoji:'🐍', png:true,

	{ name:'极光', emoji:'🌌',
		body:(i,tot,h)=>'hsl('+(170+Math.sin(i*0.5+h*2)*40)+',80%,'+(48-(i/Math.max(tot-1,1))*18)+'%)',
		glow:(i,tot,h)=>'hsl('+(180+Math.sin(i*0.6+h*2)*50)+',90%,65%)' },
	{ name:'熔岩', emoji:'🌋',

];
let selectedSkin = 0;

let snake, food, bonusFood, particles, texts, powerUp;
let dir, nextDir, score, combo, comboTimer, highScore;
let gameRunning, gamePaused, gameOver, gameStarted;
let speed, baseSpeed, difficulty, frameCount;
let powerUpActive, powerUpTimer;
let shakeAmount, shakeDuration;
let rainbowHue, lastMilestone;
let imgHead, imgBody, imgFood, imgBg; // PNG asset images

const DIFF_NAMES = ['🐢 入门', '🐇 简单', '🦊 普通'];

// Load PNG assets

imgBody = new Image(); imgBody.src = 'snake_body.png';

// Food types with different scores/effects
const FOOD_TYPES = [

{ emoji:'💎', score:10, color:'#4dff4d', glow:'#00ff00', chance:5 },
{ emoji:'🌈', score:8, color:'#ff69b4', glow:'#ff1493', chance:3 },

];

// ===== INIT =====
function initGame() {
const cx = BOARD.cx;
const cy = BOARD.cy;

snake = [
{x:cx, y:cy},
{x:cx-1, y:cy},
{x:cx-2, y:cy},
];
dir = {x:1, y:0};
nextDir = {x:1, y:0};
score = 0;
combo = 0;
comboTimer = 0;
food = null;
bonusFood = null;
particles = [];
texts = [];
powerUp = null;

document.querySelectorAll('.spd-btn').forEach(b=>b.classList.remove('active'));
const defSpd = document.querySelector('.spd-btn[data-spd=\"1\"]');
if (defSpd) defSpd.classList.add('active');
gameRunning = true;

gameStarted = true;
frameCount = 0;
shakeAmount = 0;

function spawnFood() {
const cols = BOARD.cols;
const rows = BOARD.rows;
let fx, fy, valid;
do {
fx = Math.floor(Math.random() * cols);
fy = Math.floor(Math.random() * rows);
valid = true;
for (const s of snake) { if (s.x===fx && s.y===fy) { valid=false; break; } }
if (bonusFood && bonusFood.x===fx && bonusFood.y===fy) valid=false;
if (powerUp && powerUp.x===fx && powerUp.y===fy) valid=false;
for (const npc of npcSnakes) { for (const s of npc.segments) { if (s.x===fx&&s.y===fy) { valid=false; break; } } }
} while (!valid);

// Pick food type based on chance
const roll = Math.random() * 100;
let acc = 0, type = FOOD_TYPES[0];
for (const ft of FOOD_TYPES) { acc += ft.chance; if (roll <= acc) { type = ft; break; } }
food = {x:fx, y:fy, type, pulse:0 };
}

function spawnBonusFood() {
if (bonusFood) return;
const cols = BOARD.cols;
const rows = BOARD.rows;
let fx, fy, valid;
do {
fx = Math.floor(Math.random() * cols);
fy = Math.floor(Math.random() * rows);
valid = true;
for (const s of snake) { if (s.x===fx && s.y===fy) { valid=false; break; } }
if (food && food.x===fx && food.y===fy) valid=false;
if (powerUp && powerUp.x===fx && powerUp.y===fy) valid=false;
} while (!valid);
bonusFood = {x:fx, y:fy, life:200, type:{emoji:'🍩', score:8, color:'#ff69b4', glow:'#ff1493', chance:0}};
}

function spawnPowerUp() {
if (powerUp || powerUpActive) return;
const cols = BOARD.cols;
const rows = BOARD.rows;
let fx, fy, valid;
do {
fx = Math.floor(Math.random() * cols);
fy = Math.floor(Math.random() * rows);
valid = true;
for (const s of snake) { if (s.x===fx && s.y===fy) { valid=false; break; } }
if (food && food.x===fx && food.y===fy) valid=false;
if (bonusFood && bonusFood.x===fx && bonusFood.y===fy) valid=false;
} while (!valid);
const types = [
{emoji:'⚡', name:'加速', color:'#00f0ff', glow:'#00ffff', duration:120},
{emoji:'🛡️', name:'护盾', color:'#ffd700', glow:'#ffaa00', duration:180},
{emoji:'🧲', name:'磁铁', color:'#ff69b4', glow:'#ff1493', duration:150},
];
powerUp = {x:fx, y:fy, type:types[Math.floor(Math.random()*types.length)], life:250};
}

// ===== NPC SNAKES =====
function spawnNPCs() {
npcSnakes = [];
const count = 3 + Math.floor(Math.random()*2); // 3-4 NPCs
for (let i=0;i<count;i++) {
let nx, ny, valid;
const len = 3 + Math.floor(Math.random()*4); // 3-6 segments
do {
nx = Math.floor(Math.random()*(BOARD.cols-6))+3;
ny = Math.floor(Math.random()*(BOARD.rows-6))+3;
valid = true;
for (const s of snake) { if (Math.abs(s.x-nx)<4 && Math.abs(s.y-ny)<4) { valid=false; break; } }
} while (!valid);
const ndir = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}][Math.floor(Math.random()*4)];
const segs = [];
for (let j=0;j<len;j++) segs.push({x:nx - ndir.x*j, y:ny - ndir.y*j});
const ci = i % NPC_COLORS.length;
npcSnakes.push({
segments: segs, dir: {...ndir}, nextDir: {...ndir},
color: NPC_COLORS[ci], name: NPC_NAMES[ci],
aiTimer: 20 + Math.floor(Math.random()*40),
});
}
}

function updateNPCs() {
for (let ni=npcSnakes.length-1;ni>=0;ni--) {
const npc = npcSnakes[ni];
npc.aiTimer--;
// AI: periodically change direction
if (npc.aiTimer <= 0) {
npc.aiTimer = 20 + Math.floor(Math.random()*30);
const dirs = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
// Filter out reverse direction
const validDirs = dirs.filter(d => !(d.x===-npc.dir.x && d.y===-npc.dir.y));
// Prefer direction toward nearest food, sometimes
if (food && Math.random()<0.4) {
const h = npc.segments[0];
const dx = food.x - h.x;
const dy = food.y - h.y;
npc.nextDir = Math.abs(dx)>Math.abs(dy) ? {x:dx>0?1:-1,y:0} : {x:0,y:dy>0?1:-1};
} else {
npc.nextDir = validDirs[Math.floor(Math.random()*validDirs.length)];
}
}
npc.dir = {...npc.nextDir};
const head = {x:npc.segments[0].x+npc.dir.x, y:npc.segments[0].y+npc.dir.y};
// Wall bounce
if (head.x<0||head.x>=BOARD.cols||head.y<0||head.y>=BOARD.rows) {
npc.nextDir = {x:-npc.dir.x, y:-npc.dir.y};
npc.dir = {...npc.nextDir};
head.x = npc.segments[0].x+npc.dir.x;
head.y = npc.segments[0].y+npc.dir.y;
}
// Self collision - change direction
let selfHit = false;
for (const s of npc.segments) {
if (s.x===head.x && s.y===head.y) { selfHit=true; break; }
}
if (selfHit) {
npc.nextDir = [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}].filter(d => !(d.x===-npc.dir.x&&d.y===-npc.dir.y))[Math.floor(Math.random()*3)] || {x:-npc.dir.x,y:-npc.dir.y};
npc.dir = {...npc.nextDir};
head.x = npc.segments[0].x+npc.dir.x;
head.y = npc.segments[0].y+npc.dir.y;
}
npc.segments.unshift(head);
// Eat food if nearby (rare - NPCs mostly ignore food)
if (food && head.x===food.x && head.y===food.y) {
spawnFood();
} else {
npc.segments.pop();
}
}
}

function checkSnakeCollisions() {
const head = snake[0];
const playerLen = snake.length;
// Player head vs NPC bodies
for (let ni=npcSnakes.length-1;ni>=0;ni--) {
const npc = npcSnakes[ni];
for (let si=0;si<npc.segments.length;si++) {
const s = npc.segments[si];
if (head.x===s.x && head.y===s.y) {
if (si===0) {
// Head-to-head collision
if (playerLen > npc.segments.length) {
eatNPC(ni); return;
} else {
die(); return;
}
} else {
// Player head hit NPC body
eatNPC(ni); return;
}
}
}
// NPC head vs player body
const npcHead = npc.segments[0];
for (let si=1;si<snake.length;si++) {
if (npcHead.x===snake[si].x && npcHead.y===snake[si].y) {
if (npc.segments.length > playerLen) {
die(); return;
} else {
eatNPC(ni); return;
}
}
}
// NPC vs NPC
for (let nj=npcSnakes.length-1;nj>ni;nj--) {
const other = npcSnakes[nj];
const oh = other.segments[0];
for (let si=1;si<npc.segments.length;si++) {
if (oh.x===npc.segments[si].x && oh.y===npc.segments[si].y) {
if (other.segments.length > npc.segments.length) {
addFloatingText(npc.segments[0].x*GS, npc.segments[0].y*GS, '💀', '#ff4444', 20);
npcSnakes.splice(ni,1);
} else {
addFloatingText(other.segments[0].x*GS, other.segments[0].y*GS, '💀', '#ff4444', 20);
npcSnakes.splice(nj,1);
}
break;
}
}
}
}
}

function eatNPC(idx) {
const npc = npcSnakes[idx];
const bonus = npc.segments.length * 3;
score += bonus;
burstParticles(npc.segments[0].x*GS+GS/2, npc.segments[0].y*GS+GS/2, npc.color, 25);
addFloatingText(npc.segments[0].x*GS+GS/2, npc.segments[0].y*GS, '吞噬 ' + npc.name + '! +'+bonus, npc.color, 22);
sfxEatNPC();
shake(8, 10);
// Grow player by eating the NPC
for (let i=0;i<npc.segments.length;i++) snake.push({...snake[snake.length-1]});
npcSnakes.splice(idx,1);
updateScoreUI();
// Respawn NPC after delay
setTimeout(() => {
if (gameRunning && !gameOver && npcSnakes.length<4) {
spawnNPCs();
}
}, 3000);
}

function updateScoreUI() {
document.getElementById('scoreUI').textContent = `🍎 ${score}`;
}
function updateHighScoreUI() {
document.getElementById('highScoreMenu').textContent = `🏆 最高分: ${highScore}`;
}

// ===== PARTICLES =====
function burstParticles(x, y, color, count=15) {
x = BOARD.x + x;
y = BOARD.y + y;
for (let i=0;i<count;i++) {
const a = Math.random()*Math.PI*2;
const sp = 2+Math.random()*6;
particles.push({
x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
life:20+Math.random()*20, color, size:2+Math.random()*5,
});
}
}

function addFloatingText(x, y, text, color='#fff', size=22) {
x = BOARD.x + x;
y = BOARD.y + y;
texts.push({x, y, text, color, size, life:35, vy:-2.5});
}

// ===== SCREEN SHAKE =====
function shake(intensity, dur) {
shakeAmount = Math.max(shakeAmount, intensity);
shakeDuration = Math.max(shakeDuration, dur);
}

function popCombo(text, color) {
const el = document.createElement('div');
el.className = 'combo-pop';
el.textContent = text;
el.style.color = color;
document.body.appendChild(el);
setTimeout(() => el.remove(), 600);
}

// ===== UPDATE =====
function update() {
if (!gameRunning || gamePaused || gameOver) return;
frameCount++;

// Update NPCs
updateNPCs();

// Combo timer
if (comboTimer > 0) { comboTimer--; if (comboTimer<=0) combo=0; }

// Power-up timer
if (powerUpActive) {
powerUpTimer--;
if (powerUpTimer <= 0) { powerUpActive = false; addFloatingText(snake[0].x*GS, snake[0].y*GS, '效果结束', '#888', 16); }
}

// Bonus food timer
if (bonusFood) { bonusFood.life--; if (bonusFood.life<=0) bonusFood=null; }

// PowerUp spawn timer
if (powerUp) { powerUp.life--; if (powerUp.life<=0) powerUp=null; }

// Random bonus food
if (!bonusFood && frameCount % 300 === 0 && Math.random() < 0.3) spawnBonusFood();
if (!powerUp && !powerUpActive && frameCount % 400 === 0 && Math.random() < 0.25) spawnPowerUp();

// Move snake
dir = {...nextDir};
const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};

// Wall collision
if (head.x < 0 || head.x >= BOARD.cols || head.y < 0 || head.y >= BOARD.rows) {
die();
return;
}

// Self collision (skip if shield active)
const shieldType = powerUpActive && powerUp && powerUp.type.name==='护盾';
if (!shieldType) {
for (const s of snake) {
if (s.x===head.x && s.y===head.y) { die(); return; }
}
}

snake.unshift(head);

// Check NPC collisions
checkSnakeCollisions();
if (gameOver) return;

// Check food
if (food && head.x===food.x && head.y===food.y) {
const ft = food.type;
score += ft.score;
combo++;
comboTimer = 40;
burstParticles(food.x*GS+GS/2, food.y*GS+GS/2, ft.color, 12+combo*2);
addFloatingText(food.x*GS+GS/2, food.y*GS, `+${ft.score}`, ft.color, 18+combo);
sfxEat();

if (combo >= 5 && combo % 5 === 0) {
const bonus = combo * 2;
score += bonus;
popCombo(`🔥 ${combo}连击! +${bonus}`, '#ffd700');
sfxCombo();
shake(4+combo/2, 6);
burstParticles(head.x*GS+GS/2, head.y*GS+GS/2, '#ffd700', 25);
}

if (combo === 10) {
popCombo('🌟 超级连击!', '#ff00ff');
sfxPowerUp();
shake(8, 10);
}

spawnFood();
updateScoreUI();
// Milestone every 50 points
if (Math.floor(score/50) > Math.floor(lastMilestone/50)) {
popCombo('🎉 ' + Math.floor(score/50)*50 + '分!', '#ffd700');
sfxMilestone();
burstParticles(head.x*GS+GS/2, head.y*GS+GS/2, '#ffd700', 40);
shake(6, 8);
}
lastMilestone = score;
} else {
snake.pop();
}

// Check bonus food
if (bonusFood && head.x===bonusFood.x && head.y===bonusFood.y) {
const bonus = bonusFood.type.score + Math.floor(Math.random()*10);
score += bonus;
burstParticles(bonusFood.x*GS+GS/2, bonusFood.y*GS+GS/2, '#ff69b4', 30);
addFloatingText(bonusFood.x*GS+GS/2, bonusFood.y*GS, `+${bonus} 甜甜圈!`, '#ff69b4', 24);
sfxBonus();
shake(6, 8);
bonusFood = null;
updateScoreUI();
}

// Check power-up
if (powerUp && head.x===powerUp.x && head.y===powerUp.y) {
const pt = powerUp.type;
powerUpActive = true;
powerUpTimer = pt.duration;
burstParticles(powerUp.x*GS+GS/2, powerUp.y*GS+GS/2, pt.color, 35);
addFloatingText(powerUp.x*GS+GS/2, powerUp.y*GS, `${pt.emoji} ${pt.name}!`, pt.color, 26);
sfxPowerUp();
shake(5, 7);

// Apply effect
if (pt.name==='加速') { speed = Math.floor(baseSpeed/2); }
if (pt.name==='磁铁') { /* magnet handled in rendering/spawning */ }

powerUp = null;
}

// Speed boost when power-up active
if (powerUpActive && powerUp.type && powerUp.type.name==='加速') {
// already set
} else {
speed = baseSpeed;
}

// Update particles
for (let i=particles.length-1;i>=0;i--) {
const p = particles[i];
p.x+=p.vx; p.y+=p.vy; p.life--;
if (p.life<=0) particles.splice(i,1);
}

// Update floating texts
for (let i=texts.length-1;i>=0;i--) {
const t = texts[i];
t.y+=t.vy; t.life--;
if (t.life<=0) texts.splice(i,1);
}

// Shake decay
if (shakeDuration>0) { shakeDuration--; shakeAmount*=0.85; }

// Check high score
if (score > highScore) {
highScore = score;
localStorage.setItem('snakeHigh', highScore);
}

rainbowHue += 0.02;
}

function die() {
gameRunning = false;
gameOver = true;
stopBGM();
sfxDie();
burstParticles(snake[0].x*GS+GS/2, snake[0].y*GS+GS/2, '#ff0000', 50);
shake(15, 15);

if (score > highScore) {
highScore = score;
localStorage.setItem('snakeHigh', highScore);
updateHighScoreUI();
}

// Kid-friendly encouragement
const msgs = ['加油！再来一次 💪', '好棒！继续努力 ⭐', '你很厉害哦！🌟', '差一点就破纪录了！🔥'];
const msg = score >= highScore ? '太厉害了！新纪录！🏆' : msgs[Math.floor(Math.random()*msgs.length)];

document.getElementById('overScore').textContent = `得分: ${score}`;
document.getElementById('overEncourage').textContent = msg;
const isNew = score >= highScore && score > 0;
document.getElementById('overNew').style.display = isNew ? 'block' : 'none';
document.getElementById('overRevive').style.display = '';
document.getElementById('overOverlay').style.display = 'flex';
}

		gameRunning = true;

// ===== RENDER =====
function drawSnakeSegment(x, y, i, total) {
const sx = BOARD.x + x * GS + GS/2;
const sy = BOARD.y + y * GS + GS/2;
const ratio = i / Math.max(total-1, 1);

const skin = SNAKE_SKINS[selectedSkin];
const nb = skin.body.length;
const ng = skin.glow.length;
const color = nb>=3 ? skin.body(i,total,rainbowHue) : nb>=2 ? skin.body(i,total) : skin.body(i);
const glowColor = ng>=3 ? skin.glow(i,total,rainbowHue) : ng>=2 ? skin.glow(i,total) : ng>=1 ? skin.glow(i) : skin.glow();

ctx.save();
ctx.translate(sx, sy);

// PNG-based classic skin rendering
if (skin.png && imgHead && imgHead.complete && imgHead.naturalWidth > 0 && imgBody && imgBody.complete && imgBody.naturalWidth > 0) {
const imgR = GS * (i===0 ? 1.0 : (i===1 ? 0.72 : (i===2 ? 0.58 : 0.5)));
const imgSize = imgR * 2.6;
if (i === 0) {
// Head with rotation based on direction
const headAngle = Math.atan2(dir.y, dir.x) + Math.PI/2;
ctx.rotate(headAngle);
ctx.drawImage(imgHead, -imgSize/2, -imgSize/2, imgSize, imgSize);
} else {
ctx.drawImage(imgBody, -imgSize/2, -imgSize/2, imgSize, imgSize);
}
ctx.restore();
return;
}

// Glow (canvas-drawn skins)
ctx.shadowColor = glowColor;
ctx.shadowBlur = i===0 ? 16 : i<=2 ? 10 : 5;

// Body radius - smooth taper from big head to body
let r;
if (i===0) r = GS*0.88;
else if (i===1) r = GS*0.65;
else if (i===2) r = GS*0.52;
else r = GS/2-1;

ctx.fillStyle = color;
ctx.beginPath();
if (i===0) {
// Cute wide head
ctx.ellipse(0, 0, r*1.08, r*0.88, 0, 0, Math.PI*2);
ctx.fill();
// Subtle outline
ctx.strokeStyle = 'rgba(0,0,0,.1)';
ctx.lineWidth = 1;
ctx.stroke();
} else if (i<=2) {
// Tapering transition segments
ctx.roundRect(-r, -r*0.8, r*2, r*1.6, r*0.6);
ctx.fill();
} else {
// Regular body
ctx.roundRect(-r, -r, r*2, r*2, r*(1-ratio*0.5));
ctx.fill();
}

// Head details
if (i === 0) {
ctx.shadowBlur = 0;
const eyeR = r * 0.27;
const eyeOffX = r * 0.44;
const eyeOffY = -r * 0.12;

// Eyelid lines
ctx.strokeStyle = 'rgba(0,0,0,.16)';
ctx.lineWidth = 1.1;
ctx.beginPath(); ctx.arc(eyeOffX, eyeOffY+eyeR*0.25, eyeR*1.45, Math.PI*1.08, Math.PI*1.92); ctx.stroke();
ctx.beginPath(); ctx.arc(-eyeOffX, eyeOffY+eyeR*0.25, eyeR*1.45, Math.PI*1.08, Math.PI*1.92); ctx.stroke();

// Eye whites
ctx.fillStyle = '#fff';
ctx.beginPath(); ctx.ellipse(eyeOffX, eyeOffY, eyeR*1.35, eyeR*1.55, 0, 0, Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.ellipse(-eyeOffX, eyeOffY, eyeR*1.35, eyeR*1.55, 0, 0, Math.PI*2); ctx.fill();

// Sparkle
ctx.fillStyle = 'rgba(255,255,255,.22)';
ctx.beginPath(); ctx.arc(eyeOffX+eyeR*0.32, eyeOffY-eyeR*0.35, eyeR*0.28, 0, Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.arc(-eyeOffX+eyeR*0.32, eyeOffY-eyeR*0.35, eyeR*0.28, 0, Math.PI*2); ctx.fill();

// Pupils
ctx.fillStyle = '#1a1a1a';
const lookX = dir.x * eyeR * 0.42;
const lookY = dir.y * eyeR * 0.42;
ctx.beginPath(); ctx.arc(eyeOffX+lookX, eyeOffY+lookY, eyeR*0.8, 0, Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.arc(-eyeOffX+lookX, eyeOffY+lookY, eyeR*0.8, 0, Math.PI*2); ctx.fill();

// Pupil highlights
ctx.fillStyle = '#fff';
ctx.beginPath(); ctx.arc(eyeOffX+lookX+eyeR*0.17, eyeOffY+lookY-eyeR*0.17, eyeR*0.17, 0, Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.arc(-eyeOffX+lookX+eyeR*0.17, eyeOffY+lookY-eyeR*0.17, eyeR*0.17, 0, Math.PI*2); ctx.fill();

// Smiling mouth
const mx = dir.x * r * 0.58;
const my = r * 0.3;
ctx.strokeStyle = 'rgba(0,0,0,.22)';
ctx.lineWidth = 1.2;
ctx.lineCap = 'round';
ctx.beginPath();
ctx.arc(mx, my, r*0.32, 0.15, Math.PI-0.15);
ctx.stroke();

// Flickering tongue
if (Math.floor(frameCount/15)%2 === 0) {
ctx.strokeStyle = '#ff5555';
ctx.lineWidth = 2;
ctx.lineCap = 'round';
ctx.beginPath();
ctx.moveTo(dir.x*r*0.4, dir.y*r*0.4);
ctx.quadraticCurveTo(
dir.x*r*0.58+(dir.y===0?0:2.5),
dir.y*r*0.58+(dir.x===0?0:2.5),
dir.x*r*0.98+(dir.y===0?0:4)*Math.sin(frameCount/5),
dir.y*r*0.98+(dir.x===0?0:4)*Math.sin(frameCount/5)
);
ctx.stroke();
}

// Blush
ctx.fillStyle = 'rgba(255,135,135,0.38)';
const cheekR = r * 0.19;
ctx.beginPath(); ctx.arc(-r*0.68, r*0.2, cheekR, 0, Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.arc(r*0.68, r*0.2, cheekR, 0, Math.PI*2); ctx.fill();
}

ctx.restore();
}

function render() {

// Brighter kid-friendly background
const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
bgGrad.addColorStop(0, '#2a1a4e');
bgGrad.addColorStop(0.4, '#1a1a3e');
bgGrad.addColorStop(0.7, '#0d0d20');
bgGrad.addColorStop(1, '#050510');

ctx.fillRect(0, 0, W, H);

// Floating decorative stars
for (let i=0;i<20;i++) {
const sx = (i*137+frameCount*0.3)%W;
const sy = (i*251+frameCount*0.2)%H;
const sr = 1+Math.sin(frameCount/30+i)*1;

// Grid (subtle) - board area only

for (let x=BOARD.x;x<BOARD.x+BOARD.w;x+=GS) { ctx.beginPath(); ctx.moveTo(x,BOARD.y); ctx.lineTo(x,BOARD.y+BOARD.h); ctx.stroke(); }
for (let y=BOARD.y;y<BOARD.y+BOARD.h;y+=GS) { ctx.beginPath(); ctx.moveTo(BOARD.x,y); ctx.lineTo(BOARD.x+BOARD.w,y); ctx.stroke(); }

// Board background + decorative border

// Tile bp.png as board background
const pat = ctx.createPattern(imgBg, 'repeat');
if (pat) { ctx.fillStyle = pat; ctx.beginPath(); ctx.roundRect(BOARD.x-2, BOARD.y-2, BOARD.w+4, BOARD.h+4, 8); ctx.fill(); }
} else {
ctx.fillStyle = 'rgba(15,10,30,.55)';
ctx.beginPath(); ctx.roundRect(BOARD.x-2, BOARD.y-2, BOARD.w+4, BOARD.h+4, 8); ctx.fill();
}
ctx.strokeStyle = 'rgba(200,180,255,.35)';
ctx.lineWidth = 2.5;
ctx.setLineDash([8,4]);
ctx.beginPath(); ctx.roundRect(BOARD.x-2, BOARD.y-2, BOARD.w+4, BOARD.h+4, 8); ctx.stroke();

// Apply shake
let sx=0, sy=0;
if (shakeDuration > 0) {
sx = (Math.random()-0.5)*shakeAmount*2;
sy = (Math.random()-0.5)*shakeAmount*2;
}
ctx.save();
ctx.translate(sx, sy);

// Draw power-up indicator (magnetic field effect)
if (powerUpActive && powerUp.type) {
const head = snake[0];
const hx = BOARD.x + head.x*GS+GS/2;
const hy = BOARD.y + head.y*GS+GS/2;
const pr = 120+Math.sin(frameCount/10)*20;
const pgrad = ctx.createRadialGradient(hx, hy, 20, hx, hy, pr);
const pc = powerUp.type.color;
pgrad.addColorStop(0, pc.replace(')','.3)').replace('rgb', 'rgba'));
pgrad.addColorStop(1, 'transparent');
ctx.fillStyle = pgrad;
ctx.beginPath(); ctx.arc(hx, hy, pr, 0, Math.PI*2); ctx.fill();
}

// Draw snake
try {
		for (let i=snake.length-1;i>=0;i--) {
			drawSnakeSegment(snake[i].x, snake[i].y, i, snake.length);
		}
	} catch(e) { ctx.fillStyle="red"; ctx.font="14px sans-serif"; ctx.fillText("Err:"+e.message,10,90); }

// Draw NPC snakes
for (const npc of npcSnakes) {
for (let i=npc.segments.length-1;i>=0;i--) {
const seg = npc.segments[i];
const sx = BOARD.x + seg.x*GS + GS/2;
const sy = BOARD.y + seg.y*GS + GS/2;
const ratio = i/Math.max(npc.segments.length-1,1);
const r = i===0 ? GS*0.6 : GS/2-2;
ctx.save();
ctx.translate(sx, sy);
// Body
ctx.shadowColor = npc.color;
ctx.shadowBlur = i===0 ? 6 : 2;
ctx.fillStyle = npc.color;
ctx.globalAlpha = 0.85 - ratio*0.3;
ctx.beginPath();
if (i===0) {
ctx.ellipse(0, 0, r*1.05, r*0.9, 0, 0, Math.PI*2);
} else {
ctx.roundRect(-r, -r, r*2, r*2, r*0.6);
}
ctx.fill();
// Small eyes on NPC head
if (i===0) {
ctx.shadowBlur = 0;
ctx.globalAlpha = 1;
ctx.fillStyle = '#fff';
const er = r*0.25;
const eox = r*0.4;
const eoy = -r*0.1;
ctx.beginPath(); ctx.arc(eox, eoy, er, 0, Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.arc(-eox, eoy, er, 0, Math.PI*2); ctx.fill();
ctx.fillStyle = '#111';
ctx.beginPath(); ctx.arc(eox+npc.dir.x*er*0.3, eoy+npc.dir.y*er*0.3, er*0.55, 0, Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.arc(-eox+npc.dir.x*er*0.3, eoy+npc.dir.y*er*0.3, er*0.55, 0, Math.PI*2); ctx.fill();
// NPC name
ctx.fillStyle = 'rgba(255,255,255,.6)';
ctx.font = '9px "Microsoft YaHei",sans-serif';
ctx.textAlign = 'center';
ctx.fillText(npc.name, 0, -r-8);
}
ctx.restore();
}
}
ctx.globalAlpha = 1;

// Draw food
if (food) {
const fx = BOARD.x + food.x*GS+GS/2;
const fy = BOARD.y + food.y*GS+GS/2;
food.pulse = (food.pulse||0)+0.08;

ctx.translate(fx, fy);

const skin = SNAKE_SKINS[selectedSkin];
if (skin.png && imgFood && imgFood.complete && imgFood.naturalWidth > 0) {

} else {
// Glow

// Circle background

// Emoji

ctx.font = `${GS+4}px serif`;

}

// Draw bonus food (flashing)
if (bonusFood) {

ctx.translate(bx, by);
ctx.shadowColor = '#ff69b4';

ctx.font = `${GS+8}px serif`;
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('🍩', 0, 2);
ctx.restore();

// Timer ring
const ratio = bonusFood.life / 200;
ctx.strokeStyle = `rgba(255,105,180,${0.5+ratio*0.5})`;

ctx.beginPath();
ctx.arc(bx, by, GS/2+4, -Math.PI/2, -Math.PI/2+Math.PI*2*ratio);

}
}

// Draw power-up
if (powerUp) {
const px = BOARD.x + powerUp.x*GS+GS/2;
const py = BOARD.y + powerUp.y*GS+GS/2;

ctx.translate(px, py);

// Spinning ring

}

// Draw particles
for (const p of particles) {
const alpha = p.life/40;
ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
if (!p.color.includes('rgba')) {
ctx.globalAlpha = alpha;
ctx.fillStyle = p.color;
}
ctx.beginPath();
ctx.arc(p.x, p.y, p.size*(p.life/40), 0, Math.PI*2);
ctx.fill();
}
ctx.globalAlpha = 1;

// Draw floating texts
for (const t of texts) {
const alpha = t.life/35;

ctx.restore();

// Power-up status bar
if (powerUpActive && powerUp.type) {

const barH = 8;

ctx.fillStyle = '#fff';

}

// Pause overlay
if (gamePaused) {
ctx.fillStyle = 'rgba(0,0,0,.6)';

ctx.font = 'bold 36px "Microsoft YaHei",sans-serif';

ctx.fillText('⏸ 暂停', W/2, H/2);
}
}

// Virtual joystick
const joyZone = document.getElementById('joystickZone');
const joyKnob = document.getElementById('joystickKnob');
let joyActive = false, joyId = null, joyCX = 0, joyCY = 0, joyR = 0;
function initJoystickPos() {
const rect = joyZone.getBoundingClientRect();
joyCX = rect.left + rect.width/2;
joyCY = rect.top + rect.height/2;
joyR = rect.width/2 - 18;
}
joyZone.addEventListener('pointerdown', e => {
e.preventDefault();
joyActive = true; joyId = e.pointerId;
initJoystickPos();
joyZone.setPointerCapture(e.pointerId);
updateJoystick(e.clientX, e.clientY);
});
joyZone.addEventListener('pointermove', e => {
if (!joyActive || e.pointerId !== joyId) return;
e.preventDefault();
updateJoystick(e.clientX, e.clientY);
});
function updateJoystick(cx, cy) {
let dx = cx - joyCX;
let dy = cy - joyCY;
const dist = Math.sqrt(dx*dx+dy*dy);
const clampR = Math.min(dist, joyR);
const nx = dist > 0 ? (dx/dist)*clampR : 0;
const ny = dist > 0 ? (dy/dist)*clampR : 0;
joyKnob.style.transform = `translate(${nx}px, ${ny}px)`;
if (dist < 12) return;
if (Math.abs(dx) > Math.abs(dy)) setDir(dx>0?1:-1, 0);
else setDir(0, dy>0?1:-1);
}
function resetJoystick() {
joyActive = false; joyId = null;
joyKnob.style.transform = 'translate(0, 0)';
}
joyZone.addEventListener('pointerup', e => { e.preventDefault(); resetJoystick(); });
joyZone.addEventListener('pointerleave', e => { e.preventDefault(); resetJoystick(); });
joyZone.addEventListener('pointercancel', e => { resetJoystick(); });

// Touch swipe on canvas
let touchStart = null;
canvas.addEventListener('touchstart', e => {
e.preventDefault();
if (!gameStarted || gameOver) return;
const t = e.touches[0];
touchStart = {x:t.clientX, y:t.clientY};
});
canvas.addEventListener('touchmove', e => {
e.preventDefault();
if (!touchStart || !gameStarted || gameOver) return;
const t = e.touches[0];
const dx = t.clientX - touchStart.x;
const dy = t.clientY - touchStart.y;
const minSwipe = 20;
if (Math.abs(dx) > minSwipe || Math.abs(dy) > minSwipe) {
if (Math.abs(dx) > Math.abs(dy)) { setDir(dx>0?1:-1, 0); }
else { setDir(0, dy>0?1:-1); }
touchStart = {x:t.clientX, y:t.clientY};
}
});
canvas.addEventListener('touchend', () => { touchStart = null; });
	canvas.addEventListener('touchcancel', () => { touchStart = null; });

function setDir(dx, dy) {
if (dx !== 0 && dir.x === -dx) return;
if (dy !== 0 && dir.y === -dy) return;
if (dx !== dir.x || dy !== dir.y) sfxTurn();
nextDir = {x:dx, y:dy};

			setTimeout(() => { const slot = document.getElementById("interstitialAdSlot"); if (slot && slot.innerHTML.includes("加载中")) { slot.innerHTML = "<div style=color:#aaa;font:13px Microsoft YaHei,sans-serif>广告暂时无法加载<br>点击下方按钮继续</div>"; } }, 3000);const skipBtn = document.getElementById('skipInterstitial');
			if (skipBtn) {
				skipBtn.textContent = '5 秒后可跳过'; skipBtn.disabled = true;
				let cd = 5;
				const timer = setInterval(() => {
					cd--;
					if (cd <= 0) { clearInterval(timer); skipBtn.textContent = '跳过广告 ▶'; skipBtn.disabled = false; }
					else { skipBtn.textContent = cd + ' 秒后可跳过'; }
				}, 1000);
			}
		},
	};
	GameMonetize.init();

	// 防护广告层遮挡游戏UI：监控并消除全屏遮罩点击拦截
	const _adGuard = new MutationObserver(() => {
		const allLinks = document.querySelectorAll('a[href*="f57rgmf8"]');
		allLinks.forEach(link => {
			link.style.pointerEvents = 'none';
			link.style.zIndex = '13';
			if (link.parentElement && link.parentElement !== document.body) {
				link.parentElement.style.pointerEvents = 'none';
				link.parentElement.style.zIndex = '13';
			}
		});
	});
	_adGuard.observe(document.body, { childList: true, subtree: true });
