<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>贪吃蛇大作战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
body{background:#0a0a12;color:#ddd;font:14px 'Microsoft YaHei',sans-serif;overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column}
#hdr{display:flex;justify-content:space-between;align-items:center;padding:4px 10px;height:36px;flex-shrink:0;background:rgba(10,8,20,.8)}
#hdr .t{color:#ffd700;font-weight:bold;font-size:14px;cursor:pointer}
#hdr .r{color:#888;font-size:12px}#hdr .r span{color:#ffd700;font-weight:bold}
#hdr .b{display:flex;gap:4px}
#hdr .b button{padding:2px 8px;border:1px solid rgba(255,255,255,.08);border-radius:3px;background:rgba(255,255,255,.03);color:#888;cursor:pointer;font:11px sans-serif}
#hdr .b button.on{border-color:#ffd700;color:#ffd700;background:rgba(255,215,0,.08)}
canvas{display:block;width:100%;flex:1;background:#1a1a2a;image-rendering:pixelated}
#ftr{display:flex;justify-content:center;align-items:center;gap:8px;padding:4px 8px;height:36px;flex-shrink:0;background:rgba(10,8,20,.8)}
#ftr button{padding:2px 12px;border:1px solid rgba(255,255,255,.08);border-radius:3px;background:rgba(255,255,255,.03);color:#888;cursor:pointer;font:11px sans-serif}
#ftr button.on{border-color:#ffd700;color:#ffd700}
#ftr .s{padding:0 4px;font-size:11px;color:#666}
#msg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:none;justify-content:center;align-items:center}
#msg>div{background:rgba(15,10,30,.96);border:1px solid rgba(150,130,200,.25);border-radius:10px;padding:20px;text-align:center;max-width:320px;width:90%}
#msg h2{color:#c49bff;font-size:16px;margin-bottom:8px}
#msg p{color:#aaa;font-size:13px;line-height:1.6;margin-bottom:12px}
#msg button{padding:8px 24px;border:1px solid rgba(255,215,0,.25);border-radius:6px;background:rgba(255,215,0,.08);color:#ffd700;cursor:pointer;font:14px 'Microsoft YaHei',sans-serif;margin:3px}
#msg button:hover{background:rgba(255,215,0,.15)}
@media(max-width:500px){#hdr .t{font-size:12px}#hdr .r{font-size:10px}}
</style></head>
<body>
<div id="hdr"><span class="t" onclick="showMenu()">🐍 贪吃蛇</span><span class="r">🏆 <span id="sc">0</span></span><div class="b" id="spdBtns"><button class="on">1×</button><button>1.5×</button><button>2×</button></div></div>
<canvas id="c"></canvas>
<div id="ftr"><button onclick="showMenu()">⏸ 菜单</button><span class="s">方向键/WASD  |  滑动触屏</span></div>
<div id="msg"><div id="msgC"></div></div>
<script>
const SKINS=['snake000','snake001','snake002','snake003','snake005','snake010','snake015'];
const H=2,B=1,T=8;
// 转弯帧: 帧0=右下,帧4=右上,帧6=左下,帧10=左上
const TURN_MAP={'1,0,0,1':0,'0,1,1,0':4,'1,0,0,-1':10,'0,-1,1,0':0,'-1,0,0,1':6,'0,1,-1,0':6,'-1,0,0,-1':4,'0,-1,-1,0':10};
let sheets={},si=0,spd=1;
let cv=document.getElementById('c'),cx=cv.getContext('2d');
let sn=[],food={},dir={},nd={},go=false,mt=null,sc=0,hs=parseInt(localStorage.getItem('snakeHS')||'0'),loadOK=false,TS=32;

function rs(){TS=Math.max(16,Math.min(48,cv.clientWidth/25|0));cv.width=cv.clientWidth-cv.clientWidth%TS;cv.height=cv.clientHeight-cv.clientHeight%TS;}
function msg(h,b){document.getElementById('msgC').innerHTML='<h2>'+h+'</h2><p>'+b+'</p><button onclick="closeMsg()">确定</button>';document.getElementById('msg').style.display='flex';}
function closeMsg(){document.getElementById('msg').style.display='none';}

function load(cb){let n=0;SKINS.forEach(nm=>{let i=new Image();i.onload=()=>{sheets[nm]=i;n++;if(n>=SKINS.length)cb();};i.onerror=()=>{n++;if(n>=SKINS.length)cb();};i.src='assets/贪吃蛇大作战/BattleSnake/snakes/snakesSets/'+nm+'.png';});setTimeout(()=>{if(!loadOK)cb();},3000);}

function sf(){let x,y,mx=cv.width/TS|0,my=cv.height/TS|0;do{x=2+Math.random()*(mx-4|0);y=2+Math.random()*(my-4|0);}while(sn.some(s=>s.x===x&&s.y===y));food={x:x|0,y:y|0};}

function ig(){
  if(mt){clearInterval(mt);mt=null;}
  rs();let cy2=cv.height/TS/2|0;sn=[];for(let i=6;i>=0;i--)sn.push({x:3+i,y:cy2});
  dir={x:1,y:0};nd={x:1,y:0};go=false;sc=0;
  document.getElementById('sc').textContent='0';sf();rd();
  mt=setInterval(tk,150/spd);
}

function tk(){
  if(go)return;
  dir={...nd};let h=sn[0],nx=h.x+dir.x,ny=h.y+dir.y,mx=cv.width/TS|0,my=cv.height/TS|0;
  if(nx<0||nx>=mx||ny<0||ny>=my||sn.some(s=>s.x===nx&&s.y===ny)){go=true;rd();return;}
  sn.unshift({x:nx,y:ny});
  if(nx===food.x&&ny===food.y){sc+=10;document.getElementById('sc').textContent=sc;sf();if(sc>hs){hs=sc;localStorage.setItem('snakeHS',String(hs));}}
  else sn.pop();
  rd();
}

function df(f,dx,dy,s){let sheet=sheets[SKINS[si]];if(!sheet)return;cx.drawImage(sheet,(f%4)*32,(f/4|0)*32,32,32,dx,dy,s||TS,s||TS);}

function rd(){
  rs();let sheet=sheets[SKINS[si]],mx=cv.width/TS|0,my=cv.height/TS|0;
  cx.clearRect(0,0,cv.width,cv.height);
  for(let y=0;y<my;y++)for(let x=0;x<mx;x++){cx.fillStyle=(x+y)%2?'#1a1a2a':'#2a2a3a';cx.fillRect(x*TS,y*TS,TS,TS);}
  // 食物
  cx.shadowColor='#ff4444';cx.shadowBlur=TS;cx.fillStyle='#ff4444';
  cx.beginPath();cx.arc(food.x*TS+TS/2,food.y*TS+TS/2,TS/3,0,Math.PI*2);cx.fill();cx.shadowBlur=0;
  cx.fillStyle='rgba(255,255,255,.3)';cx.beginPath();cx.arc(food.x*TS+TS/2-3,food.y*TS+TS/2-3,TS/8,0,Math.PI*2);cx.fill();
  // 蛇
  if(!sheet){sn.forEach((s,i)=>{cx.fillStyle=i===0?'#ffd700':i===sn.length-1?'#a050ff':'#4dc9f6';cx.fillRect(s.x*TS,s.y*TS,TS-1,TS-1);});}
  else{sn.forEach((seg,i)=>{
    let d={};if(i===0)d={...dir};else{d.x=seg.x-sn[i-1].x;d.y=seg.y-sn[i-1].y;}
    let turnF=-1;
    if(i>0&&i<sn.length-1){
      let nx=sn[i+1].x-seg.x,ny=sn[i+1].y-seg.y;
      if(d.x!==nx||d.y!==ny){
        let ex=(-nx)+','+(-ny)+','+(-d.x)+','+(-d.y);
        turnF={'1,0,0,1':6,'0,1,-1,0':10,'-1,0,0,-1':4,'0,-1,1,0':11,'0,1,1,0':4,'-1,0,0,1':11,'1,0,0,-1':10,'0,-1,-1,0':6}[ex]||B;
      }
    }
    let f=i===0?H:i===sn.length-1?T:(turnF>=0?turnF:B);cx.save();cx.translate(seg.x*TS+TS/2,seg.y*TS+TS/2);let a=0;
    if(i===0){if(d.x===1)a=0;else if(d.x===-1)a=Math.PI;else if(d.y===1)a=Math.PI/2;else a=-Math.PI/2;}
    else if(i===sn.length-1){let p=sn[i-1];if(p.x<seg.x)a=Math.PI;else if(p.x>seg.x)a=0;else if(p.y<seg.y)a=-Math.PI/2;else a=Math.PI/2;}
    else if(turnF>=0)a=0;
    else{if(d.x===1)a=0;else if(d.x===-1)a=Math.PI;else if(d.y===1)a=Math.PI/2;else a=-Math.PI/2;}
    cx.rotate(a);df(f,-TS/2,-TS/2,TS);cx.restore();
  });}
  // HUD
  if(hs>0){cx.fillStyle='rgba(0,0,0,.3)';cx.fillRect(2,2,100,18);cx.fillStyle='#888';cx.font='10px sans-serif';cx.textAlign='left';cx.fillText('🏆 最高 '+hs,6,14);}
  // Game Over
  if(go){cx.fillStyle='rgba(0,0,0,.6)';cx.fillRect(0,0,cv.width,cv.height);
    cx.fillStyle='#ff4444';cx.font='bold '+Math.min(48,cv.width/12|0)+'px sans-serif';cx.textAlign='center';
    cx.fillText('GAME OVER',cv.width/2,cv.height/2-20);
    cx.fillStyle='#aaa';cx.font='16px sans-serif';cx.fillText('点击或按空格重新开始',cv.width/2,cv.height/2+30);}
}

function showMenu(){
  let skins=SKINS.map((n,i)=>'<button style="border-color:'+(i===si?'#ffd700':'rgba(255,255,255,.08)')+';color:'+(i===si?'#ffd700':'#888')+'" onclick="selSkin('+i+')">'+(i+1)+'</button>').join('');
  document.getElementById('msgC').innerHTML='<h2>🐍 贪吃蛇大作战</h2><p>选择皮肤:</p><div style="display:flex;gap:4px;justify-content:center;flex-wrap:wrap">'+skins+'</div><p style="margin-top:8px;font-size:11px;color:#666">最高分: '+hs+'</p><button onclick="closeMsg();ig()">🎮 开始游戏</button>';
  document.getElementById('msg').style.display='flex';}
function selSkin(i){si=i;closeMsg();ig();}

document.querySelectorAll('#spdBtns button').forEach((btn,i)=>{btn.onclick=()=>{spd=[1,1.5,2][i];document.querySelectorAll('#spdBtns button').forEach(b=>b.className='');btn.className='on';if(mt){clearInterval(mt);mt=setInterval(tk,150/spd);}};});

document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Space'){e.preventDefault();if(go)ig();return;}
  if(e.key==='Enter'){if(go)ig();return;}
  if(go||document.getElementById('msg').style.display==='flex')return;
  switch(e.key){case'ArrowUp':case'w':case'W':if(dir.y!==1)nd={x:0,y:-1};e.preventDefault();break;
  case'ArrowDown':case's':case'S':if(dir.y!==-1)nd={x:0,y:1};e.preventDefault();break;
  case'ArrowLeft':case'a':case'A':if(dir.x!==1)nd={x:-1,y:0};e.preventDefault();break;
  case'ArrowRight':case'd':case'D':if(dir.x!==-1)nd={x:1,y:0};e.preventDefault();break;
  case'p':case'P':showMenu();e.preventDefault();break;}
});

let tx=0,ty=0;
cv.addEventListener('touchstart',e=>{const t=e.touches[0];tx=t.clientX;ty=t.clientY;});
cv.addEventListener('touchend',e=>{
  if(document.getElementById('msg').style.display==='flex')return;
  if(go){ig();return;}
  const t=e.changedTouches[0],dx=t.clientX-tx,dy=t.clientY-ty;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
  if(Math.abs(dx)>Math.abs(dy)){if(dir.x!==1)nd={x:-1,y:0};if(dir.x!==-1)nd={x:1,y:0};}
  else{if(dir.y!==1)nd={x:0,y:-1};if(dir.y!==-1)nd={x:0,y:1};}
  e.preventDefault();
});
cv.addEventListener('click',()=>{if(go)ig();});
window.addEventListener('resize',()=>{if(!go&&mt)rd();});

rs();load(()=>{loadOK=true;showMenu();});
</script></body></html>
