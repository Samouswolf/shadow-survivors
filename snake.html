<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇大作战 - 彩虹蛇蛇</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:"Microsoft YaHei","PingFang SC",sans-serif}
canvas{display:block}
.ui-top{position:fixed;top:8px;left:8px;right:8px;z-index:10;display:flex;justify-content:space-between;align-items:center;pointer-events:none;gap:8px}
.ui-top>*{pointer-events:auto}
.score-display{background:rgba(10,10,20,.85);color:#ffd700;padding:6px 14px;border-radius:20px;font:bold 16px "Microsoft YaHei",sans-serif;border:1px solid rgba(255,215,0,.3)}
.combo-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font:bold 48px "Microsoft YaHei",sans-serif;pointer-events:none;z-index:20;animation:popUp .6s ease-out forwards;text-shadow:0 0 30px currentColor}
@keyframes popUp{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}50%{opacity:1;transform:translate(-50%,-80%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-120%) scale(1)}}
.menu{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(20,10,40,.92),rgba(0,0,0,.97));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99;gap:16px}
.menu h1{font:bold 52px "Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff,#ff6b6b);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:rainbow 3s ease infinite;letter-spacing:6px}
@keyframes rainbow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.menu .emoji-snake{font-size:80px;animation:bounce 1s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.menu .sub{color:#888;font-size:15px;margin-top:-8px}
.menu .high-score{color:#ffd700;font-size:18px}
.start-btn{padding:14px 56px;background:linear-gradient(135deg,#ff6b6b,#ff8e53);border:none;border-radius:30px;color:#fff;font:bold 22px "Microsoft YaHei",sans-serif;cursor:pointer;letter-spacing:4px;transition:.25s;box-shadow:0 8px 30px rgba(255,107,107,.4)}
.start-btn:hover{transform:scale(1.06);box-shadow:0 12px 40px rgba(255,107,107,.6)}
.start-btn:active{transform:scale(.96)}
.diff-row{display:flex;gap:10px}
.diff-btn{padding:8px 20px;border:2px solid rgba(255,255,255,.2);border-radius:20px;background:rgba(255,255,255,.04);color:#aaa;cursor:pointer;font:14px "Microsoft YaHei",sans-serif;transition:.2s}
.diff-btn.active{border-color:#ffd93d;background:rgba(255,215,60,.15);color:#ffd93d}
.over-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;gap:12px}
.over-overlay h2{font:bold 42px "Microsoft YaHei",sans-serif;color:#ff6b6b;text-shadow:0 0 30px rgba(255,107,107,.5)}
.over-score{color:#ffd700;font:bold 28px "Microsoft YaHei",sans-serif}
.over-new{color:#4dff4d;font:bold 20px "Microsoft YaHei",sans-serif;animation:bounce .6s ease-in-out infinite}
.over-btn{padding:12px 40px;border:none;border-radius:25px;color:#fff;font:bold 18px "Microsoft YaHei",sans-serif;cursor:pointer;transition:.2s;background:linear-gradient(135deg,#8e44ad,#c49bff)}
.over-btn:hover{transform:scale(1.04)}
.mobile-controls{position:fixed;bottom:20px;left:0;right:0;z-index:10;display:none;justify-content:center;align-items:center}
.dpad{position:relative;width:160px;height:160px}
.dpad-btn{position:absolute;width:52px;height:52px;background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;touch-action:none}
.dpad-btn:active{background:rgba(200,150,255,.3);border-color:#c49bff}
.dpad-up{top:0;left:54px}
.dpad-down{bottom:0;left:54px}
.dpad-left{top:54px;left:0}
.dpad-right{top:54px;right:0}
@media(max-width:768px){
.mobile-controls{display:flex}
.menu h1{font-size:36px}
.over-overlay h2{font-size:32px}
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui-top">
<div class="score-display" id="scoreUI">🍎 0</div>
<div style="display:flex;gap:6px">
<button id="pauseBtn" style="background:rgba(10,10,20,.85);color:#fff;border:1px solid rgba(255,255,255,.2);padding:6px 12px;border-radius:20px;font:13px 'Microsoft YaHei',sans-serif;cursor:pointer">⏸</button>
<button id="soundBtn" style="background:rgba(10,10,20,.85);color:#fff;border:1px solid rgba(255,255,255,.2);padding:6px 12px;border-radius:20px;font:13px 'Microsoft YaHei',sans-serif;cursor:pointer">🔊</button>
</div>
</div>

<div class="mobile-controls" id="mobileCtrl">
<div class="dpad">
<button class="dpad-btn dpad-up" data-dir="up">▲</button>
<button class="dpad-btn dpad-down" data-dir="down">▼</button>
<button class="dpad-btn dpad-left" data-dir="left">◀</button>
<button class="dpad-btn dpad-right" data-dir="right">▶</button>
</div>
</div>

<div class="menu" id="menu">
<div class="emoji-snake">🐍</div>
<h1>贪吃蛇大作战</h1>
<div class="sub">彩虹蛇蛇 · 收集星星 · 超级加速</div>
<div class="high-score" id="highScoreMenu">🏆 最高分: 0</div>
<div class="diff-row" id="diffRow"></div>
<button class="start-btn" id="startBtn">🎮 开始游戏</button>
<div style="color:#888;font:12px 'Microsoft YaHei',sans-serif">键盘方向键/WASD | 手机滑动/方向按钮</div>
</div>

<div class="over-overlay" id="overOverlay">
<h2>游戏结束</h2>
<div class="over-score" id="overScore">得分: 0</div>
<div class="over-new" id="overNew" style="display:none">🎉 新纪录！</div>
<button class="over-btn" id="overRestart">🔄 再来一局</button>
<button class="over-btn" id="overMenu" style="background:rgba(255,255,255,.15)">🏠 返回菜单</button>
</div>

<script>
// ===== AUDIO =====
let audioCtx = null;
function initAudio() {
if (!audioCtx) { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
if (audioCtx.state === 'suspended') audioCtx.resume();
}
let soundOn = true;
function beep(freq, type='square', dur=0.1, vol=0.08, slide=0) {
if (!audioCtx || !soundOn) return;
const t = audioCtx.currentTime;
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.type = type;
osc.frequency.setValueAtTime(freq, t);
if (slide) osc.frequency.linearRampToValueAtTime(freq+slide, t+dur);
gain.gain.setValueAtTime(vol, t);
gain.gain.exponentialRampToValueAtTime(0.001, t+dur);
osc.connect(gain); gain.connect(audioCtx.destination);
osc.start(t); osc.stop(t+dur);
}
function sfxEat() { beep(600+Math.random()*300, 'sine', 0.08, 0.06, 200) }
function sfxCombo() { beep(900, 'triangle', 0.12, 0.1, 400) }
function sfxPowerUp() { [523,659,784,1047].forEach((f,i)=>beep(f,'sine',0.15,0.08,0)) }
function sfxDie() { beep(50, 'sawtooth', 0.5, 0.15, -30) }
function sfxBonus() { beep(1200, 'sine', 0.1, 0.06, -200) }

// ===== CANVAS =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
W = canvas.width = innerWidth;
H = canvas.height = innerHeight;
}
resize();
window.onresize = resize;

// ===== GAME STATE =====
const GS = 18; // grid size
let snake, food, bonusFood, particles, texts, powerUp;
let dir, nextDir, score, combo, comboTimer, highScore;
let gameRunning, gamePaused, gameOver, gameStarted;
let speed, baseSpeed, difficulty, frameCount;
let powerUpActive, powerUpTimer;
let shakeAmount, shakeDuration;
let rainbowHue;

const DIFF_NAMES = ['🍼 简单', '⚡ 普通', '🔥 困难'];
const DIFF_SPEEDS = [80, 55, 35];

// Food types with different scores/effects
const FOOD_TYPES = [
{ emoji:'🍎', score:1, color:'#ff4444', glow:'#ff0000', chance:40 },
{ emoji:'🍊', score:2, color:'#ff8c42', glow:'#ff6600', chance:25 },
{ emoji:'🍇', score:3, color:'#9b59b6', glow:'#8e44ad', chance:15 },
{ emoji:'⭐', score:5, color:'#ffd700', glow:'#ffaa00', chance:10 },
{ emoji:'💎', score:10, color:'#4dff4d', glow:'#00ff00', chance:5 },
{ emoji:'🌈', score:8, color:'#ff69b4', glow:'#ff1493', chance:3 },
{ emoji:'🦄', score:15, color:'#ff00ff', glow:'#ff00ff', chance:2 },
];

// ===== INIT =====
function initGame() {
const cols = Math.floor(W / GS);
const rows = Math.floor(H / GS);
const cx = Math.floor(cols / 2);
const cy = Math.floor(rows / 2);

snake = [
{x:cx, y:cy},
{x:cx-1, y:cy},
{x:cx-2, y:cy},
];
dir = {x:1, y:0};
nextDir = {x:1, y:0};
score = 0;
combo = 0;
comboTimer = 0;
food = null;
bonusFood = null;
particles = [];
texts = [];
powerUp = null;
powerUpActive = false;
powerUpTimer = 0;
speed = baseSpeed;
gameRunning = true;
gamePaused = false;
gameOver = false;
gameStarted = true;
frameCount = 0;
shakeAmount = 0;
shakeDuration = 0;
rainbowHue = 0;
spawnFood();
updateScoreUI();
document.getElementById('overOverlay').style.display = 'none';
document.getElementById('mobileCtrl').style.display = innerWidth<=768 ? 'flex':'none';
}

function spawnFood() {
const cols = Math.floor(W / GS);
const rows = Math.floor(H / GS);
let fx, fy, valid;
do {
fx = Math.floor(Math.random() * cols);
fy = Math.floor(Math.random() * rows);
valid = true;
for (const s of snake) { if (s.x===fx && s.y===fy) { valid=false; break; } }
if (bonusFood && bonusFood.x===fx && bonusFood.y===fy) valid=false;
if (powerUp && powerUp.x===fx && powerUp.y===fy) valid=false;
} while (!valid);

// Pick food type based on chance
const roll = Math.random() * 100;
let acc = 0, type = FOOD_TYPES[0];
for (const ft of FOOD_TYPES) { acc += ft.chance; if (roll <= acc) { type = ft; break; } }
food = {x:fx, y:fy, type, pulse:0 };
}

function spawnBonusFood() {
if (bonusFood) return;
const cols = Math.floor(W / GS);
const rows = Math.floor(H / GS);
let fx, fy, valid;
do {
fx = Math.floor(Math.random() * cols);
fy = Math.floor(Math.random() * rows);
valid = true;
for (const s of snake) { if (s.x===fx && s.y===fy) { valid=false; break; } }
if (food && food.x===fx && food.y===fy) valid=false;
if (powerUp && powerUp.x===fx && powerUp.y===fy) valid=false;
} while (!valid);
bonusFood = {x:fx, y:fy, life:200, type:{emoji:'🍩', score:8, color:'#ff69b4', glow:'#ff1493', chance:0}};
}

function spawnPowerUp() {
if (powerUp || powerUpActive) return;
const cols = Math.floor(W / GS);
const rows = Math.floor(H / GS);
let fx, fy, valid;
do {
fx = Math.floor(Math.random() * cols);
fy = Math.floor(Math.random() * rows);
valid = true;
for (const s of snake) { if (s.x===fx && s.y===fy) { valid=false; break; } }
if (food && food.x===fx && food.y===fx) valid=false;
if (bonusFood && bonusFood.x===fx && bonusFood.y===fy) valid=false;
} while (!valid);
const types = [
{emoji:'⚡', name:'加速', color:'#00f0ff', glow:'#00ffff', duration:120},
{emoji:'🛡️', name:'护盾', color:'#ffd700', glow:'#ffaa00', duration:180},
{emoji:'🧲', name:'磁铁', color:'#ff69b4', glow:'#ff1493', duration:150},
];
powerUp = {x:fx, y:fy, type:types[Math.floor(Math.random()*types.length)], life:250};
}

function updateScoreUI() {
document.getElementById('scoreUI').textContent = `🍎 ${score}`;
}
function updateHighScoreUI() {
document.getElementById('highScoreMenu').textContent = `🏆 最高分: ${highScore}`;
}

// ===== PARTICLES =====
function burstParticles(x, y, color, count=15) {
for (let i=0;i<count;i++) {
const a = Math.random()*Math.PI*2;
const sp = 2+Math.random()*6;
particles.push({
x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
life:20+Math.random()*20, color, size:2+Math.random()*5,
});
}
}

function addFloatingText(x, y, text, color='#fff', size=22) {
texts.push({x, y, text, color, size, life:35, vy:-2.5});
}

// ===== SCREEN SHAKE =====
function shake(intensity, dur) {
shakeAmount = Math.max(shakeAmount, intensity);
shakeDuration = Math.max(shakeDuration, dur);
}

function popCombo(text, color) {
const el = document.createElement('div');
el.className = 'combo-pop';
el.textContent = text;
el.style.color = color;
document.body.appendChild(el);
setTimeout(() => el.remove(), 600);
}

// ===== UPDATE =====
function update() {
if (!gameRunning || gamePaused || gameOver) return;
frameCount++;

// Combo timer
if (comboTimer > 0) { comboTimer--; if (comboTimer<=0) combo=0; }

// Power-up timer
if (powerUpActive) {
powerUpTimer--;
if (powerUpTimer <= 0) { powerUpActive = false; addFloatingText(snake[0].x*GS, snake[0].y*GS, '效果结束', '#888', 16); }
}

// Bonus food timer
if (bonusFood) { bonusFood.life--; if (bonusFood.life<=0) bonusFood=null; }

// PowerUp spawn timer
if (powerUp) { powerUp.life--; if (powerUp.life<=0) powerUp=null; }

// Random bonus food
if (!bonusFood && frameCount % 300 === 0 && Math.random() < 0.3) spawnBonusFood();
if (!powerUp && !powerUpActive && frameCount % 400 === 0 && Math.random() < 0.25) spawnPowerUp();

// Move snake
dir = {...nextDir};
const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};

// Wall collision
const cols = Math.floor(W / GS);
const rows = Math.floor(H / GS);
if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) {
die();
return;
}

// Self collision (skip if shield active)
const shieldType = powerUpActive && powerUp && powerUp.type.name==='护盾';
if (!shieldType) {
for (const s of snake) {
if (s.x===head.x && s.y===head.y) { die(); return; }
}
}

snake.unshift(head);

// Check food
if (food && head.x===food.x && head.y===food.y) {
const ft = food.type;
score += ft.score;
combo++;
comboTimer = 40;
burstParticles(food.x*GS+GS/2, food.y*GS+GS/2, ft.color, 12+combo*2);
addFloatingText(food.x*GS+GS/2, food.y*GS, `+${ft.score}`, ft.color, 18+combo);
sfxEat();

if (combo >= 5 && combo % 5 === 0) {
const bonus = combo * 2;
score += bonus;
popCombo(`🔥 ${combo}连击! +${bonus}`, '#ffd700');
sfxCombo();
shake(4+combo/2, 6);
burstParticles(head.x*GS+GS/2, head.y*GS+GS/2, '#ffd700', 25);
}

if (combo === 10) {
popCombo('🌟 超级连击!', '#ff00ff');
sfxPowerUp();
shake(8, 10);
}

spawnFood();
updateScoreUI();
} else {
snake.pop();
}

// Check bonus food
if (bonusFood && head.x===bonusFood.x && head.y===bonusFood.y) {
const bonus = bonusFood.type.score + Math.floor(Math.random()*10);
score += bonus;
burstParticles(bonusFood.x*GS+GS/2, bonusFood.y*GS+GS/2, '#ff69b4', 30);
addFloatingText(bonusFood.x*GS+GS/2, bonusFood.y*GS, `+${bonus} 甜甜圈!`, '#ff69b4', 24);
sfxBonus();
shake(6, 8);
bonusFood = null;
updateScoreUI();
}

// Check power-up
if (powerUp && head.x===powerUp.x && head.y===powerUp.y) {
const pt = powerUp.type;
powerUpActive = true;
powerUpTimer = pt.duration;
burstParticles(powerUp.x*GS+GS/2, powerUp.y*GS+GS/2, pt.color, 35);
addFloatingText(powerUp.x*GS+GS/2, powerUp.y*GS, `${pt.emoji} ${pt.name}!`, pt.color, 26);
sfxPowerUp();
shake(5, 7);

// Apply effect
if (pt.name==='加速') { speed = Math.floor(baseSpeed/2); }
if (pt.name==='磁铁') { /* magnet handled in rendering/spawning */ }

powerUp = null;
}

// Speed boost when power-up active
if (powerUpActive && powerUp.type && powerUp.type.name==='加速') {
// already set
} else {
speed = baseSpeed;
}

// Update particles
for (let i=particles.length-1;i>=0;i--) {
const p = particles[i];
p.x+=p.vx; p.y+=p.vy; p.life--;
if (p.life<=0) particles.splice(i,1);
}

// Update floating texts
for (let i=texts.length-1;i>=0;i--) {
const t = texts[i];
t.y+=t.vy; t.life--;
if (t.life<=0) texts.splice(i,1);
}

// Shake decay
if (shakeDuration>0) { shakeDuration--; shakeAmount*=0.85; }

// Check high score
if (score > highScore) {
highScore = score;
localStorage.setItem('snakeHigh', highScore);
}

rainbowHue += 0.02;
}

function die() {
gameRunning = false;
gameOver = true;
sfxDie();
burstParticles(snake[0].x*GS+GS/2, snake[0].y*GS+GS/2, '#ff0000', 50);
shake(15, 15);

if (score > highScore) {
highScore = score;
localStorage.setItem('snakeHigh', highScore);
updateHighScoreUI();
}

document.getElementById('overScore').textContent = `得分: ${score}`;
const isNew = score >= highScore;
document.getElementById('overNew').style.display = isNew ? 'block' : 'none';
document.getElementById('overOverlay').style.display = 'flex';
}

// ===== RENDER =====
function drawSnakeSegment(x, y, i, total) {
const sx = x * GS + GS/2;
const sy = y * GS + GS/2;
const ratio = i / Math.max(total-1, 1);

// Rainbow snake!
const hue = (rainbowHue * 60 + i * 15) % 360;
const color = `hsl(${hue}, 80%, ${55-ratio*20}%)`;
const glowColor = `hsl(${hue}, 90%, 65%)`;

ctx.save();
ctx.translate(sx, sy);

// Glow
ctx.shadowColor = glowColor;
ctx.shadowBlur = 8 + (i===0?6:2);

// Body
const r = GS/2 - 1;
ctx.fillStyle = color;
ctx.beginPath();
ctx.roundRect(-r, -r, r*2, r*2, r*(1-ratio*0.5));
ctx.fill();

// Eyes on head
if (i === 0) {
ctx.shadowBlur = 0;
const eyeR = r * 0.35;
const eyeOffX = r * 0.5;
const eyeOffY = -r * 0.2;

// White of eyes
ctx.fillStyle = '#fff';
ctx.beginPath(); ctx.arc(eyeOffX, eyeOffY, eyeR*1.3, 0, Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.arc(-eyeOffX, eyeOffY, eyeR*1.3, 0, Math.PI*2); ctx.fill();

// Pupils
ctx.fillStyle = '#111';
const lookX = dir.x * eyeR * 0.4;
const lookY = dir.y * eyeR * 0.4;
ctx.beginPath(); ctx.arc(eyeOffX+lookX, eyeOffY+lookY, eyeR, 0, Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.arc(-eyeOffX+lookX, eyeOffY+lookY, eyeR, 0, Math.PI*2); ctx.fill();

// Tongue (flickers every 30 frames)
if (Math.floor(frameCount/15)%2 === 0) {
const tongueLen = r * 1.2;
const tx = dir.x * r * 0.9;
const ty = dir.y * r * 0.9;
ctx.strokeStyle = '#ff4444';
ctx.lineWidth = 2;
ctx.lineCap = 'round';
ctx.beginPath();
ctx.moveTo(dir.x*r*0.5, dir.y*r*0.5);
ctx.quadraticCurveTo(
dir.x*r*0.7 + (dir.y===0?0:3),
dir.y*r*0.7 + (dir.x===0?0:3),
dir.x*r + (dir.y===0?0:4)*Math.sin(frameCount/5),
dir.y*r + (dir.x===0?0:4)*Math.sin(frameCount/5)
);
ctx.stroke();
}

// Cheeks (cute blush)
ctx.fillStyle = 'rgba(255,150,150,0.5)';
const cheekR = r * 0.25;
ctx.beginPath(); ctx.arc(-r*0.7, r*0.1, cheekR, 0, Math.PI*2); ctx.fill();
ctx.beginPath(); ctx.arc(r*0.7, r*0.1, cheekR, 0, Math.PI*2); ctx.fill();
}

ctx.restore();
}

function render() {
// Background gradient
const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
bgGrad.addColorStop(0, '#1a1a3e');
bgGrad.addColorStop(0.5, '#0d0d20');
bgGrad.addColorStop(1, '#050510');
ctx.fillStyle = bgGrad;
ctx.fillRect(0, 0, W, H);

// Grid (subtle)
ctx.strokeStyle = 'rgba(255,255,255,.02)';
ctx.lineWidth = 1;
for (let x=0;x<W;x+=GS) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
for (let y=0;y<H;y+=GS) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

// Apply shake
let sx=0, sy=0;
if (shakeDuration > 0) {
sx = (Math.random()-0.5)*shakeAmount*2;
sy = (Math.random()-0.5)*shakeAmount*2;
}
ctx.save();
ctx.translate(sx, sy);

// Draw power-up indicator (magnetic field effect)
if (powerUpActive && powerUp.type) {
const head = snake[0];
const hx = head.x*GS+GS/2;
const hy = head.y*GS+GS/2;
const pr = 120+Math.sin(frameCount/10)*20;
const pgrad = ctx.createRadialGradient(hx, hy, 20, hx, hy, pr);
const pc = powerUp.type.color;
pgrad.addColorStop(0, pc.replace(')','.3)').replace('rgb', 'rgba'));
pgrad.addColorStop(1, 'transparent');
ctx.fillStyle = pgrad;
ctx.beginPath(); ctx.arc(hx, hy, pr, 0, Math.PI*2); ctx.fill();
}

// Draw snake
for (let i=snake.length-1;i>=0;i--) {
drawSnakeSegment(snake[i].x, snake[i].y, i, snake.length);
}

// Draw food
if (food) {
const fx = food.x*GS+GS/2;
const fy = food.y*GS+GS/2;
food.pulse = (food.pulse||0)+0.08;
const scale = 1+Math.sin(food.pulse)*0.2;

ctx.save();
ctx.translate(fx, fy);
ctx.scale(scale, scale);

// Glow
ctx.shadowColor = food.type.glow;
ctx.shadowBlur = 15+Math.sin(food.pulse)*8;

// Circle background
ctx.fillStyle = 'rgba(255,255,255,.1)';
ctx.beginPath(); ctx.arc(0,0,GS/2+2,0,Math.PI*2); ctx.fill();

// Emoji
ctx.shadowBlur = 0;
ctx.font = `${GS+4}px serif`;
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(food.type.emoji, 0, 2);

ctx.restore();
}

// Draw bonus food (flashing)
if (bonusFood) {
const bx = bonusFood.x*GS+GS/2;
const by = bonusFood.y*GS+GS/2;
const blink = bonusFood.life < 50 && Math.floor(bonusFood.life/5)%2===0;
if (!blink) {
ctx.save();
ctx.translate(bx, by);
ctx.shadowColor = '#ff69b4';
ctx.shadowBlur = 20;
ctx.font = `${GS+8}px serif`;
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('🍩', 0, 2);
ctx.restore();

// Timer ring
const ratio = bonusFood.life / 200;
ctx.strokeStyle = `rgba(255,105,180,${0.5+ratio*0.5})`;
ctx.lineWidth = 2;
ctx.beginPath();
ctx.arc(bx, by, GS/2+4, -Math.PI/2, -Math.PI/2+Math.PI*2*ratio);
ctx.stroke();
}
}

// Draw power-up
if (powerUp) {
const px = powerUp.x*GS+GS/2;
const py = powerUp.y*GS+GS/2;
ctx.save();
ctx.translate(px, py);
const pscale = 1+Math.sin(frameCount/8)*0.15;
ctx.scale(pscale, pscale);
ctx.shadowColor = powerUp.type.glow;
ctx.shadowBlur = 18;
ctx.font = `${GS+6}px serif`;
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(powerUp.type.emoji, 0, 2);

// Spinning ring
ctx.shadowBlur = 0;
ctx.strokeStyle = powerUp.type.color;
ctx.lineWidth = 2;
ctx.beginPath();
ctx.arc(0, 0, GS/2+6, frameCount/10, frameCount/10+Math.PI*1.5);
ctx.stroke();

ctx.restore();
}

// Draw particles
for (const p of particles) {
const alpha = p.life/40;
ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
if (!p.color.includes('rgba')) {
ctx.globalAlpha = alpha;
ctx.fillStyle = p.color;
}
ctx.beginPath();
ctx.arc(p.x, p.y, p.size*(p.life/40), 0, Math.PI*2);
ctx.fill();
}
ctx.globalAlpha = 1;

// Draw floating texts
for (const t of texts) {
const alpha = t.life/35;
ctx.fillStyle = `rgba(255,255,255,${alpha})`;
ctx.font = `bold ${t.size}px "Microsoft YaHei",sans-serif`;
ctx.textAlign = 'center';
ctx.fillText(t.text, t.x, t.y);
}

ctx.restore();

// Power-up status bar
if (powerUpActive && powerUp.type) {
const barW = 160;
const barH = 8;
const barX = (W-barW)/2;
const barY = 50;
const ratio = powerUpTimer / powerUp.type.duration;

ctx.fillStyle = 'rgba(0,0,0,.5)';
ctx.beginPath(); ctx.roundRect(barX-2, barY-2, barW+4, barH+4, 6); ctx.fill();

ctx.fillStyle = 'rgba(255,255,255,.1)';
ctx.beginPath(); ctx.roundRect(barX, barY, barW, barH, 4); ctx.fill();

const pgrad = ctx.createLinearGradient(barX, 0, barX+barW*ratio, 0);
pgrad.addColorStop(0, powerUp.type.color);
pgrad.addColorStop(1, powerUp.type.glow);
ctx.fillStyle = pgrad;
ctx.beginPath(); ctx.roundRect(barX, barY, barW*ratio, barH, 4); ctx.fill();

ctx.fillStyle = '#fff';
ctx.font = 'bold 11px "Microsoft YaHei",sans-serif';
ctx.textAlign = 'center';
ctx.fillText(`${powerUp.type.emoji} ${powerUp.type.name}`, W/2, barY-6);
}

// Pause overlay
if (gamePaused) {
ctx.fillStyle = 'rgba(0,0,0,.6)';
ctx.fillRect(0,0,W,H);
ctx.fillStyle = '#fff';
ctx.font = 'bold 36px "Microsoft YaHei",sans-serif';
ctx.textAlign = 'center';
ctx.fillText('⏸ 暂停', W/2, H/2);
}
}

// ===== GAME LOOP =====
function gameLoop() {
update();
render();
if (gameOver) {
document.getElementById('mobileCtrl').style.display = 'none';
}
setTimeout(gameLoop, speed);
}

// ===== INPUT =====
document.addEventListener('keydown', e => {
if (!gameStarted || gameOver) return;
const k = e.key.toLowerCase();

if (k === 'escape' || k === 'p') { togglePause(); return; }

if (k === 'arrowup' || k === 'w') { setDir(0,-1); e.preventDefault(); }
else if (k === 'arrowdown' || k === 's') { setDir(0,1); e.preventDefault(); }
else if (k === 'arrowleft' || k === 'a') { setDir(-1,0); e.preventDefault(); }
else if (k === 'arrowright' || k === 'd') { setDir(1,0); e.preventDefault(); }
});

// Mobile D-pad
document.querySelectorAll('.dpad-btn').forEach(btn => {
btn.addEventListener('pointerdown', e => {
e.preventDefault();
const d = btn.dataset.dir;
if (d==='up') setDir(0,-1);
if (d==='down') setDir(0,1);
if (d==='left') setDir(-1,0);
if (d==='right') setDir(1,0);
});
});

// Touch swipe on canvas
let touchStart = null;
canvas.addEventListener('touchstart', e => {
e.preventDefault();
if (!gameStarted || gameOver) return;
const t = e.touches[0];
touchStart = {x:t.clientX, y:t.clientY};
});
canvas.addEventListener('touchmove', e => {
e.preventDefault();
if (!touchStart || !gameStarted || gameOver) return;
const t = e.touches[0];
const dx = t.clientX - touchStart.x;
const dy = t.clientY - touchStart.y;
const minSwipe = 20;
if (Math.abs(dx) > minSwipe || Math.abs(dy) > minSwipe) {
if (Math.abs(dx) > Math.abs(dy)) { setDir(dx>0?1:-1, 0); }
else { setDir(0, dy>0?1:-1); }
touchStart = {x:t.clientX, y:t.clientY};
}
});
canvas.addEventListener('touchend', () => { touchStart = null; });

function setDir(dx, dy) {
if (dx !== 0 && dir.x === -dx) return; // Prevent 180
if (dy !== 0 && dir.y === -dy) return;
nextDir = {x:dx, y:dy};
}

function togglePause() {
if (!gameStarted || gameOver) return;
gamePaused = !gamePaused;
document.getElementById('pauseBtn').textContent = gamePaused ? '▶' : '⏸';
}

// ===== BUTTONS =====
document.getElementById('pauseBtn').onclick = togglePause;
document.getElementById('soundBtn').onclick = () => {
soundOn = !soundOn;
document.getElementById('soundBtn').textContent = soundOn ? '🔊' : '🔇';
};

document.getElementById('startBtn').onclick = () => {
initAudio();
initGame();
document.getElementById('menu').style.display = 'none';
updateHighScoreUI();
gameLoop();
};

document.getElementById('overRestart').onclick = () => {
initAudio();
initGame();
gameLoop();
};

document.getElementById('overMenu').onclick = () => {
gameRunning = false;
gameOver = false;
gameStarted = false;
document.getElementById('overOverlay').style.display = 'none';
document.getElementById('menu').style.display = 'flex';
document.getElementById('mobileCtrl').style.display = 'none';
updateHighScoreUI();
};

// ===== DIFFICULTY =====
let selectedDiff = 1;
function buildDiffRow() {
const row = document.getElementById('diffRow');
row.innerHTML = '';
DIFF_NAMES.forEach((name, i) => {
const btn = document.createElement('button');
btn.className = 'diff-btn' + (i===selectedDiff ? ' active' : '');
btn.textContent = name;
btn.onclick = () => { selectedDiff=i; buildDiffRow(); };
row.appendChild(btn);
});
baseSpeed = DIFF_SPEEDS[selectedDiff];
}
buildDiffRow();

// ===== HIGH SCORE =====
highScore = parseInt(localStorage.getItem('snakeHigh')||'0');
updateHighScoreUI();

// ===== INIT =====
resize();
</script>
</body>
</html>
